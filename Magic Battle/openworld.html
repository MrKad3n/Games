		maxHp: t.hp, hp: t.hp,
		vx: 0, vy: 0,
		facing: -1,
		attackTimer: 60,
		dead: false, deathTimer: 0,
		flash: 0,
		phase: 1,
		specialTimer: 0
	};
	document.getElementById('bossBar').style.display = 'block';
	document.getElementById('bossName').textContent = t.name;
}

/* ============================================================
   [21] HELPER FUNCTIONS
   ============================================================ */

/* Get the region the given x-coordinate falls within */
function getRegionAt(x){
	for(const r of REGIONS) if(x >= r.startX && x < r.endX) return r;
	return REGIONS[REGIONS.length-1];
}

/* Get ground Y at a given world x */
function getGroundY(x){
	for(const seg of GROUND_SEGMENTS){
		if(x >= seg.x1 && x < seg.x2) return seg.y;
	}
	return null; // no ground (lava!)
}

/* Check if position is over a lava gap */
function isOverLava(x){
	return getGroundY(x) === null && getRegionAt(x)?.id === 'temple';
}

/* ============================================================
   [22] UPDATE LOGIC
   ============================================================ */

function update(){
	if(paused || !gameStarted) return;
	if(cinematicActive){ updateCinematic(); return; }

	/* -- Player Movement (dungeon-consistent) -- */
	if(!player.dead && !dialogueActive){
		let mx = 0;
		if(keys['a'] || keys['arrowleft']) mx -= 1;
		if(keys['d'] || keys['arrowright']) mx += 1;
		if(mx !== 0) player.facing = mx;
		const spdM = player.slowTimer > 0 ? 0.5 : 1;
		const vowSpdMult = 1 + vowSpeedBonus * 0.08;
		const vowMvPenalty = Math.max(0.5, 1 - vowMovementPenalty * 0.01);
		const currentSpeed = player.speed * (playerBuffs.speedTimer > 0 ? playerBuffs.speedMult : 1) * spdM * vowSpdMult * vowMvPenalty;
		player.vx = mx * currentSpeed;
		if(player.launchVx){ player.vx += player.launchVx; player.launchVx *= 0.88; if(Math.abs(player.launchVx) < 0.5) player.launchVx = 0; }

		if((keys['w'] || keys['arrowup'] || keys[' ']) && player.grounded){
			const vowJmpMult = 1 + vowJumpBonus * 0.08;
			const currentJump = player.jumpPow * (playerBuffs.jumpTimer > 0 ? playerBuffs.jumpMult : 1) * vowJmpMult;
			player.vy = currentJump;
			player.grounded = false;
		}
	}

	// Apply gravity
	player.vy += GRAVITY;
	if(player.vy > 18) player.vy = 18;
	player.x += player.vx;
	player.y += player.vy;

	// Clamp to world
	player.x = Math.max(0, Math.min(player.x, WORLD_WIDTH - player.w));

	// Ground collision
	player.grounded = false;
	const groundY = getGroundY(player.x + player.w/2);
	if(groundY !== null && player.y + player.h >= groundY && player.vy >= 0){
		player.y = groundY - player.h;
		player.vy = 0;
		player.grounded = true;
	}

	// Platform collision (world + player-created)
	const allPlatforms = [...PLATFORMS, ...playerPlatforms];
	for(const plat of allPlatforms){
		if(player.vy >= 0 &&
		   player.x + player.w > plat.x && player.x < plat.x + plat.w &&
		   player.y + player.h >= plat.y && player.y + player.h <= plat.y + plat.h + 12){
			player.y = plat.y - player.h;
			player.vy = 0;
			player.grounded = true;
		}
	}

	// Lava death
	if(player.y > canvas.height + 50){
		player.hp -= 50;
		if(player.hp <= 0){ player.dead = true; }
		else {
			// Respawn at last safe ground
			const seg = GROUND_SEGMENTS.find(s => s.x2 > player.x - 500);
			if(seg){ player.x = seg.x1 + 100; player.y = seg.y - player.h - 20; player.vy = 0; }
		}
	}

	// Mana regen (with buff support)
	const manaRegenRate = player.manaRegen * (playerBuffs.manaRegenTimer > 0 ? playerBuffs.manaRegenMult : 1);
	player.mana = Math.min(player.maxMana, player.mana + manaRegenRate);
	// Spell cooldowns
	for(let i = 0; i < 10; i++) if(spellCooldowns[i] > 0) spellCooldowns[i]--;
	if(player.castCooldown > 0) player.castCooldown--;
	if(player.castTimer > 0) player.castTimer--;
	if(player.attackTimer > 0) player.attackTimer--;
	else player.attacking = false;
	if(player.invincible > 0) player.invincible--;
	if(player.flash > 0) player.flash--;
	// LaunchVx decay
	if(player.launchVx) { player.x += player.launchVx; player.launchVx *= 0.9; if(Math.abs(player.launchVx) < 0.3) player.launchVx = 0; }
	// Speed buff
	const moveSpeedMult = playerBuffs.speedTimer > 0 ? playerBuffs.speedMult : 1;

	// Player animation
	if(player.dead) pAnimState = 'defeat';
	else if(player.attacking) pAnimState = 'attack';
	else if(Math.abs(player.vx) > 0.5) pAnimState = 'walk';
	else pAnimState = 'idle';
	pAnimTimer++;
	if(pAnimTimer >= PS_FPS){ pAnimTimer = 0; pAnimFrame = (pAnimFrame+1)%PS_COLS; }

	/* -- Update Player Platforms -- */
	for(let i = playerPlatforms.length-1; i >= 0; i--){
		playerPlatforms[i].life--;
		if(playerPlatforms[i].life <= 0) playerPlatforms.splice(i,1);
	}

	/* -- Update Projectiles (full spell engine) -- */
	updateProjectiles();
	renderHotbar();

	/* -- Update Enemy Projectiles -- */
	for(let i = enemyProjectiles.length-1; i >= 0; i--){
		const ep = enemyProjectiles[i];
		ep.x += ep.vx;
		ep.y += ep.vy;
		ep.life--;

		// Hit player
		if(!player.dead && player.invincible <= 0 &&
		   ep.x+ep.w > player.x && ep.x < player.x+player.w &&
		   ep.y+ep.h > player.y && ep.y < player.y+player.h){
			damagePlayer(ep.damage);
			enemyProjectiles.splice(i,1);
			continue;
		}
		if(ep.life <= 0) enemyProjectiles.splice(i,1);
	}

	/* -- Update Enemies -- */
	for(const e of enemies){
		if(e.dead){ e.deathTimer++; continue; }

		// DOTs + stun/slow are processed in updateProjectiles() via ensureEnemyProps
		if(e.stunTimer && e.stunTimer > 0) continue;

		const dist = Math.hypot(player.x - e.x, player.y - e.y);
		const speedMod = (e.slowTimer && e.slowTimer > 0) ? 0.4 : 1;
		e.attackTimer = Math.max(0, e.attackTimer - 1);

		if(e.ai === 'chase' && dist < e.aggroRange){
			const dir = player.x > e.x ? 1 : -1;
			e.facing = dir;
			e.vx = dir * e.speed * speedMod;
			if(dist < e.attackRange && e.attackTimer <= 0){
				damagePlayer(e.damage);
				e.attackTimer = e.attackCd;
			}
		} else if(e.ai === 'ranged' && dist < e.aggroRange){
			e.facing = player.x > e.x ? 1 : -1;
			if(dist > 80) e.vx = e.facing * e.speed * 0.5 * speedMod;
			else e.vx = 0;
			if(dist < e.attackRange && e.attackTimer <= 0){
				const angle = Math.atan2(player.y+player.h/2-(e.y+e.h/2), player.x+player.w/2-(e.x+e.w/2));
				enemyProjectiles.push({
					x:e.x+e.w/2-6, y:e.y+e.h/2-6, w:12, h:12,
					vx:Math.cos(angle)*(e.projectileSpeed||4),
					vy:Math.sin(angle)*(e.projectileSpeed||4),
					damage:e.damage, life:120,
					color:e.projectileColor||'#ff4444'
				});
				e.attackTimer = e.attackCd;
			}
		} else if(e.ai === 'stationary_attack'){
			e.vx = 0;
			if(dist < e.attackRange && e.attackTimer <= 0){
				damagePlayer(e.damage);
				e.attackTimer = e.attackCd;
			}
		} else if(e.patrol){
			if(e.x <= e.patrol[0]) e.facing = 1;
			if(e.x >= e.patrol[1]) e.facing = -1;
			e.vx = e.facing * e.speed * 0.5 * speedMod;
		} else {
			e.vx *= 0.9;
		}

		e.vy += GRAVITY;
		e.x += e.vx;
		e.y += e.vy;
		const egy = getGroundY(e.x + e.w/2);
		if(egy !== null && e.y + e.h >= egy){
			e.y = egy - e.h;
			e.vy = 0;
		}

		// Death check
		if(e.hp <= 0 && !e.dead){
			e.dead = true;
			e.deathTimer = 0;
			for(let k=0;k<12;k++) particles.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-3,life:25+Math.random()*20,color:e.color,size:4});
		}
	}

	// Check if all training dummies defeated
	if(currentQuestIndex === 1){
		const dummiesLeft = enemies.filter(e => e.isTraining && !e.dead);
		if(dummiesLeft.length === 0) questFlags.trainingDone = true;
	}

	// Remove fully dead enemies after animation
	for(let i = enemies.length-1; i >= 0; i--){
		if(enemies[i].dead && enemies[i].deathTimer > 60) enemies.splice(i,1);
	}

	/* -- Update Boss -- */
	if(activeBoss && !activeBoss.dead){
		const b = activeBoss;
		const dist = Math.hypot(player.x - b.x, player.y - b.y);
		const speedMod = (b.slowTimer && b.slowTimer > 0) ? 0.4 : 1;
		if(b.stunTimer && b.stunTimer > 0){ /* stun handled by updateProjectiles */ }
		else {
			b.facing = player.x > b.x ? 1 : -1;
			b.attackTimer--;
			b.specialTimer++;

			if(b.ai === 'boss_warden'){
				// Fire Warden: chase + ground slam + fireball
				if(dist > 80) b.vx = b.facing * b.speed * speedMod;
				else b.vx = 0;

				if(b.attackTimer <= 0){
					if(b.specialTimer % 3 === 0){
						// Ground slam
						for(let k=-2;k<=2;k++){
							enemyProjectiles.push({
								x:b.x+b.w/2+k*40-8, y:b.y+b.h-16, w:16, h:16,
								vx:k*2, vy:-6, damage:b.damage, life:50,
								color:'#ff6622'
							});
						}
					} else {
						// Fireball
						const angle = Math.atan2(player.y-b.y, player.x-b.x);
						enemyProjectiles.push({
							x:b.x+b.w/2-10, y:b.y+b.h/2-10, w:20, h:20,
							vx:Math.cos(angle)*5, vy:Math.sin(angle)*5,
							damage:b.damage, life:100, color:'#ff4400'
						});
					}
					b.attackTimer = b.attackCd;
				}
			}

			if(b.ai === 'boss_ignaroth'){
				// Ignaroth: fire breath, charge, meteor rain
				if(dist > 150) b.vx = b.facing * b.speed * speedMod;
				else b.vx *= 0.9;

				// Phases at 66% and 33% HP
				if(b.hp < b.maxHp * 0.33) b.phase = 3;
				else if(b.hp < b.maxHp * 0.66) b.phase = 2;

				if(b.attackTimer <= 0){
					const atk = b.specialTimer % (4 - b.phase + 1);
					if(atk === 0){
						// Fire breath — cone of projectiles
						for(let k=-3;k<=3;k++){
							const angle = Math.atan2(player.y-b.y, player.x-b.x) + k*0.15;
							enemyProjectiles.push({
								x:b.x+b.w/2, y:b.y+b.h/3, w:14, h:14,
								vx:Math.cos(angle)*6, vy:Math.sin(angle)*6,
								damage:b.damage*0.6, life:60, color:'#ff3300'
							});
						}
					} else if(atk === 1){
						// Charge
						b.vx = b.facing * 12;
					} else {
						// Meteor — rain from above
						for(let k=0;k<(b.phase>=2?5:3);k++){
							enemyProjectiles.push({
								x:player.x + (Math.random()-0.5)*200 - 10, y:camera.y - 20, w:20, h:20,
								vx:(Math.random()-0.5)*2, vy:5+Math.random()*3,
								damage:b.damage*0.8, life:120, color:'#ff6622'
							});
						}
					}
					b.attackTimer = Math.max(20, b.attackCd - b.phase*8);
				}
			}
		}

		b.vy += GRAVITY;
		b.x += b.vx;
		b.y += b.vy;
		b.vx *= 0.92;
		const bgy = getGroundY(b.x + b.w/2);
		if(bgy !== null && b.y + b.h >= bgy){
			b.y = bgy - b.h;
			b.vy = 0;
		}

		// DOTs handled by updateProjectiles() via ensureEnemyProps
		if(b.flash > 0) b.flash--;

		// Boss HP bar
		const pct = Math.max(0, b.hp/b.maxHp*100);
		document.getElementById('bossHpFill').style.width = pct+'%';

		// Boss death
		if(b.hp <= 0){
			b.dead = true;
			document.getElementById('bossBar').style.display = 'none';
			if(b.type === 'fire_warden'){
				questFlags.fireWardenDefeated = true;
				owSave.defeatedBosses.push('fire_warden');
			}
			if(b.type === 'ignaroth'){
				questFlags.ignarothDefeated = true;
				owSave.defeatedBosses.push('ignaroth');
			}
			for(let k=0;k<30;k++) particles.push({x:b.x+Math.random()*b.w,y:b.y+Math.random()*b.h,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8-4,life:40+Math.random()*30,color:b.color,size:5+Math.random()*5});
			enemyProjectiles.length = 0;
			activeBoss = null;
			saveOW();
		}
	}

	// Melee boss damage to player
	if(activeBoss && !activeBoss.dead && !player.dead && player.invincible <= 0){
		const b = activeBoss;
		if(player.x+player.w > b.x && player.x < b.x+b.w && player.y+player.h > b.y && player.y < b.y+b.h){
			damagePlayer(b.damage * 0.5);
		}
	}

	/* -- Particles -- */
	for(let i = particles.length-1; i >= 0; i--){
		const p = particles[i];
		p.x += p.vx; p.y += p.vy;
		p.vy += 0.1;
		p.life--;
		if(p.life <= 0) particles.splice(i,1);
	}

	/* -- Damage Numbers -- */
	for(let i = dmgNumbers.length-1; i >= 0; i--){
		dmgNumbers[i].y -= 1;
		dmgNumbers[i].age++;
		if(dmgNumbers[i].age > 50) dmgNumbers.splice(i,1);
	}

	/* -- Quest Progression -- */
	if(currentQuestIndex < QUESTS.length){
		const q = QUESTS[currentQuestIndex];
		if(q.check()){
			q.onComplete();
			currentQuestIndex++;
			if(currentQuestIndex < QUESTS.length) QUESTS[currentQuestIndex].onStart();
			saveOW();
		}
	}

	/* -- UI Updates -- */
	checkNearby();
	checkRegionLabel();
	updateTypewriter();
	updateNotify();
	updateCamera();
	updateHUD();

	// Auto-save every 30 seconds
	if(frameCount % 1800 === 0) saveOW();
}

function damagePlayer(dmg){
	if(player.dead || player.invincible > 0) return;
	const stats = computeStats(playerData);
	const def = stats.magicDefence || 5;
	const actual = Math.max(1, dmg - def*0.3);
	player.hp -= actual;
	player.invincible = 30;
	player.flash = 8;
	dmgNumbers.push({x:player.x+player.w/2,y:player.y-10,text:'-'+Math.round(actual),age:0,color:'#ff6666'});
	if(player.hp <= 0){
		player.hp = 0;
		player.dead = true;
		// Respawn after delay
		setTimeout(()=>{
			player.dead = false;
			player.hp = player.maxHp;
			player.mana = player.maxMana;
			// Respawn at nearest region start
			const r = getRegionAt(player.x);
			player.x = r ? r.startX + 200 : 300;
			const gy = getGroundY(player.x + player.w/2) || GROUND_Y_BASE;
			player.y = gy - player.h - 10;
			player.vy = 0;
		}, 2000);
	}
}

function updateHUD(){
	const hpPct = Math.max(0, player.hp/player.maxHp*100);
	const mpPct = Math.max(0, player.mana/player.maxMana*100);
	document.getElementById('healthFill').style.width = hpPct+'%';
	document.getElementById('healthLabel').textContent = Math.round(player.hp)+' / '+player.maxHp;
	document.getElementById('manaFill').style.width = mpPct+'%';
	document.getElementById('manaLabel').textContent = Math.round(player.mana)+' / '+player.maxMana;

	// Quest tracker
	if(currentQuestIndex < QUESTS.length){
		const q = QUESTS[currentQuestIndex];
		document.getElementById('questTitle').textContent = q.title;
		document.getElementById('questDesc').textContent = q.desc;
	} else {
		document.getElementById('questTitle').textContent = 'Chapter 1 Complete';
		document.getElementById('questDesc').textContent = 'The story continues…';
	}
}

/* ============================================================
   [23] RENDERING
   ============================================================ */

function render(){
	const w = canvas.width, h = canvas.height;
	ctx.clearRect(0,0,w,h);

	const region = getRegionAt(player.x) || REGIONS[0];

	/* -- Sky gradient -- */
	const skyGrad = ctx.createLinearGradient(0,0,0,h);
	skyGrad.addColorStop(0, region.skyTop);
	skyGrad.addColorStop(1, region.skyBot);
	ctx.fillStyle = skyGrad;
	ctx.fillRect(0,0,w,h);

	/* -- Far parallax: mountains/structures -- */
	ctx.save();
	const farOff = camera.x * 0.15;
	drawFarBackground(region, farOff, w, h);
	ctx.restore();

	/* -- Mid parallax: trees/buildings -- */
	ctx.save();
	const midOff = camera.x * 0.4;
	drawMidBackground(region, midOff, w, h);
	ctx.restore();

	/* -- Ground & terrain -- */
	ctx.save();
	ctx.translate(-camera.x, 0);

	for(const seg of GROUND_SEGMENTS){
		if(seg.x2 < camera.x - 100 || seg.x1 > camera.x + w + 100) continue;
		const r = getRegionAt((seg.x1+seg.x2)/2);
		ctx.fillStyle = r?.groundColor || '#333';
		ctx.fillRect(seg.x1, seg.y, seg.x2-seg.x1, h-seg.y);
		// Ground accent line
		ctx.fillStyle = r?.groundAccent || '#222';
		ctx.fillRect(seg.x1, seg.y, seg.x2-seg.x1, 3);
	}

	/* Lava in temple gaps */
	if(region.id === 'temple'){
		ctx.fillStyle = '#ff4400';
		ctx.globalAlpha = 0.5 + Math.sin(Date.now()*0.003)*0.2;
		ctx.fillRect(17200, h-40, 200, 40);
		ctx.fillRect(17800, h-40, 200, 40);
		ctx.fillRect(18800, h-40, 200, 40);
		ctx.fillRect(19300, h-40, 100, 40);
		ctx.globalAlpha = 1;
	}

	/* -- Platforms -- */
	for(const plat of PLATFORMS){
		if(plat.x + plat.w < camera.x - 50 || plat.x > camera.x + w + 50) continue;
		ctx.fillStyle = plat.type === 'wood' ? '#665533' : plat.type === 'temple' ? '#553333' : '#777788';
		ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
		ctx.fillStyle = 'rgba(255,255,255,0.1)';
		ctx.fillRect(plat.x, plat.y, plat.w, 2);
	}

	/* Player-created platforms */
	for(const pp of playerPlatforms){
		ctx.fillStyle = pp.color || '#44aa44';
		ctx.globalAlpha = Math.min(1, pp.life/30);
		ctx.fillRect(pp.x, pp.y, pp.w, pp.h);
		ctx.strokeStyle = 'rgba(255,255,255,0.3)';
		ctx.strokeRect(pp.x, pp.y, pp.w, pp.h);
		ctx.globalAlpha = 1;
	}

	/* -- Decorations per region -- */
	drawDecorations(region, w);

	/* -- World objects (pickups, monuments, portals) -- */
	for(const obj of WORLD_OBJECTS){
		if(obj.type !== 'portal' && owSave.discoveredItems.includes(obj.id)) continue;
		if(obj.condition && !obj.condition()) continue;
		if(obj.x < camera.x - 100 || obj.x > camera.x + w + 100) continue;
		ctx.font = (obj.w || 24)+'px Arial';
		ctx.textAlign = 'center';
		ctx.fillText(obj.icon, obj.x + (obj.w||24)/2, obj.y + (obj.h||24)/2 + 6);
		// Glow
		ctx.save(); ctx.globalAlpha = 0.3 + Math.sin(Date.now()*0.004)*0.2;
		ctx.beginPath(); ctx.arc(obj.x+(obj.w||24)/2, obj.y+(obj.h||24)/2, 20, 0, Math.PI*2);
		ctx.fillStyle = obj.type === 'portal' ? '#ff4400' : '#ffcc44'; ctx.fill(); ctx.restore();
	}

	/* -- NPCs -- */
	for(const npc of NPCS){
		if(npc.x < camera.x - 100 || npc.x > camera.x + w + 100) continue;
		const ny = GROUND_Y_BASE - npc.h;
		// Body
		ctx.fillStyle = npc.color;
		ctx.fillRect(npc.x, ny, npc.w, npc.h);
		// Icon
		ctx.font = '24px Arial';
		ctx.textAlign = 'center';
		ctx.fillText(npc.icon, npc.x + npc.w/2, ny - 8);
		// Name
		ctx.font = '11px Arial';
		ctx.fillStyle = '#fff';
		ctx.textAlign = 'center';
		ctx.fillText(npc.name, npc.x + npc.w/2, ny - 22);
		// Quest indicator
		if(isNPCQuestTarget(npc.id)){
			ctx.font = '18px Arial';
			ctx.fillText('❗', npc.x + npc.w/2, ny - 38);
		}
	}

	/* -- Enemies -- */
	for(const e of enemies){
		if(e.dead && e.deathTimer > 40) continue;
		if(e.x + e.w < camera.x - 50 || e.x > camera.x + w + 50) continue;
		ctx.save();
		if(e.dead) ctx.globalAlpha = Math.max(0, 1 - e.deathTimer/40);
		if(e.flash > 0){ ctx.globalAlpha = 0.5+Math.sin(e.flash*2)*0.5; }
		ctx.fillStyle = e.color;
		ctx.fillRect(e.x, e.y, e.w, e.h);
		// Icon
		ctx.font = Math.min(e.w, e.h)*0.6+'px Arial';
		ctx.textAlign = 'center';
		ctx.fillText(e.icon, e.x+e.w/2, e.y+e.h/2+4);
		// HP bar
		if(!e.dead && e.hp < e.maxHp){
			const bw = e.w;
			ctx.fillStyle = 'rgba(0,0,0,0.6)';
			ctx.fillRect(e.x, e.y-8, bw, 5);
			ctx.fillStyle = '#e74c3c';
			ctx.fillRect(e.x, e.y-8, bw*(e.hp/e.maxHp), 5);
		}
		ctx.restore();
	}

	/* -- Boss -- */
	if(activeBoss && !activeBoss.dead){
		const b = activeBoss;
		ctx.save();
		if(b.flash > 0) ctx.globalAlpha = 0.6+Math.sin(b.flash*3)*0.4;
		ctx.fillStyle = b.color;
		ctx.fillRect(b.x, b.y, b.w, b.h);
		ctx.font = Math.min(b.w,b.h)*0.5+'px Arial';
		ctx.textAlign = 'center';
		ctx.fillText(b.icon, b.x+b.w/2, b.y+b.h/2+10);
		// Phase aura
		if(b.type === 'ignaroth'){
			ctx.globalAlpha = 0.1 + Math.sin(Date.now()*0.003)*0.05;
			ctx.beginPath(); ctx.arc(b.x+b.w/2, b.y+b.h/2, b.w*0.7, 0, Math.PI*2);
			ctx.fillStyle = b.phase >= 3 ? '#ff0022' : b.phase >= 2 ? '#ff4422' : '#882200';
			ctx.fill();
		}
		ctx.restore();
	}

	/* -- Player -- */
	if(!player.dead || (player.dead && pAnimState === 'defeat')){
		ctx.save();
		if(player.invincible > 0 && player.invincible % 4 < 2) ctx.globalAlpha = 0.4;
		if(PLAYER_SPRITE.complete && PLAYER_SPRITE.naturalWidth > 0){
			const row = PS_ROW[pAnimState] || 0;
			const fw = PLAYER_SPRITE.naturalWidth / PS_COLS;
			const fh = PLAYER_SPRITE.naturalHeight / PS_ROWS;
			const dw = fw * PS_SCALE * 0.5;
			const dh = fh * PS_SCALE * 0.5;
			const dx = player.x + player.w/2 - dw/2;
			const dy = player.y + player.h - dh;
			if(player.facing < 0){
				ctx.translate(dx + dw, dy);
				ctx.scale(-1, 1);
				ctx.drawImage(PLAYER_SPRITE, pAnimFrame*fw, row*fh, fw, fh, 0, 0, dw, dh);
			} else {
				ctx.drawImage(PLAYER_SPRITE, pAnimFrame*fw, row*fh, fw, fh, dx, dy, dw, dh);
			}
		} else {
			ctx.fillStyle = '#4488ff';
			ctx.fillRect(player.x, player.y, player.w, player.h);
		}
		if(player.flash > 0){
			ctx.globalAlpha = player.flash/8*0.5;
			ctx.fillStyle = '#fff';
			ctx.fillRect(player.x-2, player.y-2, player.w+4, player.h+4);
		}
		ctx.restore();
	}

	/* -- Projectiles (full spell engine rendering) -- */
	renderProjectiles();

	/* -- Enemy projectiles -- */
	for(const ep of enemyProjectiles){
		ctx.fillStyle = ep.color || '#ff4444';
		ctx.beginPath(); ctx.arc(ep.x+ep.w/2, ep.y+ep.h/2, ep.w/2, 0, Math.PI*2);
		ctx.fill();
	}

	/* -- Particles -- */
	for(const p of particles){
		ctx.save();
		const ml = p.maxLife || 30;
		ctx.globalAlpha = Math.max(0, p.life / ml);
		if(typeof p.color === 'object' && p.color.r !== undefined){
			ctx.fillStyle = `rgb(${p.color.r},${p.color.g},${p.color.b})`;
		} else {
			ctx.fillStyle = p.color || '#fff';
		}
		const sz = p.r || p.size || 3;
		ctx.beginPath();
		ctx.arc(p.x, p.y, sz, 0, Math.PI*2);
		ctx.fill();
		ctx.restore();
	}

	/* -- Damage numbers -- */
	for(const d of dmgNumbers){
		ctx.save();
		ctx.globalAlpha = Math.max(0, 1 - d.age/50);
		ctx.font = 'bold 14px Arial';
		ctx.fillStyle = d.color;
		ctx.textAlign = 'center';
		ctx.fillText(d.text, d.x, d.y);
		ctx.restore();
	}

	ctx.restore(); // undo camera translate

	/* -- Death overlay -- */
	if(player.dead){
		ctx.fillStyle = 'rgba(0,0,0,0.5)';
		ctx.fillRect(0,0,w,h);
		ctx.font = 'bold 36px Arial';
		ctx.fillStyle = '#ff4444';
		ctx.textAlign = 'center';
		ctx.fillText('You Died', w/2, h/2 - 10);
		ctx.font = '16px Arial';
		ctx.fillStyle = '#aaa';
		ctx.fillText('Respawning…', w/2, h/2+20);
	}

	/* -- Fog overlay for certain regions -- */
	if(region.fogColor){
		ctx.fillStyle = region.fogColor;
		ctx.fillRect(0,0,w,h);
	}
}

/* -- Background rendering helpers -- */
function drawFarBackground(region, offset, w, h){
	// Draw distant silhouettes based on region
	if(region.id === 'valley' || region.id === 'city'){
		// Mountains
		ctx.fillStyle = 'rgba(60,80,120,0.3)';
		for(let i=0;i<8;i++){
			const mx = i*300 - (offset%300);
			const mh = 100+Math.sin(i*1.3)*50;
			ctx.beginPath();
			ctx.moveTo(mx, h*0.55);
			ctx.lineTo(mx+150, h*0.55-mh);
			ctx.lineTo(mx+300, h*0.55);
			ctx.fill();
		}
	}
	if(region.id === 'woods'){
		ctx.fillStyle = 'rgba(20,50,30,0.5)';
		for(let i=0;i<12;i++){
			const tx = i*200 - (offset%200);
			ctx.beginPath();
			ctx.moveTo(tx+20, h*0.5);
			ctx.lineTo(tx+50, h*0.15);
			ctx.lineTo(tx+80, h*0.5);
			ctx.fill();
		}
	}
	if(region.id === 'foothills'){
		// Volcanic mountains with lava glow
		ctx.fillStyle = 'rgba(60,20,10,0.4)';
		for(let i=0;i<6;i++){
			const mx = i*350 - (offset%350);
			ctx.beginPath();
			ctx.moveTo(mx, h*0.5);
			ctx.lineTo(mx+175, h*0.15);
			ctx.lineTo(mx+350, h*0.5);
			ctx.fill();
		}
		// Lava glow at peaks
		ctx.fillStyle = 'rgba(255,80,20,0.15)';
		for(let i=0;i<6;i++){
			const mx = i*350 - (offset%350) + 175;
			ctx.beginPath(); ctx.arc(mx, h*0.15, 30, 0, Math.PI*2); ctx.fill();
		}
	}
	if(region.id === 'temple'){
		// Stone pillars background
		ctx.fillStyle = 'rgba(50,20,20,0.4)';
		for(let i=0;i<10;i++){
			const px = i*220 - (offset%220);
			ctx.fillRect(px+80, h*0.2, 30, h*0.4);
			ctx.fillRect(px+60, h*0.18, 70, 15);
		}
	}
}

function drawMidBackground(region, offset, w, h){
	if(region.id === 'valley'){
		// Flowers and small crystals
		ctx.fillStyle = 'rgba(100,200,100,0.2)';
		for(let i=0;i<15;i++){
			const fx = i*150 - (offset%150);
			const fh = 15+Math.sin(i*2.1)*10;
			ctx.beginPath();
			ctx.ellipse(fx+75, h*0.7, 60, fh, 0, 0, Math.PI*2);
			ctx.fill();
		}
	}
	if(region.id === 'city'){
		// Building silhouettes
		ctx.fillStyle = 'rgba(40,30,60,0.6)';
		for(let i=0;i<8;i++){
			const bx = i*250 - (offset%250);
			const bh = 80+Math.sin(i*1.7)*40;
			ctx.fillRect(bx+30, h*0.45-bh, 120, bh+h*0.1);
			// Window lights
			ctx.fillStyle = 'rgba(255,200,100,0.4)';
			for(let wy=0;wy<bh-20;wy+=25){
				for(let wx=0;wx<80;wx+=30){
					ctx.fillRect(bx+50+wx, h*0.45-bh+15+wy, 10, 10);
				}
			}
			ctx.fillStyle = 'rgba(40,30,60,0.6)';
		}
		// Floating lanterns
		ctx.fillStyle = 'rgba(255,200,80,0.5)';
		for(let i=0;i<20;i++){
			const lx = i*120 - (offset*0.8%120);
			const ly = h*0.3 + Math.sin(Date.now()*0.001+i)*15;
			ctx.beginPath(); ctx.arc(lx, ly, 4, 0, Math.PI*2); ctx.fill();
		}
	}
	if(region.id === 'woods'){
		// Tree trunks
		ctx.fillStyle = 'rgba(30,55,25,0.5)';
		for(let i=0;i<10;i++){
			const tx = i*180 - (offset%180);
			ctx.fillRect(tx+70, h*0.3, 18, h*0.4);
			// Canopy
			ctx.fillStyle = 'rgba(20,70,30,0.4)';
			ctx.beginPath(); ctx.arc(tx+79, h*0.3, 50, 0, Math.PI*2); ctx.fill();
			ctx.fillStyle = 'rgba(30,55,25,0.5)';
		}
		// Floating spores
		ctx.fillStyle = 'rgba(150,255,150,0.3)';
		for(let i=0;i<25;i++){
			const sx = i*90 - (offset*0.6%90);
			const sy = h*0.3 + Math.sin(Date.now()*0.001+i*0.7)*40;
			ctx.beginPath(); ctx.arc(sx, sy, 2, 0, Math.PI*2); ctx.fill();
		}
	}
	if(region.id === 'foothills'){
		// Scorched trees
		ctx.fillStyle = 'rgba(40,25,15,0.5)';
		for(let i=0;i<8;i++){
			const tx = i*220 - (offset%220);
			ctx.fillRect(tx+90, h*0.4, 12, h*0.2);
			// Dead branches
			ctx.strokeStyle = 'rgba(50,30,20,0.4)';
			ctx.lineWidth = 3;
			ctx.beginPath(); ctx.moveTo(tx+96, h*0.42); ctx.lineTo(tx+120, h*0.35); ctx.stroke();
			ctx.beginPath(); ctx.moveTo(tx+96, h*0.44); ctx.lineTo(tx+70, h*0.37); ctx.stroke();
		}
		// Smoke columns
		ctx.fillStyle = 'rgba(100,60,40,0.15)';
		for(let i=0;i<5;i++){
			const sx = i*300 - (offset*0.3%300);
			ctx.beginPath(); ctx.ellipse(sx+150, h*0.25-Math.sin(Date.now()*0.001+i)*10, 25, 60, 0, 0, Math.PI*2); ctx.fill();
		}
	}
}

function drawDecorations(region, w){
	const cx = camera.x;
	// Region-specific on-ground decorations
	if(region.id === 'valley'){
		// Arcane flowers and crystals
		for(let i=0;i<40;i++){
			const fx = i*100;
			if(fx < cx-50 || fx > cx+w+50) continue;
			const gy = getGroundY(fx) || GROUND_Y_BASE;
			// Flower
			ctx.fillStyle = ['#ff66aa','#66aaff','#ffcc44','#aa66ff'][i%4];
			ctx.beginPath(); ctx.arc(fx, gy-4, 4, 0, Math.PI*2); ctx.fill();
			// Small crystal (every 5th)
			if(i%5 === 0){
				ctx.fillStyle = 'rgba(100,200,255,0.5)';
				ctx.beginPath();
				ctx.moveTo(fx+30, gy);
				ctx.lineTo(fx+34, gy-14);
				ctx.lineTo(fx+38, gy);
				ctx.fill();
			}
		}
	}
	if(region.id === 'city'){
		// Street rune markings
		for(let i=0;i<20;i++){
			const rx = 4000 + i*200;
			if(rx < cx-50 || rx > cx+w+50) continue;
			const gy = getGroundY(rx) || GROUND_Y_BASE;
			ctx.strokeStyle = 'rgba(120,100,200,0.2)';
			ctx.lineWidth = 1;
			ctx.beginPath(); ctx.arc(rx, gy-1, 12, 0, Math.PI*2); ctx.stroke();
		}
		// Clock tower (x:6800)
		if(6700 > cx-200 && 6700 < cx+w+200){
			const gy = GROUND_Y_BASE;
			ctx.fillStyle = '#444466';
			ctx.fillRect(6750, gy-200, 60, 200);
			ctx.fillStyle = '#555577';
			ctx.fillRect(6740, gy-220, 80, 25);
			// Clock face
			ctx.beginPath(); ctx.arc(6780, gy-180, 20, 0, Math.PI*2);
			ctx.fillStyle = '#887744'; ctx.fill();
			ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
			ctx.beginPath(); ctx.arc(6780, gy-180, 18, 0, Math.PI*2); ctx.stroke();
			// Hands
			const t = Date.now()*0.001;
			ctx.beginPath(); ctx.moveTo(6780,gy-180); ctx.lineTo(6780+Math.cos(t)*12, gy-180+Math.sin(t)*12); ctx.stroke();
		}
	}
	if(region.id === 'woods'){
		// Glowing mushrooms
		for(let i=0;i<30;i++){
			const mx = 8000 + i*150;
			if(mx < cx-50 || mx > cx+w+50) continue;
			const gy = getGroundY(mx) || GROUND_Y_BASE;
			ctx.fillStyle = `rgba(100,255,150,${0.3+Math.sin(Date.now()*0.002+i)*0.15})`;
			ctx.beginPath(); ctx.arc(mx, gy-6, 5, Math.PI, 0); ctx.fill();
			ctx.fillStyle = '#443322';
			ctx.fillRect(mx-1.5, gy-6, 3, 6);
		}
	}
	if(region.id === 'foothills'){
		// Lava cracks in ground
		for(let i=0;i<20;i++){
			const lx = 12500 + i*200;
			if(lx < cx-50 || lx > cx+w+50) continue;
			const gy = getGroundY(lx) || GROUND_Y_BASE;
			ctx.strokeStyle = 'rgba(255,100,20,0.4)';
			ctx.lineWidth = 2;
			ctx.beginPath();
			ctx.moveTo(lx, gy+2);
			ctx.lineTo(lx+15, gy+8);
			ctx.lineTo(lx+30, gy+3);
			ctx.stroke();
		}
	}
	if(region.id === 'temple'){
		// Braziers
		for(let i=0;i<15;i++){
			const bx = 16500 + i*230;
			if(bx < cx-50 || bx > cx+w+50) continue;
			const gy = getGroundY(bx);
			if(!gy) continue;
			ctx.fillStyle = '#443333';
			ctx.fillRect(bx, gy-30, 16, 30);
			// Fire
			ctx.fillStyle = `rgba(255,120,20,${0.5+Math.sin(Date.now()*0.005+i)*0.3})`;
			ctx.beginPath(); ctx.arc(bx+8, gy-34, 8, 0, Math.PI*2); ctx.fill();
		}
		// Dragon statues
		for(const sx of [16800, 17600, 18000, 19000]){
			if(sx < cx-100 || sx > cx+w+100) continue;
			const gy = getGroundY(sx);
			if(!gy) continue;
			ctx.fillStyle = '#3a2222';
			ctx.fillRect(sx, gy-60, 30, 60);
			ctx.font = '28px Arial';
			ctx.textAlign = 'center';
			ctx.fillText('🐉', sx+15, gy-62);
		}
	}
}

function isNPCQuestTarget(npcId){
	if(npcId === 'thalen' && (currentQuestIndex === 0 || currentQuestIndex === 5 || currentQuestIndex === 12)) return true;
	if(npcId === 'dorn' && currentQuestIndex === 2) return true;
	return false;
}

/* ============================================================
   [24] GAME LOOP
   ============================================================ */
let frameCount = 0;

function gameLoop(){
	frameCount++;

	if(cinematicActive){
		updateCinematic();
	} else {
		update();
	}
	render();
	requestAnimationFrame(gameLoop);
}

/* ============================================================
   [25] INITIALIZATION
   ============================================================ */
function init(){
	// Spawn world enemies
	spawnWorldEnemies();

	// If quest requires spawning, do it
	if(currentQuestIndex === 1) spawnTrainingDummies();
	if(currentQuestIndex === 9) spawnBoss('fire_warden');
	if(currentQuestIndex === 10 || currentQuestIndex === 11) spawnBoss('ignaroth');

	// Re-establish flags from quest index (for reload)
	if(currentQuestIndex > 0) questFlags.spokeThalen0 = true;
	if(currentQuestIndex > 1) questFlags.trainingDone = true;
	if(currentQuestIndex > 2) questFlags.spokeDorn = true;
	if(currentQuestIndex > 3) questFlags.foundRuin = true;
	if(currentQuestIndex > 4) questFlags.readMonument = true;
	if(currentQuestIndex > 5) questFlags.reportedThalen = true;
	if(currentQuestIndex > 7) questFlags.foundSunFragment = true;
	if(currentQuestIndex > 9) questFlags.fireWardenDefeated = true;
	if(currentQuestIndex > 11) questFlags.ignarothDefeated = true;

	// Start game loop
	gameLoop();
}

init();
</script>
