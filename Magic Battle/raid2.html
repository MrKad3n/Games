<!--
AI SPRITE SHEET PROMPT — The Void Arbiter (Raid Boss)
=====================================================
Generate a pixel art sprite sheet for a towering dark armored colossus boss character.
The character is "The Void Arbiter" — a massive floating entity clad in jagged void-black
and deep purple crystalline armor. A pulsing crimson void core glows at the center of its
chest. It has a horned helmet with a single menacing red eye slit. Tattered purple-black
energy tendrils trail from its shoulders and back like spectral wings.

Layout: 4 columns × 4 rows (16 frames total)
- Row 1: Idle animation (4 frames) — floating with subtle bob, energy tendrils drifting, core pulsing
- Row 2: Attack wind-up & strike (4 frames) — arms raised, energy gathering, slam downward, impact flash
- Row 3: Special attack (4 frames) — void portals opening around it, energy vortex charging, release, afterglow
- Row 4: Damage taken & death (4 frames) — recoil with crack effects, armor fragmenting, core destabilizing, dissolving into void particles

Style: 64×64 pixels per frame, dark fantasy pixel art, transparent background.
Color palette: void-black (#0a0014), deep purple (#2d1b4e), crimson (#cc2244), dark teal (#1a3a3a),
white-hot energy (#ffddff). The armor should have subtle iridescent purple highlights.
The crimson core should glow brightest at center with falloff. Tendrils should look ethereal
and semi-transparent with particle effects.
-->

<script>
/* =========================================================
   Magic Battle — THE VOID ARBITER (Raid Boss 2)
   100,000 HP · 3 Phases · 14 Unique Attacks
   ========================================================= */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
addEventListener('resize',resize);resize();

const FPS = 60;
const TILE = 40;
const GRAVITY = 0.65;

/* === ARENA — vast dark void arena === */
const ARENA_W = 4000;
const ARENA_H = 2000;
const ARENA_FLOOR_Y = ARENA_H - 150;
const ARENA_CEIL_Y = 80;
const platforms = [
	{ x:300, y:ARENA_FLOOR_Y-200, w:220, h:20 },
	{ x:800, y:ARENA_FLOOR_Y-380, w:180, h:20 },
	{ x:1300, y:ARENA_FLOOR_Y-200, w:240, h:20 },
	{ x:1800, y:ARENA_FLOOR_Y-500, w:200, h:20 },
	{ x:2200, y:ARENA_FLOOR_Y-280, w:220, h:20 },
	{ x:2700, y:ARENA_FLOOR_Y-420, w:180, h:20 },
	{ x:3200, y:ARENA_FLOOR_Y-200, w:220, h:20 },
	{ x:3600, y:ARENA_FLOOR_Y-380, w:180, h:20 },
	{ x:1000, y:ARENA_FLOOR_Y-650, w:160, h:20 },
	{ x:2000, y:ARENA_FLOOR_Y-700, w:200, h:20 },
	{ x:3000, y:ARENA_FLOOR_Y-650, w:160, h:20 },
];

/* === PLAYER DATA (localStorage) === */
let playerData;
try{ const raw=localStorage.getItem('magicBattle_playerData'); playerData=raw?JSON.parse(raw):null; }catch(e){playerData=null;}
if(!playerData){
	playerData={
		baseStats:{magicPower:10,magicControl:5,manaRegen:100,magicDefence:8},
		equipment:{staff:null,robe:null,relic1:null,relic2:null},
		inventory:[],
		spells:new Array(10).fill(null),
		vows:[null,null,null],
	};
	playerData.spells[0]={name:'Magic Missile',phases:[{shape:'missile',behavior:'straight',width:1,height:1,speed:1.5,duration:1,power:1,count:1,spread:0,effects:[],color:'#4488ff',trail:'sparkle',nextTrigger:'onHit',orbitRadius:80,orbitSpeed:3,orbitDuration:1.5}]};
}
if(!playerData.vows) playerData.vows=[null,null,null];

/* --- Vow System --- */
function getVowBoostsForSlot(slot){
	const globalBoosts=new Set(['maxHealth','jumpHeight','playerSpeed','defense','elementalDmg']);
	const b={power:0,size:0,speed:0,count:0,duration:0,effects:0,phases:0,maxHealth:0,manaCost:0,cooldown:0,jumpHeight:0,playerSpeed:0,defense:0,elementalDmg:0,_sizeBonus:false};
	for(const v of playerData.vows){
		if(!v)continue;
		if(v.boostType!=null){
			if(globalBoosts.has(v.boostType)){b[v.boostType]=(b[v.boostType]||0)+(v.boostAmount||0);continue;}
			if(v.targetSlot!==slot)continue;
			b[v.boostType]=(b[v.boostType]||0)+(v.boostAmount||0);
			if(v.sizeBonus)b._sizeBonus=true;
		}else if(v.boosts){
			if(v.targetSlot!==slot)continue;
			for(const k in v.boosts)b[k]=(b[k]||0)+v.boosts[k];
		}
	}
	return b;
}
let vowHealthPenalty=0, vowManaPenalty=0, vowLockedSlots=new Set(), vowMaxHealthBonus=0;
let vowJumpBonus=0, vowSpeedBonus=0, vowDefenseBonus=0, vowElementalDmgBonus=0;
let vowLockedEffects=new Set(), vowLockedShapes=new Set();
let vowManaEfficiency=0;
let vowSacrificedItemSlots=new Set();
function applyVowSacrifices(){
	vowHealthPenalty=0;vowManaPenalty=0;vowLockedSlots=new Set();vowMaxHealthBonus=0;
	vowJumpBonus=0;vowSpeedBonus=0;vowDefenseBonus=0;vowElementalDmgBonus=0;
	vowLockedEffects=new Set();vowLockedShapes=new Set();vowManaEfficiency=0;
	vowSacrificedItemSlots=new Set();
	for(const v of playerData.vows){
		if(!v)continue;
		if(v.sacrifice==='health')vowHealthPenalty+=v.amount;
		else if(v.sacrifice==='maxMana')vowManaPenalty+=v.amount;
		else if(v.sacrifice==='spellSlot'){for(const s of v.slots||[])vowLockedSlots.add(s);}
		else if(v.sacrifice==='effects'){for(const fx of v.sacrificedEffects||[])vowLockedEffects.add(fx);}
		else if(v.sacrifice==='shapes'){for(const sh of v.sacrificedShapes||[])vowLockedShapes.add(sh);}
		else if(v.sacrifice==='items'){for(const sl of v.sacrificedItemSlots||[])vowSacrificedItemSlots.add(sl);}
		if(v.boostType==='maxHealth')vowMaxHealthBonus+=(v.boostAmount||0)*5;
		if(v.boostType==='jumpHeight')vowJumpBonus+=(v.boostAmount||0);
		if(v.boostType==='playerSpeed')vowSpeedBonus+=(v.boostAmount||0);
		if(v.boostType==='defense')vowDefenseBonus+=(v.boostAmount||0);
		if(v.boostType==='elementalDmg')vowElementalDmgBonus+=(v.boostAmount||0);
		if(v.boostType==='manaEfficiency')vowManaEfficiency+=(v.boostAmount||0);
	}
}
applyVowSacrifices();

/* --- ITEM_DB --- */
const ITEM_DB={
	oak_staff:{stats:{magicPower:2}},crystal_staff:{stats:{magicPower:5,magicControl:2}},phoenix_staff:{stats:{magicPower:8,manaRegen:15}},shadow_staff:{stats:{magicPower:10,magicControl:5}},starweaver:{stats:{magicPower:14,magicControl:8,manaRegen:10}},
	linen_robe:{stats:{magicDefence:2}},mage_robe:{stats:{magicDefence:4,manaRegen:8}},arcane_vestments:{stats:{magicPower:3,magicDefence:6,manaRegen:12}},void_mantle:{stats:{magicPower:6,magicDefence:9,magicControl:4}},celestial_garb:{stats:{magicPower:8,magicDefence:10,magicControl:6,manaRegen:20}},
	mana_gem:{stats:{manaRegen:15}},fire_ring:{stats:{magicPower:3}},frost_amulet:{stats:{magicDefence:3,manaRegen:10}},ghost_lantern:{stats:{manaRegen:12,magicDefence:3}},bloodstone:{stats:{magicPower:8,magicDefence:4}},wind_charm:{stats:{magicControl:4,manaRegen:8}},eye_of_eternity:{stats:{magicPower:12,magicControl:12,manaRegen:30,magicDefence:6}},crystal_crown:{stats:{magicControl:8,magicPower:6,magicDefence:3}},
};
function computeStats(){
	const s={...playerData.baseStats};
	for(const slotKey of['staff','robe','relic1','relic2']){
		if(vowSacrificedItemSlots.has(slotKey)) continue;
		const id=playerData.equipment[slotKey];if(!id)continue;
		const item=ITEM_DB[id];if(!item)continue;
		for(const k in item.stats)s[k]=(s[k]||0)+item.stats[k];
	}
	return s;
}
const stats=computeStats();

/* --- Spell cost tables --- */
const SHAPES={missile:1,orb:1,blade:1,beam:1,ring:1,cone:1,nova:1,chain:1,wall:1,solidify:1,spike:1,allyOrb:1,polygon:1,summon:1,meteor:1,vortex:1,same:1};
const SHAPE_MANA={missile:5,orb:8,blade:7,beam:10,ring:12,cone:10,nova:15,chain:18,wall:12,solidify:10,spike:8,polygon:9,allyOrb:6,summon:20,meteor:16,vortex:18,same:0};
const SHAPE_CTRL={missile:0,orb:1,blade:2,beam:4,ring:5,cone:4,nova:7,chain:9,wall:6,solidify:4,spike:3,polygon:3,allyOrb:1,summon:8,meteor:5,vortex:5};
const BEH_MANA={straight:0,lob:2,homing:5,boomerang:4,groundSurge:5,orbit:8,spiral:6,rain:8,barrage:8,stationary:0,underfoot:3,selfCast:2,aroundSelf:5,ground:4,zigzag:5,teleport:7};
const BEH_CTRL={straight:0,lob:1,homing:3,boomerang:3,groundSurge:4,orbit:6,spiral:5,rain:7,barrage:7,stationary:0,underfoot:2,selfCast:1,aroundSelf:3,ground:3,zigzag:3};
const FX_MANA={burn:5,freeze:5,knockback:3,pull:4,poison:5,stun:7,healSelf:6,shield:6,lifesteal:8,speedBoost:4,jumpBoost:4,manaRegen:5,timedRelease:3,phaseFork:6,resetProjectiles:0,forceJump:4,horizontalLaunch:5,randomDelay:2,phaseThrough:20,damageStore:4,damageRelease:6,damageHeal:5,dispel:25,ricochet:18,shatter:8,gravityWell:10,blind:6,leechMana:7,mark:5};
const FX_CTRL={burn:2,freeze:2,knockback:1,pull:3,poison:3,stun:5,healSelf:4,shield:4,lifesteal:6,speedBoost:3,jumpBoost:3,manaRegen:4,timedRelease:2,phaseFork:5,resetProjectiles:0,forceJump:2,horizontalLaunch:2,randomDelay:1,phaseThrough:6,damageStore:2,damageRelease:4,damageHeal:3,dispel:4,ricochet:6,shatter:6,gravityWell:7,blind:5,leechMana:5,mark:4};
const PIERCE_SET=new Set(['nova','ring','beam','cone','wall','solidify','spike','summon','vortex']);
function calcSpellCost(spell){
	if(!spell||!spell.phases.length)return 0;
	let cost=5;
	for(const ph of spell.phases){
		cost+=(SHAPE_MANA[ph.shape]||0)+(BEH_MANA[ph.behavior]||0);
		const isAreaBeh=ph.behavior==='rain'||ph.behavior==='barrage';
		const countMult=1+(((ph.count||1)-1)*(isAreaBeh?0.1:0.4));
		cost+=(ph.power||1)*50*countMult+((ph.count||1)-1)*(isAreaBeh?1:4)+((ph.width||1)-1)*2+((ph.height||1)-1)*2;
		if(ph.shape==='chain'&&(ph.chainStunTime||0)>0)cost+=(ph.chainStunTime||0)*25;
		if(ph.behavior==='ground'&&(ph.groundRadius||200)>200)cost+=Math.floor(((ph.groundRadius||200)-200)/50)*3;
		if(ph.shape==='summon'){cost+=(ph.summonRange||0)*4+(ph.summonHealth||0)*3+(ph.summonSpeed||0)*3;}
		for(const fx of(ph.effects||[]))cost+=(FX_MANA[fx]||0);
		if((ph.effects||[]).includes('phaseFork'))cost+=((ph.phaseForkRepeats||1)*35);
	}
	cost*=(0.6+spell.phases.length*0.25);
	return Math.max(1,Math.round(cost));
}
function calcSpellCtrl(spell){let t=0;for(const p of spell.phases){t+=(SHAPE_CTRL[p.shape]||0)+(BEH_CTRL[p.behavior]||0);for(const fx of(p.effects||[]))t+=(FX_CTRL[fx]||0);}return t;}

/* === COMBAT STATE === */
const maxHealthBase=Math.max(30, 500 - vowHealthPenalty + vowMaxHealthBonus);
let health=maxHealthBase, maxHealth=maxHealthBase;
const _maxManaBase=Math.max(100, 1500 - vowManaPenalty);
let mana=_maxManaBase, maxMana=_maxManaBase;
const baseManaRegen=0.3 + (stats.manaRegen||0) * 0.008;
let totalMana=0;
const totalManaMax=500;
let damageStored=0,damageStoreMax=300;
let shield=0;

let activeSlot=0;
const spellCooldowns=new Array(10).fill(0);
const spellMaxCooldowns=new Array(10).fill(1);
let castPressed=false;
let nextCastId=0;
const spellHitCounts={};
const projectiles=[];
const enemyProjectiles=[];
const particles=[];
const dmgNumbers=[];
const playerMinions=[];
const spellWalls=[];
const playerBuffs={speedTimer:0,speedMult:1,jumpTimer:0,jumpMult:1,manaRegenTimer:0,manaRegenMult:1};
let hotbarDirty=true;

/* Warning indicators for boss attacks */
const indicators=[];

/* === INPUT === */
const keys={};
addEventListener('keydown',e=>{
	keys[e.key.toLowerCase()]=true;
	const digit=e.key>='0'&&e.key<='9'?(+e.key===0?9:+e.key-1):-1;
	if(digit>=0&&digit<10)selectSpellSlot(digit);
});
addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
let mouseDown=false;
let mouseScreenX=0,mouseScreenY=0;
canvas.addEventListener('mousedown',e=>{mouseDown=true;mouseScreenX=e.clientX;mouseScreenY=e.clientY;});
canvas.addEventListener('mouseup',()=>{mouseDown=false;releaseHeldProjectiles();});
canvas.addEventListener('mousemove',e=>{mouseScreenX=e.clientX;mouseScreenY=e.clientY;});

function releaseHeldProjectiles(){
	const worldMX=mouseScreenX+camera.x;
	const worldMY=mouseScreenY+camera.y;
	for(const p of projectiles){
		if(!p._held)continue;
		p._held=false;
		const ang=Math.atan2(worldMY-p.y,worldMX-p.x);
		const spd=(p.phase.speed||1)*7;
		p.vx=Math.cos(ang)*spd;p.vy=Math.sin(ang)*spd;
		p.age=0;p.hitTargets.clear();
	}
}

/* === PLAYER === */
const player={
	x:ARENA_W/2-20, y:ARENA_FLOOR_Y-60,
	w:40, h:60, vx:0, vy:0, launchVx:0,
	speed:5.5, jumpPow:-13.5,
	onGround:false, facing:1,
	castTimer:0, castColor:'#4488ff',
	iFrames:0, flash:0, dots:[], slowTimer:0, stunTimer:0,
	ultCharging:false, ultChargeTimer:0, ultChargeColor:'#ffaa00',
	ultChargeSpell:null, ultChargeFacing:1, ultChargeDuration:90, ultChargeSlot:0,
};

/* === PLAYER SPRITE === */
const PLAYER_SPRITE=new Image();
PLAYER_SPRITE.src='images/assests/player-sheet.png';
const PLAYER_SPRITE_COLS=6, PLAYER_SPRITE_ROWS=4;
const PLAYER_SPRITE_ROW={idle:0,walk:1,attack:2,defeat:3};
const PLAYER_SPRITE_FPS=8;
const PLAYER_SPRITE_SCALE=3.125;
let playerAnimFrame=0,playerAnimTimer=0,playerAnimState='idle';

/* === BOSS SPRITE SHEET === */
const BOSS_SPRITE=new Image();
BOSS_SPRITE.src='images/enemies/void-arbiter-sheet.png';
const BOSS_SPRITE_COLS=4, BOSS_SPRITE_ROWS=4;
const BOSS_SPRITE_ROW={idle:0,move:1,attack:2,defeat:3};
const BOSS_SPRITE_FPS=6;
let bossAnimFrame=0,bossAnimTimer=0,bossAnimState='idle';

const camera={x:0,y:0};
function updateCamera(){
	camera.x=player.x-canvas.width/2;
	camera.y=player.y-canvas.height/2;
	camera.x=Math.max(0,Math.min(camera.x,ARENA_W-canvas.width));
	camera.y=Math.max(0,Math.min(camera.y,ARENA_H-canvas.height));
}

/* === HOTBAR === */
function selectSpellSlot(idx){activeSlot=idx;renderHotbar();}
function renderHotbar(){
	const bar=document.getElementById('hotbar');bar.innerHTML='';
	for(let i=0;i<10;i++){
		const el=document.createElement('div');

/* === TELEGRAPH / WARNING SYSTEM === */
function showWarning(text,duration){
	const el=document.getElementById('warningText');
	el.textContent=text;el.style.opacity='1';
	setTimeout(()=>{el.style.opacity='0';},duration||1500);
}
function addIndicator(x,y,w,h,duration,color,type){
	indicators.push({x,y,w,h,age:0,maxAge:duration,color:color||'#ff2244',type:type||'rect'});

/* === BOSS ATTACK SYSTEM === */
function bossAttack(){
	if(boss.dead||boss.stunTimer>0||boss.phaseTransition>0||boss.globalCd>0)return;
	const hpPct=boss.hp/boss.maxHp;
	const inPhase2=hpPct<=0.65&&boss.phase<2;
	const inPhase3=hpPct<=0.30&&boss.phase<3;
	if(inPhase2){
		boss.phase=2;boss.phaseTransition=150;
		showWarning('⚠️ THE ARBITER AWAKENS — PHASE 2',2000);
		dmgNumbers.push({x:boss.x+boss.w/2,y:boss.y-50,text:'🌑 PHASE 2 — WRATH UNLEASHED',age:0,color:'#ff4466'});
		for(let v=0;v<30;v++) particles.push({x:boss.x+Math.random()*boss.w,y:boss.y+Math.random()*boss.h,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*10-4,life:60+Math.random()*30,color:['#ff2244','#cc1133','#ff6644','#440011'][v%4]});
		return;
	}
	if(inPhase3){
		boss.phase=3;boss.phaseTransition=180;
		showWarning('💀 FINAL PHASE — JUDGEMENT',2500);
		dmgNumbers.push({x:boss.x+boss.w/2,y:boss.y-50,text:'💀 PHASE 3 — ABSOLUTE JUDGEMENT',age:0,color:'#ff0033'});
		for(let v=0;v<40;v++) particles.push({x:boss.x+Math.random()*boss.w,y:boss.y+Math.random()*boss.h,vx:(Math.random()-0.5)*12,vy:(Math.random()-0.5)*12-5,life:80+Math.random()*40,color:['#ff0022','#ff4400','#ffcc00','#880000'][v%4]});
		return;
	}

	let maxIdx=8; // phase 1: 8 attacks (incl. rifts + meteors)
	if(boss.phase>=2) maxIdx=14;
	if(boss.phase>=3) maxIdx=17;
	let idx;
	do{ idx=Math.floor(Math.random()*maxIdx); }while(idx===boss.lastAttack&&maxIdx>1);
	boss.lastAttack=idx;

	const attacks=[
		// Phase 1 (0-7)
		attackVoidSlam,          // 0 — Ground slam: shockwave + ground spikes (jump to dodge)
		attackAbyssalLaser,      // 1 — Giant laser beam (use dispel or hide behind wall)
		attackDarkOrbs,          // 2 — Homing dark orbs (destroy or dodge)
		attackGravityCrush,      // 3 — Pull into center + crushing zone (wall-jump escape)
		attackVoidPillars,       // 4 — Pillars erupt from ground (indicators show safe spots)
		attackShadowWave,        // 5 — Wide wave of projectiles (jump over)
		attackVoidDash,          // 6 — Boss dashes at player leaving void trail
		attackTeleportStrike,    // 7 — Boss teleports to player + burst
		// Phase 2 (8-13)
		attackDimensionalRift,   // 8 — Portals appear and shoot projectiles from sides
		attackMeteorBarrage,     // 9 — Massive meteors rain from sky (indicators on ground)
		attackVoidCage,          // 10 — Closing cage of projectiles (must dispel or break one side)
		attackSoulDrain,         // 11 — Channeled beam that heals boss (stun to interrupt)
		attackShadowBlinkBarrage,// 12 — Rapid teleport 3x, firing aimed shots each time
		attackVoidDash,          // 13 — Dash again in phase 2 (same attack, increases frequency)
		// Phase 3 (14-16)
		attackAbsoluteVoid,      // 14 — Arena darkens, only safe near light orbs
		attackJudgementStrike,   // 15 — Targeted massive slam (dodge indicator + platforming)
		attackVoidStorm,         // 16 — Everything at once: orbs + spikes + laser sweeps
	];

	if(attacks[idx]) attacks[idx]();
	const baseCd=boss.phase>=3?90:boss.phase>=2?120:150;
	boss.globalCd=baseCd+Math.floor(Math.random()*50);
}

   Pulls player toward center + crushing zone.
   Counter: Jump away using platforms, or use horizontalLaunch/forceJump spell */
function attackGravityCrush(){
	showWarning('🌀 GRAVITY CRUSH — ESCAPE THE CENTER!',1500);
	const cx=boss.x+boss.w/2,cy=boss.y+boss.h/2;
	addIndicator(cx-400,cy-400,800,800,280,'rgba(100,0,200,0.35)','circle');
	// Pull effect for 3 seconds — much wider range
	const pullId=setInterval(()=>{
		if(boss.dead){clearInterval(pullId);return;}
		const dx=cx-player.x-player.w/2;
		const dy=cy-player.y-player.h/2;
		const d=Math.sqrt(dx*dx+dy*dy)||1;
		if(d<600){
			player.launchVx+=(dx/d)*1.2;
			player.vy+=(dy/d)*0.5;
		}
	},16);
	setTimeout(()=>clearInterval(pullId),3000);
	// Crushing explosion after pull
	setTimeout(()=>{
		if(boss.dead)return;
		for(let i=0;i<24;i++){
			const a=(i/24)*Math.PI*2;
			spawnBossProj(cx,cy,Math.cos(a)*5,Math.sin(a)*5,{
				color:'#6600aa',color2:'#aa44ff',power:26,width:50,height:50,shape:'orb',

/* === SPELL CASTING === */
function castSpell(){
	const spell=playerData.spells[activeSlot];
	if(!spell||!spell.phases.length)return;
	if(vowLockedSlots.has(activeSlot))return;
	const controlDiscount=Math.max(0.3,1-stats.magicControl*0.015);
	const _vbCast=getVowBoostsForSlot(activeSlot);
	const vowManaCostMult=Math.max(0.1,1-(_vbCast.manaCost||0)*0.05);
	const vowGlobalManaMult=Math.max(0.1,1-vowManaEfficiency*0.025);
	const vowCdMult=Math.max(0.1,1-(_vbCast.cooldown||0)*0.08);
	const rawCost=calcSpellCost(spell);
	const cost=Math.round(rawCost*controlDiscount*vowManaCostMult*vowGlobalManaMult);
	const req=calcSpellCtrl(spell);
	const avgPower=spell.phases.reduce((s,p)=>s+(p.power||1),0)/spell.phases.length;
	const isUlt=(activeSlot===9&&spell.isUltimate);
	if(isUlt){
		const ultCost=cost*10;
		if(stats.magicControl<req||totalMana<ultCost||spellCooldowns[activeSlot]>0)return;
		if(player.ultCharging)return;
		totalMana-=ultCost;
		const cd=Math.round((24+Math.round(avgPower*16)+Math.round(rawCost*0.15)+player.ultChargeDuration)*vowCdMult);
		spellCooldowns[activeSlot]=cd;spellMaxCooldowns[activeSlot]=cd;
		player.ultCharging=true;player.ultChargeTimer=0;
		player.ultChargeColor=spell.phases[0]?.color||'#ffaa00';
		player.ultChargeSpell=spell;player.ultChargeFacing=player.facing;player.ultChargeSlot=activeSlot;
	} else {
		if(stats.magicControl<req||mana<cost||spellCooldowns[activeSlot]>0)return;
		mana-=cost;totalMana=Math.min(totalManaMax,totalMana+cost);
		const cd=Math.round((8+Math.round(avgPower*12)+Math.round(rawCost*0.12))*vowCdMult);
		spellCooldowns[activeSlot]=cd;spellMaxCooldowns[activeSlot]=cd;
		player.castTimer=12;player.castColor=spell.phases[0]?.color||'#4488ff';
		const castId=nextCastId++;spellHitCounts[castId]=0;
		spawnPhase(spell,0,player.x+player.w/2,player.y+player.h/2-6,player.facing,undefined,undefined,castId,activeSlot);
	}
}

function spawnPhase(spell,phaseIdx,originX,originY,facing,dmgMult,isUltimate,castId,sourceSlot){
	if(phaseIdx>=spell.phases.length)return;
	let totalProj=1;
	for(const p of spell.phases)totalProj*=(p.behavior==='aroundSelf'?(p.aroundSelfCount||4):(p.count||1));
	if(totalProj>1000)return;
	const ph=spell.phases[phaseIdx];
	const resolvedShape=(ph.shape==='same'&&phaseIdx>0)?spell.phases[phaseIdx-1].shape:(ph.shape||'missile');
	const count=ph.behavior==='aroundSelf'?(ph.aroundSelfCount||4):(ph.count||1);
	const cursorAimBehaviors=new Set(['straight','boomerang','lob','spiral','zigzag','teleport']);
	let baseAngle;
	if(cursorAimBehaviors.has(ph.behavior||'straight')){
		const worldMX=mouseScreenX+camera.x;const worldMY=mouseScreenY+camera.y;
		baseAngle=Math.atan2(worldMY-originY,worldMX-originX);
	} else {baseAngle=facing===1?0:Math.PI;}
	const powerMult=dmgMult||1;
	const selfBehaviors=['underfoot','selfCast','aroundSelf','stationary'];
	const selfPowerBonus=ph.behavior==='stationary'?2.0:selfBehaviors.includes(ph.behavior)?1.0:0;
	const ultFlag=!!(isUltimate||spell.isUltimate);
	const vb=getVowBoostsForSlot(sourceSlot!=null?sourceSlot:-1);
	const vowPowerMult=1+vb.power*0.12;
	const vowSizeMult=1+vb.size*0.1;
	const vowSpeedMult=1+vb.speed*0.1;
	const vowCountBonus=vb.count||0;
	const vowDurMult=1+vb.duration*0.1;
	const vowSizeBonus=vb._sizeBonus?1.5:1;
	const releaseSizeMult=(ph.effects&&ph.effects.includes('damageRelease')&&damageStored>0)?(1+damageStored/1000):1;
	const effectiveCount=Math.min(count+vowCountBonus,20);
	for(let i=0;i<effectiveCount;i++){
		let spreadAngle=0;
		if(effectiveCount>1){const sr=(ph.spread||0)*Math.PI/180;spreadAngle=((i/(effectiveCount-1))-0.5)*sr;}
		const angle=baseAngle+spreadAngle;
		const spd=(ph.speed||1)*7*vowSpeedMult;
		const proj={
			spell,phaseIdx,phase:ph,
			x:originX+facing*16,y:originY,
			vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,
			facing,age:0,maxAge:(ph.duration||1)*FPS*vowDurMult,
			width:(ph.width||1)*10*vowSizeMult*vowSizeBonus*releaseSizeMult,
			height:(ph.height||1)*10*vowSizeMult*vowSizeBonus*releaseSizeMult,
			power:((ph.power||1)/effectiveCount+0.05+selfPowerBonus)*(1+stats.magicPower*0.08)*powerMult*vowPowerMult,
			color:ph.color||'#4488ff',trail:ph.trail||'none',
			shape:vowLockedShapes.has(resolvedShape)?'missile':resolvedShape,
			behavior:ph.behavior||'straight',
			effects:(ph.effects||[]).filter(fx=>!vowLockedEffects.has(fx)),trailParts:[],
			orbitAngle:i*(Math.PI*2/count),orbitRadius:(ph.orbitRadius||80),
			orbitSpeed:(ph.orbitSpeed||3),orbitDur:(ph.orbitDuration||1.5)*FPS,
			orbitOriginX:originX,orbitOriginY:originY,
			startX:originX+facing*16,startY:originY,
			beamLen:0,beamAngle:angle,
			chainHits:0,chainMax:3,hasHit:false,phaseTriggered:false,
			hitTargets:new Set(),
			aimAngle:baseAngle,
			timedReleaseDelay:(ph.timedReleaseDelay||0.5)*FPS,timedReleaseTriggered:false,
			phaseForkDelay:(ph.phaseForkDelay||1)*FPS,phaseForkRepeats:ph.phaseForkRepeats||1,
			phaseForkCount:0,phaseForkNextAge:(ph.phaseForkDelay||1)*FPS,
			isSolidPlatform:false,isUltimate:ultFlag,
			castId:castId!=null?castId:-1,sourceSlot:sourceSlot!=null?sourceSlot:-1,
			randomDelay:(ph.effects&&ph.effects.includes('randomDelay'))?Math.round(Math.random()*(ph.randomDelayMax||0.5)*FPS):0,
			afterHitEffect:ph.afterHitEffect||'none',
			polygonSides:ph.polygonSides||6,
			_held:!!ph.holdDown,_holdSavedVx:0,_holdSavedVy:0,
		};
		if(resolvedShape==='solidify'){proj.isSolidPlatform=true;proj.vx=0;proj.vy=0;}
		if(ph.behavior==='rain'){const s2=200*(ph.width||1);proj.x=originX+(i-(count-1)/2)*(s2/Math.max(count-1,1));proj.y=originY-(ph.rainHeight||150);proj.vx=0;proj.vy=spd*0.8;proj.startX=proj.x;proj.startY=proj.y;proj.facing=1;proj.beamAngle=Math.PI/2;}
		if(ph.behavior==='barrage'){const s2=200*(ph.height||1);proj.x=originX+facing*120;proj.y=originY+(i-(count-1)/2)*(s2/Math.max(count-1,1));proj.vx=facing*spd*0.8;proj.vy=0;proj.startX=proj.x;proj.startY=proj.y;proj.beamAngle=facing===1?0:Math.PI;}
		if(ph.behavior==='stationary'){proj.vx=0;proj.vy=0;}
		if(ph.behavior==='groundSurge'){proj.vy=0;proj.vx=facing*spd;}
		if(ph.behavior==='underfoot'){proj.x=player.x+player.w/2;proj.y=player.y+player.h+4;proj.vx=0;proj.vy=0;}
		if(ph.behavior==='selfCast'){proj.x=player.x+player.w/2;proj.y=player.y+player.h/2;proj.vx=0;proj.vy=0;}
		if(resolvedShape==='allyOrb'){proj.x=player.x+player.w/2;proj.y=player.y+player.h/2;proj.vx=0;proj.vy=0;}
		if(ph.behavior==='aroundSelf'){const radius=ph.aroundSelfRadius||50;const sa=(i/count)*Math.PI*2;proj.x=player.x+player.w/2+Math.cos(sa)*radius;proj.y=player.y+player.h/2+Math.sin(sa)*radius;proj.vx=0;proj.vy=0;}
		if(ph.behavior==='ground'){
			const groundRadius=ph.groundRadius||200;let tgt=null;
			if(ph.groundAutoLock!==false){let td=groundRadius;/* no enemies in raid, skip */}
			proj.x=player.x+player.w/2;proj.y=player.y+player.h+4;
			proj.vx=0;proj.vy=-((ph.speed||1)*2);proj.maxAge*=3;proj.power*=1.4;
		}
		if(proj._held){proj._holdSavedVx=proj.vx;proj._holdSavedVy=proj.vy;proj.vx=0;proj.vy=0;}
		if(proj.shape==='vortex'){proj.vx*=0.35;proj.vy*=0.35;proj.maxAge*=2*(ph.vortexDuration||1);proj._vortexDotTimer=0;}
		if(proj.shape==='summon'){
			playerMinions.push({x:proj.x,y:proj.y,w:20,h:20,vx:0,vy:0,color:proj.color,spell,phaseIdx,sourceSlot:proj.sourceSlot,castId:proj.castId,facing:proj.facing,isUltimate:proj.isUltimate,power:proj.power,hp:40+(ph.summonHealth||0)*10,maxHp:40+(ph.summonHealth||0)*10,age:0,maxAge:proj.maxAge*2,fireTimer:0,fireCooldown:Math.round(FPS*2.5),target:null,animTimer:0,detectRange:600+(ph.summonRange||0)*100,moveSpeed:2.5+(ph.summonSpeed||0)*0.5,summonClose:!!ph.summonClose});
			continue;
		}
		projectiles.push(proj);
	}
}

function damagePlayer(amount,effects){
	if(player.iFrames>0)return;
	const defReduction=1-stats.magicDefence*0.008;
	const vowDefMult=Math.max(0.3,1-vowDefenseBonus*0.05);
	if(shield>0){const blocked=Math.min(shield,amount);shield-=blocked;amount-=blocked;dmgNumbers.push({x:player.x+player.w/2,y:player.y-30,text:'🛡️ -'+Math.round(blocked),age:0,color:'#88bbff'});}
	const dmg=amount*Math.max(0.2,defReduction)*vowDefMult;
	health-=dmg;player.iFrames=30;player.flash=10;
	dmgNumbers.push({x:player.x+player.w/2,y:player.y-20,text:'-'+Math.round(dmg),age:0,color:'#ff4444'});
	if(effects){
		for(const fx of effects){
			switch(fx){
				case'burn':player.dots.push({type:'burn',dmg:amount*0.2,ticks:4,interval:60,timer:0,color:'#ff6a00'});break;
				case'freeze':player.slowTimer=Math.max(player.slowTimer,90);break;
				case'poison':player.dots.push({type:'poison',dmg:amount*0.15,ticks:5,interval:75,timer:0,color:'#44dd44'});break;
				case'horizontalLaunch':{const dir=boss.x+boss.w/2>player.x+player.w/2?-1:1;player.launchVx=dir*14;player.vy=-6;break;}
				case'knockback':{const dx=player.x-boss.x-boss.w/2,dy=player.y-boss.y-boss.h/2;const d=Math.sqrt(dx*dx+dy*dy)||1;player.launchVx=(dx/d)*10;player.vy=-5;break;}
				case'pull':{const dx=boss.x+boss.w/2-player.x-player.w/2;player.launchVx=dx*0.06;player.vy=-3;break;}
				case'stun':player.stunTimer=Math.max(player.stunTimer,60);break;
				case'slow':player.slowTimer=Math.max(player.slowTimer,120);break;
			}
		}
	}
	if(health<=0){health=0;respawnPlayer();}
}

function dist(x1,y1,x2,y2){return Math.sqrt((x2-x1)**2+(y2-y1)**2);}
function rectRect(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function circRect(cx,cy,cr,rx,ry,rw,rh){const nx=Math.max(rx,Math.min(cx,rx+rw));const ny=Math.max(ry,Math.min(cy,ry+rh));return(cx-nx)**2+(cy-ny)**2<=cr*cr;}
function hexToRgb(hex){return{r:parseInt(hex.slice(1,3),16)||100,g:parseInt(hex.slice(3,5),16)||150,b:parseInt(hex.slice(5,7),16)||255};}

/* === APPLY EFFECTS === */
function applyEffects(proj,target,rawDmg){
	const ultMult=proj.isUltimate?3:1;
	const ePow=proj.phase.effectPower||1;
	const eDur=proj.phase.effectDuration||1;
	for(const fx of proj.effects){
		switch(fx){
			case'burn':if(target&&rawDmg){const stolenDmg=rawDmg*0.5;const ticks=Math.round(5*eDur*ultMult);const dotPerTick=(stolenDmg*1.25)/ticks;if(target===boss){if(!boss.dots)boss.dots=[];boss.dots.push({type:'burn',dmg:dotPerTick,ticks,interval:60,timer:0,color:'#ff6a00'});}}break;
			case'poison':if(target&&rawDmg){const stolenDmg=rawDmg*0.4;const ticks=Math.round(6*eDur*ultMult);const dotPerTick=(stolenDmg*1.25)/ticks;if(target===boss){if(!boss.dots)boss.dots=[];boss.dots.push({type:'poison',dmg:dotPerTick,ticks,interval:75,timer:0,color:'#44dd44'});}}break;
			case'freeze':if(target===boss)boss.slowTimer=Math.max(boss.slowTimer||0,Math.round(90*eDur*ultMult));break;
			case'knockback':if(target===boss){boss.x+=proj.facing*40*ePow*ultMult;boss.x=Math.max(40,Math.min(ARENA_W-40-boss.w,boss.x));}break;
			case'pull':if(target===boss){const dx=player.x+player.w/2-(boss.x+boss.w/2);const dy=player.y+player.h/2-(boss.y+boss.h/2);const d2=Math.sqrt(dx*dx+dy*dy)||1;boss.x+=(dx/d2)*50*ePow*ultMult;boss.y+=(dy/d2)*30*ePow*ultMult;}break;
			case'stun':if(target===boss)boss.stunTimer=Math.max(boss.stunTimer||0,Math.round(60*eDur*ultMult));break;
			case'healSelf':{const healAmt=Math.round(proj.power*5*ePow*ultMult);health=Math.min(maxHealth,health+healAmt);dmgNumbers.push({x:player.x+player.w/2,y:player.y-10,text:'+'+healAmt,age:0,color:'#44ff88'});break;}
			case'shield':shield+=Math.round(proj.power*3*ePow*ultMult);dmgNumbers.push({x:player.x+player.w/2,y:player.y-20,text:'🛡️ Shield +'+Math.round(proj.power*3*ePow*ultMult),age:0,color:'#88bbff'});break;
			case'lifesteal':mana=Math.min(maxMana,mana+proj.power*3*ePow*ultMult);dmgNumbers.push({x:player.x+player.w/2,y:player.y-10,text:'+'+Math.round(proj.power*3*ePow*ultMult)+'💧',age:0,color:'#bb44ff'});break;
			case'speedBoost':playerBuffs.speedTimer=Math.round(300*eDur*ultMult);playerBuffs.speedMult=proj.isUltimate?2.5:1.8;break;
			case'jumpBoost':playerBuffs.jumpTimer=Math.round(300*eDur*ultMult);playerBuffs.jumpMult=proj.isUltimate?2.0:1.5;break;
			case'manaRegen':playerBuffs.manaRegenTimer=Math.round(300*eDur*ultMult);playerBuffs.manaRegenMult=proj.isUltimate?6:3;break;
			case'forceJump':if(!target){player.vy=player.jumpPow*(playerBuffs.jumpTimer>0?playerBuffs.jumpMult:1);player.onGround=false;}else if(target===boss){boss.y-=60;}break;
			case'horizontalLaunch':if(!target){player.launchVx=proj.facing*proj.power*3.5;}else if(target===boss){boss.x+=proj.facing*proj.power*10;boss.x=Math.max(40,Math.min(ARENA_W-40-boss.w,boss.x));}break;
			case'damageHeal':if(!target&&damageStored>0){const healAmt=damageStored*0.5;health=Math.min(maxHealth,health+healAmt);updateHealthHUD();dmgNumbers.push({x:player.x+player.w/2,y:player.y-20,text:'+'+Math.round(healAmt)+' 💚',age:0,color:'#44ff88'});damageStored=0;updateDamageStoreHUD();}break;
		}
	}
}

function morphProjectile(proj,phaseIdx,dmgMult){
	const spell=proj.spell;if(phaseIdx>=spell.phases.length)return;
	const ph=spell.phases[phaseIdx];const count=ph.behavior==='aroundSelf'?(ph.aroundSelfCount||4):(ph.count||1);
	const powerMult=dmgMult||1;const selfBehaviors=['underfoot','selfCast','aroundSelf','stationary'];
	const selfPowerBonus=ph.behavior==='stationary'?2.0:selfBehaviors.includes(ph.behavior)?1.0:0;
	const _vb=getVowBoostsForSlot(proj.sourceSlot!=null?proj.sourceSlot:-1);
	const spd=(ph.speed||1)*7*(1+_vb.speed*0.1);const _vowSzB=_vb._sizeBonus?1.5:1;
	const origX=proj.x,origY=proj.y,origFacing=proj.facing;const ultFlag=!!proj.isUltimate;
	function applyPhaseToProj(p,spreadIdx){
		const baseAng=origFacing===1?0:Math.PI;let spreadAngle=0;
		if(count>1){const spreadRad=(ph.spread||0)*Math.PI/180;spreadAngle=((spreadIdx/(count-1))-0.5)*spreadRad;}
		const angle=baseAng+spreadAngle;
		p.phaseIdx=phaseIdx;p.phase=ph;p.age=0;p.maxAge=(ph.duration||1)*FPS*(1+_vb.duration*0.1);
		p.width=(ph.width||1)*10*(1+_vb.size*0.1)*_vowSzB;p.height=(ph.height||1)*10*(1+_vb.size*0.1)*_vowSzB;
		p.power=((ph.power||1)/count+0.05+selfPowerBonus)*(1+stats.magicPower*0.08)*powerMult*(1+_vb.power*0.12);
		p.color=ph.color||'#4488ff';p.trail=ph.trail||'none';p.shape=ph.shape||'missile';p.behavior=ph.behavior||'straight';
		p.effects=ph.effects||[];p.trailParts=[];p.hasHit=false;p.phaseTriggered=false;p.hitTargets=new Set();
		p.startX=origX;p.startY=origY;p.beamLen=0;p.beamAngle=angle;p.chainHits=0;p.chainMax=3;
		p.timedReleaseDelay=(ph.timedReleaseDelay||0.5)*FPS;p.timedReleaseTriggered=false;
		p.phaseForkDelay=(ph.phaseForkDelay||1)*FPS;p.phaseForkRepeats=ph.phaseForkRepeats||1;
		p.phaseForkCount=0;p.phaseForkNextAge=(ph.phaseForkDelay||1)*FPS;
		p.isSolidPlatform=false;p.isUltimate=ultFlag;p.afterHitEffect=ph.afterHitEffect||'none';p.polygonSides=ph.polygonSides||6;
		p.vx=Math.cos(angle)*spd;p.vy=Math.sin(angle)*spd;
		if(ph.shape==='solidify'){p.isSolidPlatform=true;p.vx=0;p.vy=0;}
		if(ph.behavior==='stationary'){p.vx=0;p.vy=0;}
		if(ph.behavior==='groundSurge'){p.vy=0;p.vx=origFacing*spd;}
		if(ph.behavior==='underfoot'){p.x=origX;p.y=origY+4;p.vx=0;p.vy=0;}
		if(ph.behavior==='selfCast'){p.x=player.x+player.w/2;p.y=player.y+player.h/2;p.vx=0;p.vy=0;}
		if(ph.shape==='allyOrb'){p.x=player.x+player.w/2;p.y=player.y+player.h/2;p.vx=0;p.vy=0;}
		if(ph.behavior==='orbit'){p.orbitOriginX=origX;p.orbitOriginY=origY;p.orbitAngle=spreadIdx*(Math.PI*2/count);p.orbitRadius=ph.orbitRadius||80;p.orbitSpeed=ph.orbitSpeed||3;p.orbitDur=(ph.orbitDuration||1.5)*FPS;}
	}
	applyPhaseToProj(proj,0);
	for(let i=1;i<count;i++){
		const clone={spell,phaseIdx,phase:ph,x:origX,y:origY,facing:origFacing,orbitAngle:0,orbitRadius:80,orbitSpeed:3,orbitDur:90,orbitOriginX:origX,orbitOriginY:origY,trailParts:[],castId:proj.castId!=null?proj.castId:-1,sourceSlot:proj.sourceSlot!=null?proj.sourceSlot:-1,aimAngle:proj.aimAngle,randomDelay:0};
		applyPhaseToProj(clone,i);projectiles.push(clone);
	}
}

function drawTrail(proj){
	if(proj.trail==='none'||proj.trailParts.length<2)return;
	const trailColors={sparkle:{r:200,g:220,b:255},flame:{r:255,g:140,b:50},smoke:{r:100,g:100,b:100},ice:{r:150,g:220,b:255},lightning:{r:180,g:180,b:255},magic:{r:200,g:100,b:255}};
	const rgb=trailColors[proj.trail]||hexToRgb(proj.color);
	for(let t=0;t<proj.trailParts.length;t++){
		const tp=proj.trailParts[t];const alpha=((t+1)/proj.trailParts.length)*0.5;
		const r=proj.width*0.5*((t+1)/proj.trailParts.length);
		ctx.beginPath();ctx.arc(tp.x,tp.y,r,0,Math.PI*2);
		ctx.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})`;ctx.fill();
	}
}

/* =============================================================
   UPDATE
   ============================================================= */
function update(){
	boss.animTimer++;

	/* Indicators */
	for(let i=indicators.length-1;i>=0;i--){indicators[i].age++;if(indicators[i].age>=indicators[i].maxAge)indicators.splice(i,1);}

	/* Player movement */
	if(player.stunTimer>0){player.stunTimer--;player.vx*=0.5;}
	if(player.stunTimer<=0&&!player.ultCharging){
		let mx=0;
		if(keys['a']||keys['arrowleft'])mx-=1;
		if(keys['d']||keys['arrowright'])mx+=1;
		if(mx!==0)player.facing=mx;
		else{const worldMX=mouseScreenX+camera.x;player.facing=worldMX>player.x+player.w/2?1:-1;}
		const spdM=player.slowTimer>0?0.5:1;
		const vowSpdMult=1+vowSpeedBonus*0.08;
		const currentSpeed=player.speed*(playerBuffs.speedTimer>0?playerBuffs.speedMult:1)*spdM*vowSpdMult;
		player.vx=mx*currentSpeed;
		if(player.launchVx){player.vx+=player.launchVx;player.launchVx*=0.88;if(Math.abs(player.launchVx)<0.5)player.launchVx=0;}
		if((keys['w']||keys['arrowup']||keys[' '])&&player.onGround){
			const vowJmpMult=1+vowJumpBonus*0.08;
			const currentJump=player.jumpPow*(playerBuffs.jumpTimer>0?playerBuffs.jumpMult:1)*vowJmpMult;
			player.vy=currentJump;player.onGround=false;
		}
	}
	if(player.ultCharging){player.vx=0;}
	player.vy+=GRAVITY;if(player.vy>18)player.vy=18;
	player.x+=player.vx;player.y+=player.vy;
	player.onGround=false;
	if(player.y+player.h>=ARENA_FLOOR_Y){player.y=ARENA_FLOOR_Y-player.h;player.vy=0;player.onGround=true;}
	if(player.y<ARENA_CEIL_Y){player.y=ARENA_CEIL_Y;player.vy=0;}
	if(player.x<40)player.x=40;
	if(player.x+player.w>ARENA_W-40)player.x=ARENA_W-40-player.w;
	for(const plat of platforms){
		if(player.vy>=0&&player.x+player.w>plat.x&&player.x<plat.x+plat.w&&
			player.y+player.h>=plat.y&&player.y+player.h<=plat.y+plat.h+12){
			player.y=plat.y-player.h;player.vy=0;player.onGround=true;
		}
	}
	for(const sw of spellWalls){if(rectRect(player,sw)){if(player.vy>0){player.y=sw.y-player.h;player.onGround=true;}else if(player.vy<0){player.y=sw.y+sw.h;}player.vy=0;}}
	for(const p of projectiles){
		if(!p.isSolidPlatform)continue;
		const sw2=p.width*3,sh2=p.height*1.5;
		const platBox={x:p.x-sw2/2,y:p.y-sh2/2,w:sw2,h:sh2};
		if(rectRect(player,platBox)){if(player.vy>0){player.y=platBox.y-player.h;player.onGround=true;}else if(player.vy<0){player.y=platBox.y+platBox.h;}player.vy=0;}
	}

	/* Casting */
	const wantCast=mouseDown;
	if(wantCast&&!castPressed){castPressed=true;castSpell();}
	if(!wantCast)castPressed=false;
	if(player.castTimer>0)player.castTimer--;
	if(player.iFrames>0)player.iFrames--;
	if(player.slowTimer>0)player.slowTimer--;
	if(player.flash>0)player.flash--;

	/* Player sprite anim */
	if(player.castTimer>0) playerAnimState='attack';

	else playerAnimState='idle';

	/* Ultimate charge-up */
	if(player.ultCharging){
		player.ultChargeTimer++;

			const castId=nextCastId++;spellHitCounts[castId]=0;
			spawnPhase(player.ultChargeSpell,0,player.x+player.w/2,player.y+player.h/2-6,player.ultChargeFacing,2.5,true,castId,player.ultChargeSlot);
		}
	}

	/* Cooldowns */
	let anyCDChanged=false;
	for(let i=0;i<10;i++){if(spellCooldowns[i]>0){spellCooldowns[i]--;anyCDChanged=true;}}

	const currentRegen=baseManaRegen*(playerBuffs.manaRegenTimer>0?playerBuffs.manaRegenMult:1);
	mana=Math.min(maxMana,mana+currentRegen);
	updateManaHUD();updateHealthHUD();

	/* Player dots */
	for(let di=player.dots.length-1;di>=0;di--){
		const dot=player.dots[di];dot.timer++;
		if(dot.timer>=dot.interval){dot.timer=0;dot.ticks--;

		}

		else{
			// Check if player is near a light orb

			if(boss._lightOrbs){
				for(const lo of boss._lightOrbs){

				}

			}
		}
	}

	/* Boss laser */
	if(boss.laserActive){
		boss.laserTimer++;
		boss.laserAngle+=boss.laserSweepDir*0.015;

			const lx=boss.x+boss.w/2,ly=boss.y+boss.h/2;

			const steps=30;
			for(let s=0;s<=steps;s++){

				const sy=ly+(endY-ly)*t;
				// Check if player hit by laser
				if(sx+laserW>player.x&&sx-laserW<player.x+player.w&&sy+laserW>player.y&&sy-laserW<player.y+player.h){

				}

				for(const p of projectiles){

						dmgNumbers.push({x:p.x,y:p.y-20,text:'🚫 LASER DISPELLED!',age:0,color:'#88ccff'});
						spawnImpact(p.x,p.y,'#88ccff');break;
					}
				}
				if(blocked)break;
				for(const sw of spellWalls){
					if(sx>=sw.x&&sx<=sw.x+sw.w&&sy>=sw.y&&sy<=sw.y+sw.h){blocked=true;break;}
				}
				if(blocked)break;
				for(const p of projectiles){
					if(!p.isSolidPlatform)continue;
					const sw2=p.width*3,sh2=p.height*1.5;
					if(sx>=p.x-sw2/2&&sx<=p.x+sw2/2&&sy>=p.y-sh2/2&&sy<=p.y+sh2/2){blocked=true;break;}
				}
				if(blocked)break;
			}
		}
	}

	/* Teleport ghost fade */
	if(boss.teleportGhostAlpha>0) boss.teleportGhostAlpha=Math.max(0,boss.teleportGhostAlpha-0.03);

	/* === Update player projectiles === */
	for(let i=projectiles.length-1;i>=0;i--){
		const p=projectiles[i];
		if(p.randomDelay&&p.randomDelay>0){p.randomDelay--;continue;}

		if(p._held){
			p.x=player.x+player.w/2+player.facing*20;p.y=player.y+player.h/2-6;
			p.startX=p.x;p.startY=p.y;
			p.trailParts.push({x:p.x,y:p.y,age:0});
			if(p.trailParts.length>MAX_TRAIL)p.trailParts.shift();
			for(const tp of p.trailParts)tp.age++;
		} else {
		p.age++;
		p.trailParts.push({x:p.x,y:p.y,age:0});
		if(p.trailParts.length>MAX_TRAIL)p.trailParts.shift();
		for(const tp of p.trailParts)tp.age++;

		switch(p.behavior){
			case'straight':break;
			case'lob':p.vy+=0.25;break;
			case'homing':{
				if(!boss.dead){
					if(p.shape==='beam'){const desired=Math.atan2(boss.y+boss.h/2-p.startY,boss.x+boss.w/2-p.startX);let diff=desired-p.beamAngle;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;p.beamAngle+=Math.min(0.08,Math.abs(diff))*Math.sign(diff);}
					else{const des=Math.atan2(boss.y+boss.h/2-p.y,boss.x+boss.w/2-p.x);const cur=Math.atan2(p.vy,p.vx);let diff=des-cur;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;const turn=Math.min(0.08,Math.abs(diff))*Math.sign(diff);const na=cur+turn;const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);p.vx=Math.cos(na)*spd;p.vy=Math.sin(na)*spd;}
				}break;
			}
			case'boomerang':{const prog=p.age/p.maxAge;if(prog>0.45){if(!p.returning){p.returning=true;p.hitTargets.clear();}const tx=player.x+player.w/2,ty=player.y+player.h/2;const dx2=tx-p.x,dy2=ty-p.y;const d2=Math.sqrt(dx2*dx2+dy2*dy2)||1;const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);p.vx=(dx2/d2)*spd*1.02;p.vy=(dy2/d2)*spd*1.02;}break;}
			case'groundSurge':p.vy+=0.6;if(p.y+4>=ARENA_FLOOR_Y){p.y=ARENA_FLOOR_Y-4;p.vy=-1.5;}for(const plat of platforms){if(p.x>=plat.x&&p.x<=plat.x+plat.w&&p.y>=plat.y-8&&p.y<=plat.y+12){p.y=plat.y-4;p.vy=-1.5;}}break;
			case'orbit':{if(p.age<p.orbitDur){p.orbitAngle+=p.orbitSpeed*0.05;p.orbitOriginX+=(player.x+player.w/2-p.orbitOriginX)*0.15;p.orbitOriginY+=(player.y+player.h/2-6-p.orbitOriginY)*0.15;p.x=p.orbitOriginX+Math.cos(p.orbitAngle)*p.orbitRadius;p.y=p.orbitOriginY+Math.sin(p.orbitAngle)*p.orbitRadius*0.6;p.vx=0;p.vy=0;}else if(p.age===Math.ceil(p.orbitDur)){if(!boss.dead){const ang=Math.atan2(boss.y+boss.h/2-p.y,boss.x+boss.w/2-p.x);const spd2=(p.phase.speed||1)*9;p.vx=Math.cos(ang)*spd2;p.vy=Math.sin(ang)*spd2;}else{p.vx=p.facing*(p.phase.speed||1)*9;p.vy=0;}}break;}
			case'spiral':{const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy)||(p.phase.speed||1)*7;const ba2=p.aimAngle!=null?p.aimAngle:(p.facing===1?0:Math.PI);const sa2=ba2+p.age*0.06;const out=0.3+p.age*0.008;p.vx=Math.cos(sa2)*spd*out;p.vy=Math.sin(sa2)*spd*out;break;}
			case'rain':case'barrage':if(p.shape==='cone'){p.vx=0;p.vy=0;p.x=p.startX;p.y=p.startY;}break;
			case'stationary':break;case'underfoot':break;case'selfCast':break;case'aroundSelf':break;
			case'ground':if(p.y+4>=ARENA_FLOOR_Y){p.vy=0;p.y=ARENA_FLOOR_Y-4;}if(p.vy<0)p.vy*=0.97;if(Math.abs(p.vy)<0.3)p.vy=0;break;
			case'zigzag':{const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy)||((p.phase.speed||1)*7);const ang=p.aimAngle!=null?p.aimAngle:(p.facing===1?0:Math.PI);const perpAng=ang+Math.PI/2;const amplitude=40+p.width*0.5;const freq=0.09;const offset=Math.sin(p.age*freq)*amplitude*freq;p.vx=Math.cos(ang)*spd+Math.cos(perpAng)*offset;p.vy=Math.sin(ang)*spd+Math.sin(perpAng)*offset;break;}
			case'teleport':{
				/* Teleport forward every 20 frames along its aim direction */
				if(p.age>0&&p.age%20===0){
					const ang=p.aimAngle!=null?p.aimAngle:(p.facing===1?0:Math.PI);
					const jumpDist=60+p.width*0.5;
					p.x+=Math.cos(ang)*jumpDist;
					p.y+=Math.sin(ang)*jumpDist;
					p.vx=0;p.vy=0;
					/* Spawn small particles at teleport point */
					for(let tp=0;tp<4;tp++) particles.push({x:p.x+(Math.random()-0.5)*10,y:p.y+(Math.random()-0.5)*10,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:15,color:p.color||'#88ccff'});
				} else { p.vx=0;p.vy=0; }
				/* Auto-advance to next phase when near boss */
				if(!boss.dead&&!p.phaseTriggered&&p.phaseIdx+1<p.spell.phases.length){
					const dx2=boss.x+boss.w/2-p.x,dy2=boss.y+boss.h/2-p.y;
					if(Math.hypot(dx2,dy2)<boss.w*0.8+p.width){
						p.phaseTriggered=true;
						if(p.effects.includes('resetProjectiles'))spawnPhase(p.spell,p.phaseIdx+1,p.x,p.y,p.facing,undefined,p.isUltimate,p.castId,p.sourceSlot);

					}

			}
		}

		if(p.shape==='vortex'){p.vx*=0.985;p.vy*=0.985;}
		if(p.shape==='beam'){p.beamLen=Math.min(p.beamLen+12,400*(p.phase.width||1));p.x=p.startX;p.y=p.startY;}

		} // end else (not held)

		/* Hit detection vs boss */
		const hitR=Math.max(p.width,p.height)*0.85;
		if((p.shape==='allyOrb'||p.behavior==='selfCast')&&!p.hasHit){
			if(circRect(p.x,p.y,hitR,player.x,player.y,player.w,player.h)){
				applyEffects(p,null);spawnImpact(p.x,p.y,p.color);p.hasHit=true;
				if(!p.phaseTriggered&&p.phase.nextTrigger==='onHit'&&p.phaseIdx+1<p.spell.phases.length){p.phaseTriggered=true;if(p.effects.includes('resetProjectiles'))spawnPhase(p.spell,p.phaseIdx+1,p.x,p.y,p.facing,undefined,p.isUltimate,p.castId,p.sourceSlot);else morphProjectile(p,p.phaseIdx+1);}
			}
		}
		if(p.shape!=='allyOrb'&&p.behavior!=='selfCast'&&!boss.dead&&!p.phase.noHit){

			if(!p.hitTargets.has('boss')){
				let hit=false;
				if(p.shape==='beam'){const bx0=p.startX,by0=p.startY;const endX=bx0+Math.cos(p.beamAngle)*p.beamLen;const endY=by0+Math.sin(p.beamAngle)*p.beamLen;const halfH=p.height/2;const steps=Math.max(3,Math.floor(p.beamLen/40));for(let s=0;s<=steps;s++){const t=s/steps;const sx=bx0+(endX-bx0)*t;const sy=by0+(endY-by0)*t;if(sx+halfH>boss.x&&sx-halfH<boss.x+boss.w&&sy+halfH>boss.y&&sy-halfH<boss.y+boss.h){hit=true;break;}}}
				else if(p.shape==='nova'||p.shape==='ring'){hit=circRect(p.x,p.y,(p.age/p.maxAge)*p.width*8,boss.x,boss.y,boss.w,boss.h);}
				else if(p.shape==='cone'){const coneLen=(p.age/p.maxAge)*200*(p.phase.width||1);const coneHalf=coneLen*0.4*(p.phase.width||1);const dx=boss.x+boss.w/2-p.startX,dy=boss.y+boss.h/2-p.startY;const along=p.facing===1?dx:-dx;hit=along>0&&along<coneLen&&Math.abs(dy)<coneHalf*(along/coneLen);}
				else if(p.shape==='wall'){hit=rectRect({x:p.x-p.width,y:p.y-p.height*3,w:p.width*2,h:p.height*6},boss);}
				else if(p.shape==='solidify'){const sw=p.width*3,sh=p.height*1.5;hit=rectRect({x:p.x-sw/2,y:p.y-sh/2,w:sw,h:sh},boss);}
				else if(p.shape==='vortex'){const vR2=p.width*3+p.width*2*(p.age/p.maxAge);hit=circRect(p.x,p.y,vR2,boss.x,boss.y,boss.w,boss.h);}
				else if(p.shape==='meteor'){hit=circRect(p.x,p.y,Math.max(p.width,p.height)*1.5,boss.x,boss.y,boss.w,boss.h);}
				else if(p.shape==='summon'){hit=false;}
				else{hit=circRect(p.x,p.y,hitR,boss.x,boss.y,boss.w,boss.h);}

				if(hit){
					const homingMult=p.behavior==='homing'?0.5:1;const lobMult=p.behavior==='lob'?1.25:1;const orbitMult=p.behavior==='orbit'?0.7:1;const rainMult=p.behavior==='rain'?1.5:1;const barrageMult=p.behavior==='barrage'?1.35:1;
					const hitNum=(p.castId>=0&&spellHitCounts[p.castId]!=null)?spellHitCounts[p.castId]++:0;const dimMult=1/(1+hitNum*0.08);const beamMult=p.shape==='beam'?0.65:1;
					const releaseMult=p.effects.includes('damageRelease')?(1+damageStored/500):1;
					const hasElemental=p.effects.includes('burn')||p.effects.includes('freeze')||p.effects.includes('poison')||p.effects.includes('stun');
					const elemMult=hasElemental?(1+vowElementalDmgBonus*0.07):1;const phaseMult=p.effects.includes('phaseThrough')?0.55:1;
					let meteorDistMult=1;if(p.shape==='meteor'){const md=Math.hypot(p.x-(player.x+player.w/2),p.y-(player.y+player.h/2));meteorDistMult=1+Math.min(md/300,2.0);}
					const meteorNerf=p.shape==='meteor'?0.75:1;let spreadMult=1;if(p.phase&&p.phase.spread>0&&p.phase.count>1){spreadMult=1+(p.phase.spread*0.0025*p.phase.count);}
					const rawDmg=p.power*8*homingMult*lobMult*orbitMult*rainMult*barrageMult*dimMult*beamMult*releaseMult*elemMult*phaseMult*meteorDistMult*spreadMult*meteorNerf;
					let dotSteal=0;if(p.effects.includes('burn'))dotSteal=0.5;if(p.effects.includes('poison'))dotSteal=0.4;
					const baseDmg=rawDmg*(1-dotSteal);
					if(p.effects.includes('damageStore')){const dsPct=p.phase.damageStorePercent!=null?p.phase.damageStorePercent:0.5;damageStored+=baseDmg*dsPct;updateDamageStoreHUD();}
					if(p.effects.includes('damageRelease')&&damageStored>0){damageStored=0;updateDamageStoreHUD();}
					boss.hp-=baseDmg;boss.flash=6;
					dmgNumbers.push({x:boss.x+boss.w/2+(Math.random()-0.5)*40,y:boss.y-10,text:'-'+Math.round(baseDmg),age:0,color:'#ffcc00'});
					applyEffects(p,boss,rawDmg);
					if(PIERCE_SET.has(p.shape)){p.hitTargets.add('boss');if(p.shape==='vortex'){const dx4=p.x-(boss.x+boss.w/2),dy4=p.y-(boss.y+boss.h/2);const d4=Math.sqrt(dx4*dx4+dy4*dy4)||1;boss.x+=dx4/d4*2;boss.y+=dy4/d4*1;}continue;}
					if(p.shape==='meteor'&&!p._meteorExploded){p._meteorExploded=true;const mSize=Math.max(p.width,p.height);spawnAfterHitEffect(p.x,p.y,'explosion',p.color,mSize*2.5);}
					p.hasHit=true;spawnImpact(p.x,p.y,p.color);

					if(!p.phaseTriggered&&p.phase.nextTrigger==='onHit'&&p.phaseIdx+1<p.spell.phases.length){p.phaseTriggered=true;if(p.effects.includes('resetProjectiles'))spawnPhase(p.spell,p.phaseIdx+1,p.x,p.y,p.facing,undefined,p.isUltimate,p.castId,p.sourceSlot);else morphProjectile(p,p.phaseIdx+1);}
				}
			}
		}

		/* Dispel enemy projectiles */
		if(p.effects.includes('dispel')&&!p.hasHit){
			const dR=Math.max(p.width,p.height)*0.8;
			for(let ei=enemyProjectiles.length-1;ei>=0;ei--){
				const ep=enemyProjectiles[ei];
				if(dist(p.x,p.y,ep.x,ep.y)<dR+ep.width){
					spawnImpact(ep.x,ep.y,'#88ccff');
					dmgNumbers.push({x:ep.x,y:ep.y-10,text:'🚫 Dispelled!',age:0,color:'#88ccff'});
					enemyProjectiles.splice(ei,1);
				}
			}
		}

		/* Timed release */
		if(!p.timedReleaseTriggered&&p.effects.includes('timedRelease')&&p.age>=p.timedReleaseDelay){

		}
		/* Phase fork */
		if(p.effects.includes('phaseFork')&&p.phaseIdx+1<p.spell.phases.length){
			if(p.phaseForkCount<p.phaseForkRepeats&&p.age>=p.phaseForkNextAge){p.phaseForkCount++;p.phaseForkNextAge=p.age+p.phaseForkDelay;const dm=1/(1+p.phaseForkCount*0.3);spawnPhase(p.spell,p.phaseIdx+1,p.x,p.y,p.facing,dm,p.isUltimate,p.castId,p.sourceSlot);spawnImpact(p.x,p.y,p.color);}

			projectiles.splice(i,1);continue;
		}
		if(p.x<-100||p.x>ARENA_W+100||p.y<-600||p.y>ARENA_H+100){projectiles.splice(i,1);}
	}

	/* Minions */
	for(let mi=playerMinions.length-1;mi>=0;mi--){
		const m=playerMinions[mi];m.age++;m.animTimer++;
		if(m.age>m.maxAge||m.hp<=0){playerMinions.splice(mi,1);continue;}
		if(!boss.dead){const dx=boss.x+boss.w/2-m.x,dy=boss.y+boss.h/2-m.y;const d=Math.sqrt(dx*dx+dy*dy)||1;m.vx+=(dx/d)*0.3;m.vy+=(dy/d)*0.3;}
		m.vx*=0.95;m.vy*=0.95;m.x+=m.vx;m.y+=m.vy;
		m.fireTimer++;
		if(m.fireTimer>=m.fireCooldown&&!boss.dead){m.fireTimer=0;const nextIdx=m.phaseIdx+1;if(nextIdx<m.spell.phases.length){spawnPhase(m.spell,nextIdx,m.x,m.y,m.facing,0.6,m.isUltimate,m.castId,m.sourceSlot);}}
	}

	/* Enemy projectiles */
	for(let i=enemyProjectiles.length-1;i>=0;i--){
		const p=enemyProjectiles[i];p.age++;
		if(p.age>p.maxAge){enemyProjectiles.splice(i,1);continue;}
		if(p.gravity)p.vy+=p.gravity;
		// Homing enemy projectiles
		if(p.homing){
			const dx=player.x+player.w/2-p.x;const dy=player.y+player.h/2-p.y;
			const d=Math.sqrt(dx*dx+dy*dy)||1;
			const curAng=Math.atan2(p.vy,p.vx);
			const desAng=Math.atan2(dy,dx);
			let diff=desAng-curAng;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;

		}

		/* Spell wall collision — walls block enemy projectiles */
		let wallBlocked=false;
		for(const sw of spellWalls){
			const pb={x:p.x-p.width/2,y:p.y-p.height/2,w:p.width,h:p.height};
			if(pb.x<sw.x+sw.w&&pb.x+pb.w>sw.x&&pb.y<sw.y+sw.h&&pb.y+pb.h>sw.y){
				wallBlocked=true;
				/* If wall has dispel, destroy the projectile cleanly */
				spawnImpact(p.x,p.y,'#88ccff');
				dmgNumbers.push({x:p.x,y:p.y-10,text:'🧱 Blocked!',age:0,color:'#88bbff'});
				enemyProjectiles.splice(i,1);
				break;
			}
		}
		if(wallBlocked)continue;
		if(player.iFrames<=0){
			const pb={x:p.x-p.width/2,y:p.y-p.height/2,w:p.width,h:p.height};
			if(rectRect(pb,player)){
				if(p.aoe){if(p.aoeTimer===0)damagePlayer(p.power,p.effects);p.aoeTimer++;if(p.aoeTimer>=p.aoeMax){enemyProjectiles.splice(i,1);continue;}}
				else{damagePlayer(p.power,p.effects);p.hasHit=true;enemyProjectiles.splice(i,1);continue;}
			}
		}
		if(p.x<-100||p.x>ARENA_W+100||p.y<-200||p.y>ARENA_H+100){enemyProjectiles.splice(i,1);}
	}

	/* Boss DOTs */
	if(!boss.dead&&boss.dots&&boss.dots.length>0){
		for(let di=boss.dots.length-1;di>=0;di--){
			const dot=boss.dots[di];dot.timer++;
			if(dot.timer>=dot.interval){dot.timer=0;boss.hp-=dot.dmg;boss.flash=4;
				dmgNumbers.push({x:boss.x+boss.w/2+(Math.random()-0.5)*30,y:boss.y-10,text:'-'+Math.round(dot.dmg),age:0,color:dot.color});
				dot.ticks--;if(dot.ticks<=0)boss.dots.splice(di,1);
			}
		}
	}

	/* Spell walls */
	for(let wi=spellWalls.length-1;wi>=0;wi--){spellWalls[wi].timer--;if(spellWalls[wi].timer<=0)spellWalls.splice(wi,1);}

	/* Boss AI */
	if(!boss.dead){
		if(boss.phaseTransition>0){boss.phaseTransition--;}
		else{
			if(boss.globalCd>0)boss.globalCd--;
			if(boss.stunTimer>0)boss.stunTimer--;
			if(boss.slowTimer>0)boss.slowTimer--;
			if(boss.armRaised>0)boss.armRaised--;
			boss.facing=player.x+player.w/2>boss.x+boss.w/2?1:-1;
			if(boss.stunTimer<=0){
				const bDx=player.x+player.w/2-(boss.x+boss.w/2);const bDy=player.y+player.h/2-(boss.y+boss.h/2);const bDist=Math.sqrt(bDx*bDx+bDy*bDy)||1;
				const prefDist=450;const spdMult=boss.slowTimer>0?0.2:1;
				if(bDist>prefDist+60){boss.x+=bDx/bDist*1.2*spdMult;boss.y+=bDy/bDist*0.4*spdMult;}
				else if(bDist<prefDist-100){boss.x-=bDx/bDist*0.8*spdMult;boss.y-=bDy/bDist*0.2*spdMult;}
			}
			if(boss.x<40)boss.x=40;if(boss.x+boss.w>ARENA_W-40)boss.x=ARENA_W-40-boss.w;
			if(boss.y<ARENA_CEIL_Y)boss.y=ARENA_CEIL_Y;if(boss.y+boss.h>ARENA_FLOOR_Y)boss.y=ARENA_FLOOR_Y-boss.h;
			bossAttack();
		}
		if(boss.hp<=0){
			boss.dead=true;boss.deathTimer=0;
			dmgNumbers.push({x:boss.x+boss.w/2,y:boss.y-30,text:'🌑 THE VOID ARBITER DEFEATED!',age:0,color:'#ff4466'});
			for(let v=0;v<50;v++) particles.push({x:boss.x+Math.random()*boss.w,y:boss.y+Math.random()*boss.h,vx:(Math.random()-0.5)*12,vy:(Math.random()-0.5)*12-4,life:80+Math.random()*40,color:['#ff2244','#cc1133','#ffaa00','#440011'][v%4]});
			enemyProjectiles.length=0;boss.laserActive=false;boss._voidDarkness=false;
			/* --- Drop mythical ingredient --- */
			const dropId='void_heart';
			const existing=playerData.inventory.find(e=>e.itemId===dropId);
			if(existing) existing.qty+=1; else playerData.inventory.push({itemId:dropId,qty:1});
			localStorage.setItem('magicBattle_playerData',JSON.stringify(playerData));
			setTimeout(()=>{
				document.getElementById('lootIcon').textContent='💜';
				document.getElementById('lootName').textContent='Void Heart';
				document.getElementById('lootDesc').textContent='The still-pulsing core of the Void Arbiter. Mythical crafting ingredient.';
				document.getElementById('victoryOverlay').style.display='flex';
			},2500);
		}
	}

	/* Particles & dmg numbers */
	for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.life--;p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;if(p.life<=0)particles.splice(i,1);}
	for(let i=dmgNumbers.length-1;i>=0;i--){dmgNumbers[i].age++;dmgNumbers[i].y-=0.8;if(dmgNumbers[i].age>60)dmgNumbers.splice(i,1);}

	/* Buff timers */
	if(playerBuffs.speedTimer>0)playerBuffs.speedTimer--;
	if(playerBuffs.jumpTimer>0)playerBuffs.jumpTimer--;
	if(playerBuffs.manaRegenTimer>0)playerBuffs.manaRegenTimer--;

	updateCamera();
}

/* =============================================================
   RENDER
   ============================================================= */
function render(){
	ctx.clearRect(0,0,canvas.width,canvas.height);

	/* Void darkness overlay */
	if(boss._voidDarkness){
		ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,canvas.width,canvas.height);
		// Draw light orbs
		if(boss._lightOrbs){
			for(const lo of boss._lightOrbs){
				if(lo.age>lo.maxAge)continue;
				const lx=lo.x-camera.x,ly=lo.y-camera.y;
				const grad=ctx.createRadialGradient(lx,ly,0,lx,ly,lo.radius);
				grad.addColorStop(0,'rgba(255,240,200,0.6)');grad.addColorStop(0.5,'rgba(255,200,100,0.2)');grad.addColorStop(1,'transparent');
				ctx.fillStyle=grad;ctx.beginPath();ctx.arc(lx,ly,lo.radius,0,Math.PI*2);ctx.fill();
			}
		}
	}

	ctx.save();
	ctx.translate(-camera.x,-camera.y);

	// Arena background — dark void theme
	ctx.fillStyle='#080412';ctx.fillRect(0,0,ARENA_W,ARENA_H);
	ctx.strokeStyle='rgba(255,30,60,0.06)';ctx.lineWidth=1;
	for(let gx=0;gx<ARENA_W;gx+=80){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,ARENA_H);ctx.stroke();}
	for(let gy=0;gy<ARENA_H;gy+=80){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(ARENA_W,gy);ctx.stroke();}
	// Floor
	const floorGrad=ctx.createLinearGradient(0,ARENA_FLOOR_Y,0,ARENA_H);
	floorGrad.addColorStop(0,'#2a0a1a');floorGrad.addColorStop(1,'#120408');
	ctx.fillStyle=floorGrad;ctx.fillRect(0,ARENA_FLOOR_Y,ARENA_W,ARENA_H-ARENA_FLOOR_Y);
	ctx.fillStyle='rgba(255,40,60,0.2)';ctx.fillRect(0,ARENA_FLOOR_Y,ARENA_W,3);
	// Walls
	ctx.fillStyle='#1a0812';ctx.fillRect(0,0,40,ARENA_H);ctx.fillRect(ARENA_W-40,0,40,ARENA_H);ctx.fillRect(0,0,ARENA_W,ARENA_CEIL_Y);
	// Platforms
	for(const plat of platforms){
		ctx.fillStyle='#2a0a1a';ctx.fillRect(plat.x,plat.y,plat.w,plat.h);
		ctx.fillStyle='rgba(255,40,60,0.25)';ctx.fillRect(plat.x,plat.y,plat.w,2);
	}

	// Indicators (with pulsing effect)
	for(const ind of indicators){
		const baseAlpha=(1-ind.age/ind.maxAge)*0.7;
		const pulse=0.15*Math.sin(ind.age*0.25);
		const alpha=Math.min(1,baseAlpha+pulse);
		ctx.save();ctx.globalAlpha=alpha;
		if(ind.type==='circle'){
			ctx.beginPath();ctx.arc(ind.x+ind.w/2,ind.y+ind.h/2,ind.w/2,0,Math.PI*2);
			ctx.fillStyle=ind.color;ctx.fill();
			ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=4;ctx.stroke();
		} else {
			ctx.fillStyle=ind.color;ctx.fillRect(ind.x,ind.y,ind.w,ind.h);
			ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=3;ctx.strokeRect(ind.x,ind.y,ind.w,ind.h);
		}
		ctx.restore();
	}

	// Enemy projectiles
	for(const p of enemyProjectiles){
		ctx.save();
		ctx.beginPath();ctx.arc(p.x,p.y,p.width/2,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();
		ctx.beginPath();ctx.arc(p.x,p.y,p.width/4,0,Math.PI*2);ctx.fillStyle=p.color2;ctx.fill();
		ctx.restore();
	}

	// Boss laser
	if(boss.laserActive){
		const lx=boss.x+boss.w/2,ly=boss.y+boss.h/2;
		const laserLen=1500;
		ctx.save();ctx.translate(lx,ly);ctx.rotate(boss.laserAngle);
		ctx.globalAlpha=0.8;ctx.fillStyle='#ff0022';ctx.fillRect(0,-15,laserLen,30);
		ctx.globalAlpha=0.5;ctx.fillStyle='#ff4444';ctx.fillRect(0,-25,laserLen,50);
		ctx.globalAlpha=1;ctx.fillStyle='#fff';ctx.fillRect(0,-5,laserLen,10);
		ctx.restore();
		// Origin glow
		ctx.save();ctx.globalAlpha=0.6;const lg=ctx.createRadialGradient(lx,ly,0,lx,ly,60);
		lg.addColorStop(0,'#ff4444');lg.addColorStop(1,'transparent');
		ctx.fillStyle=lg;ctx.beginPath();ctx.arc(lx,ly,60,0,Math.PI*2);ctx.fill();ctx.restore();
	}

	// Spell walls
	for(const sw of spellWalls){
		const alpha=Math.min(1,sw.timer/60);ctx.save();ctx.globalAlpha=0.5*alpha;ctx.fillStyle=sw.color;
		ctx.fillRect(sw.x,sw.y,sw.w,sw.h);ctx.globalAlpha=0.8*alpha;ctx.strokeStyle=sw.color;ctx.lineWidth=2;
		ctx.strokeRect(sw.x,sw.y,sw.w,sw.h);ctx.restore();
	}

	// Player projectiles (all shapes)
	for(const p of projectiles){
		const px=p.x,py=p.y;const progress=p.age/p.maxAge;
		const margin=500;if(px-camera.x<-margin||px-camera.x>canvas.width+margin||py-camera.y<-margin||py-camera.y>canvas.height+margin)continue;
		drawTrail(p);
		if(projectiles.length<100){ctx.save();ctx.globalAlpha=0.25+0.2*(1-progress);const glow=ctx.createRadialGradient(px,py,0,px,py,p.width*3);glow.addColorStop(0,p.color);glow.addColorStop(1,'transparent');ctx.fillStyle=glow;ctx.beginPath();ctx.arc(px,py,p.width*3,0,Math.PI*2);ctx.fill();ctx.restore();}
		ctx.fillStyle=p.color;ctx.strokeStyle=p.color;ctx.globalAlpha=0.9;
		switch(p.shape){
			case'allyOrb':{const r=p.width*1.3;ctx.fillStyle='#44ff88';ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#aaffcc';ctx.globalAlpha=0.6;ctx.beginPath();ctx.arc(px,py,r*0.5,0,Math.PI*2);ctx.fill();break;}
			case'missile':case'orb':{const r=p.shape==='orb'?p.width*1.3:p.width*0.7;ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.globalAlpha=0.6;ctx.beginPath();ctx.arc(px,py,r*0.4,0,Math.PI*2);ctx.fill();break;}
			case'blade':{ctx.save();ctx.translate(px,py);ctx.rotate(p.age*0.3);ctx.fillRect(-p.width*1.8,-p.height*0.3,p.width*3.6,p.height*0.6);ctx.restore();break;}
			case'beam':{const bx=p.startX,by=p.startY;ctx.save();ctx.translate(bx,by);ctx.rotate(p.beamAngle);ctx.globalAlpha=0.7;ctx.fillRect(0,-p.height/2,p.beamLen,p.height);ctx.fillStyle='#fff';ctx.globalAlpha=0.5;ctx.fillRect(0,-p.height*0.15,p.beamLen,p.height*0.3);ctx.restore();break;}
			case'ring':{const eR=progress*p.width*8;ctx.beginPath();ctx.arc(px,py,eR,0,Math.PI*2);ctx.lineWidth=3;ctx.globalAlpha=0.7*(1-progress);ctx.stroke();break;}
			case'nova':{const eR=progress*p.width*8;ctx.globalAlpha=0.25*(1-progress);ctx.beginPath();ctx.arc(px,py,eR,0,Math.PI*2);ctx.fill();ctx.lineWidth=3;ctx.globalAlpha=0.6*(1-progress);ctx.beginPath();ctx.arc(px,py,eR,0,Math.PI*2);ctx.stroke();break;}
			case'cone':{const cL=progress*200*(p.phase.width||1),cH=cL*0.4*(p.phase.width||1);const cx2=p.startX,cy2=p.startY;ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.lineTo(cx2+p.facing*cL,cy2-cH);ctx.lineTo(cx2+p.facing*cL,cy2+cH);ctx.closePath();ctx.globalAlpha=0.3*(1-progress*0.5);ctx.fill();break;}
			case'chain':{ctx.beginPath();ctx.arc(px,py,p.width*0.7,0,Math.PI*2);ctx.fill();break;}
			case'wall':{const ww=p.width*2,wh=p.height*6;ctx.globalAlpha=0.45;ctx.fillRect(px-ww/2,py-wh/2,ww,wh);ctx.globalAlpha=0.7;ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.strokeRect(px-ww/2,py-wh/2,ww,wh);break;}
			case'solidify':{const sw2=p.width*3,sh2=p.height*1.5;ctx.globalAlpha=0.7;ctx.fillRect(px-sw2/2,py-sh2/2,sw2,sh2);ctx.globalAlpha=0.9;ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.strokeRect(px-sw2/2,py-sh2/2,sw2,sh2);break;}
			case'spike':{ctx.save();ctx.translate(px,py);const skA=Math.atan2(p.vy,p.vx);ctx.rotate(skA);const sk=Math.max(p.width,p.height)*0.9;ctx.beginPath();ctx.moveTo(sk*2,0);ctx.lineTo(-sk,-sk*0.8);ctx.lineTo(-sk*0.3,0);ctx.lineTo(-sk,sk*0.8);ctx.closePath();ctx.fill();ctx.restore();break;}
			case'polygon':{ctx.save();ctx.translate(px,py);ctx.rotate(p.age*0.04);const pgR=Math.max(p.width,p.height);const pgSides=p.polygonSides||6;ctx.beginPath();for(let si=0;si<=pgSides;si++){const a=si*Math.PI*2/pgSides;if(si===0)ctx.moveTo(Math.cos(a)*pgR,Math.sin(a)*pgR);else ctx.lineTo(Math.cos(a)*pgR,Math.sin(a)*pgR);}ctx.closePath();ctx.fill();ctx.restore();break;}
			case'meteor':{
				const mr=Math.max(p.width,p.height)*1.5;
				const _mRgb=hexToRgb(p.color);
				const coreC=`rgb(${Math.min(255,_mRgb.r+40)},${Math.min(255,_mRgb.g+20)},${Math.min(255,_mRgb.b+20)})`;
				const glowC=`rgb(${Math.min(255,_mRgb.r+100)},${Math.min(255,_mRgb.g+80)},${Math.min(255,_mRgb.b+80)})`;
				ctx.save();ctx.translate(px,py);ctx.rotate(Math.atan2(p.vy,p.vx));
				// outer glow
				ctx.globalAlpha=0.15;const hg=ctx.createRadialGradient(0,0,mr*0.5,0,0,mr*2.5);
				hg.addColorStop(0,coreC);hg.addColorStop(0.5,p.color+'44');hg.addColorStop(1,'transparent');
				ctx.fillStyle=hg;ctx.beginPath();ctx.arc(0,0,mr*2.5,0,Math.PI*2);ctx.fill();
				// rocky body
				ctx.globalAlpha=1;ctx.fillStyle=`rgb(${Math.max(0,_mRgb.r-80)},${Math.max(0,_mRgb.g-80)},${Math.max(0,_mRgb.b-80)})`;
				ctx.beginPath();for(let i=0;i<8;i++){const a=i*Math.PI*2/8;const rr=mr*(0.7+Math.sin(i*2.7)*0.3);if(i===0)ctx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr);else ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);}ctx.closePath();ctx.fill();
				// core
				ctx.fillStyle=coreC;ctx.globalAlpha=0.8;ctx.beginPath();ctx.arc(0,0,mr*0.45,0,Math.PI*2);ctx.fill();
				ctx.fillStyle=glowC;ctx.globalAlpha=0.6;ctx.beginPath();ctx.arc(0,0,mr*0.25,0,Math.PI*2);ctx.fill();
				// flame trail
				ctx.globalAlpha=0.5;
				for(let fi=1;fi<=5;fi++){const fx=-mr*fi*0.65,fy=Math.sin(p.age*0.4+fi*1.2)*mr*0.25;const tR=mr*(0.6-fi*0.09);ctx.fillStyle=fi<3?coreC:glowC;ctx.beginPath();ctx.arc(fx,fy,Math.max(tR,2),0,Math.PI*2);ctx.fill();}
				ctx.restore();break;
			}
			case'vortex':{const vr=p.width*3+p.width*2*(p.age/p.maxAge);ctx.save();ctx.globalAlpha=0.3;ctx.beginPath();ctx.arc(px,py,vr,0,Math.PI*2);ctx.fill();ctx.globalAlpha=0.7;ctx.lineWidth=3;ctx.beginPath();ctx.arc(px,py,vr,p.age*0.05,p.age*0.05+Math.PI*1.3);ctx.stroke();ctx.beginPath();ctx.arc(px,py,vr*0.6,p.age*-0.08,p.age*-0.08+Math.PI);ctx.stroke();ctx.restore();break;}
			default:{const r=Math.max(p.width,p.height)/2;ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.fill();break;}
		}
		ctx.globalAlpha=1;
	}

	// Minions
	for(const m of playerMinions){ctx.beginPath();ctx.arc(m.x,m.y,m.w/2,0,Math.PI*2);ctx.fillStyle=m.color;ctx.fill();}

	// Boss
	if(!boss.dead){
		if(boss.teleportGhostAlpha>0){ctx.save();ctx.globalAlpha=boss.teleportGhostAlpha;drawVoidArbiter(boss.teleportGhostX,boss.teleportGhostY);ctx.restore();}
		drawVoidArbiter(boss.x,boss.y);
	}

	// Player (sprite sheet)
	if(player.iFrames<=0||(player.iFrames%4<2)){
		const ppx=player.x,ppy=player.y;
		if(PLAYER_SPRITE.complete&&PLAYER_SPRITE.naturalWidth>0){
			const sw=PLAYER_SPRITE.naturalWidth/PLAYER_SPRITE_COLS;
			const sh=PLAYER_SPRITE.naturalHeight/PLAYER_SPRITE_ROWS;
			const row=PLAYER_SPRITE_ROW[playerAnimState]||0;
			const col=playerAnimFrame%PLAYER_SPRITE_COLS;
			const _fitScale=Math.min(player.w/sw,player.h/sh)*2;
			const dw=sw*_fitScale,dh=sh*_fitScale;
			const dx=ppx+(player.w-dw)/2,dy=ppy+(player.h-dh);
			ctx.save();
			if(player.flash>0){ctx.globalAlpha=0.7;ctx.filter='brightness(2) saturate(0.3) hue-rotate(-30deg)';}
			if(player.facing===-1){ctx.translate(dx+dw,dy);ctx.scale(-1,1);ctx.drawImage(PLAYER_SPRITE,col*sw,row*sh,sw,sh,0,0,dw,dh);}
			else{ctx.drawImage(PLAYER_SPRITE,col*sw,row*sh,sw,sh,dx,dy,dw,dh);}
			ctx.restore();
		} else {
			// Fallback procedural player
			ctx.fillStyle=player.flash>0?'#ff6666':'#5b7fbf';ctx.fillRect(ppx,ppy,player.w,player.h);
			ctx.fillStyle='#3a5a9e';ctx.fillRect(ppx,ppy+player.h-10,player.w,10);
			ctx.fillStyle='#c8a882';ctx.fillRect(ppx+6,ppy+2,20,16);
			ctx.fillStyle='#fff';const eyeX=player.facing===1?ppx+18:ppx+10;ctx.fillRect(eyeX,ppy+7,5,5);
			ctx.fillStyle='#222';ctx.fillRect(player.facing===1?eyeX+2:eyeX,ppy+8,3,3);
			ctx.fillStyle='#2e3a6e';ctx.beginPath();ctx.moveTo(ppx+4,ppy+4);ctx.lineTo(ppx+player.w/2,ppy-18);ctx.lineTo(ppx+player.w-4,ppy+4);ctx.closePath();ctx.fill();
			const armY=ppy+18,armX=player.facing===1?ppx+player.w:ppx;
			ctx.fillStyle='#5b7fbf';ctx.fillRect(player.facing===1?armX:armX-10,armY,10,6);
			if(player.castTimer>0){ctx.save();ctx.globalAlpha=0.6*(player.castTimer/12);ctx.beginPath();ctx.arc(player.facing===1?armX+10:armX-10,armY+3,12,0,Math.PI*2);ctx.fillStyle=player.castColor;ctx.fill();ctx.restore();}
		}
	}

	// Particles
	if(particles.length>MAX_PARTICLES)particles.splice(0,particles.length-MAX_PARTICLES);
	for(const p of particles){
		const alpha=p.maxLife?p.life/p.maxLife:p.life/40;const r=p.r?(p.r*alpha):2;
		ctx.globalAlpha=alpha*0.8;
		if(typeof p.color==='string'){ctx.fillStyle=p.color;ctx.fillRect(p.x-r,p.y-r,r*2,r*2);}
		else{ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fillStyle=`rgba(${p.color.r},${p.color.g},${p.color.b},${alpha*0.8})`;ctx.fill();}
	}
	ctx.globalAlpha=1;
	// Damage numbers
	for(const d of dmgNumbers){ctx.globalAlpha=Math.max(0,1-d.age/60);ctx.font='bold 14px Arial';ctx.fillStyle=d.color;ctx.textAlign='center';ctx.fillText(d.text,d.x,d.y);}
	ctx.globalAlpha=1;
	ctx.restore();

	// Boss HP bar (screen space)
	if(!boss.dead){
		const barW=600,barH=22,barX=(canvas.width-barW)/2,barY=36;
		ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(barX-2,barY-2,barW+4,barH+4);
		const hpPct=Math.max(0,boss.hp/boss.maxHp);
		const hpGrad=ctx.createLinearGradient(barX,barY,barX+barW*hpPct,barY);
		const p=boss.phase;
		hpGrad.addColorStop(0,p>=3?'#cc0022':p>=2?'#991133':'#882244');
		hpGrad.addColorStop(1,p>=3?'#ff2244':p>=2?'#ff4466':'#cc4466');
		ctx.fillStyle=hpGrad;ctx.fillRect(barX,barY,barW*hpPct,barH);
		// Phase markers
		ctx.fillStyle='rgba(255,255,255,0.3)';
		ctx.fillRect(barX+barW*0.65-1,barY,2,barH);
		ctx.fillRect(barX+barW*0.30-1,barY,2,barH);
		ctx.font='bold 14px Arial';ctx.fillStyle=p>=3?'#ff2244':p>=2?'#ff4466':'#cc6688';ctx.textAlign='center';
		const phaseText=p>=3?' — JUDGEMENT':p>=2?' — WRATH':'';
		ctx.fillText('The Void Arbiter'+phaseText,barX+barW/2,barY-8);
		ctx.font='11px Arial';ctx.fillStyle='#fff';
		ctx.fillText(Math.ceil(boss.hp)+' / '+boss.maxHp,barX+barW/2,barY+barH/2+4);
		ctx.strokeStyle=p>=3?'#ff0022':p>=2?'#cc2244':'#882244';ctx.lineWidth=2;ctx.strokeRect(barX,barY,barW,barH);
	}
	ctx.textAlign='left';
}

/* =============================================================
   DRAW THE VOID ARBITER
   Massive dark colossus with void energy
   ============================================================= */
function drawVoidArbiter(bx,by){
	const cx=bx+boss.w/2,cy=by+boss.h/2;
	const t=boss.animTimer;
	const p=boss.phase;

	// Phase aura
	ctx.save();ctx.globalAlpha=0.1+Math.sin(t*0.02)*0.05;
	ctx.beginPath();ctx.arc(cx,cy,boss.w*(p>=3?1.2:p>=2?1.0:0.7),0,Math.PI*2);
	const ag=ctx.createRadialGradient(cx,cy,20,cx,cy,boss.w);
	ag.addColorStop(0,p>=3?'#ff0022':p>=2?'#ff2244':'#882244');ag.addColorStop(1,'transparent');
	ctx.fillStyle=ag;ctx.fill();ctx.restore();

	/* --- Sprite sheet draw --- */
	if(BOSS_SPRITE.complete && BOSS_SPRITE.naturalWidth>0){
		// Determine animation state
		if(boss.dead) bossAnimState='defeat';
		else if(boss.armRaised>0||boss.laserActive) bossAnimState='attack';
		else if(boss.teleportGhostAlpha>0.3||Math.abs(boss.vx)>0.5) bossAnimState='move';
		else bossAnimState='idle';
		bossAnimTimer++;
		if(bossAnimTimer>=BOSS_SPRITE_FPS){bossAnimTimer=0;bossAnimFrame=(bossAnimFrame+1)%BOSS_SPRITE_COLS;}
		const row=BOSS_SPRITE_ROW[bossAnimState]||0;
		const fw=BOSS_SPRITE.naturalWidth/BOSS_SPRITE_COLS;
		const fh=BOSS_SPRITE.naturalHeight/BOSS_SPRITE_ROWS;
		const sx=bossAnimFrame*fw, sy=row*fh;
		// Draw sprite scaled to boss w/h, flip based on facing
		ctx.save();
		if(boss.facing>0){ctx.translate(bx+boss.w,by);ctx.scale(-1,1);ctx.drawImage(BOSS_SPRITE,sx,sy,fw,fh,0,0,boss.w,boss.h);}
		else{ctx.drawImage(BOSS_SPRITE,sx,sy,fw,fh,bx,by,boss.w,boss.h);}
		ctx.restore();
		// Phase overlay tint
		if(p>=2){
			ctx.save();ctx.globalAlpha=p>=3?0.15:0.08;
			ctx.fillStyle=p>=3?'#ff0022':'#ff2244';ctx.fillRect(bx,by,boss.w,boss.h);
			ctx.restore();
		}
		// Flash on hit
		if(boss.flash>0){ctx.save();ctx.globalAlpha=boss.flash/6*0.4;ctx.fillStyle='#fff';ctx.fillRect(bx,by,boss.w,boss.h);ctx.restore();boss.flash--;}
		// Floating void runes
		ctx.save();
		const runeSymbols=['⚖️','🌑','💀','⚡','🔥'];
		for(let r=0;r<5;r++){const ra=t*0.015+r*Math.PI*2/5;const rr=90+Math.sin(t*0.01+r)*15;const rx=cx+Math.cos(ra)*rr;const ry=cy-30+Math.sin(ra)*rr*0.4;ctx.globalAlpha=0.4+Math.sin(t*0.05+r)*0.3;ctx.font='16px Arial';ctx.textAlign='center';ctx.fillStyle=p>=3?'#ff4466':p>=2?'#ff6688':'#cc6688';ctx.fillText(runeSymbols[r],rx,ry);}
		ctx.restore();
		return;
	}

	// Floating body
	const hover=Math.sin(t*0.025)*10;
	const bodyY=by+40+hover;

	// Shadow
	ctx.save();ctx.globalAlpha=0.25;
	ctx.beginPath();ctx.ellipse(cx,ARENA_FLOOR_Y-2,70,12,0,0,Math.PI*2);
	ctx.fillStyle='#220008';ctx.fill();ctx.restore();

	// Body — massive armored colossus
	ctx.fillStyle='#0a0015';
	ctx.beginPath();
	ctx.moveTo(cx-80,bodyY+40);
	ctx.quadraticCurveTo(cx-100,bodyY+180,cx-60,by+boss.h);
	ctx.lineTo(cx+60,by+boss.h);
	ctx.quadraticCurveTo(cx+100,bodyY+180,cx+80,bodyY+40);
	ctx.closePath();ctx.fill();

	// Armor plates
	ctx.fillStyle='#1a0025';
	ctx.beginPath();ctx.moveTo(cx-70,bodyY+60);ctx.lineTo(cx-40,bodyY+140);ctx.lineTo(cx,bodyY+60);ctx.closePath();ctx.fill();
	ctx.beginPath();ctx.moveTo(cx+70,bodyY+60);ctx.lineTo(cx+40,bodyY+140);ctx.lineTo(cx,bodyY+60);ctx.closePath();ctx.fill();

	// Void core (chest)
	ctx.save();ctx.globalAlpha=0.6+Math.sin(t*0.06)*0.3;
	ctx.beginPath();ctx.arc(cx,bodyY+80,20,0,Math.PI*2);
	const coreGrad=ctx.createRadialGradient(cx,bodyY+80,0,cx,bodyY+80,20);
	coreGrad.addColorStop(0,p>=3?'#ff0022':'#ff2244');coreGrad.addColorStop(1,'transparent');
	ctx.fillStyle=coreGrad;ctx.fill();ctx.restore();

	// Arms
	const armWave=boss.armRaised>0?-30:Math.sin(t*0.04)*15;
	ctx.strokeStyle='#0a0015';ctx.lineWidth=14;ctx.lineCap='round';
	ctx.beginPath();ctx.moveTo(cx-75,bodyY+60);ctx.quadraticCurveTo(cx-120,bodyY+50+armWave,cx-130,bodyY+25+armWave);ctx.stroke();
	ctx.beginPath();ctx.moveTo(cx+75,bodyY+60);ctx.quadraticCurveTo(cx+120,bodyY+50-armWave,cx+130,bodyY+25-armWave);ctx.stroke();

	// Hands — void orbs
	const handGlow=p>=3?'#ff0022':p>=2?'#ff4466':'#cc2244';
	ctx.beginPath();ctx.arc(cx-130,bodyY+25+armWave,12,0,Math.PI*2);ctx.fillStyle=handGlow;ctx.fill();
	ctx.beginPath();ctx.arc(cx+130,bodyY+25-armWave,12,0,Math.PI*2);ctx.fillStyle=handGlow;ctx.fill();
	// Hand glow
	ctx.save();ctx.globalAlpha=0.3;
	ctx.beginPath();ctx.arc(cx-130,bodyY+25+armWave,25,0,Math.PI*2);ctx.fillStyle=handGlow;ctx.fill();
	ctx.beginPath();ctx.arc(cx+130,bodyY+25-armWave,25,0,Math.PI*2);ctx.fillStyle=handGlow;ctx.fill();
	ctx.restore();

	// Head — massive horned helmet
	const headY=bodyY-20;
	ctx.fillStyle='#0a0015';
	ctx.beginPath();ctx.arc(cx,headY,40,0,Math.PI*2);ctx.fill();

	// Horns
	ctx.strokeStyle='#1a0025';ctx.lineWidth=8;ctx.lineCap='round';
	ctx.beginPath();ctx.moveTo(cx-30,headY-15);ctx.quadraticCurveTo(cx-50,headY-60,cx-35,headY-80);ctx.stroke();
	ctx.beginPath();ctx.moveTo(cx+30,headY-15);ctx.quadraticCurveTo(cx+50,headY-60,cx+35,headY-80);ctx.stroke();

	// Face visor — single glowing eye slit
	const eyeColor=p>=3?'#ff0022':p>=2?'#ff2244':'#cc4466';
	ctx.fillStyle=eyeColor;
	ctx.fillRect(cx-25,headY-5,50,8);
	// Eye glow
	ctx.save();ctx.globalAlpha=0.5+Math.sin(t*0.08)*0.3;
	ctx.beginPath();ctx.arc(cx,headY,20,0,Math.PI*2);ctx.fillStyle=eyeColor;ctx.fill();
	ctx.restore();

	// Phase 2+ cracks
	if(p>=2){
		ctx.strokeStyle='#ff2244';ctx.lineWidth=2;
		ctx.beginPath();ctx.moveTo(cx-15,bodyY+50);ctx.lineTo(cx-25,bodyY+100);ctx.lineTo(cx-10,bodyY+130);ctx.stroke();
		ctx.beginPath();ctx.moveTo(cx+20,bodyY+60);ctx.lineTo(cx+30,bodyY+110);ctx.stroke();
	}
	// Phase 3 — burning aura
	if(p>=3){
		ctx.save();ctx.globalAlpha=0.15+Math.sin(t*0.04)*0.1;
		ctx.beginPath();ctx.arc(cx,cy,boss.w*0.6,0,Math.PI*2);
		const burnGrad=ctx.createRadialGradient(cx,cy,boss.w*0.2,cx,cy,boss.w*0.6);
		burnGrad.addColorStop(0,'#ff0022');burnGrad.addColorStop(1,'transparent');
		ctx.fillStyle=burnGrad;ctx.fill();ctx.restore();
	}

	// Floating void runes
	ctx.save();
	const runeSymbols=['⚖️','🌑','💀','⚡','🔥'];
	for(let r=0;r<5;r++){
		const ra=t*0.015+r*Math.PI*2/5;
		const rr=90+Math.sin(t*0.01+r)*15;
		const rx=cx+Math.cos(ra)*rr;
		const ry=cy-30+Math.sin(ra)*rr*0.4;
		ctx.globalAlpha=0.4+Math.sin(t*0.05+r)*0.3;
		ctx.font='16px Arial';ctx.textAlign='center';
		ctx.fillStyle=p>=3?'#ff4466':p>=2?'#ff6688':'#cc6688';
		ctx.fillText(runeSymbols[r],rx,ry);
	}
	ctx.restore();

	// Flash on hit
	if(boss.flash>0){
		ctx.save();ctx.globalAlpha=boss.flash/6*0.4;
		ctx.fillStyle='#fff';ctx.fillRect(bx,by,boss.w,boss.h);
		ctx.restore();boss.flash--;
	}
}

/* GAME LOOP */
function loop(){update();render();requestAnimationFrame(loop);}
loop();
</script>
