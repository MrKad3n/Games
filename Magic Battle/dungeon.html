			ctx.fillStyle = ind.color;
			if(ind.type === 'circle'){
				ctx.beginPath();
				ctx.arc(ix + ind.w/2, iy + ind.h/2, ind.w/2, 0, Math.PI * 2);
				ctx.fill();
			} else {
				ctx.fillRect(ix, iy, ind.w, ind.h);
			}
			ctx.globalAlpha = 1;
		}
		
		// Draw raid boss
		if(raidBoss && !raidBoss.dead){
			const bx = raidBoss.x - camera.x, by = raidBoss.y - camera.y;
			const p = raidBoss.phase;
			
			// Boss glow (intensifies with phase)
			const cx = bx + raidBoss.w/2, cy = by + raidBoss.h/2;
			ctx.save();
			ctx.beginPath(); ctx.arc(cx, cy, raidBoss.w * (p >= 3 ? 1.2 : p >= 2 ? 1.0 : 0.7), 0, Math.PI * 2);
			const ag = ctx.createRadialGradient(cx, cy, 20, cx, cy, raidBoss.w);
			ag.addColorStop(0, p >= 3 ? '#ff0022' : p >= 2 ? '#ff2244' : '#882244');
			ag.addColorStop(1, 'transparent');
			ctx.fillStyle = ag; ctx.fill(); ctx.restore();
			
			// Sprite sheet draw
			if(BOSS_SPRITE.complete && BOSS_SPRITE.naturalWidth > 0){
				// Determine animation state
				if(raidBoss.armRaised > 0 || raidBoss.laserActive) bossAnimState = 'attack';
				else if(raidBoss.teleportGhostAlpha > 0.3 || Math.abs(raidBoss.vx) > 0.5) bossAnimState = 'move';
				else bossAnimState = 'idle';
				bossAnimTimer++;
				if(bossAnimTimer >= BOSS_SPRITE_FPS){ bossAnimTimer = 0; bossAnimFrame = (bossAnimFrame + 1) % BOSS_SPRITE_COLS; }
				const row = BOSS_SPRITE_ROW[bossAnimState] || 0;
				const fw = BOSS_SPRITE.naturalWidth / BOSS_SPRITE_COLS;
				const fh = BOSS_SPRITE.naturalHeight / BOSS_SPRITE_ROWS;
				const sx = bossAnimFrame * fw, sy = row * fh;
				// Draw sprite scaled to boss w/h, flip based on facing
				ctx.save();
				if(raidBoss.facing > 0){ ctx.translate(bx + raidBoss.w, by); ctx.scale(-1, 1); ctx.drawImage(BOSS_SPRITE, sx, sy, fw, fh, 0, 0, raidBoss.w, raidBoss.h); }
				else { ctx.drawImage(BOSS_SPRITE, sx, sy, fw, fh, bx, by, raidBoss.w, raidBoss.h); }
				ctx.restore();
				// Phase overlay tint
				if(p >= 2){
					ctx.save(); ctx.globalAlpha = p >= 3 ? 0.15 : 0.08;
					ctx.fillStyle = p >= 3 ? '#ff0022' : '#ff2244'; ctx.fillRect(bx, by, raidBoss.w, raidBoss.h);
					ctx.restore();
				}
				// Flash on hit
				if(raidBoss.flash > 0){
					ctx.save(); ctx.globalAlpha = raidBoss.flash / 6 * 0.4; ctx.fillStyle = '#fff'; ctx.fillRect(bx, by, raidBoss.w, raidBoss.h); ctx.restore();
				}
			} else {
				// Fallback: simple rectangle if sprite not loaded
				ctx.fillStyle = raidBoss.flash > 0 ? '#ffffff' : '#2d1b4e';
				ctx.fillRect(bx + 20, by + 40, raidBoss.w - 40, raidBoss.h - 60);
				ctx.fillStyle = '#0a0014';
				ctx.beginPath(); ctx.moveTo(bx + raidBoss.w/2, by); ctx.lineTo(bx + 20, by + 60); ctx.lineTo(bx + raidBoss.w - 20, by + 60); ctx.closePath(); ctx.fill();
				ctx.fillStyle = '#cc2244'; ctx.fillRect(bx + raidBoss.w/2 - 20, by + 35, 40, 8);
			}
			
			// Boss HP bar (at top of screen)
			const hpPct = raidBoss.hp / raidBoss.maxHp;
			ctx.fillStyle = 'rgba(0,0,0,0.7)';
			ctx.fillRect(canvas.width/2 - 200, 50, 400, 20);
			const hpColor = hpPct > 0.65 ? '#cc2244' : hpPct > 0.3 ? '#ff6644' : '#ff0033';
			ctx.fillStyle = hpColor;
			ctx.fillRect(canvas.width/2 - 200, 50, 400 * hpPct, 20);
			ctx.strokeStyle = '#440022';
			ctx.lineWidth = 2;
			ctx.strokeRect(canvas.width/2 - 200, 50, 400, 20);
			ctx.fillStyle = '#fff';
			ctx.font = 'bold 12px Arial';
			ctx.textAlign = 'center';
			ctx.fillText(Math.round(raidBoss.hp) + ' / ' + raidBoss.maxHp + ' (Phase ' + raidBoss.phase + ')', canvas.width/2, 65);
			
			// Laser beam rendering
			if(raidBoss.laserActive){
				const lx = raidBoss.x + raidBoss.w/2 - camera.x;
				const ly = raidBoss.y + raidBoss.h/2 - camera.y;
				const laserLen = 2000;
				ctx.save();
				ctx.globalAlpha = 0.8;
				ctx.strokeStyle = '#ff0044';
				ctx.lineWidth = 30;
				ctx.beginPath();
				ctx.moveTo(lx, ly);
				ctx.lineTo(lx + Math.cos(raidBoss.laserAngle) * laserLen, ly + Math.sin(raidBoss.laserAngle) * laserLen);
				ctx.stroke();
				ctx.strokeStyle = '#ff6688';
				ctx.lineWidth = 15;
				ctx.beginPath();
				ctx.moveTo(lx, ly);
				ctx.lineTo(lx + Math.cos(raidBoss.laserAngle) * laserLen, ly + Math.sin(raidBoss.laserAngle) * laserLen);
				ctx.stroke();
				ctx.restore();
			}
		} else if(raidBoss && raidBoss.dead && raidBoss.deathTimer < 120){
			// Death animation with sprite
			const bx = raidBoss.x - camera.x, by = raidBoss.y - camera.y;
			ctx.globalAlpha = 1 - raidBoss.deathTimer / 120;
			if(BOSS_SPRITE.complete && BOSS_SPRITE.naturalWidth > 0){
				bossAnimState = 'defeat';
				const row = BOSS_SPRITE_ROW[bossAnimState] || 3;
				const fw = BOSS_SPRITE.naturalWidth / BOSS_SPRITE_COLS;
				const fh = BOSS_SPRITE.naturalHeight / BOSS_SPRITE_ROWS;
				const sx = bossAnimFrame * fw, sy = row * fh;
				ctx.drawImage(BOSS_SPRITE, sx, sy, fw, fh, bx, by, raidBoss.w, raidBoss.h);
			} else {
				ctx.fillStyle = '#2d1b4e';
				ctx.fillRect(bx + 20, by + 40, raidBoss.w - 40, raidBoss.h - 60);
			}
			ctx.globalAlpha = 1;
		}
	} else if(IS_OPENWORLD){
		// Gradient sky for openworld tutorial
		const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
		grad.addColorStop(0, OPENWORLD_CONFIG.bgColor);
		grad.addColorStop(1, OPENWORLD_CONFIG.bgColor2);
		ctx.fillStyle = grad;
		ctx.fillRect(0, 0, canvas.width, canvas.height);
		
		// Draw ground
		const groundScreenY = OPENWORLD_CONFIG.groundY - camera.y;
		ctx.fillStyle = '#3a4a3a';
		ctx.fillRect(0, groundScreenY, canvas.width, canvas.height - groundScreenY + 200);
		ctx.fillStyle = '#4a5a4a';
		ctx.fillRect(0, groundScreenY, canvas.width, 4);
		
		// Draw platforms
		for(const plat of sandboxPlatforms){
			if(plat.y === OPENWORLD_CONFIG.groundY) continue;
			const px = plat.x - camera.x, py = plat.y - camera.y;
			if(px + plat.w < -50 || px > canvas.width + 50) continue;
			ctx.fillStyle = '#4a5a5f';
			ctx.fillRect(px, py, plat.w, plat.h);
			ctx.fillStyle = '#5a6a6f';
			ctx.fillRect(px, py, plat.w, 3);
		}
		
		// Draw NPCs
		for(const npc of npcs){
			const nx = npc.x - camera.x, ny = npc.y - camera.y;
			if(nx + npc.w < -50 || nx > canvas.width + 50) continue;
			
			// NPC shadow
			ctx.fillStyle = 'rgba(0,0,0,0.3)';
			ctx.beginPath();
			ctx.ellipse(nx + npc.w/2, ny + npc.h, npc.w/2, 6, 0, 0, Math.PI * 2);
			ctx.fill();
			
			// NPC body
			ctx.fillStyle = npc.color;
			ctx.fillRect(nx + 4, ny + 16, npc.w - 8, npc.h - 16);
			
			// NPC head
			ctx.fillStyle = '#ffddbb';
			ctx.fillRect(nx + 8, ny, npc.w - 16, 20);
			
			// Icon
			ctx.font = '20px Arial';
			ctx.textAlign = 'center';
			ctx.fillText(npc.icon, nx + npc.w/2, ny + 40);
			
			// Name plate
			ctx.fillStyle = '#f1c40f';
			ctx.font = 'bold 11px Arial';
			ctx.fillText(npc.name, nx + npc.w/2, ny - 8);
		}
		
		// Draw training dummies
		for(let i = 0; i < dummies.length; i++){
			const d = dummies[i];
			const dx = d.x - camera.x, dy = d.y - camera.y;
			if(dx + d.w < -50 || dx > canvas.width + 50) continue;
			
			ctx.fillStyle = d.flash > 0 ? '#ffffff' : '#cc8844';
			ctx.fillRect(dx, dy, d.w, d.h);
			ctx.strokeStyle = '#442211';
			ctx.lineWidth = 2;
			ctx.beginPath();
			ctx.moveTo(dx + 6, dy + 12); ctx.lineTo(dx + 12, dy + 18);
			ctx.moveTo(dx + 12, dy + 12); ctx.lineTo(dx + 6, dy + 18);
			ctx.moveTo(dx + 16, dy + 12); ctx.lineTo(dx + 22, dy + 18);
			ctx.moveTo(dx + 22, dy + 12); ctx.lineTo(dx + 16, dy + 18);
			ctx.stroke();
			
			const hpPct = Math.max(0, d.hp / d.maxHp);
			ctx.fillStyle = 'rgba(0,0,0,0.6)';
			ctx.fillRect(dx - 5, dy - 12, d.w + 10, 6);
			ctx.fillStyle = hpPct > 0.5 ? '#44ff88' : hpPct > 0.25 ? '#ffaa44' : '#ff4444';
			ctx.fillRect(dx - 5, dy - 12, (d.w + 10) * hpPct, 6);
		}
		
		// Draw slimes
		for(const s of slimes){
			if(s.dead) continue;
			const sx = s.x - camera.x, sy = s.y - camera.y;
			if(sx + s.w < -50 || sx > canvas.width + 50) continue;
			
			// Slime shadow
			ctx.fillStyle = 'rgba(0,0,0,0.3)';
			ctx.beginPath();
			ctx.ellipse(sx + s.w/2, sy + s.h, s.w/2, 4, 0, 0, Math.PI * 2);
			ctx.fill();
			
			// Slime body (squish when grounded)
			const squish = s.grounded ? 0.8 : 1.0;
			const stretchY = s.grounded ? 1.2 : 1.0;
			ctx.fillStyle = s.flash > 0 ? '#ffffff' : SLIME_TYPE.color;
			ctx.beginPath();
			ctx.ellipse(sx + s.w/2, sy + s.h/2 + (1-squish)*s.h/2, s.w/2 * stretchY, s.h/2 * squish, 0, 0, Math.PI * 2);
			ctx.fill();
			
			// Slime highlight
			ctx.fillStyle = SLIME_TYPE.color2;
			ctx.globalAlpha = 0.4;
			ctx.beginPath();
			ctx.ellipse(sx + s.w/2 - 4, sy + s.h/2 - 4, 6, 4, 0, 0, Math.PI * 2);
			ctx.fill();
			ctx.globalAlpha = 1;
			
			// Eyes
			ctx.fillStyle = '#000';
			ctx.fillRect(sx + s.w/2 - 8, sy + s.h/2 - 2, 4, 4);
			ctx.fillRect(sx + s.w/2 + 4, sy + s.h/2 - 2, 4, 4);
			
			// HP bar
			const hpPct = s.hp / s.maxHp;
			ctx.fillStyle = 'rgba(0,0,0,0.6)';
			ctx.fillRect(sx - 2, sy - 10, s.w + 4, 5);
			ctx.fillStyle = hpPct > 0.5 ? '#44ff88' : hpPct > 0.25 ? '#ffaa44' : '#ff4444';
			ctx.fillRect(sx - 2, sy - 10, (s.w + 4) * hpPct, 5);
		}
	} else {
		ctx.fillStyle=dungeon.bgColor;
		ctx.fillRect(0,0,canvas.width,canvas.height);
	}

	/* Render tilemap (only visible tiles) - skip for sandbox/raid/openworld */
	if(!IS_SANDBOX && !IS_RAID && !IS_OPENWORLD){
		const startCol=Math.max(0,Math.floor(camera.x/TILE));
		const endCol=Math.min(MAP_COLS-1,Math.ceil((camera.x+canvas.width)/TILE));
		const startRow=Math.max(0,Math.floor(camera.y/TILE));
		const endRow=Math.min(MAP_ROWS-1,Math.ceil((camera.y+canvas.height)/TILE));

		for(let r=startRow;r<=endRow;r++){
			for(let c=startCol;c<=endCol;c++){
				const sx=c*TILE-camera.x;
				const sy=r*TILE-camera.y;
				if(tileMap[r][c]===0){
					// Solid tile (wall)
					// Base color with slight variation
					const hash = (r * 73 + c * 137) % 20;
					ctx.fillStyle = hash < 14 ? dungeon.wallColor : dungeon.wallColor2;
					ctx.fillRect(sx,sy,TILE,TILE);

					// Edge highlights
					const edges = tileEdges[r][c];
					if(edges){
						ctx.fillStyle = dungeon.wallEdge;
						if(edges.airTop) ctx.fillRect(sx,sy,TILE,3);
						if(edges.airBot) ctx.fillRect(sx,sy+TILE-3,TILE,3);
						if(edges.airLeft) ctx.fillRect(sx,sy,3,TILE);
						if(edges.airRight) ctx.fillRect(sx+TILE-3,sy,3,TILE);

						// Inner floor highlight (top of floor)
						if(edges.airTop){
							ctx.fillStyle=dungeon.floorHighlight;
							ctx.globalAlpha=0.3;
							ctx.fillRect(sx,sy,TILE,6);
							ctx.globalAlpha=1;
						}
						// Ceiling shadow
						if(edges.airBot){
							ctx.fillStyle=dungeon.ceilShadow;
							ctx.globalAlpha=0.4;
							ctx.fillRect(sx,sy+TILE-6,TILE,6);
							ctx.globalAlpha=1;
						}
					}
				} else {
					// Air tile — dungeon air color
					ctx.fillStyle = dungeon.airColor;
					ctx.fillRect(sx,sy,TILE,TILE);
				}
			}
		}
	}
	/* Render decorations */
	renderDecorations();

	/* Active Domain Expansion rendering (on top of background, behind entities) */
	if(activeDomain){
		const dx = activeDomain.x - camera.x - activeDomain.w/2;
		const dy = activeDomain.y - camera.y - activeDomain.h/2;
		const fade = activeDomain.age < 30 ? activeDomain.age/30 : 
		             activeDomain.age > activeDomain.maxAge - 30 ? (activeDomain.maxAge - activeDomain.age)/30 : 1;
		
		ctx.save();
		ctx.globalAlpha = 0.7 * fade;
		
		// Dark overlay to emphasize domain
		ctx.fillStyle = 'rgba(0,0,0,0.5)';
		ctx.fillRect(0, 0, canvas.width, canvas.height);
		
		// Domain fill with pattern-based rendering
		const grd = ctx.createRadialGradient(
			activeDomain.x - camera.x, activeDomain.y - camera.y, 0,
			activeDomain.x - camera.x, activeDomain.y - camera.y, activeDomain.w/2
		);
		grd.addColorStop(0, activeDomain.color + 'cc');
		grd.addColorStop(0.4, activeDomain.color + '88');
		grd.addColorStop(0.8, activeDomain.color + '44');
		grd.addColorStop(1, activeDomain.color + '00');
		ctx.fillStyle = grd;
		ctx.fillRect(0, 0, canvas.width, canvas.height);
		
		// Domain border
		ctx.globalAlpha = 0.8 * fade;
		ctx.strokeStyle = activeDomain.color;
		ctx.lineWidth = 8 + Math.sin(activeDomain.age * 0.05) * 3;
		ctx.strokeRect(dx + 20, dy + 20, activeDomain.w - 40, activeDomain.h - 40);
		
		// Inner pattern lines based on pattern type
		ctx.globalAlpha = 0.5 * fade;
		ctx.lineWidth = 3;
		ctx.strokeStyle = activeDomain.color;
		const centerX = activeDomain.x - camera.x, centerY = activeDomain.y - camera.y;
		switch(activeDomain.pattern){
			case 'flames':
				for(let i = 0; i < 12; i++){
					const ang = (i/12) * Math.PI * 2 + activeDomain.age * 0.02;
					ctx.beginPath();
					ctx.moveTo(centerX, centerY);
					ctx.lineTo(centerX + Math.cos(ang) * activeDomain.w * 0.6, centerY + Math.sin(ang) * activeDomain.h * 0.6);
					ctx.stroke();
				}
				break;
			case 'crystals':
				for(let i = 0; i < 6; i++){
					const ang = (i/6) * Math.PI * 2;
					const r1 = activeDomain.w * 0.3, r2 = activeDomain.w * 0.5;
					ctx.beginPath();
					ctx.moveTo(centerX + Math.cos(ang) * r1, centerY + Math.sin(ang) * r1);
					ctx.lineTo(centerX + Math.cos(ang + Math.PI/6) * r2, centerY + Math.sin(ang + Math.PI/6) * r2);
					ctx.lineTo(centerX + Math.cos(ang + Math.PI/3) * r1, centerY + Math.sin(ang + Math.PI/3) * r1);
					ctx.stroke();
				}
				break;
			case 'skulls':
			case 'void':
				for(let ring = 1; ring <= 3; ring++){
					ctx.beginPath();
					ctx.arc(centerX, centerY, activeDomain.w * ring * 0.15, 0, Math.PI * 2);
					ctx.stroke();
				}
				break;
			case 'lightning':
				for(let i = 0; i < 8; i++){
					const ang = (i/8) * Math.PI * 2 + activeDomain.age * 0.03;
					ctx.beginPath();
					let px = centerX, py = centerY;
					for(let j = 0; j < 10; j++){
						const jang = ang + (Math.random()-0.5)*0.5;
						const dist = activeDomain.w * 0.05;
						px += Math.cos(jang) * dist;
						py += Math.sin(jang) * dist;
						ctx.lineTo(px, py);
					}
					ctx.stroke();
				}
				break;
			case 'stars':
				for(let i = 0; i < 5; i++){
					const ang = (i/5) * Math.PI * 2 - Math.PI/2;
					const r1 = activeDomain.w * 0.2, r2 = activeDomain.w * 0.45;
					ctx.beginPath();
					ctx.moveTo(centerX + Math.cos(ang) * r2, centerY + Math.sin(ang) * r2);
					ctx.lineTo(centerX + Math.cos(ang + Math.PI*2/10) * r1, centerY + Math.sin(ang + Math.PI*2/10) * r1);
					ctx.lineTo(centerX + Math.cos(ang + Math.PI*2/5) * r2, centerY + Math.sin(ang + Math.PI*2/5) * r2);
					ctx.stroke();
				}
				break;
		}
		
		// Domain particles
		ctx.globalAlpha = 0.6 * fade;
		for(const p of activeDomain.particles){
			const px = centerX + p.x, py = centerY + p.y;
			ctx.fillStyle = activeDomain.color;
			ctx.beginPath();
			ctx.arc(px, py, p.size * p.alpha, 0, Math.PI * 2);
			ctx.fill();
		}
		
		// Element icon indicator at center
		ctx.globalAlpha = 0.8 * fade;
		ctx.font = 'bold 64px Arial';
		ctx.textAlign = 'center';
		ctx.textBaseline = 'middle';
		const elementIcons = {burn:'🔥', freeze:'❄️', poison:'☠️', stun:'⚡'};
		ctx.fillText(elementIcons[activeDomain.element] || '⚡', centerX, centerY);
		
		ctx.restore();
	}

	/* Render boss step-on spots */
	for(const spot of bossStepSpots){
		const sx = spot.x - camera.x, sy = spot.y - camera.y;
		if(sx + spot.w < -50 || sx > canvas.width + 50) continue;
		const pulse = Math.sin(spot.glowTimer * 0.1) * 0.2 + 0.6;
		const lifeAlpha = spot.activated ? (1 - (spot.timer - (spot.maxTimer > 30 ? 0 : 0)) / 30) : Math.min(1, spot.timer / 30);
		ctx.save();
		// Glow circle
		const glowR = 40 + Math.sin(spot.glowTimer * 0.08) * 8;
		const glow = ctx.createRadialGradient(sx + spot.w/2, sy, 0, sx + spot.w/2, sy, glowR);
		glow.addColorStop(0, spot.activated ? 'rgba(68,255,136,0.5)' : `rgba(255,204,0,${0.4 * pulse * lifeAlpha})`);
		glow.addColorStop(1, 'transparent');
		ctx.fillStyle = glow;
		ctx.beginPath(); ctx.arc(sx + spot.w/2, sy, glowR, 0, Math.PI*2); ctx.fill();
		// Platform marker
		ctx.globalAlpha = pulse * lifeAlpha;
		ctx.fillStyle = spot.activated ? '#44ff88' : '#ffcc00';
		ctx.fillRect(sx, sy - 3, spot.w, 6);
		ctx.strokeStyle = spot.activated ? '#22cc66' : '#ff9900';
		ctx.lineWidth = 2;
		ctx.strokeRect(sx - 1, sy - 4, spot.w + 2, 8);
		// Arrow pointing down
		if(!spot.activated){
			const arrowY = sy - 25 - Math.sin(spot.glowTimer * 0.12) * 8;
			ctx.fillStyle = '#ffcc00';
			ctx.beginPath();
			ctx.moveTo(sx + spot.w/2, sy - 12);
			ctx.lineTo(sx + spot.w/2 - 10, arrowY);
			ctx.lineTo(sx + spot.w/2 + 10, arrowY);
			ctx.closePath(); ctx.fill();
		}
		ctx.restore();
	}

	/* Render enemies */
	for(const en of enemies){
		if(en.dead){
			if(en.deathTimer<60){
				const alpha=1-en.deathTimer/60;
				ctx.globalAlpha=alpha;
				drawEnemy(en);
				ctx.globalAlpha=1;
			}
			continue;
		}
		drawEnemy(en);
	}

	/* Player minions */
	for(const m of playerMinions){
		const mx=m.x-camera.x,my=m.y-camera.y;
		if(mx+m.w<-50||mx>canvas.width+50)continue;
		const bob=Math.sin(m.animTimer*0.08)*3;
		ctx.save();
		const glow=ctx.createRadialGradient(mx+m.w/2,my+m.h/2+bob,0,mx+m.w/2,my+m.h/2+bob,m.w*1.5);
		glow.addColorStop(0,m.color);glow.addColorStop(1,'transparent');
		ctx.globalAlpha=0.25;ctx.fillStyle=glow;
		ctx.beginPath();ctx.arc(mx+m.w/2,my+m.h/2+bob,m.w*1.5,0,Math.PI*2);ctx.fill();
		ctx.restore();
		ctx.fillStyle=m.color;
		ctx.beginPath();ctx.arc(mx+m.w/2,my+m.h/2+bob,m.w*0.45,0,Math.PI*2);ctx.fill();
		ctx.fillStyle='#fff';
		ctx.beginPath();ctx.arc(mx+m.w/2+m.facing*3-3,my+m.h/2+bob-2,2,0,Math.PI*2);ctx.fill();
		ctx.beginPath();ctx.arc(mx+m.w/2+m.facing*3+3,my+m.h/2+bob-2,2,0,Math.PI*2);ctx.fill();
		ctx.globalAlpha=0.5;
		const wingFlap=Math.sin(m.animTimer*0.2)*4;
		ctx.fillStyle=m.color;
		ctx.beginPath();ctx.moveTo(mx+m.w/2-5,my+m.h/2+bob);ctx.lineTo(mx-4,my+m.h/2-8+bob+wingFlap);ctx.lineTo(mx+4,my+m.h/2+bob);ctx.fill();
		ctx.beginPath();ctx.moveTo(mx+m.w/2+5,my+m.h/2+bob);ctx.lineTo(mx+m.w+4,my+m.h/2-8+bob-wingFlap);ctx.lineTo(mx+m.w-4,my+m.h/2+bob);ctx.fill();
		ctx.globalAlpha=1;
		if(m.hp<m.maxHp){const hpPct=m.hp/m.maxHp;ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(mx-2,my-6+bob,m.w+4,3);ctx.fillStyle=hpPct>0.5?'#44ff88':'#ff8844';ctx.fillRect(mx-2,my-6+bob,(m.w+4)*hpPct,3);}
	}

	/* Player projectiles */
	for(const p of projectiles){
		const px=p.x-camera.x,py=p.y-camera.y;
		const progress=p.age/p.maxAge;
		if(px<-500||px>canvas.width+500||py<-500||py>canvas.height+500)continue;
		drawTrail(p);
		if(projectiles.length<100){
			ctx.save();ctx.globalAlpha=0.25+0.2*(1-progress);
			const glow=ctx.createRadialGradient(px,py,0,px,py,p.width*3);
			glow.addColorStop(0,p.color);glow.addColorStop(1,'transparent');
			ctx.fillStyle=glow;ctx.beginPath();ctx.arc(px,py,p.width*3,0,Math.PI*2);ctx.fill();
			ctx.restore();
		}
		ctx.fillStyle=p.color;ctx.strokeStyle=p.color;ctx.globalAlpha=0.9;
		switch(p.shape){
			case'allyOrb':{const r2=p.width*1.3;ctx.fillStyle='#44ff88';ctx.beginPath();ctx.arc(px,py,r2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#aaffcc';ctx.globalAlpha=0.6;ctx.beginPath();ctx.arc(px,py,r2*0.5,0,Math.PI*2);ctx.fill();break;}
			case'missile':case'orb':{const r2=p.shape==='orb'?p.width*1.3:p.width*0.7;ctx.beginPath();ctx.arc(px,py,r2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.globalAlpha=0.6;ctx.beginPath();ctx.arc(px,py,r2*0.4,0,Math.PI*2);ctx.fill();break;}
			case'blade':{ctx.save();ctx.translate(px,py);ctx.rotate(p.age*0.3);ctx.fillRect(-p.width*1.8,-p.height*0.3,p.width*3.6,p.height*0.6);ctx.restore();break;}
			case'beam':{const bx=p.startX-camera.x,by=p.startY-camera.y;ctx.save();ctx.translate(bx,by);ctx.rotate(p.beamAngle);ctx.globalAlpha=0.7;ctx.fillRect(0,-p.height/2,p.beamLen,p.height);ctx.fillStyle='#fff';ctx.globalAlpha=0.5;ctx.fillRect(0,-p.height*0.15,p.beamLen,p.height*0.3);ctx.restore();break;}
			case'ring':{const eR=progress*p.width*8;ctx.beginPath();ctx.arc(px,py,eR,0,Math.PI*2);ctx.lineWidth=3;ctx.globalAlpha=0.7*(1-progress);ctx.stroke();break;}
			case'cone':{const cL=progress*200*(p.phase.width||1),cH=cL*0.4*(p.phase.width||1);const cx2=p.startX-camera.x,cy2=p.startY-camera.y;
				if(p.behavior==='rain'){ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.lineTo(cx2-cH,cy2+cL);ctx.lineTo(cx2+cH,cy2+cL);ctx.closePath();}
				else{ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.lineTo(cx2+p.facing*cL,cy2-cH);ctx.lineTo(cx2+p.facing*cL,cy2+cH);ctx.closePath();}
				ctx.globalAlpha=0.3*(1-progress*0.5);ctx.fill();ctx.globalAlpha=0.6;ctx.lineWidth=2;ctx.stroke();break;}
			case'nova':{const eR=progress*p.width*8;ctx.globalAlpha=0.25*(1-progress);ctx.beginPath();ctx.arc(px,py,eR,0,Math.PI*2);ctx.fill();ctx.lineWidth=3;ctx.globalAlpha=0.6*(1-progress);ctx.beginPath();ctx.arc(px,py,eR,0,Math.PI*2);ctx.stroke();break;}
			case'chain':{ctx.beginPath();ctx.arc(px,py,p.width*0.7,0,Math.PI*2);ctx.fill();break;}
			case'wall':{const ww=p.width*2,wh=p.height*6;ctx.globalAlpha=0.45;ctx.fillRect(px-ww/2,py-wh/2,ww,wh);ctx.globalAlpha=0.7;ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.strokeRect(px-ww/2,py-wh/2,ww,wh);break;}
			case'solidify':{const sw2=p.width*3,sh2=p.height*1.5;ctx.globalAlpha=0.7;ctx.fillRect(px-sw2/2,py-sh2/2,sw2,sh2);break;}
			case'spike':{ctx.save();ctx.translate(px,py);const skA=Math.atan2(p.vy,p.vx);ctx.rotate(skA);const sk=Math.max(p.width,p.height)*0.9;ctx.beginPath();ctx.moveTo(sk*2,0);ctx.lineTo(-sk,-sk*0.8);ctx.lineTo(-sk*0.3,0);ctx.lineTo(-sk,sk*0.8);ctx.closePath();ctx.fill();ctx.fillStyle='#fff';ctx.globalAlpha=0.5;ctx.beginPath();ctx.moveTo(sk*1.5,0);ctx.lineTo(-sk*0.2,-sk*0.25);ctx.lineTo(-sk*0.2,sk*0.25);ctx.closePath();ctx.fill();ctx.restore();break;}
			case'polygon':{ctx.save();ctx.translate(px,py);ctx.rotate(p.age*0.04);const pgR=Math.max(p.width,p.height)*1.0;const pgS=p.polygonSides||6;ctx.beginPath();for(let si=0;si<=pgS;si++){const a=si*Math.PI*2/pgS;if(si===0)ctx.moveTo(Math.cos(a)*pgR,Math.sin(a)*pgR);else ctx.lineTo(Math.cos(a)*pgR,Math.sin(a)*pgR);}ctx.closePath();ctx.fill();ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.globalAlpha=0.9;ctx.stroke();ctx.fillStyle='#fff';ctx.globalAlpha=0.25;ctx.beginPath();for(let si=0;si<=pgS;si++){const a=si*Math.PI*2/pgS;const ir=pgR*0.45;if(si===0)ctx.moveTo(Math.cos(a)*ir,Math.sin(a)*ir);else ctx.lineTo(Math.cos(a)*ir,Math.sin(a)*ir);}ctx.closePath();ctx.fill();ctx.restore();break;}
			case'summon':{ctx.save();ctx.translate(px,py);const sr=p.width*1.2;ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.globalAlpha=0.6+Math.sin(p.age*0.1)*0.2;ctx.beginPath();ctx.arc(0,0,sr,0,Math.PI*2);ctx.stroke();ctx.rotate(p.age*0.08);ctx.beginPath();ctx.arc(0,0,sr*0.6,0,Math.PI*2);ctx.stroke();ctx.fillStyle=p.color;ctx.globalAlpha=0.7;for(let si=0;si<5;si++){const a=si*Math.PI*2/5-Math.PI/2;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*sr*0.8,Math.sin(a)*sr*0.8);ctx.stroke();}ctx.restore();break;}
			case'meteor':{
				ctx.save();ctx.translate(px,py);
				const mR=Math.max(p.width,p.height)*1.5;
				const skA=Math.atan2(p.vy,p.vx);
				ctx.rotate(skA);
				// derive colors from p.color
				const _mRgb=hexToRgb(p.color);
				const coreC=`rgb(${Math.min(255,_mRgb.r+40)},${Math.min(255,_mRgb.g+20)},${Math.min(255,_mRgb.b+20)})`;
				const glowC=`rgb(${Math.min(255,_mRgb.r+100)},${Math.min(255,_mRgb.g+80)},${Math.min(255,_mRgb.b+80)})`;
				// outer heatwave glow
				ctx.globalAlpha=0.15;const heatGlow=ctx.createRadialGradient(0,0,mR*0.5,0,0,mR*2.5);
				heatGlow.addColorStop(0,coreC);heatGlow.addColorStop(0.5,p.color+'44');heatGlow.addColorStop(1,'transparent');
				ctx.fillStyle=heatGlow;ctx.beginPath();ctx.arc(0,0,mR*2.5,0,Math.PI*2);ctx.fill();
				// rocky body with cracks
				ctx.globalAlpha=1;ctx.fillStyle=`rgb(${Math.max(0,_mRgb.r-80)},${Math.max(0,_mRgb.g-80)},${Math.max(0,_mRgb.b-80)})`;ctx.beginPath();ctx.arc(0,0,mR,0,Math.PI*2);ctx.fill();
				ctx.fillStyle=`rgb(${Math.max(0,_mRgb.r-30)},${Math.max(0,_mRgb.g-30)},${Math.max(0,_mRgb.b-30)})`;ctx.globalAlpha=0.7;
				for(let ci=0;ci<5;ci++){const ca=ci*1.25+p.age*0.01;ctx.beginPath();ctx.arc(Math.cos(ca)*mR*0.4,Math.sin(ca)*mR*0.35,mR*0.3,0,Math.PI*2);ctx.fill();}
				// molten core
				ctx.fillStyle=coreC;ctx.globalAlpha=0.8;ctx.beginPath();ctx.arc(0,0,mR*0.45,0,Math.PI*2);ctx.fill();
				ctx.fillStyle=glowC;ctx.globalAlpha=0.6;ctx.beginPath();ctx.arc(0,0,mR*0.25,0,Math.PI*2);ctx.fill();
				// flame trail (long fiery tail)
				ctx.globalAlpha=0.5;
				for(let fi=1;fi<=6;fi++){const fx=-mR*fi*0.65,fy=(Math.sin(p.age*0.4+fi*1.2)*mR*0.25);
					const tR=mR*(0.7-fi*0.09);ctx.fillStyle=fi<3?coreC:glowC;
					ctx.beginPath();ctx.arc(fx,fy,Math.max(tR,2),0,Math.PI*2);ctx.fill();}
				// ember sparks
				ctx.globalAlpha=0.7;ctx.fillStyle=glowC;
				for(let si=0;si<3;si++){const sx=-mR*(1.5+si*0.8)+Math.sin(p.age*0.5+si)*mR*0.3;const sy=Math.cos(p.age*0.7+si*2)*mR*0.5;ctx.beginPath();ctx.arc(sx,sy,1.5+Math.random(),0,Math.PI*2);ctx.fill();}
				ctx.restore();break;
			}
			case'vortex':{
				ctx.save();ctx.translate(px,py);
				const vR=p.width*3+p.width*2*(p.age/p.maxAge); // starts visible, grows slowly
				// dark void background
				const voidGrad=ctx.createRadialGradient(0,0,0,0,0,vR);
				voidGrad.addColorStop(0,'rgba(10,0,20,0.8)');voidGrad.addColorStop(0.5,p.color);voidGrad.addColorStop(1,'transparent');
				ctx.globalAlpha=0.5*(1-progress*0.5);ctx.fillStyle=voidGrad;ctx.beginPath();ctx.arc(0,0,vR,0,Math.PI*2);ctx.fill();
				// distortion rings
				ctx.lineWidth=2;ctx.strokeStyle=p.color;
				for(let ri=0;ri<3;ri++){
					ctx.globalAlpha=0.4*(1-progress)*(1-ri*0.25);
					const rr=vR*(0.4+ri*0.25);ctx.beginPath();
					ctx.ellipse(0,0,rr,rr*0.6,p.age*0.03+ri*0.8,0,Math.PI*2);ctx.stroke();
				}
				// spinning debris/energy arms
				ctx.lineWidth=3;
				for(let arm=0;arm<4;arm++){
					ctx.globalAlpha=0.7*(1-progress);ctx.strokeStyle=arm%2===0?p.color:'#fff';
					ctx.beginPath();
					const baseA=arm*Math.PI/2+p.age*0.08;
					for(let t=0;t<20;t++){const a2=baseA+t*0.3;const r2=vR*0.1+vR*0.8*(t/20);const wobble=Math.sin(p.age*0.2+t*0.5)*r2*0.05;ctx.lineTo(Math.cos(a2)*(r2+wobble),Math.sin(a2)*(r2+wobble));}
					ctx.stroke();
				}
				// glowing eye center
				ctx.globalAlpha=0.9*(1-progress*0.3);
				const eyeGrad=ctx.createRadialGradient(0,0,0,0,0,vR*0.2);
				eyeGrad.addColorStop(0,'#fff');eyeGrad.addColorStop(0.5,p.color);eyeGrad.addColorStop(1,'transparent');
				ctx.fillStyle=eyeGrad;ctx.beginPath();ctx.arc(0,0,vR*0.2,0,Math.PI*2);ctx.fill();
				// energy crackles
				ctx.globalAlpha=0.6;ctx.strokeStyle='#fff';ctx.lineWidth=1;
				for(let li=0;li<3;li++){const la=p.age*0.15+li*2.1;const lr=vR*(0.3+Math.sin(p.age*0.1+li)*0.3);
					ctx.beginPath();ctx.moveTo(Math.cos(la)*lr*0.2,Math.sin(la)*lr*0.2);
					ctx.lineTo(Math.cos(la+0.3)*lr*0.6,Math.sin(la+0.2)*lr*0.5);
					ctx.lineTo(Math.cos(la+0.1)*lr,Math.sin(la+0.4)*lr*0.8);ctx.stroke();}
				ctx.restore();break;
			}
		}
		ctx.globalAlpha=1;
	}

	/* Enemy projectiles */
	for(const p of enemyProjectiles){
		const px=p.x-camera.x,py=p.y-camera.y;
		if(px<-200||px>canvas.width+200||py<-200||py>canvas.height+200)continue;

		// Lingering pool (lava etc.)
		if(p.linger&&p.hasHit){
			const alpha=1-(p.lingerTimer/p.lingerMax);
			ctx.globalAlpha=alpha*0.6;
			ctx.fillStyle=p.color;
			ctx.beginPath();ctx.ellipse(px,py,p.width*1.5,p.width*0.5,0,0,Math.PI*2);ctx.fill();
			ctx.fillStyle=p.color2;
			ctx.globalAlpha=alpha*0.3;
			ctx.beginPath();ctx.ellipse(px,py,p.width,p.width*0.3,0,0,Math.PI*2);ctx.fill();
			ctx.globalAlpha=1;
			continue;
		}

		// AoE ring
		if(p.aoe){
			const r2=(p.aoeTimer/p.aoeMax)*p.aoeRadius;
			const alpha=1-p.aoeTimer/p.aoeMax;
			ctx.globalAlpha=alpha*0.4;
			ctx.fillStyle=p.color;
			ctx.beginPath();ctx.arc(px,py,r2,0,Math.PI*2);ctx.fill();
			ctx.globalAlpha=alpha*0.8;
			ctx.strokeStyle=p.color2;ctx.lineWidth=3;
			ctx.beginPath();ctx.arc(px,py,r2,0,Math.PI*2);ctx.stroke();
			ctx.globalAlpha=1;
			continue;
		}

		// Normal projectile
		ctx.globalAlpha=0.9;
		if(p.shape==='sword'){
			ctx.save();ctx.translate(px,py);ctx.rotate(p.rotAngle);
			ctx.fillStyle=p.color;
			ctx.fillRect(-p.width*0.8,-p.height*0.15,p.width*1.6,p.height*0.3);
			ctx.fillRect(-p.width*0.15,-p.height*0.5,p.width*0.3,p.height);
			ctx.fillStyle=p.color2;ctx.globalAlpha=0.5;
			ctx.fillRect(-p.width*0.6,-p.height*0.08,p.width*1.2,p.height*0.16);
			ctx.restore();
		} else {
			// Circle
			ctx.fillStyle=p.color;
			ctx.beginPath();ctx.arc(px,py,p.width*0.6,0,Math.PI*2);ctx.fill();
			ctx.fillStyle=p.color2;ctx.globalAlpha=0.5;
			ctx.beginPath();ctx.arc(px,py,p.width*0.3,0,Math.PI*2);ctx.fill();
		}
		ctx.globalAlpha=1;
	}

	/* Particles */
	if(particles.length>MAX_PARTICLES)particles.splice(0,particles.length-MAX_PARTICLES);
	for(const p of particles){
		const alpha=p.life/p.maxLife;
		ctx.beginPath();ctx.arc(p.x-camera.x,p.y-camera.y,p.r*alpha,0,Math.PI*2);
		ctx.fillStyle=`rgba(${p.color.r},${p.color.g},${p.color.b},${alpha*0.8})`;ctx.fill();
	}
	for(const p of ambientParticles){
		const alpha=p.life/p.maxLife;
		ctx.beginPath();ctx.arc(p.x-camera.x,p.y-camera.y,p.r*alpha,0,Math.PI*2);
		ctx.fillStyle=`rgba(${p.color.r},${p.color.g},${p.color.b},${alpha*0.5})`;ctx.fill();
	}

	/* Dmg numbers */
	for(const dn of dmgNumbers){
		ctx.font='bold 14px Arial';ctx.fillStyle=dn.color;
		ctx.globalAlpha=1-dn.age/60;ctx.textAlign='center';
		ctx.fillText(dn.text,dn.x-camera.x,dn.y-camera.y);
	}
	ctx.globalAlpha=1;

	/* Gravity wells */
	for(const gw of gravityWells){
		const gwx=gw.x-camera.x, gwy=gw.y-camera.y;
		const progress=gw.age/gw.life;
		const alpha=0.35*(1-progress);
		ctx.save();ctx.translate(gwx,gwy);
		// Outer pull zone
		const grad=ctx.createRadialGradient(0,0,0,0,0,gw.radius);
		grad.addColorStop(0,gw.color);grad.addColorStop(1,'transparent');
		ctx.globalAlpha=alpha*0.4;ctx.fillStyle=grad;ctx.beginPath();ctx.arc(0,0,gw.radius,0,Math.PI*2);ctx.fill();
		// Spinning rings
		ctx.strokeStyle=gw.color;ctx.lineWidth=2;
		for(let ri=0;ri<3;ri++){
			ctx.globalAlpha=alpha*(0.6-ri*0.15);
			const rr=gw.radius*(0.3+ri*0.25);
			ctx.beginPath();ctx.arc(0,0,rr,gw.age*0.08+ri*2,gw.age*0.08+ri*2+Math.PI*1.2);ctx.stroke();
		}
		// Center dot
		ctx.globalAlpha=alpha*1.5;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();
		ctx.restore();
	}

	/* Player */
	if(player.iFrames<=0||(player.iFrames%4<2)){
		const ppx=player.x-camera.x,ppy=player.y-camera.y;
		// Sprite sheet rendering
		if(PLAYER_SPRITE.complete && PLAYER_SPRITE.naturalWidth > 0){
			const cols = PLAYER_SPRITE_COLS;
			const rows = PLAYER_SPRITE_ROWS;
			const fw = PLAYER_SPRITE.naturalWidth / cols;
			const fh = PLAYER_SPRITE.naturalHeight / rows;
			const row = PLAYER_SPRITE_ROW[playerAnimState] || 0;
			const col = playerAnimFrame % cols;
			const _fitScale = Math.min(player.w / fw, player.h / fh) * 2;
			const dw = fw * _fitScale;
			const dh = fh * _fitScale;
			const drawX = ppx + player.w/2 - dw/2;
			const drawY = ppy + player.h - dh;
			ctx.save();
			if(player.flash > 0){
				ctx.globalAlpha = 0.7;
				ctx.filter = 'brightness(2) saturate(0.3) sepia(1) hue-rotate(-30deg)';
			}
			if(player.facing === -1){
				ctx.translate(ppx + player.w/2, 0);
				ctx.scale(-1, 1);
				ctx.drawImage(PLAYER_SPRITE, col*fw, row*fh, fw, fh,
					-dw/2, drawY, dw, dh);
			} else {
				ctx.drawImage(PLAYER_SPRITE, col*fw, row*fh, fw, fh,
					drawX, drawY, dw, dh);
			}
			ctx.restore();
		} else {
			// Fallback: procedural player drawing
			ctx.fillStyle=player.flash>0?'#ff6666':'#5b7fbf';ctx.fillRect(ppx,ppy,player.w,player.h);
			ctx.fillStyle='#3a5a9e';ctx.fillRect(ppx,ppy+player.h-10,player.w,10);
			ctx.fillStyle='#c8a882';ctx.fillRect(ppx+6,ppy+2,20,16);
			ctx.fillStyle='#fff';
			const eyeX=player.facing===1?ppx+18:ppx+10;
			ctx.fillRect(eyeX,ppy+7,5,5);
			ctx.fillStyle='#222';ctx.fillRect(player.facing===1?eyeX+2:eyeX,ppy+8,3,3);
			ctx.fillStyle='#2e3a6e';ctx.beginPath();
			ctx.moveTo(ppx+4,ppy+4);ctx.lineTo(ppx+player.w/2,ppy-18);ctx.lineTo(ppx+player.w-4,ppy+4);
			ctx.closePath();ctx.fill();
		}
		// Arm + cast glow (drawn over sprite)
		const armY=ppy+18,armX=player.facing===1?ppx+player.w:ppx;
		if(player.castTimer>0){
			ctx.save();ctx.globalAlpha=0.6*(player.castTimer/12);
			ctx.beginPath();ctx.arc(player.facing===1?armX+10:armX-10,armY+3,12,0,Math.PI*2);
			ctx.fillStyle=player.castColor;ctx.fill();ctx.restore();
		}
	}

	// Stun indicator on player
	if(player.stunTimer>0){
		ctx.font='bold 12px Arial';ctx.fillStyle='#ffcc00';ctx.textAlign='center';
		ctx.fillText('⚡ Stunned',player.x+player.w/2-camera.x,player.y-25-camera.y);
	}
	if(player.slowTimer>0){
		ctx.font='bold 11px Arial';ctx.fillStyle='#66ccff';ctx.textAlign='center';
		ctx.fillText('❄️ Slowed',player.x+player.w/2-camera.x,player.y-35-camera.y);
	}

	/* Ultimate charge-up visual */
	if(player.ultCharging){
		const pcx=player.x+player.w/2-camera.x, pcy=player.y+player.h/2-camera.y;
		const prog=player.ultChargeTimer/player.ultChargeDuration;
		// Growing magic circle
		const maxR=50;
		ctx.save();
		ctx.globalAlpha=0.3+prog*0.4;
		ctx.strokeStyle=player.ultChargeColor;ctx.lineWidth=3;
		ctx.beginPath();ctx.arc(pcx,pcy,maxR*prog,0,Math.PI*2);ctx.stroke();
		// Inner spinning rune ring
		ctx.translate(pcx,pcy);ctx.rotate(player.ultChargeTimer*0.05);
		ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.globalAlpha=0.2+prog*0.5;
		ctx.beginPath();ctx.arc(0,0,maxR*prog*0.6,0,Math.PI*2*prog);ctx.stroke();
		// Cross lines
		for(let a=0;a<4;a++){
			const angle=a*Math.PI/2+player.ultChargeTimer*0.03;
			const len=maxR*prog;
			ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(angle)*len,Math.sin(angle)*len);ctx.stroke();
		}
		ctx.restore();
		// Progress bar above
		ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(pcx-30,pcy-maxR-18,60,8);
		ctx.fillStyle=player.ultChargeColor;ctx.fillRect(pcx-29,pcy-maxR-17,58*prog,6);
		ctx.font='bold 10px Arial';ctx.fillStyle='#fff';ctx.textAlign='center';
		ctx.fillText('CHARGING...',pcx,pcy-maxR-22);
	}

	/* Boss telegraphs */
	for(const tel of bossTelegraphs){
		const prog=tel.timer/tel.duration;
		const flash=Math.sin(tel.timer*0.3)*0.15;
		const alpha=Math.min(0.5,0.15+prog*0.35)+flash;
		ctx.save();ctx.globalAlpha=Math.max(0.05,alpha);
		if(tel.type==='rect'){
			// Pulsing warning rectangle
			ctx.fillStyle=tel.color;
			ctx.fillRect(tel.x-camera.x,tel.y-camera.y,tel.w,tel.h);
			// Border animates inward
			ctx.strokeStyle='#ff3300';ctx.lineWidth=2;
			ctx.globalAlpha=Math.max(0.1,alpha*1.5);
			ctx.strokeRect(tel.x-camera.x+(1-prog)*tel.w*0.5, tel.y-camera.y+(1-prog)*tel.h*0.5, tel.w*prog, tel.h*prog);
		} else if(tel.type==='circle'){
			ctx.fillStyle=tel.color;
			ctx.beginPath();ctx.arc(tel.x+tel.w/2-camera.x,tel.y+tel.h/2-camera.y,tel.radius*prog,0,Math.PI*2);ctx.fill();
			ctx.strokeStyle='#ff3300';ctx.lineWidth=2;ctx.globalAlpha=Math.max(0.1,alpha*1.5);
			ctx.beginPath();ctx.arc(tel.x+tel.w/2-camera.x,tel.y+tel.h/2-camera.y,tel.radius,0,Math.PI*2);ctx.stroke();
		} else if(tel.type==='line'){
			ctx.strokeStyle=tel.color;ctx.lineWidth=tel.h||6;
			ctx.beginPath();ctx.moveTo(tel.x-camera.x,tel.y-camera.y);ctx.lineTo(tel.x+tel.w-camera.x,tel.y-camera.y);ctx.stroke();
		}
		// Label
		if(tel.label){
			ctx.globalAlpha=Math.min(1,alpha*2);
			ctx.font='bold 13px Arial';ctx.fillStyle='#ffcc00';ctx.textAlign='center';
			ctx.fillText(tel.label,tel.x+tel.w/2-camera.x,tel.y-10-camera.y);
		}
		ctx.restore();
	}

	/* Boss cutscene overlay */
	if(bossState.phase === 'cutscene'){
		renderBossCutscene();
		// Screen shake
		if(bossState.shakeTimer > 0){
			const shk = bossState.shakeTimer;
			ctx.setTransform(1,0,0,1,(Math.random()-0.5)*shk*2,(Math.random()-0.5)*shk*2);
		}
	}

	/* Boss arena sealed indicator */
	if(bossState.phase === 'active' && bossState.lockWall){
		const lw = bossState.lockWall;
		const lwx = lw.x - camera.x, lwy = lw.y - camera.y;
		const isIce = DUNGEON_TYPE === 'ice';
		ctx.fillStyle = isIce ? '#112244' : '#661100';
		ctx.fillRect(lwx, lwy, lw.w, lw.h);
		ctx.fillStyle = isIce ? 'rgba(80,160,255,0.4)' : 'rgba(255,80,0,0.4)';
		ctx.fillRect(lwx-2, lwy, lw.w+4, lw.h);
		const glow = ctx.createRadialGradient(lwx+lw.w/2, lwy+lw.h/2, 0, lwx+lw.w/2, lwy+lw.h/2, 60);
		glow.addColorStop(0, isIce ? 'rgba(80,160,255,0.3)' : 'rgba(255,60,0,0.3)');
		glow.addColorStop(1, 'transparent');
		ctx.fillStyle = glow;
		ctx.beginPath(); ctx.arc(lwx+lw.w/2, lwy+lw.h/2, 60, 0, Math.PI*2); ctx.fill();
	}

	/* VISIBILITY VOW SACRIFICE — fog-of-war overlay */
	if(vowVisibilityPenalty>0){
		const pcx=player.x+player.w/2-camera.x, pcy=player.y+player.h/2-camera.y;
		// Vision radius shrinks as penalty increases (100% at 0, 40% of screen at max 60%)
		const fogStrength=Math.min(vowVisibilityPenalty,60)/100;
		const maxVision=Math.max(canvas.width,canvas.height)*0.75;
		const visionR=maxVision*(1-fogStrength);
		const fogGrad=ctx.createRadialGradient(pcx,pcy,visionR*0.6,pcx,pcy,visionR);
		fogGrad.addColorStop(0,'transparent');
		fogGrad.addColorStop(1,'rgba(0,0,0,0.85)');
		ctx.fillStyle=fogGrad;
		ctx.fillRect(0,0,canvas.width,canvas.height);
		// Hard black edge beyond vision radius
		ctx.fillStyle='rgba(0,0,0,0.85)';
		ctx.beginPath();ctx.rect(0,0,canvas.width,canvas.height);
		ctx.arc(pcx,pcy,visionR,0,Math.PI*2,true);ctx.fill();
	}
	
	// End screen shake transform
	ctx.restore();
}

/* =============================================================
   DRAW TRAIL (same as sandbox)
   ============================================================= */
function drawTrail(proj){
	if(proj.trail==='none'||proj.trailParts.length<2)return;
	const trailColors={sparkle:{r:200,g:220,b:255},flame:{r:255,g:140,b:50},smoke:{r:100,g:100,b:100},ice:{r:150,g:220,b:255},lightning:{r:180,g:180,b:255}};
	const rgb=trailColors[proj.trail]||hexToRgb(proj.color);
	for(let t=0;t<proj.trailParts.length;t++){
		const tp=proj.trailParts[t];
		const alpha=((t+1)/proj.trailParts.length)*0.5;
		const r2=proj.width*0.5*((t+1)/proj.trailParts.length);
		ctx.beginPath();ctx.arc(tp.x-camera.x,tp.y-camera.y,r2,0,Math.PI*2);
		ctx.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})`;ctx.fill();
	}
	if(['sparkle','flame','lightning'].includes(proj.trail)&&particles.length<MAX_PARTICLES){
		const last=proj.trailParts[proj.trailParts.length-1];
		if(last&&Math.random()<0.25){
			particles.push({x:last.x+(Math.random()-0.5)*8,y:last.y+(Math.random()-0.5)*8,vx:(Math.random()-0.5)*1.5,vy:(Math.random()-0.5)*1.5-0.5,life:10+Math.random()*8|0,maxLife:18,r:1.5+Math.random()*1.5,color:rgb});
		}
	}
}

/* =============================================================
   SPRITE SHEET RENDERING
   ============================================================= */
function getEnemySpriteRow(en){
	if(en.dead)                                   return SPRITE_ROW.defeat;
	if(en.charging || en.attackAnimTimer > 0)      return SPRITE_ROW.attack;
	if(Math.abs(en.vx) > 0.3)                     return SPRITE_ROW.walk;
	return SPRITE_ROW.idle;
}
function drawSpriteEnemy(en, img){
	if(!img.complete || !img.naturalWidth) return false;
	const cols = SPRITE_COLS_OVERRIDE[en.type] || SPRITE_COLS;
	const fW = img.naturalWidth  / cols;
	const fH = img.naturalHeight / SPRITE_ROWS;
	const row = getEnemySpriteRow(en);

	// Frame index
	let frame;
	if(row === SPRITE_ROW.defeat){
		// Play once, hold last frame
		frame = Math.min(Math.floor(en.deathTimer / SPRITE_FPS), cols - 1);
	} else if(row === SPRITE_ROW.attack && en.attackAnimTimer > 0 && !en.charging){
		// Attack from cast — play from start
		const attackDur = SPRITE_FPS * cols;
		const elapsed = attackDur - Math.min(en.attackAnimTimer, attackDur);
		frame = Math.min(Math.floor(elapsed / SPRITE_FPS), cols - 1);
	} else {
		// Idle / walk / charge — loop
		frame = Math.floor(en.animTimer / SPRITE_FPS) % cols;
	}

	const sx = frame * fW;
	const sy = row  * fH;

	// Render size (larger than collision box for visual detail)
	const s  = SPRITE_SCALE[en.type] || 1.5;
	const rW = en.w * s;
	const rH = en.h * s;

	const ex = en.x - camera.x;
	const ey = en.y - camera.y;
	const cx = ex + en.w / 2;
	const cy = ey + en.h / 2;

	ctx.save();
	if(en.flash > 0) ctx.filter = 'brightness(2.5) saturate(0.3)';

	// Anchor bottom of sprite to bottom of hitbox for ground enemies, center for flying
	const isFlying = en.typeDef.flies;
	const drawX = cx - rW/2;
	const drawY = isFlying ? (cy - rH/2) : (ey + en.h - rH);

	if(en.facing === -1){
		ctx.translate(cx, isFlying ? cy : (ey + en.h - rH/2));
		ctx.scale(-1, 1);
		ctx.drawImage(img, sx, sy, fW, fH, -rW/2, -rH/2, rW, rH);
	} else {
		ctx.drawImage(img, sx, sy, fW, fH, drawX, drawY, rW, rH);
	}
	ctx.restore();
	return true;
}

/* =============================================================
   DRAW ENEMY
   ============================================================= */
function drawEnemy(en){
	const ex=en.x-camera.x, ey=en.y-camera.y;
	if(ex+en.w<-50||ex>canvas.width+50||ey+en.h<-50||ey>canvas.height+50)return;

	// ---- Sprite-sheet rendering for enemies with sprite sheets ----
	const spriteImg = ENEMY_SPRITE_SHEETS[en.type];
	if(spriteImg && spriteImg.complete && spriteImg.naturalWidth > 0){
		const cx2 = ex + en.w/2, cy2 = ey + en.h/2;
		// Boss aura VFX (drawn behind sprite)
		if(en.typeDef.isBoss && !en.dead){
			const phase2 = en.bossPhase === 2;
			if(phase2){
				ctx.save();
				const auraR = 200 + Math.sin(en.animTimer * 0.05) * 25;
				const aura = ctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, auraR);
				if(en.type === 'frostColossus'){
					aura.addColorStop(0, 'rgba(40,80,255,0.18)');
					aura.addColorStop(0.5, 'rgba(80,150,255,0.1)');
					aura.addColorStop(1, 'transparent');
				} else if(en.type === 'earthColossus'){
					aura.addColorStop(0, 'rgba(180,140,40,0.18)');
					aura.addColorStop(0.5, 'rgba(140,100,20,0.1)');
					aura.addColorStop(1, 'transparent');
				} else {
					aura.addColorStop(0, 'rgba(255,60,0,0.18)');
					aura.addColorStop(0.5, 'rgba(255,100,0,0.1)');
					aura.addColorStop(1, 'transparent');
				}
				ctx.fillStyle = aura;
				ctx.beginPath(); ctx.arc(cx2, cy2, auraR, 0, Math.PI*2); ctx.fill();
				ctx.restore();
			}
		}
		drawSpriteEnemy(en, spriteImg);
		// Boss phase transition shockwave rings (on top)
		if(en.typeDef.isBoss && en.bossPhaseTransition > 0){
			const tProg = 1 - en.bossPhaseTransition / 120;
			ctx.save();
			if(en.type === 'frostColossus'){
				ctx.strokeStyle = `rgba(40,${Math.round(100+tProg*155)},255,${0.8-tProg*0.6})`;
			} else if(en.type === 'earthColossus'){
				ctx.strokeStyle = `rgba(${Math.round(140+tProg*60)},${Math.round(100+tProg*60)},0,${0.8-tProg*0.6})`;
			} else {
				ctx.strokeStyle = `rgba(255,${Math.round(60+tProg*140)},0,${0.8-tProg*0.6})`;
			}
			ctx.lineWidth = 6;
			ctx.beginPath(); ctx.arc(cx2, cy2, tProg * 350, 0, Math.PI*2); ctx.stroke();
			ctx.beginPath(); ctx.arc(cx2, cy2, tProg * 250, 0, Math.PI*2); ctx.stroke();
			ctx.beginPath(); ctx.arc(cx2, cy2, tProg * 150, 0, Math.PI*2); ctx.stroke();
			ctx.restore();
		}
		drawEnemyHpBar(en);
		return;
	}

	const flashColor = en.flash>0;
	const t = en.typeDef;

	switch(en.type){
	/* === FIRE === */
	case 'imp': {
		// Wings
		ctx.fillStyle=flashColor?'#ff8888':'#aa2200';
		const wingOff=Math.sin(en.animTimer*0.15)*6;
		ctx.beginPath();ctx.moveTo(ex+en.w/2,ey+6);
		ctx.lineTo(ex-8+wingOff,ey-4);ctx.lineTo(ex+4,ey+10);ctx.closePath();ctx.fill();
		ctx.beginPath();ctx.moveTo(ex+en.w/2,ey+6);
		ctx.lineTo(ex+en.w+8-wingOff,ey-4);ctx.lineTo(ex+en.w-4,ey+10);ctx.closePath();ctx.fill();
		// Body
		ctx.fillStyle=flashColor?'#ff6666':t.color;
		ctx.fillRect(ex+2,ey+4,en.w-4,en.h-8);
		// Head
		ctx.fillStyle=flashColor?'#ff8888':t.color2;
		ctx.fillRect(ex+4,ey,en.w-8,12);
		// Eyes
		ctx.fillStyle='#ffcc00';
		const eyeOff=en.facing===1?2:0;
		ctx.fillRect(ex+6+eyeOff,ey+3,3,3);ctx.fillRect(ex+14+eyeOff,ey+3,3,3);
		// Horns
		ctx.fillStyle='#880000';
		ctx.fillRect(ex+4,ey-3,3,5);ctx.fillRect(ex+en.w-7,ey-3,3,5);
		// Tail
		ctx.strokeStyle='#aa2200';ctx.lineWidth=2;
		ctx.beginPath();ctx.moveTo(ex+en.w/2,ey+en.h-4);
		ctx.quadraticCurveTo(ex+en.w/2+en.facing*12,ey+en.h+8,ex+en.w/2+en.facing*8,ey+en.h+4);
		ctx.stroke();
		break;
	}
	case 'flameSerpent': {
		// Sinusoidal body
		ctx.fillStyle=flashColor?'#ff8866':t.color;
		const segments=6;
		for(let s=0;s<segments;s++){
			const sx2=ex+s*(en.w/segments);
			const sy2=ey+Math.sin(en.animTimer*0.08+s*0.8)*4;
			const sw=en.w/segments+2;
			ctx.fillRect(sx2,sy2,sw,en.h);
		}
		// Head
		ctx.fillStyle=flashColor?'#ffaa88':t.color2;
		const headX=en.facing===1?ex+en.w-10:ex;
		ctx.fillRect(headX,ey-2,12,en.h+4);
		// Eyes
		ctx.fillStyle='#ff0000';
		ctx.fillRect(headX+(en.facing===1?6:2),ey+2,3,3);
		// Forked tongue
		ctx.strokeStyle='#ff4444';ctx.lineWidth=1;
		const tongueX=en.facing===1?headX+12:headX;
		ctx.beginPath();ctx.moveTo(tongueX,ey+en.h/2);
		ctx.lineTo(tongueX+en.facing*8,ey+en.h/2-2);ctx.moveTo(tongueX,ey+en.h/2);
		ctx.lineTo(tongueX+en.facing*8,ey+en.h/2+2);ctx.stroke();
		break;
	}
	case 'emberMage': {
		// Robe
		ctx.fillStyle=flashColor?'#cc6644':t.color;
		ctx.beginPath();ctx.moveTo(ex+4,ey+14);ctx.lineTo(ex-2,ey+en.h);
		ctx.lineTo(ex+en.w+2,ey+en.h);ctx.lineTo(ex+en.w-4,ey+14);ctx.closePath();ctx.fill();
		// Body
		ctx.fillStyle=flashColor?'#ff8866':t.color2;
		ctx.fillRect(ex+4,ey+10,en.w-8,20);
		// Hood/Head
		ctx.fillStyle=flashColor?'#cc6644':'#662200';
		ctx.beginPath();ctx.arc(ex+en.w/2,ey+8,10,0,Math.PI*2);ctx.fill();
		// Eyes glow
		ctx.fillStyle='#ff8800';
		ctx.fillRect(ex+8,ey+5,3,4);ctx.fillRect(ex+15,ey+5,3,4);
		// Staff
		ctx.fillStyle='#553311';
		const staffX=en.facing===1?ex+en.w+2:ex-5;
		ctx.fillRect(staffX,ey-4,3,en.h+4);
		ctx.fillStyle='#ff6600';
		ctx.beginPath();ctx.arc(staffX+1,ey-6,4,0,Math.PI*2);ctx.fill();
		break;
	}
	case 'magmaGolem': {
		// Body (rocky)
		ctx.fillStyle=flashColor?'#996644':t.color;
		ctx.fillRect(ex+4,ey+12,en.w-8,en.h-16);
		// Lava cracks
		ctx.fillStyle='#ff6600';ctx.globalAlpha=0.6;
		ctx.fillRect(ex+8,ey+20,3,12);ctx.fillRect(ex+18,ey+28,4,8);
		ctx.fillRect(ex+28,ey+18,3,14);ctx.globalAlpha=1;
		// Shoulders
		ctx.fillStyle=flashColor?'#aa7755':t.color2;
		ctx.fillRect(ex,ey+10,en.w,10);
		// Head
		ctx.fillStyle=flashColor?'#996644':t.color;
		ctx.fillRect(ex+8,ey,en.w-16,14);
		// Eyes
		ctx.fillStyle='#ff4400';
		ctx.fillRect(ex+12,ey+4,4,4);ctx.fillRect(ex+24,ey+4,4,4);
		// Arms
		ctx.fillStyle=t.color2;
		ctx.fillRect(ex-6,ey+16,8,20);ctx.fillRect(ex+en.w-2,ey+16,8,20);
		// Legs
		ctx.fillRect(ex+6,ey+en.h-8,12,8);ctx.fillRect(ex+en.w-18,ey+en.h-8,12,8);
		break;
	}
	case 'fireSprite': {
		// Glowing orb
		ctx.save();
		const pulse=0.8+Math.sin(en.animTimer*0.12)*0.2;
		const glow=ctx.createRadialGradient(ex+en.w/2,ey+en.h/2,0,ex+en.w/2,ey+en.h/2,en.w*pulse);
		glow.addColorStop(0,flashColor?'#ffee88':'#ffcc44');
		glow.addColorStop(0.5,flashColor?'#ffaa44':'#ff8800');
		glow.addColorStop(1,'transparent');
		ctx.fillStyle=glow;
		ctx.beginPath();ctx.arc(ex+en.w/2,ey+en.h/2,en.w*pulse,0,Math.PI*2);ctx.fill();
		// Core
		ctx.fillStyle='#fff';ctx.globalAlpha=0.8;
		ctx.beginPath();ctx.arc(ex+en.w/2,ey+en.h/2,en.w*0.3,0,Math.PI*2);ctx.fill();
		ctx.restore();
		break;
	}

	/* === ICE === */
	case 'frostWraith': {
		ctx.save();ctx.globalAlpha=flashColor?0.9:0.6;
		ctx.fillStyle=t.color;
		// Ghostly body that waves
		const waveOff=Math.sin(en.animTimer*0.06)*4;
		ctx.beginPath();ctx.moveTo(ex+4,ey);ctx.lineTo(ex+en.w-4,ey);
		ctx.lineTo(ex+en.w+waveOff,ey+en.h);
		for(let s=en.w;s>=0;s-=6)ctx.lineTo(ex+s-waveOff,ey+en.h-(s%12<6?0:8));
		ctx.closePath();ctx.fill();
		// Eyes
		ctx.fillStyle=flashColor?'#ffffff':'#aaddff';ctx.globalAlpha=1;
		ctx.fillRect(ex+8,ey+10,4,4);ctx.fillRect(ex+16,ey+10,4,4);
		ctx.restore();
		break;
	}
	case 'iceArcher': {
		ctx.fillStyle=flashColor?'#8899bb':t.color;
		ctx.fillRect(ex+3,ey+10,en.w-6,en.h-12);
		ctx.fillStyle=flashColor?'#aabbdd':t.color2;
		ctx.fillRect(ex+5,ey,en.w-10,14);
		ctx.fillStyle='#88ccff';
		ctx.fillRect(ex+7,ey+4,3,3);ctx.fillRect(ex+14,ey+4,3,3);
		// Bow
		ctx.strokeStyle='#556677';ctx.lineWidth=2;
		const bowX=en.facing===1?ex+en.w+2:ex-4;
		ctx.beginPath();ctx.arc(bowX,ey+en.h/2,12,en.facing===1?-0.8:Math.PI-0.8,en.facing===1?0.8:Math.PI+0.8);ctx.stroke();
		break;
	}
	case 'snowBeast': {
		ctx.fillStyle=flashColor?'#bbccdd':t.color;
		ctx.fillRect(ex+4,ey+8,en.w-8,en.h-10);
		ctx.fillStyle=flashColor?'#ddeeff':t.color2;
		ctx.fillRect(ex+6,ey,en.w-12,14);
		ctx.fillStyle='#446688';
		ctx.fillRect(ex+10,ey+4,5,4);ctx.fillRect(ex+en.w-15,ey+4,5,4);
		// Fangs
		ctx.fillStyle='#fff';
		ctx.fillRect(ex+14,ey+12,3,5);ctx.fillRect(ex+en.w-17,ey+12,3,5);
		// Arms
		ctx.fillStyle=t.color;
		ctx.fillRect(ex-4,ey+14,6,16);ctx.fillRect(ex+en.w-2,ey+14,6,16);
		break;
	}
	case 'cryoMage': {
		ctx.fillStyle=flashColor?'#5588cc':t.color;
		ctx.beginPath();ctx.moveTo(ex+4,ey+14);ctx.lineTo(ex-2,ey+en.h);
		ctx.lineTo(ex+en.w+2,ey+en.h);ctx.lineTo(ex+en.w-4,ey+14);ctx.closePath();ctx.fill();
		ctx.fillStyle=flashColor?'#88bbff':t.color2;
		ctx.fillRect(ex+4,ey+10,en.w-8,20);
		ctx.fillStyle='#223366';
		ctx.beginPath();ctx.arc(ex+en.w/2,ey+8,10,0,Math.PI*2);ctx.fill();
		ctx.fillStyle='#88ddff';
		ctx.fillRect(ex+8,ey+5,3,4);ctx.fillRect(ex+15,ey+5,3,4);
		const staffX=en.facing===1?ex+en.w+2:ex-5;
		ctx.fillStyle='#445566';ctx.fillRect(staffX,ey-4,3,en.h+4);
		ctx.fillStyle='#88ddff';ctx.beginPath();ctx.arc(staffX+1,ey-6,4,0,Math.PI*2);ctx.fill();
		break;
	}
	case 'glacierSentinel': {
		ctx.fillStyle=flashColor?'#7799bb':t.color;
		ctx.fillRect(ex+4,ey+12,en.w-8,en.h-16);
		ctx.fillStyle='#88ddff';ctx.globalAlpha=0.4;
		ctx.fillRect(ex+8,ey+20,4,10);ctx.fillRect(ex+20,ey+24,3,8);ctx.fillRect(ex+30,ey+18,3,12);ctx.globalAlpha=1;
		ctx.fillStyle=flashColor?'#99bbdd':t.color2;
		ctx.fillRect(ex,ey+10,en.w,10);
		ctx.fillStyle=t.color;ctx.fillRect(ex+8,ey,en.w-16,14);
		ctx.fillStyle='#aaeeff';ctx.fillRect(ex+12,ey+4,4,4);ctx.fillRect(ex+26,ey+4,4,4);
		ctx.fillStyle=t.color2;
		ctx.fillRect(ex-6,ey+16,8,18);ctx.fillRect(ex+en.w-2,ey+16,8,18);
		ctx.fillRect(ex+6,ey+en.h-8,12,8);ctx.fillRect(ex+en.w-18,ey+en.h-8,12,8);
		break;
	}

	/* === EARTH === */
	case 'rockGolem': {
		ctx.fillStyle=flashColor?'#887744':t.color;
		ctx.fillRect(ex+4,ey+10,en.w-8,en.h-14);
		ctx.fillStyle='#999977';ctx.globalAlpha=0.4;
		ctx.fillRect(ex+8,ey+18,4,8);ctx.fillRect(ex+22,ey+22,3,10);ctx.globalAlpha=1;
		ctx.fillStyle=flashColor?'#aa9966':t.color2;
		ctx.fillRect(ex,ey+8,en.w,10);
		ctx.fillStyle=t.color;ctx.fillRect(ex+8,ey,en.w-16,12);
		ctx.fillStyle='#bbaa66';ctx.fillRect(ex+12,ey+3,4,4);ctx.fillRect(ex+24,ey+3,4,4);
		ctx.fillStyle=t.color2;
		ctx.fillRect(ex-5,ey+14,7,18);ctx.fillRect(ex+en.w-2,ey+14,7,18);
		ctx.fillRect(ex+6,ey+en.h-8,11,8);ctx.fillRect(ex+en.w-17,ey+en.h-8,11,8);
		break;
	}
	case 'vineCrawler': {
		ctx.fillStyle=flashColor?'#66aa44':t.color;
		const segs=5;
		for(let s=0;s<segs;s++){
			const sx2=ex+s*(en.w/segs);
			const sy2=ey+Math.sin(en.animTimer*0.1+s*1.0)*3;
			ctx.fillRect(sx2,sy2,en.w/segs+1,en.h);
		}
		ctx.fillStyle=flashColor?'#88cc66':t.color2;
		const headX=en.facing===1?ex+en.w-8:ex;
		ctx.fillRect(headX,ey-2,10,en.h+4);
		ctx.fillStyle='#33ff33';ctx.fillRect(headX+(en.facing===1?4:2),ey+4,3,3);
		// Leaves
		ctx.fillStyle='#44aa22';
		ctx.beginPath();ctx.moveTo(ex+en.w/2,ey-2);ctx.lineTo(ex+en.w/2-6,ey-8);ctx.lineTo(ex+en.w/2+6,ey-8);ctx.closePath();ctx.fill();
		break;
	}
	case 'caveSpider': {
		ctx.fillStyle=flashColor?'#776655':t.color;
		ctx.beginPath();ctx.ellipse(ex+en.w/2,ey+en.h/2,en.w/2,en.h/2,0,0,Math.PI*2);ctx.fill();
		ctx.fillStyle=flashColor?'#998877':t.color2;
		ctx.beginPath();ctx.ellipse(en.facing===1?ex+en.w-4:ex+4,ey+en.h/2,6,5,0,0,Math.PI*2);ctx.fill();
		// Eyes (many)
		ctx.fillStyle='#ff3333';
		const hx=en.facing===1?ex+en.w-6:ex+2;
		for(let ei=0;ei<4;ei++)ctx.fillRect(hx+(ei%2)*4,ey+en.h/2-4+Math.floor(ei/2)*4,2,2);
		// Legs
		ctx.strokeStyle=t.color;ctx.lineWidth=1.5;
		for(let l=0;l<4;l++){
			const lx=ex+4+l*(en.w-8)/3;
			ctx.beginPath();ctx.moveTo(lx,ey+en.h/2);ctx.lineTo(lx-6,ey+en.h+6);ctx.stroke();
			ctx.beginPath();ctx.moveTo(lx,ey+en.h/2);ctx.lineTo(lx+6,ey+en.h+6);ctx.stroke();
		}
		break;
	}
	case 'crystalMage': {
		ctx.fillStyle=flashColor?'#aa77cc':t.color;

			ctx.beginPath(); ctx.arc(cx, cy, auraR, 0, Math.PI*2); ctx.fill();
			ctx.restore();
		}

		// ---- DUST/RUBBLE BASE ----
		for(let m=0;m<5;m++){
			const mx = cx + Math.sin(en.animTimer*0.025+m*1.4)*(40+m*12);
			const my = cy + 90 + m*16 + Math.cos(en.animTimer*0.018+m)*4;
			const mr = 20+m*7;
			ctx.fillStyle = `rgba(${phase2?'180,140,40':'120,90,40'},${0.15-m*0.025})`;
			ctx.beginPath(); ctx.arc(mx, my, mr, 0, Math.PI*2); ctx.fill();
		}

		// ---- BODY (massive stone torso) ----
		ctx.fillStyle = flashColor ? '#c4a060' : (phase2 ? '#3a2a10' : '#4a3a20');
		ctx.beginPath();
		ctx.moveTo(cx - 90, cy - 55 + breathe);
		ctx.lineTo(cx - 110, cy + 60 + breathe);
		ctx.lineTo(cx - 65, cy + 110 + breathe);
		ctx.lineTo(cx + 65, cy + 110 + breathe);
		ctx.lineTo(cx + 110, cy + 60 + breathe);
		ctx.lineTo(cx + 90, cy - 55 + breathe);
		ctx.closePath(); ctx.fill();
		// Stone veins/cracks
		ctx.strokeStyle = flashColor ? '#ddc080' : (phase2 ? '#c4a032' : '#8b7340');
		ctx.lineWidth = 2;
		for(let v=0;v<6;v++){
			ctx.beginPath();
			ctx.moveTo(cx + (v-2.5)*30, cy - 40 + breathe);
			ctx.lineTo(cx + (v-2.5)*35 + Math.sin(v*1.3)*12, cy + 55 + breathe);
			ctx.stroke();
		}

		// ---- EARTH CORE (glowing chest crystal) ----
		ctx.save();
		const coreGlow = ctx.createRadialGradient(cx, cy + 5, 0, cx, cy + 5, 55);
		coreGlow.addColorStop(0, phase2 ? 'rgba(220,180,40,0.9)' : 'rgba(180,140,40,0.7)');
		coreGlow.addColorStop(0.5, phase2 ? 'rgba(160,120,20,0.4)' : 'rgba(120,90,20,0.3)');
		coreGlow.addColorStop(1, 'transparent');
		ctx.fillStyle = coreGlow;
		ctx.beginPath(); ctx.arc(cx, cy + 5, 55, 0, Math.PI*2); ctx.fill();
		ctx.fillStyle = phase2 ? '#ffcc33' : '#c4a032';
		ctx.shadowColor = phase2 ? '#ff8800' : '#886600';
		ctx.shadowBlur = phase2 ? 24 : 16;
		ctx.beginPath();
		ctx.moveTo(cx, cy - 18); ctx.lineTo(cx + 24, cy + 5);
		ctx.lineTo(cx, cy + 30); ctx.lineTo(cx - 24, cy + 5);
		ctx.closePath(); ctx.fill();
		ctx.shadowBlur = 0;
		ctx.restore();

		// ---- SHOULDER BOULDERS ----
		const shoulderO = [[-1, -85], [1, 85]];
		for(const [side, offX] of shoulderO){
			ctx.fillStyle = flashColor ? '#b09050' : (phase2 ? '#3a2a10' : '#5a4a28');
			const sx2 = cx + offX;
			const sy2 = cy - 40 + breathe;
			ctx.beginPath();
			ctx.moveTo(sx2, sy2 - 35); ctx.lineTo(sx2 + side*35, sy2 - 55);
			ctx.lineTo(sx2 + side*48, sy2 - 18); ctx.lineTo(sx2 + side*28, sy2 + 12);
			ctx.lineTo(sx2, sy2 + 8);
			ctx.closePath(); ctx.fill();
			// Extra crystal on top
			ctx.fillStyle = phase2 ? '#ffcc33' : '#aa66ff';
			ctx.beginPath();
			ctx.moveTo(sx2 + side*20, sy2 - 50); ctx.lineTo(sx2 + side*38, sy2 - 80);
			ctx.lineTo(sx2 + side*44, sy2 - 35);
			ctx.closePath(); ctx.fill();
		}

		// ---- ARMS (massive stone arms) ----
		const armSwing = Math.sin(en.animTimer * 0.04) * 12;
		for(const side of [-1, 1]){
			const armX = cx + side * 100;
			const armY = cy - 15 + breathe;
			ctx.fillStyle = flashColor ? '#c4a060' : (phase2 ? '#3a2a10' : '#4a3a20');
			ctx.fillRect(armX - 18, armY, 36, 70 + (side === 1 ? armSwing : -armSwing));
			ctx.fillStyle = flashColor ? '#b09050' : (phase2 ? '#2a1a05' : '#3a2a14');
			ctx.fillRect(armX - 20 + side*2, armY + 65 + (side === 1 ? armSwing : -armSwing), 40, 60);
			// Stone fists
			ctx.fillStyle = phase2 ? '#6b5530' : '#5a4a28';
			const fistY = armY + 125 + (side === 1 ? armSwing : -armSwing);
			ctx.beginPath(); ctx.arc(armX, fistY, 22, 0, Math.PI*2); ctx.fill();
		}

		// ---- LEGS (thick stone pillars) ----
		ctx.fillStyle = flashColor ? '#b09050' : (phase2 ? '#2a1a05' : '#3a2a14');
		const legSwing = Math.sin(en.animTimer * 0.035) * 6;
		ctx.fillRect(cx - 45, cy + 90 + breathe, 35, 65 + legSwing);
		ctx.fillRect(cx + 10, cy + 90 + breathe, 35, 65 - legSwing);
		// Feet
		ctx.fillStyle = '#4a3a20';
		ctx.fillRect(cx - 52, cy + 155 + breathe + legSwing, 50, 14);
		ctx.fillRect(cx + 3, cy + 155 + breathe - legSwing, 50, 14);

		// ---- HEAD (angular stone/crystal) ----
		const headY = cy - 100 + breathe + Math.sin(en.animTimer * 0.03) * 2;
		ctx.fillStyle = flashColor ? '#c4a060' : (phase2 ? '#3a2a10' : '#4a3a20');
		ctx.beginPath();
		ctx.moveTo(cx - 42, headY + 14);
		ctx.lineTo(cx - 32, headY - 36);
		ctx.lineTo(cx, headY - 50);
		ctx.lineTo(cx + 32, headY - 36);
		ctx.lineTo(cx + 42, headY + 14);
		ctx.lineTo(cx + 32, headY + 36);
		ctx.lineTo(cx - 32, headY + 36);
		ctx.closePath(); ctx.fill();
		// Face plate
		ctx.fillStyle = flashColor ? '#ddc080' : (phase2 ? '#5a4a28' : '#6b5530');
		ctx.beginPath();
		ctx.moveTo(cx - 24, headY + 4);
		ctx.lineTo(cx, headY - 18);
		ctx.lineTo(cx + 24, headY + 4);
		ctx.lineTo(cx + 18, headY + 26);
		ctx.lineTo(cx - 18, headY + 26);
		ctx.closePath(); ctx.fill();
		// Eyes — glowing amber/orange
		ctx.fillStyle = phase2 ? '#ffaa00' : '#c4a032';
		ctx.shadowColor = phase2 ? '#ff6600' : '#886600';
		ctx.shadowBlur = phase2 ? 24 : 16;
		ctx.beginPath(); ctx.arc(cx - 14, headY + 6, 7, 0, Math.PI*2); ctx.fill();
		ctx.beginPath(); ctx.arc(cx + 14, headY + 6, 7, 0, Math.PI*2); ctx.fill();
		ctx.shadowBlur = 0;
		// Pupils
		ctx.fillStyle = '#fff';
		ctx.beginPath(); ctx.arc(cx - 14 + f*2, headY + 6, 3, 0, Math.PI*2); ctx.fill();
		ctx.beginPath(); ctx.arc(cx + 14 + f*2, headY + 6, 3, 0, Math.PI*2); ctx.fill();
		// Crown of stone spires
		ctx.fillStyle = phase2 ? '#c4a032' : '#8b7340';
		const crownXE = [-26, -12, 0, 12, 26];
		for(const cxOff of crownXE){
			const ch = 20 + Math.abs(cxOff) * 0.3 + (cxOff === 0 ? 16 : 0);
			ctx.beginPath();
			ctx.moveTo(cx + cxOff - 5, headY - 36);
			ctx.lineTo(cx + cxOff, headY - 36 - ch);
			ctx.lineTo(cx + cxOff + 5, headY - 36);
			ctx.closePath(); ctx.fill();
		}

		// ---- AMBIENT EARTH PARTICLES ----
		if(en.animTimer % 6 === 0 && particles.length < MAX_PARTICLES){
			particles.push({
				x: cx + (Math.random()-0.5)*en.w,
				y: cy + en.h*0.3 + Math.random()*en.h*0.3,
				vx: (Math.random()-0.5)*1.5,
				vy: -0.5 - Math.random()*1,
				life: 18 + Math.random()*12|0,
				color: {r:120+Math.random()*40|0, g:90+Math.random()*30|0, b:20+Math.random()*20|0}
			});
		}

		// Phase transition effect — expanding earth rings
		if(en.bossPhaseTransition > 0){
			const tProg = 1 - en.bossPhaseTransition / 120;
			ctx.save();
			ctx.strokeStyle = `rgba(${Math.round(180+tProg*60)},${Math.round(140+tProg*40)},${Math.round(20+tProg*20)},${0.8-tProg*0.6})`;
			ctx.lineWidth = 7;
			ctx.beginPath(); ctx.arc(cx, cy, tProg * 400, 0, Math.PI*2); ctx.stroke();
			ctx.beginPath(); ctx.arc(cx, cy, tProg * 300, 0, Math.PI*2); ctx.stroke();
			ctx.beginPath(); ctx.arc(cx, cy, tProg * 200, 0, Math.PI*2); ctx.stroke();
			ctx.restore();
		}
		break;
	}
	default: {
		// Fallback
		ctx.fillStyle=flashColor?'#ff8888':t.color;
		ctx.fillRect(ex,ey,en.w,en.h);
		break;
	}
	}

	drawEnemyHpBar(en);
}

/* Separated HP bar / name so sprite-rendered enemies can call it too */
function drawEnemyHpBar(en){
	const ex=en.x-camera.x, ey=en.y-camera.y;
	const t = en.typeDef;

	// HP bar (boss gets special large bar)
	if(en.typeDef.isBoss){
		// Large boss HP bar at top of screen (screen-fixed)
		ctx.save();
		ctx.setTransform(1,0,0,1,0,0); // reset to screen coords
		const barW = 500;
		const barH = 18;
		const barX = (canvas.width - barW) / 2;
		const barY = 30;
		const hpPct = Math.max(0, en.hp / en.maxHp);
		const phase2 = en.bossPhase === 2;
		const isIceBoss = en.type === 'frostColossus';
		const isEarthBoss = en.type === 'earthColossus';

		// Bar background
		ctx.fillStyle = 'rgba(0,0,0,0.7)';
		ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
		// HP fill
		const hpGrad = ctx.createLinearGradient(barX, barY, barX + barW * hpPct, barY);
		if(isIceBoss){
			hpGrad.addColorStop(0, phase2 ? '#0044cc' : '#2266aa');
			hpGrad.addColorStop(1, phase2 ? '#4488ff' : '#4488ff');
		} else if(isEarthBoss){
			hpGrad.addColorStop(0, phase2 ? '#8b6914' : '#6b5530');
			hpGrad.addColorStop(1, phase2 ? '#c4a032' : '#8b7340');
		} else {
			hpGrad.addColorStop(0, phase2 ? '#ff2200' : '#cc3300');
			hpGrad.addColorStop(1, phase2 ? '#ff6600' : '#ff4400');
		}
		ctx.fillStyle = hpGrad;
		ctx.fillRect(barX, barY, barW * hpPct, barH);
		// Phase markers
		ctx.fillStyle = 'rgba(255,255,255,0.3)';
		ctx.fillRect(barX + barW * 0.5 - 1, barY, 2, barH);
		// Boss name
		ctx.font = 'bold 14px Arial';
		const nameColor = isIceBoss ? (phase2 ? '#4488ff' : '#88bbff') : isEarthBoss ? (phase2 ? '#c4a032' : '#b09050') : (phase2 ? '#ff6644' : '#ffcc88');
		ctx.fillStyle = nameColor;
		ctx.textAlign = 'center';
		const phaseSuffix2 = isIceBoss ? ' — UNLEASHED' : isEarthBoss ? ' — AWAKENED' : ' — ENRAGED';
		ctx.fillText(t.name + (phase2 ? phaseSuffix2 : ''), barX + barW/2, barY - 8);
		// HP text
		ctx.font = '11px Arial';
		ctx.fillStyle = '#fff';
		ctx.fillText(Math.ceil(en.hp) + ' / ' + en.maxHp, barX + barW/2, barY + barH/2 + 4);
		// Border
		const borderColor = isIceBoss ? (phase2 ? '#4488ff' : '#224488') : isEarthBoss ? (phase2 ? '#c4a032' : '#6b5530') : (phase2 ? '#ff4400' : '#884400');
		ctx.strokeStyle = borderColor;
		ctx.lineWidth = 2;
		ctx.strokeRect(barX, barY, barW, barH);
		ctx.restore();
	} else if(en.hp<en.maxHp){
		const barW=en.w+10;
		const hpPct=Math.max(0,en.hp/en.maxHp);
		ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(ex-5,ey-10,barW,5);
		ctx.fillStyle=hpPct>0.5?'#2ecc71':(hpPct>0.25?'#f39c12':'#e74c3c');
		ctx.fillRect(ex-5,ey-10,barW*hpPct,5);
	}
	// Name (not for boss — shown in HP bar)
	if(!en.typeDef.isBoss){
		ctx.font='9px Arial';ctx.fillStyle='#aaa';ctx.textAlign='center';
		ctx.fillText(t.name,ex+en.w/2,ey+en.h+12);
	}
}

/* =============================================================
   RENDER DECORATIONS
   ============================================================= */
function renderDecorations(){
	for(const dec of dungeon.decorations){
		const sx=dec.x-camera.x, sy=(dec.y||0)-camera.y;
		if(sx<-200||sx>canvas.width+200)continue;

		switch(dec.type){
		case 'lava':{
			const pulse=0.6+Math.sin(Date.now()*0.003)*0.2;
			ctx.fillStyle=`rgba(255,80,0,${pulse})`;
			ctx.fillRect(sx,sy,dec.w,dec.h);
			ctx.fillStyle=`rgba(255,200,0,${pulse*0.5})`;
			ctx.fillRect(sx+4,sy+2,dec.w-8,dec.h-4);
			break;
		}
		case 'torch':{
			// Bracket
			ctx.fillStyle='#554433';
			ctx.fillRect(sx,sy,6,14);
			// Flame
			const flicker=Math.sin(Date.now()*0.008+dec.x)*3;
			ctx.fillStyle='#ff8800';
			ctx.beginPath();ctx.arc(sx+3,sy-4+flicker,5,0,Math.PI*2);ctx.fill();
			ctx.fillStyle='#ffcc44';
			ctx.beginPath();ctx.arc(sx+3,sy-4+flicker,3,0,Math.PI*2);ctx.fill();
			// Light glow
			ctx.save();ctx.globalAlpha=0.08;
			const lg=ctx.createRadialGradient(sx+3,sy-4,0,sx+3,sy-4,80);
			lg.addColorStop(0,'#ff8800');lg.addColorStop(1,'transparent');
			ctx.fillStyle=lg;ctx.beginPath();ctx.arc(sx+3,sy-4,80,0,Math.PI*2);ctx.fill();
			ctx.restore();
			break;
		}
		case 'crack':{
			ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1;
			ctx.beginPath();ctx.moveTo(sx,sy);
			ctx.lineTo(sx+dec.size*0.4,sy+dec.size*0.3);
			ctx.lineTo(sx+dec.size*0.2,sy+dec.size*0.6);
			ctx.lineTo(sx+dec.size*0.6,sy+dec.size);
			ctx.stroke();
			break;
		}
		case 'stalagmite':{
			ctx.fillStyle=dungeon.wallColor2;
			ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+8,sy-dec.h);ctx.lineTo(sx+16,sy);ctx.closePath();ctx.fill();
			break;
		}
		case 'stalactite':{
			ctx.fillStyle=dungeon.wallColor2;
			ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+8,sy+dec.h);ctx.lineTo(sx+16,sy);ctx.closePath();ctx.fill();
			break;
		}
		case 'icePool':{
			ctx.fillStyle='rgba(100,180,255,0.3)';
			ctx.fillRect(sx,sy,dec.w,dec.h);
			ctx.fillStyle='rgba(200,240,255,0.5)';
			ctx.fillRect(sx+4,sy+2,dec.w-8,dec.h-4);
			// Shimmer
			ctx.fillStyle='rgba(255,255,255,0.3)';
			ctx.fillRect(sx+dec.w*0.3,sy+3,dec.w*0.2,2);
			break;
		}
		case 'icicle':{
			ctx.fillStyle='rgba(150,220,255,0.7)';
			ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+4,sy+dec.h);ctx.lineTo(sx+8,sy);ctx.closePath();ctx.fill();
			ctx.fillStyle='rgba(220,240,255,0.5)';
			ctx.fillRect(sx+2,sy,2,dec.h*0.6);
			break;
		}
		case 'snowPile':{
			ctx.fillStyle='rgba(220,230,240,0.6)';
			ctx.beginPath();ctx.ellipse(sx+dec.w/2,sy+dec.h/2,dec.w/2,dec.h/2,0,0,Math.PI*2);ctx.fill();
			break;
		}
		case 'frostCrystal':{
			ctx.fillStyle='rgba(120,200,255,0.6)';
			ctx.save();ctx.translate(sx,sy);ctx.rotate(0.3);
			ctx.fillRect(-dec.size/4,-dec.size/2,dec.size/2,dec.size);
			ctx.rotate(1.0);
			ctx.fillRect(-dec.size/4,-dec.size/2,dec.size/2,dec.size);
			ctx.restore();
			break;
		}
		case 'mushroom':{
			// Stem
			ctx.fillStyle='#ddddbb';
			ctx.fillRect(sx+dec.size*0.35,sy-dec.size*0.2,dec.size*0.3,dec.size*0.8);
			// Cap
			ctx.fillStyle=dec.color||'#88aa44';
			ctx.beginPath();ctx.ellipse(sx+dec.size/2,sy-dec.size*0.2,dec.size/2,dec.size*0.35,0,0,Math.PI*2);ctx.fill();
			// Dots
			ctx.fillStyle='rgba(255,255,255,0.4)';
			ctx.beginPath();ctx.arc(sx+dec.size*0.3,sy-dec.size*0.3,2,0,Math.PI*2);ctx.fill();
			ctx.beginPath();ctx.arc(sx+dec.size*0.7,sy-dec.size*0.2,1.5,0,Math.PI*2);ctx.fill();
			break;
		}
		case 'vine':{
			ctx.strokeStyle='#336622';ctx.lineWidth=2;
			ctx.beginPath();ctx.moveTo(sx,sy);
			ctx.quadraticCurveTo(sx+10,sy+dec.h*0.4,sx-5,sy+dec.h*0.7);
			ctx.quadraticCurveTo(sx+8,sy+dec.h*0.9,sx+3,sy+dec.h);
			ctx.stroke();
			// Leaves
			ctx.fillStyle='#448822';
			ctx.beginPath();ctx.ellipse(sx+8,sy+dec.h*0.3,4,7,0.5,0,Math.PI*2);ctx.fill();
			ctx.beginPath();ctx.ellipse(sx-3,sy+dec.h*0.6,4,6,-0.3,0,Math.PI*2);ctx.fill();
			break;
		}
		case 'crystal':{
			ctx.fillStyle=dec.color||'#aa66ff';
			ctx.globalAlpha=0.7;
			ctx.save();ctx.translate(sx,sy);
			// Main crystal
			ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-dec.size*0.3,-dec.size);ctx.lineTo(dec.size*0.3,-dec.size);ctx.lineTo(0,0);ctx.closePath();ctx.fill();
			// Side crystal
			ctx.beginPath();ctx.moveTo(dec.size*0.2,0);ctx.lineTo(dec.size*0.1,-dec.size*0.6);ctx.lineTo(dec.size*0.5,-dec.size*0.6);ctx.lineTo(dec.size*0.2,0);ctx.closePath();ctx.fill();
			// Glow
			ctx.globalAlpha=0.15;
			const cg=ctx.createRadialGradient(0,-dec.size*0.5,0,0,-dec.size*0.5,dec.size);
			cg.addColorStop(0,dec.color||'#aa66ff');cg.addColorStop(1,'transparent');
			ctx.fillStyle=cg;ctx.beginPath();ctx.arc(0,-dec.size*0.5,dec.size,0,Math.PI*2);ctx.fill();
			ctx.restore();ctx.globalAlpha=1;
			break;
		}
		case 'roots':{
			ctx.strokeStyle='#443322';ctx.lineWidth=3;
			ctx.beginPath();ctx.moveTo(sx,sy);
			ctx.quadraticCurveTo(sx+dec.w*0.3,sy-8,sx+dec.w*0.5,sy-4);
			ctx.quadraticCurveTo(sx+dec.w*0.7,sy+6,sx+dec.w,sy);
			ctx.stroke();
			ctx.lineWidth=2;
			ctx.beginPath();ctx.moveTo(sx+dec.w*0.3,sy-6);ctx.lineTo(sx+dec.w*0.25,sy-14);ctx.stroke();
			ctx.beginPath();ctx.moveTo(sx+dec.w*0.7,sy+4);ctx.lineTo(sx+dec.w*0.75,sy-6);ctx.stroke();
			break;
		}
		}
	}
}

/* =============================================================
   GAME LOOP
   ============================================================= */
function loop(){update();render();requestAnimationFrame(loop);}
loop();
</script>
