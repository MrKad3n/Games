<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Magic Battle — Dungeon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#111}
canvas{display:block}
#hud{position:fixed;top:14px;left:14px;color:#c8c8e0;font:13px/1.4 Arial,sans-serif;text-shadow:1px 1px 2px #000;pointer-events:none;z-index:10}
#backBtn{position:fixed;top:12px;right:14px;z-index:10;padding:8px 18px;font:14px Arial,sans-serif;background:rgba(255,255,255,.12);color:#ddd;border:1px solid rgba(255,255,255,.25);border-radius:6px;cursor:pointer;transition:background .2s;text-decoration:none}
#backBtn:hover{background:rgba(255,255,255,.22)}
#hotbar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:10;pointer-events:none}
.hb-slot{width:52px;height:56px;background:rgba(0,0,0,.55);border:2px solid rgba(255,255,255,.2);border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;transition:border-color .15s,background .15s;overflow:hidden}
.hb-slot.active{border-color:#6c5ce7;background:rgba(108,92,231,.25)}
.hb-cd-overlay{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);pointer-events:none}
.hb-key{font-size:10px;color:#888;position:absolute;top:2px;left:5px}
.hb-dot{width:8px;height:8px;border-radius:50%;margin-bottom:2px}
.hb-name{font-size:9px;color:#bbb;max-width:48px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hb-mana{font-size:9px;color:#3498db}\n.hb-ult{border-color:rgba(255,170,0,.5);background:rgba(255,170,0,.15)}\n.hb-ult.active{border-color:#ffaa00;background:rgba(255,170,0,.3)}
#manaWrap{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:260px;z-index:10;pointer-events:none}
#manaBarBg{width:100%;height:12px;background:rgba(0,0,0,.5);border:1px solid rgba(52,152,219,.4);border-radius:6px;overflow:hidden}
#manaBarFill{height:100%;background:linear-gradient(90deg,#2980b9,#3498db);border-radius:6px;transition:width .1s}
#manaText{text-align:center;font-size:11px;color:#5dade2;text-shadow:1px 1px 2px #000;margin-top:2px}
#totalManaWrap{position:fixed;bottom:130px;left:50%;transform:translateX(-50%);width:220px;z-index:10;pointer-events:none}
#totalManaBarBg{width:100%;height:10px;background:rgba(0,0,0,.5);border:1px solid rgba(255,170,0,.4);border-radius:5px;overflow:hidden}
#totalManaBarFill{height:100%;background:linear-gradient(90deg,#cc8800,#ffaa00);border-radius:5px;transition:width .15s}
#totalManaText{text-align:center;font-size:10px;color:#ffcc44;text-shadow:1px 1px 2px #000;margin-top:1px}
#healthWrap{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);width:260px;z-index:10;pointer-events:none}
#healthBarBg{width:100%;height:14px;background:rgba(0,0,0,.5);border:1px solid rgba(231,76,60,.4);border-radius:6px;overflow:hidden}
#healthBarFill{height:100%;background:linear-gradient(90deg,#c0392b,#e74c3c);border-radius:6px;transition:width .15s}
#healthText{text-align:center;font-size:11px;color:#f1948a;text-shadow:1px 1px 2px #000;margin-top:2px}
#dungeonName{position:fixed;top:14px;left:50%;transform:translateX(-50%);color:#fff;font:bold 16px Arial,sans-serif;text-shadow:2px 2px 4px #000;z-index:10;pointer-events:none}

/* === DIALOGUE SYSTEM === */
#dialogueOverlay{position:fixed;inset:0;z-index:50;display:none;background:rgba(0,0,0,0.4)}
#dialogueBox{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);width:min(720px,92vw);background:rgba(18,12,32,0.96);border:2px solid rgba(255,255,255,0.2);border-radius:14px;padding:22px 26px}
#dialogueIcon{font-size:32px;float:left;margin-right:12px}
#dialogueName{font-size:16px;font-weight:bold;color:#f1c40f;margin-bottom:8px}
#dialogueText{font-size:14px;color:#ddd;line-height:1.55;min-height:44px}
#dialogueContinue{font-size:11px;color:#666;margin-top:10px;text-align:right}

/* === NPC SYSTEM === */
#interactPrompt{position:fixed;bottom:200px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:#fff;padding:8px 16px;border-radius:6px;font-size:13px;z-index:15;display:none}
.npc-nameplate{position:absolute;font-size:11px;color:#f1c40f;text-shadow:1px 1px 2px #000;text-align:center;pointer-events:none}

/* === INVENTORY OVERLAY === */
#inventoryOverlay{position:fixed;inset:0;z-index:9999;display:none;background:rgba(0,0,0,0.75);align-items:center;justify-content:center}
#inventoryOverlay.open{display:flex}
#invFrame{width:min(960px,94vw);height:min(700px,90vh);border:2px solid #6c5ce7;border-radius:10px;background:#1a1a2e}
#invCloseBtn{position:fixed;top:12px;right:18px;font-size:28px;color:#fff;cursor:pointer;z-index:10000;background:rgba(0,0,0,0.5);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center}
#invCloseBtn:hover{background:#6c5ce7}

/* === NOTIFICATION === */
#notification{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(241,196,15,0.9);color:#000;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:bold;z-index:20;opacity:0;transition:opacity 0.4s;pointer-events:none}

/* === TUTORIAL HINTS === */
#tutorialHint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(20,15,40,0.95);border:2px solid #6c5ce7;border-radius:12px;padding:20px 30px;color:#fff;font-size:14px;line-height:1.6;text-align:center;z-index:45;display:none;max-width:400px}
</style>
</head>
<body>
<div id="hud">
	<div>WASD / Arrows — Move &amp; Jump</div>
	<div>1-0 — Select Spell · X or Click — Cast</div>
</div>
<a href="dungeons.html" id="backBtn">← Back</a>
<div id="dungeonName"></div>
<canvas id="game"></canvas>
<div id="healthWrap">
	<div id="healthBarBg"><div id="healthBarFill" style="width:100%"></div></div>
	<div id="healthText">100 / 100</div>
</div>
<div id="manaWrap">
	<div id="manaBarBg"><div id="manaBarFill" style="width:100%"></div></div>
	<div id="manaText">100 / 100</div>
</div>
<div id="totalManaWrap">
	<div id="totalManaBarBg"><div id="totalManaBarFill" style="width:0%"></div></div>
	<div id="totalManaText">⚡ Total Mana: 0</div>
</div>
<div id="damageStoreWrap" style="position:fixed;top:110px;left:12px;font-size:11px;color:#ffcc00;text-shadow:0 0 4px #000;display:none">
	<span id="damageStoreText">⚔️ Stored: 0</span>
</div>
<div id="hotbar"></div>

<!-- Dialogue System -->
<div id="dialogueOverlay">
	<div id="dialogueBox">
		<span id="dialogueIcon"></span>
		<div id="dialogueName"></div>
		<div id="dialogueText"></div>
		<div id="dialogueContinue">Click or press E to continue</div>
	</div>
</div>

<!-- Inventory Overlay (M key) -->
<div id="inventoryOverlay">
	<div id="invCloseBtn" onclick="closeInventory()">✕</div>
	<iframe id="invFrame" src="about:blank"></iframe>
</div>

<!-- Interaction Prompt -->
<div id="interactPrompt">Press <b>E</b> to interact</div>

<!-- Notification -->
<div id="notification"></div>

<!-- Tutorial Hint -->
<div id="tutorialHint"></div>

<!-- Victory Overlay -->
<div id="victoryOverlay" style="display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.75); display:none; flex-direction:column; align-items:center; justify-content:center; font-family:Arial,sans-serif; color:#fff;">
	<div style="background:rgba(20,18,40,0.95); border:2px solid rgba(255,255,255,0.2); border-radius:16px; padding:36px 48px; max-width:480px; text-align:center; box-shadow:0 0 40px rgba(100,80,200,0.3);">
		<div id="victoryEmoji" style="font-size:56px; margin-bottom:8px;">🏆</div>
		<h2 id="victoryTitle" style="font-size:28px; margin-bottom:6px; text-shadow:0 0 12px rgba(255,220,0,0.5);">Boss Defeated!</h2>
		<div id="victoryDiff" style="font-size:13px; color:#aaa; margin-bottom:16px;"></div>
		<div style="font-size:15px; color:#ccc; margin-bottom:12px;">Rewards:</div>
		<div id="victoryRewards" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:24px;"></div>
		<button onclick="location.href='dungeons.html'" style="padding:12px 32px; font-size:16px; font-weight:bold; border:none; border-radius:8px; background:linear-gradient(135deg,#5a3ec8,#8866ee); color:#fff; cursor:pointer; box-shadow:0 3px 10px rgba(90,62,200,0.4); transition:transform .2s;">Return to Dungeons</button>
	</div>
</div>

<script>
/* =========================================================
   Magic Battle — Unified Spell Battle Engine
   ========================================================= */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
addEventListener('resize',resize);resize();

/* === URL PARAMS === */
const GAME_MODE = new URLSearchParams(location.search).get('mode') || 'dungeon';
const DUNGEON_TYPE = new URLSearchParams(location.search).get('type') || 'fire';
const DIFFICULTY = new URLSearchParams(location.search).get('diff') || 'normal';
// Difficulty multipliers: easy / normal / hard
const DIFF_HP_MULT = DIFFICULTY === 'hard' ? 2 : DIFFICULTY === 'easy' ? 0.6 : 1;
const DIFF_SIZE_MULT = 1.4; // always use hard-mode size for all difficulties
const DIFF_DMG_MULT = DIFFICULTY === 'hard' ? 1.5 : DIFFICULTY === 'easy' ? 0.7 : 1;
const DIFF_CD_MULT = DIFFICULTY === 'hard' ? 0.8 : DIFFICULTY === 'easy' ? 1.5 : 1; // cooldown multiplier (lower = faster attacks)

/* === ENEMY SPRITE SHEETS === */
const ENEMY_SPRITE_SHEETS = {};
const SPRITE_COLS = 6, SPRITE_ROWS = 4;
const SPRITE_ROW = { idle: 0, walk: 1, attack: 2, defeat: 3 };
const SPRITE_FPS = 8; // game frames per animation frame
const ATTACK_ANIM_DURATION = SPRITE_FPS * SPRITE_COLS; // 48 frames for full attack cycle
const SPRITE_SCALE = { imp:3.2, flameSerpent:2.8, emberMage:2.8, magmaGolem:3.0, fireSprite:3.8, fireDragon:1.4, frostWraith:3.2, iceArcher:2.8, snowBeast:3.0, cryoMage:2.8, glacierSentinel:3.0, frostColossus:1.4, rockGolem:3.0, vineCrawler:2.8, caveSpider:2.8, crystalMage:2.8, mudElemental:3.0, earthColossus:1.4 };
const SPRITE_COLS_OVERRIDE = { fireDragon: 4, frostColossus: 4, earthColossus: 4, crystalMage: 7 }; // boss sheets have 4 frames per row, crystal mage has 7
const SPRITE_NAME_OVERRIDE = { cryoMage: 'cyro-mage' }; // filename doesn't match camelCase conversion
// Fire enemies — JPG
['imp','flameSerpent','emberMage','magmaGolem','fireSprite','fireDragon'].forEach(key => {
	const name = key.replace(/([A-Z])/g, '-$1').toLowerCase();
	const img = new Image();
	img.src = 'images/enemies/' + name + '-sheet.jpg';
	ENEMY_SPRITE_SHEETS[key] = img;
});
// Ice enemies — PNG
['frostWraith','iceArcher','snowBeast','cryoMage','glacierSentinel','frostColossus'].forEach(key => {
	const name = SPRITE_NAME_OVERRIDE[key] || key.replace(/([A-Z])/g, '-$1').toLowerCase();
	const img = new Image();
	img.src = 'images/enemies/' + name + '-sheet.png';
	ENEMY_SPRITE_SHEETS[key] = img;
});
// Earth enemies — PNG (except earthColossus which is JPG)
['rockGolem','vineCrawler','caveSpider','crystalMage','mudElemental'].forEach(key => {
	const name = key.replace(/([A-Z])/g, '-$1').toLowerCase();
	const img = new Image();
	img.src = 'images/enemies/' + name + '-sheet.png';
	ENEMY_SPRITE_SHEETS[key] = img;
});
{
	const img = new Image();
	img.src = 'images/enemies/earth-colossus-sheet.png';
	ENEMY_SPRITE_SHEETS['earthColossus'] = img;
}

/* === PLAYER SPRITE SHEET === */
const PLAYER_SPRITE = new Image();
PLAYER_SPRITE.src = 'images/assests/player-sheet.png';
const PLAYER_SPRITE_COLS = 6, PLAYER_SPRITE_ROWS = 4;
const PLAYER_SPRITE_ROW = { idle: 0, walk: 1, attack: 2, defeat: 3 };
const PLAYER_SPRITE_FPS = 8;
const PLAYER_SPRITE_SCALE = 2.5;
let playerAnimFrame = 0;
let playerAnimTimer = 0;
let playerAnimState = 'idle'; // idle, walk, attack

/* === BOSS REWARD TABLES (per dungeon + difficulty) === */
const BOSS_REWARDS = {
	fire: {
		easy:   [{ id:'ember_shard', qty:5 }, { id:'lava_essence', qty:2 }, { id:'arcane_dust', qty:3 }],
		normal: [{ id:'ember_shard', qty:8 }, { id:'lava_essence', qty:4 }, { id:'molten_core', qty:1 }, { id:'arcane_dust', qty:5 }],
		hard:   [{ id:'ember_shard', qty:12}, { id:'lava_essence', qty:6 }, { id:'molten_core', qty:3 }, { id:'inferno_fang', qty:1 }, { id:'dragon_scale', qty:1 }, { id:'arcane_dust', qty:8 }],
	},
	ice: {
		easy:   [{ id:'ice_crystal', qty:5 }, { id:'permafrost', qty:2 }, { id:'arcane_dust', qty:3 }],
		normal: [{ id:'ice_crystal', qty:8 }, { id:'permafrost', qty:4 }, { id:'frost_core', qty:1 }, { id:'arcane_dust', qty:5 }],
		hard:   [{ id:'ice_crystal', qty:12}, { id:'permafrost', qty:6 }, { id:'frost_core', qty:3 }, { id:'glacial_shard', qty:1 }, { id:'starlight_dew', qty:1 }, { id:'arcane_dust', qty:8 }],
	},
	earth: {
		easy:   [{ id:'ancient_amber', qty:5 }, { id:'mana_herb', qty:3 }, { id:'arcane_dust', qty:3 }],
		normal: [{ id:'ancient_amber', qty:8 }, { id:'mana_herb', qty:5 }, { id:'terra_core', qty:1 }, { id:'arcane_dust', qty:5 }],
		hard:   [{ id:'ancient_amber', qty:12}, { id:'mana_herb', qty:8 }, { id:'terra_core', qty:3 }, { id:'titan_shard', qty:1 }, { id:'void_shard', qty:1 }, { id:'arcane_dust', qty:8 }],
	},
};

/* Item name/icon lookup for victory screen (subset matching inventory.html ITEM_DB) */
const REWARD_ITEM_INFO = {
	arcane_dust:  { name:'Arcane Dust',    icon:'✨' },
	ember_shard:  { name:'Ember Shard',    icon:'🔥' },
	ice_crystal:  { name:'Ice Crystal',    icon:'🧊' },
	mana_herb:    { name:'Mana Herb',      icon:'🌿' },
	shadow_essence:{ name:'Shadow Essence',icon:'🖤' },
	dragon_scale: { name:'Dragon Scale',   icon:'🐉' },
	starlight_dew:{ name:'Starlight Dew',  icon:'🌟' },
	void_shard:   { name:'Void Shard',     icon:'🌑' },
	molten_core:  { name:'Molten Core',    icon:'🌋' },
	inferno_fang: { name:'Inferno Fang',   icon:'🦷' },
	lava_essence: { name:'Lava Essence',   icon:'🔶' },
	frost_core:   { name:'Frost Core',     icon:'💎' },
	glacial_shard:{ name:'Glacial Shard',  icon:'🔷' },
	permafrost:   { name:'Permafrost',     icon:'❄️' },
	terra_core:   { name:'Terra Core',     icon:'🪨' },
	titan_shard:  { name:'Titan Shard',    icon:'⛰️' },
	ancient_amber:{ name:'Ancient Amber',  icon:'🟠' },
};

function grantBossRewards(){
	const rewards = BOSS_REWARDS[DUNGEON_TYPE] && BOSS_REWARDS[DUNGEON_TYPE][DIFFICULTY];
	if(!rewards) return;
	// Add items to playerData inventory
	for(const r of rewards){
		const existing = playerData.inventory.find(e => e.itemId === r.id);
		if(existing) existing.qty += r.qty;
		else playerData.inventory.push({ itemId: r.id, qty: r.qty });
	}
	// Save to localStorage
	localStorage.setItem('magicBattle_playerData', JSON.stringify(playerData));
	// Show victory overlay after a short delay
	setTimeout(() => showVictoryScreen(rewards), 1500);
}

function showVictoryScreen(rewards){
	const overlay = document.getElementById('victoryOverlay');
	overlay.style.display = 'flex';
	const dungeonNames = { fire:'The Inferno Depths', ice:'The Frozen Caverns', earth:'The Stone Warrens' };
	const dungeonEmojis = { fire:'🔥', ice:'❄️', earth:'🪨' };
	document.getElementById('victoryEmoji').textContent = dungeonEmojis[DUNGEON_TYPE] || '🏆';
	document.getElementById('victoryTitle').textContent = (dungeonNames[DUNGEON_TYPE] || 'Dungeon') + ' Cleared!';
	const diffLabel = DIFFICULTY.charAt(0).toUpperCase() + DIFFICULTY.slice(1);
	const diffColors = { easy:'#44dd88', normal:'#66aaff', hard:'#ff5555' };
	document.getElementById('victoryDiff').innerHTML = 'Difficulty: <span style="color:'+diffColors[DIFFICULTY]+'">'+diffLabel+'</span>';
	const rewardsEl = document.getElementById('victoryRewards');
	rewardsEl.innerHTML = '';
	for(const r of rewards){
		const info = REWARD_ITEM_INFO[r.id] || { name:r.id, icon:'📦' };
		const div = document.createElement('div');
		div.style.cssText = 'background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:8px; padding:8px 14px; text-align:center; min-width:80px;';
		div.innerHTML = '<div style="font-size:24px;">'+info.icon+'</div><div style="font-size:12px; color:#ddd; margin-top:2px;">'+info.name+'</div><div style="font-size:14px; color:#ffcc00; font-weight:bold;">×'+r.qty+'</div>';
		rewardsEl.appendChild(div);
	}
}

/* =============================================================
   PLAYER DATA (from localStorage, same as sandbox)
   ============================================================= */
let playerData;
try{ const raw=localStorage.getItem('magicBattle_playerData'); playerData=raw?JSON.parse(raw):null; }catch(e){playerData=null;}
if(!playerData){
	playerData={
		baseStats:{magicPower:10,magicControl:5,manaRegen:100,magicDefence:8},
		equipment:{staff:null,robe:null,relic1:null,relic2:null},
		inventory:[],
		spells:new Array(10).fill(null),
		vows:[null,null,null], // 3 vow slots
	};
	playerData.spells[0]={
		name:'Magic Missile',
		phases:[{shape:'missile',behavior:'straight',width:1,height:1,speed:1.5,
			duration:1,power:1,count:1,spread:0,effects:[],color:'#4488ff',trail:'sparkle',
			nextTrigger:'onHit',orbitRadius:80,orbitSpeed:3,orbitDuration:1.5}]
	};
}

/* --- Ensure vows array exists (migration) --- */
if(!playerData.vows) playerData.vows = [null,null,null];
/* --- Ensure spellBoosts array exists (migration) --- */
if(!playerData.spellBoosts) playerData.spellBoosts = new Array(10).fill(1.0);

/* Helper to get item boost for a spell slot */
function getItemBoostForSlot(slot){
	if(slot < 0 || slot >= playerData.spellBoosts.length) return 1.0;
	return playerData.spellBoosts[slot] || 1.0;
}

/* --- Vow System --- */
function getVowBoostsForSlot(slot){
	const globalBoosts = new Set(['maxHealth','jumpHeight','playerSpeed','defense','elementalDmg']);
	const b = {power:0,size:0,speed:0,count:0,duration:0,effects:0,phases:0,maxHealth:0,manaCost:0,cooldown:0,jumpHeight:0,playerSpeed:0,defense:0,elementalDmg:0,_sizeBonus:false};
	for(const v of playerData.vows){
		if(!v) continue;
		if(v.boostType != null){
			if(globalBoosts.has(v.boostType)){ b[v.boostType] = (b[v.boostType]||0) + (v.boostAmount||0); continue; }
			if(v.targetSlot !== slot) continue;
			b[v.boostType] = (b[v.boostType]||0) + (v.boostAmount||0);
			if(v.sizeBonus) b._sizeBonus = true;
		} else if(v.boosts){
			if(v.targetSlot !== slot) continue;
			for(const k in v.boosts) b[k]=(b[k]||0)+v.boosts[k];
		}
	}
	return b;
}
function applyVowSacrifices(){
	vowHealthPenalty=0; vowManaPenalty=0; vowLockedSlots=new Set(); vowMaxHealthBonus=0;
	vowJumpBonus=0; vowSpeedBonus=0; vowDefenseBonus=0; vowElementalDmgBonus=0;
	vowLockedEffects=new Set(); vowLockedShapes=new Set();
	vowMovementPenalty=0; vowVisibilityPenalty=0;
	vowCritChance=0; vowSpellVamp=0; vowThorns=0; vowManaEfficiency=0;
	vowSacrificedItemSlots=new Set();
	for(const v of playerData.vows){
		if(!v) continue;
		if(v.sacrifice==='health') vowHealthPenalty+=v.amount;
		else if(v.sacrifice==='maxMana') vowManaPenalty+=v.amount;
		else if(v.sacrifice==='spellSlot'){
			for(const s of v.slots||[]) vowLockedSlots.add(s);
		}
		else if(v.sacrifice==='effects'){
			for(const fx of v.sacrificedEffects||[]) vowLockedEffects.add(fx);
		}
		else if(v.sacrifice==='shapes'){
			for(const sh of v.sacrificedShapes||[]) vowLockedShapes.add(sh);
		}
		else if(v.sacrifice==='movement') vowMovementPenalty+=v.amount;
		else if(v.sacrifice==='visibility') vowVisibilityPenalty+=v.amount;
		else if(v.sacrifice==='items'){
			for(const sl of v.sacrificedItemSlots||[]) vowSacrificedItemSlots.add(sl);
		}
		// Global boosts
		if(v.boostType==='maxHealth') vowMaxHealthBonus += (v.boostAmount||0) * 5;
		if(v.boostType==='jumpHeight') vowJumpBonus += (v.boostAmount||0);
		if(v.boostType==='playerSpeed') vowSpeedBonus += (v.boostAmount||0);
		if(v.boostType==='defense') vowDefenseBonus += (v.boostAmount||0);
		if(v.boostType==='elementalDmg') vowElementalDmgBonus += (v.boostAmount||0);
		if(v.boostType==='critChance') vowCritChance += (v.boostAmount||0);
		if(v.boostType==='spellVamp') vowSpellVamp += (v.boostAmount||0);

const SHAPE_CTRL={missile:0,orb:1,blade:2,beam:4,ring:5,cone:4,nova:7,chain:9,wall:6,solidify:4,spike:3,allyOrb:1,polygon:3,meteor:6,vortex:7,same:0};

const FX_CTRL={burn:2,freeze:2,knockback:1,pull:3,poison:3,stun:5,healSelf:4,shield:4,lifesteal:6,speedBoost:3,jumpBoost:3,manaRegen:4,timedRelease:2,phaseFork:5,resetProjectiles:0,forceJump:2,horizontalLaunch:2,randomDelay:1,phaseThrough:6,damageStore:2,damageRelease:4,damageHeal:3,dispel:4,ricochet:6,shatter:6,gravityWell:7};

function calcSpellCost(spell){
	if(!spell||!spell.phases.length)return 0;
	let cost=5;
	for(const ph of spell.phases){
		cost+=(SHAPE_MANA[ph.shape]||0)+(BEH_MANA[ph.behavior]||0);
		const isAreaBeh=ph.behavior==='rain'||ph.behavior==='barrage';
		const countMult=1+(ph.count-1)*(isAreaBeh?0.1:0.4);
		cost+=ph.power*50*countMult+(ph.count-1)*(isAreaBeh?1:4)+(ph.width-1)*2+(ph.height-1)*2;
		if(ph.shape==='chain'&&ph.chainStunTime>0)cost+=ph.chainStunTime*25;
		if(ph.behavior==='ground'&&ph.groundRadius>200)cost+=Math.floor((ph.groundRadius-200)/50)*3;
		if(ph.shape==='summon'){cost+=(ph.summonRange||0)*4+(ph.summonHealth||0)*3+(ph.summonSpeed||0)*3;}
		for(const fx of ph.effects)cost+=(FX_MANA[fx]||0);
		if(ph.effects.includes('phaseFork')){cost+=(ph.phaseForkRepeats||1)*35;}
	}
	cost*=(0.6+spell.phases.length*0.25);
	return Math.round(cost);
}
function calcSpellCtrl(spell){
	if(!spell||!spell.phases.length)return 0;
	let req=0;
	for(const ph of spell.phases){
		req=Math.max(req,SHAPE_CTRL[ph.shape]||0,BEH_CTRL[ph.behavior]||0);
		for(const fx of ph.effects)req=Math.max(req,FX_CTRL[fx]||0);
	}
	req+=(spell.phases.length-1)*3;
	return req;
}

/* =============================================================
   TILEMAP GENERATION
   ============================================================= */
const WORLD_W = IS_SANDBOX ? SANDBOX_CONFIG.worldW : IS_RAID ? RAID_CONFIG.worldW : IS_OPENWORLD ? OPENWORLD_CONFIG.worldW : dungeon.worldW;
const WORLD_H = IS_SANDBOX ? SANDBOX_CONFIG.worldH : IS_RAID ? RAID_CONFIG.worldH : IS_OPENWORLD ? OPENWORLD_CONFIG.worldH : dungeon.worldH;
const MAP_COLS = Math.ceil(WORLD_W / TILE);
const MAP_ROWS = Math.ceil(WORLD_H / TILE);

// Ground level for sandbox/raid (open-sky maps)
const GROUND_Y = IS_SANDBOX ? SANDBOX_CONFIG.groundY : IS_RAID ? RAID_CONFIG.groundY : IS_OPENWORLD ? OPENWORLD_CONFIG.groundY : WORLD_H;
const GROUND_THICK = IS_SANDBOX ? SANDBOX_CONFIG.groundThick : 60;

// Platforms for open-sky modes (sandbox/raid)
let sandboxPlatforms = [];
if(IS_SANDBOX){
	sandboxPlatforms = [
		{ x:0, y:SANDBOX_CONFIG.groundY, w:WORLD_W, h:SANDBOX_CONFIG.groundThick }, // Main ground
		...SANDBOX_CONFIG.platforms,
		// Side walls
		{ x:-50, y:0, w:50, h:WORLD_H },
		{ x:WORLD_W, y:0, w:50, h:WORLD_H },
	];
} else if(IS_RAID){
	sandboxPlatforms = [
		{ x:0, y:RAID_CONFIG.groundY, w:WORLD_W, h:200 }, // Main ground
		...RAID_CONFIG.platforms,
		// Side walls
		{ x:-50, y:0, w:50, h:WORLD_H },
		{ x:WORLD_W, y:0, w:50, h:WORLD_H },
	];
} else if(IS_OPENWORLD){
	sandboxPlatforms = [
		{ x:0, y:OPENWORLD_CONFIG.groundY, w:WORLD_W, h:200 }, // Main ground
		...OPENWORLD_CONFIG.platforms,
		// Side walls
		{ x:-50, y:0, w:50, h:WORLD_H },
		{ x:WORLD_W, y:0, w:50, h:WORLD_H },
	];
}

// 0 = solid wall, 1 = air (for dungeon mode tilemap)
const tileMap = [];
for(let r=0;r<MAP_ROWS;r++) tileMap[r] = new Uint8Array(MAP_COLS);

// Fill tilemap based on mode
if(IS_DUNGEON && dungeon){
	for(const c of dungeon.corridors){
		const sc = Math.floor(c.x / TILE);
		const ec = Math.ceil((c.x + c.w) / TILE);
		const sr = Math.floor(c.y / TILE);
		const er = Math.ceil((c.y + c.h) / TILE);
		for(let r = sr; r < er && r < MAP_ROWS; r++)
			for(let col = sc; col < ec && col < MAP_COLS; col++)
				if(r >= 0 && col >= 0) tileMap[r][col] = 1;
	}
} else {
	// Open-sky modes: all air above ground
	const groundRow = Math.floor(GROUND_Y / TILE);
	for(let r = 0; r < MAP_ROWS; r++){
		for(let c = 0; c < MAP_COLS; c++){
			tileMap[r][c] = r < groundRow ? 1 : 0; // air above, solid below
		}
	}
}

function isSolid(col, row){
	// No tilemap in sandbox/raid/openworld modes
	if(IS_SANDBOX || IS_RAID || IS_OPENWORLD) return false;
	if(row < 0 || row >= MAP_ROWS || col < 0 || col >= MAP_COLS) return true;
	return tileMap[row][col] === 0;
}

// Platform collision for open-sky modes
function checkPlatformCollision(x, y, w, h){
	if(!IS_SANDBOX && !IS_RAID && !IS_OPENWORLD) return null;
	for(const p of sandboxPlatforms){
		if(x + w > p.x && x < p.x + p.w && y + h > p.y && y < p.y + p.h){
			return p;
		}
	}
	return null;
}

// One-way platform check (landing from above)
function checkPlatformLanding(x, y, w, h, vy){
	if(!IS_SANDBOX && !IS_RAID && !IS_OPENWORLD) return null;
	for(const p of sandboxPlatforms){
		// Only collide if falling and feet are above/at platform top
		if(vy >= 0 && x + w > p.x && x < p.x + p.w){
			if(y + h >= p.y && y + h <= p.y + 12){ // within 12px of platform top
				return p;
			}
		}
	}
	return null;
}

// Precompute tile edge flags for rendering (is there air adjacent?)
const tileEdges = [];
for(let r=0;r<MAP_ROWS;r++){
	tileEdges[r] = [];
	for(let c=0;c<MAP_COLS;c++){
		if(tileMap[r][c]===0){
			tileEdges[r][c] = {
				airTop: r>0 && tileMap[r-1][c]===1,
				airBot: r<MAP_ROWS-1 && tileMap[r+1][c]===1,
				airLeft: c>0 && tileMap[r][c-1]===1,
				airRight: c<MAP_COLS-1 && tileMap[r][c+1]===1,
			};
		} else {
			tileEdges[r][c] = null;
		}
	}
}

const camera = { x:0, y:0, shakeX:0, shakeY:0, shakeDur:0, shakeIntensity:0 };
function shakeScreen(intensity, duration){
	camera.shakeIntensity = intensity;
	camera.shakeDur = duration;
}
function updateCamera(){
	camera.x = player.x - canvas.width/2;
	camera.y = player.y - canvas.height/2;
	camera.x = Math.max(0, Math.min(camera.x, WORLD_W - canvas.width));
	camera.y = Math.max(0, Math.min(camera.y, WORLD_H - canvas.height));
	// Apply screen shake
	if(camera.shakeDur > 0){
		const decay = camera.shakeDur / 30; // fade out
		camera.shakeX = (Math.random() - 0.5) * camera.shakeIntensity * decay;
		camera.shakeY = (Math.random() - 0.5) * camera.shakeIntensity * decay;
		camera.shakeDur--;
	} else {
		camera.shakeX = 0;
		camera.shakeY = 0;
	}
}

/* Release all held-down projectiles toward cursor */
function releaseHeldProjectiles(){
	const worldMX = mouseScreenX + camera.x;
	const worldMY = mouseScreenY + camera.y;
	for(const p of projectiles){
		if(!p._held) continue;
		p._held = false;
		const ang = Math.atan2(worldMY - p.y, worldMX - p.x);
		const spd = (p.phase.speed||1)*7;
		p.vx = Math.cos(ang)*spd;
		p.vy = Math.sin(ang)*spd;
		p.age = 0; // reset age so it gets full duration after release
		p.hitTargets.clear(); // clear so it can hit again after release
	}
}

function startBossCutscene(){
	if(bossState.phase !== 'inactive') return;
	bossState.phase = 'cutscene';
	bossState.timer = 0;
	// Boss spawns after cutscene — use saved spawn position for camera target
	if(bossSpawnDef){
		const bt = ENEMY_TYPES[bossSpawnDef.type];
		bossState.bossCx = bossSpawnDef.x + (bt ? bt.w/2 : 160);
		bossState.bossCy = bossSpawnDef.y + (bt ? bt.h/2 : 120);
	}
	// Seal the entrance — add solid tiles
	if(BOSS_LOCK_WALL){
	bossState.lockWall = { ...BOSS_LOCK_WALL };
	const lx = Math.floor(BOSS_LOCK_WALL.x / TILE);
	const ly = Math.floor(BOSS_LOCK_WALL.y / TILE);
	const rx = Math.ceil((BOSS_LOCK_WALL.x + BOSS_LOCK_WALL.w) / TILE);
	const ry = Math.ceil((BOSS_LOCK_WALL.y + BOSS_LOCK_WALL.h) / TILE);
	for(let r = ly; r < ry; r++){
		for(let c = lx; c < rx; c++){
			if(r >= 0 && r < MAP_ROWS && c >= 0 && c < MAP_COLS){
				tileMap[r][c] = 0; // solid
			}
		}
	}
	// Recompute edges for those tiles
	computeTileEdges();
	}

	// Push player into the room if they're at the edge
	if(BOSS_ROOM_RECT && player.x < BOSS_ROOM_RECT.x + 80) player.x = BOSS_ROOM_RECT.x + 80;

	// Spawn dramatic particles
	const isIceBoss = DUNGEON_TYPE === 'ice';
	const isEarthBoss = DUNGEON_TYPE === 'earth';
	for(let i = 0; i < 20; i++){
		const pColor = isIceBoss ? {r:80+Math.random()*50|0,g:160+Math.random()*60|0,b:255} : isEarthBoss ? {r:139+Math.random()*60|0,g:105+Math.random()*50|0,b:20+Math.random()*30|0} : {r:255,g:Math.random()*100|0,b:0};
		particles.push({x:player.x+Math.random()*100-50, y:player.y+Math.random()*60-30,
			vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4-2,
			life:40+Math.random()*30, color: pColor});
	}
}

function updateBossCutscene(){
	bossState.timer++;
	const t = bossState.timer;
	const dur = bossState.cutsceneDuration;
	const prog = t / dur;

	// Camera pans to boss for first 60%, then back to player
	if(prog < 0.6){
		// Pan to boss
		const panProg = Math.min(1, prog / 0.4);
		const ease = panProg * panProg * (3 - 2 * panProg); // smoothstep
		camera.x = player.x - canvas.width/2 + (bossState.bossCx - player.x) * ease;
		camera.y = player.y - canvas.height/2 + (bossState.bossCy - player.y) * ease;
	} else {
		// Pan back to player
		const panProg = Math.min(1, (prog - 0.6) / 0.3);
		const ease = panProg * panProg * (3 - 2 * panProg);
		camera.x = bossState.bossCx - canvas.width/2 + (player.x - bossState.bossCx) * ease;
		camera.y = bossState.bossCy - canvas.height/2 + (player.y - bossState.bossCy) * ease;
	}
	camera.x = Math.max(0, Math.min(camera.x, WORLD_W - canvas.width));
	camera.y = Math.max(0, Math.min(camera.y, WORLD_H - canvas.height));

	// Text alpha — fade in and out
	if(prog < 0.15) bossState.textAlpha = prog / 0.15;
	else if(prog > 0.75) bossState.textAlpha = (1 - prog) / 0.25;
	else bossState.textAlpha = 1;

	// Screen shake at start
	if(t < 30) bossState.shakeTimer = 4;
	else if(t === 90) bossState.shakeTimer = 6;
	else if(bossState.shakeTimer > 0) bossState.shakeTimer--;

	// End cutscene — spawn the boss
	if(t >= dur){
		bossState.phase = 'active';
		bossState.textAlpha = 0;
		// Spawn boss enemy now
		if(bossSpawnDef){
			const bt = ENEMY_TYPES[bossSpawnDef.type];
			if(bt){
				const bossHp = Math.round(bt.hp * DIFF_HP_MULT);
				enemies.push({
					type: bossSpawnDef.type, typeDef: bt,
					x: bossSpawnDef.x, y: bossSpawnDef.y,
					w: Math.round(bt.w * DIFF_SIZE_MULT), h: Math.round(bt.h * DIFF_SIZE_MULT), vx: 0, vy: 0,
					hp: bossHp, maxHp: bossHp, facing: -1,
					patrol: bossSpawnDef.patrol, patrolDir: 1,
					state: 'alert', alertTimer: 0,
					spellCooldowns: bt.spells.map(s => Math.round(s.cooldown * 0.8 * DIFF_CD_MULT)),
					currentSpell: 0, flash: 0, dots: [],
					stunTimer: 0, slowTimer: 0, animTimer: 0, attackAnimTimer: 0,
					dead: false, deathTimer: 0,
					baseY: bossSpawnDef.y, flyOffset: 0,
					charging: false, chargeVx: 0, chargeVy: 0, chargeTimer: 0, chargeCastDone: false,
					bossPhase: 1, bossPhaseTransition: 0, bossCharging: false,
				});
				// Dramatic spawn burst
				const spawnColors = bossSpawnDef.type === 'frostColossus' ? ['#2244ff','#4488ff','#66bbff','#aaeeff'] : bossSpawnDef.type === 'earthColossus' ? ['#8b6914','#c4a032','#b08830','#ffcc33'] : ['#ff2200','#ff6600','#ffaa00','#ffdd00'];
				for(let i=0;i<40;i++) particles.push({x:bossSpawnDef.x+bt.w/2+Math.random()*bt.w-bt.w/2,y:bossSpawnDef.y+bt.h/2+Math.random()*bt.h-bt.h/2,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*10-3,life:50+Math.random()*40,color:spawnColors[i%4]});
			}
		}
	}
}

function renderBossCutscene(){
	// Dark vignette overlay
	ctx.save();
	ctx.setTransform(1,0,0,1,0,0);
	const vignette = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.width*0.3,
		canvas.width/2, canvas.height/2, canvas.width*0.7);
	vignette.addColorStop(0, 'transparent');
	vignette.addColorStop(1, 'rgba(0,0,0,0.6)');
	ctx.fillStyle = vignette;
	ctx.fillRect(0, 0, canvas.width, canvas.height);

	// Cinematic bars
	const barH = 40;
	ctx.fillStyle = '#000';
	ctx.fillRect(0, 0, canvas.width, barH);
	ctx.fillRect(0, canvas.height - barH, canvas.width, barH);

	// Boss name text
	const alpha = bossState.textAlpha;
	const isIce = DUNGEON_TYPE === 'ice';
	const isEarth = DUNGEON_TYPE === 'earth';
	if(alpha > 0){
		ctx.globalAlpha = alpha;
		// Boss title
		ctx.font = 'bold 32px Arial';
		ctx.fillStyle = isIce ? '#4488ff' : isEarth ? '#c4a032' : '#ff4400';
		ctx.textAlign = 'center';
		ctx.shadowColor = isIce ? '#0044ff' : isEarth ? '#8b6914' : '#ff0000';
		ctx.shadowBlur = 20;
		const bossName = isIce ? 'Kryonax' : isEarth ? 'Terravox' : 'Ignaroth';
		ctx.fillText(bossName, canvas.width/2, canvas.height/2 - 20);
		// Subtitle
		ctx.font = 'italic 18px Arial';
		ctx.fillStyle = isIce ? '#88bbff' : isEarth ? '#b09050' : '#ffaa66';
		ctx.shadowBlur = 10;
		const bossSubtitle = isIce ? 'The Frozen Colossus' : isEarth ? 'The Stone Titan' : 'The Inferno Dragon';
		ctx.fillText(bossSubtitle, canvas.width/2, canvas.height/2 + 15);
		// Warning text
		if(bossState.timer > 60){
			ctx.font = 'bold 14px Arial';
			ctx.fillStyle = isIce ? '#66aaff' : isEarth ? '#c4a032' : '#ff8844';
			ctx.shadowBlur = 6;
			const warning = isIce ? '❄ The Cavern Trembles ❄' : isEarth ? '🪨 The Earth Trembles 🪨' : '⚔ Prepare for Battle ⚔';
			ctx.fillText(warning, canvas.width/2, canvas.height/2 + 50);
		}
		ctx.shadowBlur = 0;
		ctx.globalAlpha = 1;
	}

	ctx.restore();
}

function computeTileEdges(){
	for(let r=0;r<MAP_ROWS;r++){
		for(let c=0;c<MAP_COLS;c++){
			if(tileMap[r][c]===0){
				tileEdges[r][c]={
					airTop: r>0 && tileMap[r-1][c]===1,
					airBot: r<MAP_ROWS-1 && tileMap[r+1][c]===1,
					airLeft: c>0 && tileMap[r][c-1]===1,
					airRight: c<MAP_COLS-1 && tileMap[r][c+1]===1,
				};
			} else {
				tileEdges[r][c]=null;
			}
		}
	}
}

const spellCooldowns = new Array(10).fill(0);
const spellMaxCooldowns = new Array(10).fill(1);

function selectSpellSlot(idx){ activeSlot = idx; renderHotbar(); }

function renderHotbar(){
	const bar = document.getElementById('hotbar'); bar.innerHTML = '';
	for(let i=0;i<10;i++){
		const sp = playerData.spells[i];
		const el = document.createElement('div');
		const isUlt = (i===9 && sp && sp.isUltimate);
		el.className = 'hb-slot' + (i===activeSlot?' active':'') + (isUlt?' hb-ult':'');
		const keyLabel = i===9?'⚡0':''+(i+1);
		const isLocked = vowLockedSlots.has(i);
		if(isLocked){
			el.style.opacity='0.35';
			el.innerHTML = `<span class="hb-key">${keyLabel}</span><div class="hb-name" style="color:#ff4444">🔒 Vowed</div>`;
		} else if(sp){
			const cost = calcSpellCost(sp);
			const controlDiscount = Math.max(0.3, 1 - stats.magicControl * 0.015);
			const _vbHud = getVowBoostsForSlot(i);
			const vowManaHud = Math.max(0.1, 1 - (_vbHud.manaCost||0) * 0.05);
			const vowGlobalHud = Math.max(0.1, 1 - vowManaEfficiency * 0.025);
			const displayCost = Math.round(cost * controlDiscount * vowManaHud * vowGlobalHud);
			const req = calcSpellCtrl(sp);
			const usable = stats.magicControl >= req;
			const color = sp.phases[0]?.color || '#888';
			let cdHtml = '';
			if(spellCooldowns[i] > 0){
				const pct = (spellCooldowns[i] / spellMaxCooldowns[i]) * 100;
				cdHtml = `<div class="hb-cd-overlay" style="height:${pct}%"></div>`;
			}
			const costLabel = isUlt ? `${displayCost*10}⚡` : `${displayCost}💧`;
			el.innerHTML = `<span class="hb-key">${keyLabel}</span>
				<div class="hb-dot" style="background:${usable?color:'#555'}"></div>
				<div class="hb-name" style="${usable?'':'color:#666;text-decoration:line-through'}">${sp.name}</div>
				<div class="hb-mana" style="${isUlt?'color:#ffaa00':''}">${costLabel}</div>${cdHtml}`;
		} else {
			el.innerHTML = `<span class="hb-key">${keyLabel}</span><div class="hb-name" style="color:#555">—</div>`;
		}
		bar.appendChild(el);
	}
}

/* --- visual hitbox: use sprite bounds for spell-enemy hit detection --- */
function getVisualHitRect(en){
	const s = SPRITE_SCALE[en.type] || 1.5;
	const rW = en.w * s, rH = en.h * s;
	const isFlying = en.typeDef && en.typeDef.flies;
	return {
		x: en.x + en.w/2 - rW/2,
		y: isFlying ? (en.y + en.h/2 - rH/2) : (en.y + en.h - rH),
		w: rW, h: rH
	};
}

// Raid telegraphs/indicators
const raidIndicators = [];

// Raid warning text display
function showRaidWarning(text, duration){
	if(!IS_RAID) return;
	const el = document.getElementById('dungeonName');
	const orig = el.innerHTML;
	el.innerHTML = '<span style="color:#ff2244;text-shadow:0 0 10px #ff0044;">' + text + '</span>';
	setTimeout(() => { el.innerHTML = orig; }, duration || 1500);
}

// Add raid indicator (telegraph zones)
function addRaidIndicator(x, y, w, h, duration, color, type){
	if(!IS_RAID) return;
	raidIndicators.push({x, y, w, h, age:0, maxAge:duration, color:color||'#ff2244', type:type||'rect'});
}

		aoeRadius: opts.aoeRadius || 0,
		aoeMax: opts.aoeMax || 0,
		aoeTimer: 0,
		homing: opts.homing || false,
		homingStrength: opts.homingStrength || 0.05,

// Spawn dungeon enemies (only in dungeon mode)
if(IS_DUNGEON && dungeon){
	for(const def of dungeon.enemies){
		const t = ENEMY_TYPES[def.type];
		if(!t) continue;
		// Boss enemies don't spawn at load — they spawn after the cutscene
		if(t.isBoss){ bossSpawnDef = def; continue; }
		// Find ground below spawn position
		let groundY = def.y;
		if(!t.flies){
			for(let row = Math.floor(def.y / TILE); row < MAP_ROWS; row++){
				if(isSolid(Math.floor(def.x / TILE), row)){
					groundY = row * TILE - t.h;
					break;
				}
			}
		}
		enemies.push({
			type: def.type,
			typeDef: t,
			x: def.x, y: groundY,
			w: Math.round(t.w * DIFF_SIZE_MULT), h: Math.round(t.h * DIFF_SIZE_MULT),
			vx: 0, vy: 0,
			hp: Math.round(t.hp * DIFF_HP_MULT), maxHp: Math.round(t.hp * DIFF_HP_MULT),
			facing: 1,
			patrol: def.patrol,
			patrolDir: 1,
			state: 'patrol',  // patrol, alert, attack, dead
			alertTimer: 0,
			spellCooldowns: t.spells.map(s => Math.random() * s.cooldown * DIFF_CD_MULT * 0.5 | 0),
			currentSpell: 0,
			flash: 0,
			dots: [],
			stunTimer: 0,
			slowTimer: 0,
			animTimer: 0,
			attackAnimTimer: 0,
			dead: false,
			deathTimer: 0,
			// flying enemies
			baseY: groundY,
			flyOffset: 0,
			// charge state (for imp charge, serpent dash, etc.)
			charging: false,
			chargeVx: 0, chargeVy: 0, chargeTimer: 0,
			chargeCastDone: false,
			// boss state
			bossPhase: 1,
			bossPhaseTransition: 0,
			bossCharging: false,
		});
	}
}

/* =============================================================
   COLLISION HELPERS
   ============================================================= */
function rectRect(a, b){
	return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}
function circRect(cx,cy,cr,rx,ry,rw,rh){
	const nx=Math.max(rx,Math.min(cx,rx+rw));
	const ny=Math.max(ry,Math.min(cy,ry+rh));
	return(cx-nx)**2+(cy-ny)**2<=cr*cr;
}
function dist(x1,y1,x2,y2){return Math.sqrt((x2-x1)**2+(y2-y1)**2);}

/* Get all hittable targets — enemies for dungeon, dummies for sandbox, raidBoss for raid, slimes+dummies for openworld */
function getAllTargets(){
	if(IS_SANDBOX) return dummies;
	if(IS_RAID && raidBoss && !raidBoss.dead) return [raidBoss];
	if(IS_OPENWORLD) return [...dummies, ...slimes.filter(s => !s.dead)];
	return enemies;
}

/* Get visual hitbox for target (for spray-based hit detection, simplified for dummies/raidBoss) */
function getTargetHitRect(target){
	if(IS_SANDBOX){
		return { x: target.x, y: target.y, w: target.w, h: target.h };
	}
	if(IS_RAID && target === raidBoss){
		return { x: target.x, y: target.y, w: target.w, h: target.h };
	}
	if(IS_OPENWORLD){
		return { x: target.x, y: target.y, w: target.w, h: target.h };
	}
	return getVisualHitRect(target);
}

/* Tilemap collision for an entity — stepped to prevent tunneling */
function moveEntityTile(ent){
	// Open-sky modes (sandbox/raid/openworld) use platform collision instead of tilemap
	if(IS_SANDBOX || IS_RAID || IS_OPENWORLD){
		moveEntitySandbox(ent);
		return;
	}
	// Horizontal — step in increments to prevent phasing through walls
	const maxStep = TILE - 1; // Max pixels per step to prevent skipping tiles
	let remainX = ent.vx;
	while(Math.abs(remainX) > 0.01){
		const stepX = Math.abs(remainX) > maxStep ? Math.sign(remainX) * maxStep : remainX;
		ent.x += stepX;
		remainX -= stepX;
		const left = Math.floor(ent.x / TILE);
		const right = Math.floor((ent.x + ent.w - 0.1) / TILE);
		const top = Math.floor(ent.y / TILE);
		const bottom = Math.floor((ent.y + ent.h - 0.1) / TILE);
		let hitWall = false;
		for(let r = top; r <= bottom; r++){
			for(let c = left; c <= right; c++){
				if(isSolid(c, r)){
					if(ent.vx > 0) ent.x = c * TILE - ent.w;
					else if(ent.vx < 0) ent.x = (c + 1) * TILE;
					ent.vx = 0;
					if(ent.launchVx) ent.launchVx = 0; // Kill launch on wall hit
					hitWall = true;
				}
			}
		}
		if(hitWall) break;
	}
	// Vertical — step in increments too
	let remainY = ent.vy;
	ent.onGround = false;
	while(Math.abs(remainY) > 0.01){
		const stepY = Math.abs(remainY) > maxStep ? Math.sign(remainY) * maxStep : remainY;
		ent.y += stepY;
		remainY -= stepY;
		const left2 = Math.floor(ent.x / TILE);
		const right2 = Math.floor((ent.x + ent.w - 0.1) / TILE);
		const top2 = Math.floor(ent.y / TILE);
		const bottom2 = Math.floor((ent.y + ent.h - 0.1) / TILE);
		let hitWallY = false;
		for(let r = top2; r <= bottom2; r++){
			for(let c = left2; c <= right2; c++){
				if(isSolid(c, r)){
					if(ent.vy > 0){ ent.y = r * TILE - ent.h; ent.onGround = true; }
					else if(ent.vy < 0) ent.y = (r + 1) * TILE;
					ent.vy = 0;
					hitWallY = true;
				}
			}
		}
		if(hitWallY) break;
	}
}

/* Open-sky mode movement (sandbox/raid) - uses platforms instead of tilemap */
function moveEntitySandbox(ent){
	// Horizontal movement with platform collision
	const prevX = ent.x;
	ent.x += ent.vx;
	
	// Clamp to world boundaries
	if(ent.x < 0){ ent.x = 0; ent.vx = 0; }
	if(ent.x + ent.w > WORLD_W){ ent.x = WORLD_W - ent.w; ent.vx = 0; }
	
	// Horizontal platform collision (solid platforms)
	for(const plat of sandboxPlatforms){
		if(plat.y === GROUND_Y) continue; // Skip ground platform
		if(ent.x + ent.w > plat.x && ent.x < plat.x + plat.w && 
		   ent.y + ent.h > plat.y && ent.y < plat.y + plat.h){
			// Resolve horizontal collision
			if(ent.vx > 0){ ent.x = plat.x - ent.w; }
			else if(ent.vx < 0){ ent.x = plat.x + plat.w; }
			ent.vx = 0;
			if(ent.launchVx) ent.launchVx = 0;
		}
	}
	
	// Vertical movement
	const prevY = ent.y;
	ent.y += ent.vy;
	ent.onGround = false;
	
	// Ground collision
	if(ent.y + ent.h >= GROUND_Y){
		ent.y = GROUND_Y - ent.h;
		ent.vy = 0;
		ent.onGround = true;
	}
	
	// Platform collision (solid from all sides)
	for(const plat of sandboxPlatforms){
		if(plat.y === GROUND_Y) continue; // Skip ground platform
		if(ent.x + ent.w > plat.x && ent.x < plat.x + plat.w && 
		   ent.y + ent.h > plat.y && ent.y < plat.y + plat.h){
			// Determine which side we collided from
			const fromTop = prevY + ent.h <= plat.y;
			const fromBottom = prevY >= plat.y + plat.h;
			if(fromTop && ent.vy >= 0){
				ent.y = plat.y - ent.h;
				ent.vy = 0;
				ent.onGround = true;
			} else if(fromBottom && ent.vy < 0){
				ent.y = plat.y + plat.h;
				ent.vy = 0;
			}
		}
	}
	
	// Ceiling (top of world)
	const ceilY = IS_RAID ? RAID_CONFIG.ceilY : 0;
	if(ent.y < ceilY){ ent.y = ceilY; ent.vy = 0; }
}

/* Check if there's a clear line of sight between two points (no solid tiles in the way) */
function hasLineOfSight(x1,y1,x2,y2){
	const dx=x2-x1, dy=y2-y1;
	const d=Math.sqrt(dx*dx+dy*dy);
	const steps=Math.ceil(d/TILE);
	for(let i=0;i<=steps;i++){
		const t=i/steps;
		const col=Math.floor((x1+dx*t)/TILE);
		const row=Math.floor((y1+dy*t)/TILE);
		if(isSolid(col,row)) return false;
	}
	return true;
}

/* =============================================================
   CAST PLAYER SPELLS (adapted from sandbox)
   ============================================================= */
function castSpell(){
	const spell=playerData.spells[activeSlot];
	if(!spell||!spell.phases.length)return;
	// Block casting from vow-locked spell slots
	if(vowLockedSlots.has(activeSlot))return;
	const controlDiscount=Math.max(0.3,1-stats.magicControl*0.015);
	const _vbCast=getVowBoostsForSlot(activeSlot);
	const vowManaCostMult=Math.max(0.1,1-(_vbCast.manaCost||0)*0.05);
	const vowGlobalManaMult=Math.max(0.1,1-vowManaEfficiency*0.025); // global mana efficiency: -2.5% per point
	const vowCdMult=Math.max(0.1,1-(_vbCast.cooldown||0)*0.08);
	const cost=Math.round(calcSpellCost(spell)*controlDiscount*vowManaCostMult*vowGlobalManaMult);
	const req=calcSpellCtrl(spell);
	const isUlt=(activeSlot===9&&spell.isUltimate);

	const rawCost=calcSpellCost(spell);
	const avgPower=spell.phases.reduce((s,p)=>s+(p.power||1),0)/spell.phases.length;
	if(isUlt){
		// Ultimate: costs totalMana instead of regular mana — starts charge-up
		const ultCost=cost*10;
		// Provide feedback for failed ultimate casts
		if(spellCooldowns[activeSlot]>0) return; // silently fail - on cooldown is obvious
		if(stats.magicControl<req){
			dmgNumbers.push({x:player.x+player.w/2,y:player.y-30,text:`Need ${req} Magic Control (have ${stats.magicControl})`,age:0,color:'#ff4444'});
			return;
		}
		if(totalMana<ultCost){
			dmgNumbers.push({x:player.x+player.w/2,y:player.y-30,text:`Need ${ultCost} Total Mana`,age:0,color:'#ff4444'});
			return;
		}
		if(player.ultCharging) return; // already charging
		totalMana-=ultCost;
		updateTotalManaHUD();
		const cd=Math.round((24+Math.round(avgPower*16)+Math.round(rawCost*0.15)+player.ultChargeDuration)*vowCdMult);
		spellCooldowns[activeSlot]=cd; spellMaxCooldowns[activeSlot]=cd;
		// Begin 3-second charge-up — spell fires when charge completes
		player.ultCharging=true;
		player.ultChargeTimer=0;
		player.ultChargeColor=spell.phases[0]?.color||'#ffaa00';
		player.ultChargeSpell=spell;
		player.ultChargeFacing=player.facing;
		player.ultChargeSlot=activeSlot;
	} else {
		if(stats.magicControl<req||mana<cost||spellCooldowns[activeSlot]>0)return;
		mana-=cost;
		player.hasCast=true; // Tutorial tracking
		// accumulate total mana from normal spell casts
		totalMana+=cost;
		updateTotalManaHUD();
		const cd=Math.round((8+Math.round(avgPower*12)+Math.round(rawCost*0.12))*vowCdMult);
		spellCooldowns[activeSlot]=cd; spellMaxCooldowns[activeSlot]=cd;
		player.castTimer=12; player.castColor=spell.phases[0]?.color||'#4488ff';
		const castId=nextCastId++;spellHitCounts[castId]=0;
		spawnPhase(spell,0,player.x+player.w/2,player.y+player.h/2-6,player.facing,undefined,undefined,castId,activeSlot);
	}
}

function spawnPhase(spell,phaseIdx,originX,originY,facing,dmgMult,isUltimate,castId,sourceSlot){
	if(phaseIdx>=spell.phases.length)return;
	let totalProj=1;
	for(const p of spell.phases)totalProj*=(p.behavior==='aroundSelf'?(p.aroundSelfCount||4):(p.count||1));
	if(totalProj>1000)return;
	const ph=spell.phases[phaseIdx];
	
	// DOMAIN EXPANSION: spawn domain zone instead of projectiles
	if(ph.behavior==='domain' && phaseIdx===0){
		// Create massive domain - larger than screen (1.5x canvas size)
		const domainW = canvas.width * 1.8;
		const domainH = canvas.height * 1.8;
		// Generate initial particles
		const particles = [];
		for(let i=0;i<60;i++){
			particles.push({
				x: Math.random() * domainW - domainW/2,
				y: Math.random() * domainH - domainH/2,
				vx: (Math.random()-0.5)*2,
				vy: (Math.random()-0.5)*2,
				size: 5 + Math.random()*15,
				alpha: 0.3 + Math.random()*0.5
			});
		}
		// Hide platforms inside domain area
		const hiddenPlats = [];
		for(let pi = sandboxPlatforms.length - 1; pi >= 0; pi--){
			const plat = sandboxPlatforms[pi];
			if(plat.y === GROUND_Y) continue; // Don't hide ground
			const platCx = plat.x + plat.w/2, platCy = plat.y + plat.h/2;
			const dx = Math.abs(platCx - originX), dy = Math.abs(platCy - originY);
			if(dx < domainW/2 && dy < domainH/2){
				hiddenPlats.push(sandboxPlatforms.splice(pi, 1)[0]);
			}
		}
		activeDomain = {
			x: originX,
			y: originY,
			w: domainW,
			h: domainH,
			element: ph.domainElement || 'burn',
			color: ph.domainColor || ph.color || '#ff4400',
			pattern: ph.domainPattern || 'flames',
			age: 0,
			maxAge: 60 * FPS, // Always 1 minute duration
			spell: spell,
			castId: castId,
			sourceSlot: sourceSlot,
			phaseTriggered: false,
			particles: particles,
			isUltimate: !!(isUltimate || spell.isUltimate),
			hiddenPlatforms: hiddenPlats, // Store hidden platforms to restore later
		};
		dmgNumbers.push({x:player.x+player.w/2,y:player.y-40,text:'⚡ DOMAIN EXPANSION ⚡',age:0,color:activeDomain.color});
		// Screen shake on domain activation
		shakeScreen(25, 45);
		// Big particle burst
		for(let v=0;v<50;v++) particles.push({x:originX,y:originY,vx:(Math.random()-0.5)*12,vy:(Math.random()-0.5)*12,life:50+Math.random()*30,color:activeDomain.color});
		return; // Domain doesn't create normal projectiles
	}
	
	// Resolve 'same' shape: inherit shape from previous phase
	const resolvedShape=(ph.shape==='same'&&phaseIdx>0)?spell.phases[phaseIdx-1].shape:(ph.shape||'missile');
	const count=ph.behavior==='aroundSelf'?(ph.aroundSelfCount||4):(ph.count||1);
	
	// Check if this is a domain spell's subsequent phase (forces homing, spawns from edges)
	const isDomainSubPhase = activeDomain && activeDomain.spell === spell && phaseIdx > 0;
	// Force homing behavior for domain subsequent phases
	const effectiveBehavior = isDomainSubPhase ? 'homing' : (ph.behavior || 'straight');
	
	// Cursor-aimed behaviors: compute angle from player to mouse cursor
	const cursorAimBehaviors = new Set(['straight','boomerang','lob','zigzag','teleport']);
	let baseAngle;
	if(cursorAimBehaviors.has(effectiveBehavior)){
		const worldMX = mouseScreenX + camera.x;
		const worldMY = mouseScreenY + camera.y;
		const pcx = originX, pcy = originY;
		baseAngle = Math.atan2(worldMY - pcy, worldMX - pcx);
	} else {
		baseAngle = facing===1?0:Math.PI;
	}
	const powerMult=dmgMult||1;
	const selfBehaviors=['underfoot','selfCast','aroundSelf','stationary'];
	const selfPowerBonus=ph.behavior==='stationary'?2.0:selfBehaviors.includes(ph.behavior)?1.0:0;
	const ultFlag=!!(isUltimate||spell.isUltimate);
	// Vow boosts (per-spell-slot)
	const vb=getVowBoostsForSlot(sourceSlot!=null?sourceSlot:-1);
	const vowPowerMult=1+vb.power*0.12;
	const vowSizeMult=1+vb.size*0.1;
	const vowSpeedMult=1+vb.speed*0.1;
	const vowCountBonus=vb.count||0;
	const vowDurMult=1+vb.duration*0.1;
	const vowSizeBonus=vb._sizeBonus?1.5:1;
	// Damage release size bonus
	const releaseSizeMult=(ph.effects&&ph.effects.includes('damageRelease')&&damageStored>0)?(1+damageStored/1000):1;

	const effectiveCount=Math.min(count+vowCountBonus,20);
	for(let i=0;i<effectiveCount;i++){
		let spreadAngle=0;
		if(effectiveCount>1){const sr=(ph.spread||0)*Math.PI/180;spreadAngle=((i/(effectiveCount-1))-0.5)*sr;}
		const angle=baseAngle+spreadAngle;
		const spd=(ph.speed||1)*7*vowSpeedMult;
		const proj={
			spell,phaseIdx,phase:ph,
			x:originX+facing*16,y:originY,
			vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,
			facing,age:0,maxAge:(ph.duration||1)*FPS*vowDurMult,
			width:(ph.width||1)*10*vowSizeMult*vowSizeBonus*releaseSizeMult,height:(ph.height||1)*10*vowSizeMult*vowSizeBonus*releaseSizeMult,
			power:((ph.power||1)/effectiveCount+0.05+selfPowerBonus)*(1+stats.magicPower*0.08)*powerMult*vowPowerMult,
			color:ph.color||'#4488ff',trail:ph.trail||'none',
			shape:vowLockedShapes.has(resolvedShape)?'missile':resolvedShape,behavior:effectiveBehavior,
			effects:(ph.effects||[]).filter(fx=>!vowLockedEffects.has(fx)),trailParts:[],
			orbitAngle:i*(Math.PI*2/count),orbitRadius:(ph.orbitRadius||80),
			orbitSpeed:(ph.orbitSpeed||3),orbitDur:(ph.orbitDuration||1.5)*FPS,
			orbitOriginX:originX,orbitOriginY:originY,
			startX:originX+facing*16,startY:originY,
			beamLen:0,beamAngle:angle,
			chainHits:0,chainMax:3,hasHit:false,phaseTriggered:false,
			hitTargets:new Set(),
			aimAngle:angle,
			timedReleaseDelay:(ph.timedReleaseDelay||0.5)*FPS,timedReleaseTriggered:false,
			phaseForkDelay:(ph.phaseForkDelay||1)*FPS,phaseForkRepeats:ph.phaseForkRepeats||1,
			phaseForkCount:0,phaseForkNextAge:(ph.phaseForkDelay||1)*FPS,
			isSolidPlatform:false,
			isUltimate:ultFlag,
			castId:castId!=null?castId:-1,
			sourceSlot:sourceSlot!=null?sourceSlot:-1,
			randomDelay:(ph.effects&&ph.effects.includes('randomDelay'))?Math.round(Math.random()*(ph.randomDelayMax||0.5)*FPS):0,
			afterHitEffect:ph.afterHitEffect||'none',
			polygonSides:ph.polygonSides||6,
			_held:!!ph.holdDown,
			_holdSavedVx:0, _holdSavedVy:0,
			_fromDomain:isDomainSubPhase,
		};
		// Cap power for domain sub-phases (max power 10 worth of damage)
		if(isDomainSubPhase){
			const maxDomainPower = 10 * (1+stats.magicPower*0.08) * powerMult * vowPowerMult;
			proj.power = Math.min(proj.power, maxDomainPower);
		}
		// Domain sub-phases: spawn from edges of domain
		if(isDomainSubPhase && activeDomain){
			// Spawn from random position anywhere in the domain
			const domX = activeDomain.x, domY = activeDomain.y;
			const halfW = activeDomain.w/2, halfH = activeDomain.h/2;
			// Random position within domain bounds (each projectile gets unique position)
			proj.x = domX + (Math.random() - 0.5) * halfW * 1.6;
			proj.y = domY + (Math.random() - 0.5) * halfH * 1.6;
			proj.startX = proj.x; proj.startY = proj.y;
			// For homing, velocity will be set by the homing logic each frame
			proj.vx = 0; proj.vy = 0;
		}
		if(resolvedShape==='solidify'){proj.isSolidPlatform=true;proj.vx=0;proj.vy=0;}
		if(effectiveBehavior==='rain'){const s2=200*(ph.width||1);proj.x=originX+(i-(count-1)/2)*(s2/Math.max(count-1,1));proj.y=originY-(ph.rainHeight||150);const rainAngle=Math.PI/2+spreadAngle;proj.vx=Math.cos(rainAngle)*spd*0.8;proj.vy=Math.sin(rainAngle)*spd*0.8;proj.startX=proj.x;proj.startY=proj.y;proj.facing=1;proj.beamAngle=rainAngle;}
		if(effectiveBehavior==='barrage'){const s2=200*(ph.height||1);proj.x=originX+facing*120;proj.y=originY+(i-(count-1)/2)*(s2/Math.max(count-1,1));const barrageAngle=(facing===1?0:Math.PI)+spreadAngle;proj.vx=Math.cos(barrageAngle)*spd*0.8;proj.vy=Math.sin(barrageAngle)*spd*0.8;proj.startX=proj.x;proj.startY=proj.y;proj.beamAngle=barrageAngle;}
		if(effectiveBehavior==='stationary'){proj.vx=0;proj.vy=0;}
		if(effectiveBehavior==='groundSurge'){proj.vy=0;proj.vx=facing*spd;}
		if(effectiveBehavior==='underfoot'){proj.x=player.x+player.w/2;proj.y=player.y+player.h+4;proj.vx=0;proj.vy=0;}
		if(effectiveBehavior==='selfCast'){proj.x=player.x+player.w/2;proj.y=player.y+player.h/2;proj.vx=0;proj.vy=0;}
		if(effectiveBehavior==='aroundSelf'){const radius=ph.aroundSelfRadius||50;const sa=(i/count)*Math.PI*2;proj.x=player.x+player.w/2+Math.cos(sa)*radius;proj.y=player.y+player.h/2+Math.sin(sa)*radius;proj.vx=0;proj.vy=0;}
		if(effectiveBehavior==='ground'){
			// Ground: spawns at nearest enemy within radius (if auto-lock on), +40% damage bonus
			const groundRadius=ph.groundRadius||200;
			let tgt=null;
			if(ph.groundAutoLock!==false){
				let td=groundRadius;
				for(const en of enemies){if(en.dead)continue;const dd=Math.hypot(en.x+en.w/2-player.x-player.w/2,en.y+en.h/2-player.y-player.h/2);if(dd<td){td=dd;tgt=en;}}
			}
			if(tgt){proj.x=tgt.x+tgt.w/2;proj.y=tgt.y+tgt.h+4;}else{proj.x=player.x+player.w/2;proj.y=player.y+player.h+4;}
			proj.vx=0;proj.vy=-((ph.speed||1)*2);proj.maxAge*=3;proj.power*=1.4;proj._groundTarget=tgt;
		}
		// Hold Down: keep projectile at player, save velocity for release
		if(proj._held){
			proj._holdSavedVx=proj.vx; proj._holdSavedVy=proj.vy;
			proj.vx=0; proj.vy=0;
		}
		// Vortex shape: slow-moving projectile that does DoT and pulls enemies in
		if(proj.shape==='vortex'){
			const spdMult=0.35; // much slower than normal
			proj.vx*=spdMult;proj.vy*=spdMult;
			proj.maxAge*=2*(ph.vortexDuration||1); // lasts longer, customizable
			proj._vortexDotTimer=0;
		}
		// Summon shape: spawn a minion instead of a projectile
		if(proj.shape==='summon'){
			playerMinions.push({
				x:proj.x, y:proj.y, w:20, h:20,
				vx:0, vy:0,
				color:proj.color,
				spell:spell, phaseIdx:phaseIdx,
				sourceSlot:proj.sourceSlot,
				castId:proj.castId,
				facing:proj.facing,
				isUltimate:proj.isUltimate,
				power:proj.power,
				hp:40+(ph.summonHealth||0)*10, maxHp:40+(ph.summonHealth||0)*10,
				age:0, maxAge:proj.maxAge*2,
				fireTimer:0, fireCooldown:Math.round(FPS*2.5),
				target:null, animTimer:0,
				detectRange:600+(ph.summonRange||0)*100,
				moveSpeed:2.5+(ph.summonSpeed||0)*0.5,
				summonClose:!!ph.summonClose,
			});
			continue;
		}
		projectiles.push(proj);
	}
}

function morphProjectile(proj,phaseIdx,dmgMult){
	const spell=proj.spell;
	if(phaseIdx>=spell.phases.length)return;
	const ph=spell.phases[phaseIdx];
	// Resolve 'same' shape: inherit from previous phase
	const resolvedShape=(ph.shape==='same'&&phaseIdx>0)?spell.phases[phaseIdx-1].shape:(ph.shape||'missile');
	const count=ph.behavior==='aroundSelf'?(ph.aroundSelfCount||4):(ph.count||1);
	const powerMult=dmgMult||1;
	const selfBehaviors=['underfoot','selfCast','aroundSelf','stationary'];
	const selfPB=ph.behavior==='stationary'?2.0:selfBehaviors.includes(ph.behavior)?1.0:0;
	const _vb=getVowBoostsForSlot(proj.sourceSlot!=null?proj.sourceSlot:-1);
	const spd=(ph.speed||1)*7*(1+_vb.speed*0.1);
	const vowSzM=1+_vb.size*0.1;
	const vowPwM=1+_vb.power*0.12;
	const vowDrM=1+_vb.duration*0.1;
	const vowSzB=_vb._sizeBonus?1.5:1;
	const ox=proj.x,oy=proj.y,of=proj.facing;
	function applyPh(p,si){
		const ba=of===1?0:Math.PI;let sa=0;
		if(count>1){const sr=(ph.spread||0)*Math.PI/180;sa=((si/(count-1))-0.5)*sr;}
		const angle=ba+sa;
		p.phaseIdx=phaseIdx;p.phase=ph;p.age=0;p.maxAge=(ph.duration||1)*FPS*vowDrM;
		p.width=(ph.width||1)*10*vowSzM*vowSzB;p.height=(ph.height||1)*10*vowSzM*vowSzB;
		p.power=((ph.power||1)/count+0.05+selfPB)*(1+stats.magicPower*0.08)*powerMult*vowPwM;
		p.color=ph.color||'#4488ff';p.trail=ph.trail||'none';
		p.shape=resolvedShape;p.behavior=ph.behavior||'straight';
		p.effects=ph.effects||[];p.trailParts=[];p.hasHit=false;p.phaseTriggered=false;
		p.hitTargets=new Set();p.startX=ox;p.startY=oy;
		p.beamLen=0;p.beamAngle=angle;p.chainHits=0;p.chainMax=3;
		p.timedReleaseDelay=(ph.timedReleaseDelay||0.5)*FPS;p.timedReleaseTriggered=false;
		p.phaseForkDelay=(ph.phaseForkDelay||1)*FPS;p.phaseForkRepeats=ph.phaseForkRepeats||1;
		p.phaseForkCount=0;p.phaseForkNextAge=(ph.phaseForkDelay||1)*FPS;p.isSolidPlatform=false;
		p.isUltimate=proj.isUltimate||false;
		p.afterHitEffect=ph.afterHitEffect||'none';p.polygonSides=ph.polygonSides||6;
		p.vx=Math.cos(angle)*spd;p.vy=Math.sin(angle)*spd;
		if(resolvedShape==='solidify'){p.isSolidPlatform=true;p.vx=0;p.vy=0;}
		if(ph.behavior==='rain'){p.vx=0;p.vy=spd*0.8;p.startX=ox;p.startY=oy;p.beamAngle=Math.PI/2;}
		if(ph.behavior==='barrage'){const s2=200*(ph.height||1);p.x=ox+of*120;p.y=oy+(si-(count-1)/2)*(s2/Math.max(count-1,1));p.vx=of*spd*0.8;p.vy=0;p.startX=p.x;p.startY=p.y;p.beamAngle=of===1?0:Math.PI;}
		if(ph.behavior==='stationary'){p.vx=0;p.vy=0;}
		if(ph.behavior==='groundSurge'){p.vy=0;p.vx=of*spd;}
		if(ph.behavior==='underfoot'){p.x=ox;p.y=oy+4;p.vx=0;p.vy=0;}
		if(ph.behavior==='selfCast'){p.x=ox;p.y=oy;p.vx=0;p.vy=0;}
		if(ph.behavior==='aroundSelf'){const radius=ph.aroundSelfRadius||50;const sa2=(si/count)*Math.PI*2;p.x=ox+Math.cos(sa2)*radius;p.y=oy+Math.sin(sa2)*radius;p.vx=0;p.vy=0;}
		if(ph.behavior==='orbit'){p.orbitOriginX=ox;p.orbitOriginY=oy;p.orbitAngle=si*(Math.PI*2/count);p.orbitRadius=ph.orbitRadius||80;p.orbitSpeed=ph.orbitSpeed||3;p.orbitDur=(ph.orbitDuration||1.5)*FPS;}
		if(ph.behavior==='ground'){
			const groundRadius=ph.groundRadius||200;
			let tgt=null;
			if(ph.groundAutoLock!==false){
				let td=groundRadius;
				for(const en of enemies){if(en.dead)continue;const dd=Math.hypot(en.x+en.w/2-ox,en.y+en.h/2-oy);if(dd<td){td=dd;tgt=en;}}
			}
			if(tgt){p.x=tgt.x+tgt.w/2;p.y=tgt.y+tgt.h+4;}else{p.x=ox;p.y=oy+4;}
			p.vx=0;p.vy=-((ph.speed||1)*2);p.maxAge*=3;p.power*=1.4;p._groundTarget=tgt;
		}
	}
	applyPh(proj,0);
	for(let i=1;i<count;i++){
		const clone={spell,phaseIdx,phase:ph,x:ox,y:oy,facing:of,orbitAngle:0,orbitRadius:80,orbitSpeed:3,orbitDur:90,orbitOriginX:ox,orbitOriginY:oy,trailParts:[],castId:proj.castId!=null?proj.castId:-1};
		applyPh(clone,i);projectiles.push(clone);
	}
}

	for(let i=0;i<6;i++){
		setTimeout(()=>{
			if(en.dead)return;
			const rx=cx+(Math.random()-0.5)*700;
			spawnEnemyProj(rx,cy+150,0,-8,{
				color:'#c4a032',color2:'#8b7340',power:35,width:18,height:50,
				shape:'circle',maxAge:80,
			});
		},1500+i*150);
	}
	// Wave 3: summon earth minions
	setTimeout(()=>{
		if(en.dead)return;
		for(let i=0;i<3;i++){
			const sx=cx+(i-1)*200;
			const sy=cy+100;
			// Spawn rock golem enemies
			const t=ENEMY_TYPES.rockGolem;
			if(t){
				let groundY=sy;
				for(let row=Math.floor(sy/TILE);row<MAP_ROWS;row++){
					if(isSolid(Math.floor(sx/TILE),row)){groundY=row*TILE-t.h;break;}
				}
				enemies.push({
					type:'rockGolem',typeDef:t,
					x:sx,y:groundY,w:t.w,h:t.h,
					vx:0,vy:0,hp:t.hp*0.6,maxHp:t.hp*0.6,facing:i<1?1:-1,
					patrol:[sx-200,sx+200],patrolDir:1,
					state:'alert',alertTimer:0,
					spellCooldowns:t.spells.map(s=>Math.random()*s.cooldown*0.5|0),
					currentSpell:0,flash:0,dots:[],
					stunTimer:0,slowTimer:0,animTimer:0,attackAnimTimer:0,
					dead:false,deathTimer:0,
					baseY:groundY,flyOffset:0,
					charging:false,chargeVx:0,chargeVy:0,chargeTimer:0,chargeCastDone:false,
				});
				for(let v=0;v<8;v++) particles.push({x:sx,y:groundY,vx:(Math.random()-0.5)*5,vy:-2-Math.random()*4,life:20+Math.random()*15,color:{r:100+Math.random()*40|0,g:80+Math.random()*30|0,b:20}});
			}
		}
		dmgNumbers.push({x:cx,y:cy-50,text:'🪨 Minions Summoned!',age:0,color:'#c4a032'});
	},2200);
}
