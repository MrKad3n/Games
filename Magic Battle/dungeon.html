/* =============================================================
   UPDATE PLAYER PROJECTILES (hits enemies)
   ============================================================= */
function updateProjectiles(){
	for(let i=projectiles.length-1;i>=0;i--){
		const p=projectiles[i];
		if(p.randomDelay>0){p.randomDelay--;continue;}
		// Hold Down: keep at player, freeze age, but still check hits
		if(p._held){
			p.x=player.x+player.w/2+player.facing*20;
			p.y=player.y+player.h/2-6;
			p.startX=p.x; p.startY=p.y;
			// still trail + hit check below, but don't age or move
			p.trailParts.push({x:p.x,y:p.y,age:0});
			if(p.trailParts.length>MAX_TRAIL)p.trailParts.shift();
			for(const tp of p.trailParts)tp.age++;
			// skip to hit detection (below behavior movement)
		} else {
		p.age++;
		p.trailParts.push({x:p.x,y:p.y,age:0});
		if(p.trailParts.length>MAX_TRAIL)p.trailParts.shift();
		for(const tp of p.trailParts)tp.age++;

		/* behavior movement */
		switch(p.behavior){
			case'straight':break;
			case'lob':p.vy+=0.25;break;
			case'homing':{
				// Find closest target from all enemy types: enemies, dummies, slimes, raidBoss
				let cl=null,cd2=Infinity;
				for(const e of enemies){if(e.dead)continue;const dd=dist(p.x,p.y,e.x+e.w/2,e.y+e.h/2);if(dd<cd2){cd2=dd;cl=e;}}
				for(const d of dummies){const dd=dist(p.x,p.y,d.x+d.w/2,d.y+d.h/2);if(dd<cd2){cd2=dd;cl=d;}}
				for(const s of slimes){if(s.dead)continue;const dd=dist(p.x,p.y,s.x+s.w/2,s.y+s.h/2);if(dd<cd2){cd2=dd;cl=s;}}
				if(raidBoss&&!raidBoss.dead){const dd=dist(p.x,p.y,raidBoss.x+raidBoss.w/2,raidBoss.y+raidBoss.h/2);if(dd<cd2){cd2=dd;cl=raidBoss;}}
				if(cl){
					// Domain projectiles start with 0 velocity - give them speed first
					const curSpd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
					const spd=curSpd>0.5?curSpd:(p.phase.speed||1)*7;
					if(p.shape==='beam'){const des=Math.atan2(cl.y+cl.h/2-p.startY,cl.x+cl.w/2-p.startX);let diff=des-p.beamAngle;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;p.beamAngle+=Math.min(0.08,Math.abs(diff))*Math.sign(diff);}
					else{const des=Math.atan2(cl.y+cl.h/2-p.y,cl.x+cl.w/2-p.x);const cur=Math.atan2(p.vy,p.vx);let diff=des-cur;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;const turn=Math.min(0.12,Math.abs(diff))*Math.sign(diff);const na=cur+turn;p.vx=Math.cos(na)*spd;p.vy=Math.sin(na)*spd;}
				}break;
			}
			case'boomerang':{const prog=p.age/p.maxAge;if(prog>0.45){if(!p.returning){p.returning=true;p.hitTargets.clear();}const tx=player.x+player.w/2,ty=player.y+player.h/2;const dx2=tx-p.x,dy2=ty-p.y;const d2=Math.sqrt(dx2*dx2+dy2*dy2)||1;const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);p.vx=(dx2/d2)*spd*1.02;p.vy=(dy2/d2)*spd*1.02;}break;}
			case'groundSurge':{
				p.vy+=0.6;
				if(IS_DUNGEON){
					const fc=Math.floor(p.x/TILE);const fr=Math.floor((p.y+4)/TILE);
					if(isSolid(fc,fr)){p.y=fr*TILE-4;p.vy=-1.5;}
				}else{
					// Open-sky modes: check GROUND_Y and platforms
					if(p.y+4>=GROUND_Y){p.y=GROUND_Y-4;p.vy=-1.5;}
					else{
						for(const plat of sandboxPlatforms){
							if(plat.y===GROUND_Y)continue;
							if(p.x>=plat.x&&p.x<=plat.x+plat.w&&p.y+4>=plat.y&&p.y+4<=plat.y+10){
								p.y=plat.y-4;p.vy=-1.5;break;
							}
						}
					}
				}
				break;
			}
			case'orbit':{
				if(p.age<p.orbitDur){p.orbitAngle+=p.orbitSpeed*0.05;p.orbitOriginX+=(player.x+player.w/2-p.orbitOriginX)*0.15;p.orbitOriginY+=(player.y+player.h/2-6-p.orbitOriginY)*0.15;p.x=p.orbitOriginX+Math.cos(p.orbitAngle)*p.orbitRadius;p.y=p.orbitOriginY+Math.sin(p.orbitAngle)*p.orbitRadius*0.6;p.vx=0;p.vy=0;
				}else if(p.age===Math.ceil(p.orbitDur)){
					// Find target from all enemy types
					let tgt=null,td=Infinity;
					for(const e of enemies){if(e.dead)continue;const dd=dist(p.x,p.y,e.x+e.w/2,e.y+e.h/2);if(dd<td){td=dd;tgt=e;}}
					for(const d of dummies){const dd=dist(p.x,p.y,d.x+d.w/2,d.y+d.h/2);if(dd<td){td=dd;tgt=d;}}
					for(const s of slimes){if(s.dead)continue;const dd=dist(p.x,p.y,s.x+s.w/2,s.y+s.h/2);if(dd<td){td=dd;tgt=s;}}
					if(raidBoss&&!raidBoss.dead){const dd=dist(p.x,p.y,raidBoss.x+raidBoss.w/2,raidBoss.y+raidBoss.h/2);if(dd<td){td=dd;tgt=raidBoss;}}
					const spd2=(p.phase.speed||1)*9;
					if(tgt){const ang2=Math.atan2(tgt.y+tgt.h/2-p.y,tgt.x+tgt.w/2-p.x);p.vx=Math.cos(ang2)*spd2;p.vy=Math.sin(ang2)*spd2;}
					else{p.vx=p.facing*spd2;p.vy=0;}
				}break;
			}
			case'rain':case'barrage':if(p.shape==='cone'){p.vx=0;p.vy=0;p.x=p.startX;p.y=p.startY;}break;
			case'stationary':break;
			case'underfoot':break;
			case'selfCast':break;
			case'aroundSelf':break;
			case'ground':{
				// Stay locked onto target enemy if alive
				if(p._groundTarget&&!p._groundTarget.dead){const tgt=p._groundTarget;p.x=tgt.x+tgt.w/2;}
				const fc2=Math.floor(p.x/TILE);const fr2=Math.floor((p.y-4)/TILE);if(isSolid(fc2,fr2)){p.vy=0;p.y=fr2*TILE+TILE+4;}if(p.vy<0)p.vy*=0.97;if(Math.abs(p.vy)<0.3)p.vy=0;break;
			}
			case'zigzag':{
				const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy)||((p.phase.speed||1)*7);
				const ang=p.aimAngle!=null?p.aimAngle:(p.facing===1?0:Math.PI);
				const perpAng=ang+Math.PI/2;
				const amplitude=40+p.width*0.5;
				const freq=0.09;
				const offset=Math.sin(p.age*freq)*amplitude*freq;
				p.vx=Math.cos(ang)*spd+Math.cos(perpAng)*offset;
				p.vy=Math.sin(ang)*spd+Math.sin(perpAng)*offset;
				break;
			}
			case'teleport':{
				/* Teleport forward every 20 frames along aim direction */
				if(p.age>0&&p.age%20===0){
					const ang=p.aimAngle!=null?p.aimAngle:(p.facing===1?0:Math.PI);
					const jumpDist=60+p.width*0.5;
					p.x+=Math.cos(ang)*jumpDist;
					p.y+=Math.sin(ang)*jumpDist;
					p.vx=0;p.vy=0;
					for(let tp=0;tp<4;tp++) particles.push({x:p.x+(Math.random()-0.5)*10,y:p.y+(Math.random()-0.5)*10,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:15,color:p.color||'#88ccff'});
				} else { p.vx=0;p.vy=0; }
				/* Auto-advance to next phase when near an enemy */
				if(!p.phaseTriggered&&p.phaseIdx+1<p.spell.phases.length){
					// Check all enemy types
					const allTargets = [...enemies.filter(e=>!e.dead), ...dummies, ...slimes.filter(s=>!s.dead)];
					if(raidBoss&&!raidBoss.dead) allTargets.push(raidBoss);
					for(const e of allTargets){
						const dx2=e.x+e.w/2-p.x,dy2=e.y+e.h/2-p.y;
						if(Math.hypot(dx2,dy2)<e.w*0.8+p.width){
							p.phaseTriggered=true;
							if(p.effects.includes('resetProjectiles'))spawnPhase(p.spell,p.phaseIdx+1,p.x,p.y,p.facing,undefined,p.isUltimate,p.castId,p.sourceSlot);
							else morphProjectile(p,p.phaseIdx+1);
							break;
						}
					}
				}
				break;
			}
		}
		if(!(p.behavior==='orbit'&&p.age<p.orbitDur)){p.x+=p.vx;p.y+=p.vy;}
		/* Vortex: slow down gradually (slow-moving projectile) */
		if(p.shape==='vortex'){const slowFactor=0.985;p.vx*=slowFactor;p.vy*=slowFactor;}
		// Beam wall collision: limit beam length to wall distance unless phaseThrough
		if(p.shape==='beam'){
			const maxLen=400*(p.phase.width||1);
			let wantedLen=Math.min(p.beamLen+12,maxLen);
			if(!p.effects.includes('phaseThrough')){
				// Check for wall hits along beam path
				const startX=p.startX,startY=p.startY;
				const dirX=Math.cos(p.beamAngle),dirY=Math.sin(p.beamAngle);
				const steps=Math.ceil(wantedLen/10);
				let hitDist=wantedLen;
				for(let s=1;s<=steps;s++){
					const d=s*10;
					if(d>wantedLen)break;
					const cx=startX+dirX*d,cy=startY+dirY*d;
					let blocked=false;
					if(IS_DUNGEON){
						if(isSolid(Math.floor(cx/TILE),Math.floor(cy/TILE))) blocked=true;
					}else{
						if(cy>=GROUND_Y) blocked=true;
						else{
							for(const plat of sandboxPlatforms){
								if(plat.y===GROUND_Y)continue;
								if(cx>=plat.x&&cx<=plat.x+plat.w&&cy>=plat.y&&cy<=plat.y+plat.h){blocked=true;break;}
							}
						}
					}
					if(blocked){hitDist=d-5;break;}
				}
				wantedLen=Math.min(wantedLen,hitDist);
			}
			p.beamLen=wantedLen;
			p.x=p.startX;p.y=p.startY;
		}
		if(PIERCE_SET.has(p.shape)&&p.shape!=='nova'&&p.age>0&&p.age%60===0)p.hitTargets.clear();
		} // end else (not held)

		/* hit enemies */
		const hitR=Math.max(p.width,p.height)*0.85;
		if((p.shape==='allyOrb'||p.behavior==='selfCast')&&!p.hasHit){
			if(circRect(p.x,p.y,hitR,player.x,player.y,player.w,player.h)){
				// Damage heal on ally orb: convert stored damage to health
				if(p.effects.includes('damageHeal')&&damageStored>0){
					const healAmt=damageStored*0.5;
					health=Math.min(maxHealth,health+healAmt);
					updateHealthHUD();
					dmgNumbers.push({x:player.x+player.w/2,y:player.y-20,text:'+'+Math.round(healAmt)+' 💚',age:0,color:'#44ff88'});
					damageStored=0;updateDamageStoreHUD();
				}
				applyPlayerEffects(p);spawnImpact(p.x,p.y,p.color);if(p.afterHitEffect&&p.afterHitEffect!=='none')spawnAfterHitEffect(p.x,p.y,p.afterHitEffect,p.color,Math.max(p.width,p.height));p.hasHit=true;
				if(!p.phaseTriggered&&p.phase.nextTrigger==='onHit'&&p.phaseIdx+1<p.spell.phases.length){p.phaseTriggered=true;if(p.effects.includes('resetProjectiles'))spawnPhase(p.spell,p.phaseIdx+1,p.x,p.y,p.facing,undefined,p.isUltimate,p.castId,p.sourceSlot);else morphProjectile(p,p.phaseIdx+1);}
			}
		}
		if(p.shape!=='allyOrb'&&p.behavior!=='selfCast'&&!p.isSolidPlatform&&!p.phase.noHit)
		for(const en of getAllTargets()){
			if(en.dead)continue;
			if(p.hitTargets.has(en))continue;
			const hr=getTargetHitRect(en); // use visual sprite bounds for hit detection
			let hit=false;
			if(p.shape==='beam'){
				const bx0=p.startX,by0=p.startY;const endX=bx0+Math.cos(p.beamAngle)*p.beamLen;const endY=by0+Math.sin(p.beamAngle)*p.beamLen;
				const halfH=p.height/2;const steps=Math.max(3,Math.floor(p.beamLen/40));
				for(let s=0;s<=steps;s++){const t=s/steps;const sx=bx0+(endX-bx0)*t;const sy=by0+(endY-by0)*t;if(sx+halfH>hr.x&&sx-halfH<hr.x+hr.w&&sy+halfH>hr.y&&sy-halfH<hr.y+hr.h){hit=true;break;}}
			}else if(p.shape==='nova'||p.shape==='ring'){hit=circRect(p.x,p.y,(p.age/p.maxAge)*p.width*8,hr.x,hr.y,hr.w,hr.h);}
			else if(p.shape==='cone'){const cL=(p.age/p.maxAge)*200*(p.phase.width||1);const cH=cL*0.4*(p.phase.width||1);
				if(p.behavior==='rain'){const dx3=hr.x+hr.w/2-p.x,dy3=hr.y+hr.h/2-p.y;hit=dy3>0&&dy3<cL&&Math.abs(dx3)<cH*(dy3/cL);}
				else{const dx3=hr.x+hr.w/2-p.startX,dy3=hr.y+hr.h/2-p.startY;const along=p.facing===1?dx3:-dx3;hit=along>0&&along<cL&&Math.abs(dy3)<cH*(along/cL);}
			}
			else if(p.shape==='wall'){hit=rectRect({x:p.x-p.width,y:p.y-p.height*3,w:p.width*2,h:p.height*6},hr);}
			else if(p.shape==='solidify'){const sw=p.width*3,sh=p.height*1.5;hit=rectRect({x:p.x-sw/2,y:p.y-sh/2,w:sw,h:sh},hr);}
			else if(p.shape==='spike'){hit=circRect(p.x,p.y,hitR*0.9,hr.x,hr.y,hr.w,hr.h);}
			else if(p.shape==='polygon'){hit=circRect(p.x,p.y,hitR,hr.x,hr.y,hr.w,hr.h);}
			else if(p.shape==='summon'){hit=false;} // summon projectiles spawn minions, don't hit
			else if(p.shape==='meteor'){hit=circRect(p.x,p.y,Math.max(p.width,p.height)*1.5,hr.x,hr.y,hr.w,hr.h);}
			else if(p.shape==='vortex'){const vR2=p.width*3+p.width*2*(p.age/p.maxAge);hit=circRect(p.x,p.y,vR2,hr.x,hr.y,hr.w,hr.h);}
			else{hit=circRect(p.x,p.y,hitR,hr.x,hr.y,hr.w,hr.h);}

			if(hit){
				const homingMult=p.behavior==='homing'?0.5:1;
				const lobMult=p.behavior==='lob'?1.25:1; // lob: 25% damage bonus
				const orbitMult=p.behavior==='orbit'?0.7:1; // orbit: 30% damage reduction
				const rainMult=p.behavior==='rain'?1.5:1; // rain: 50% damage bonus
				const barrageMult=p.behavior==='barrage'?1.35:1; // barrage: 35% damage bonus
				const hitNum=(p.castId>=0&&spellHitCounts[p.castId]!=null)?spellHitCounts[p.castId]++:0;
				const dimMult=1/(1+hitNum*0.08); // lower diminishing returns (was 0.15)
				const beamMult=p.shape==='beam'?0.65:1; // beam: less harsh penalty (was 0.5)
				// Damage release bonus
				const releaseMult=p.effects.includes('damageRelease')?(1+damageStored/500):1;
				// Elemental vow damage bonus (burn/freeze/poison)
				const hasElemental=p.effects.includes('burn')||p.effects.includes('freeze')||p.effects.includes('poison')||p.effects.includes('stun');
				const elemMult=hasElemental?(1+vowElementalDmgBonus*0.07):1;
				// Domain element buff: +50% damage if spell effect matches active domain element
				const domainElemMult = checkDomainElementMatch(p.effects);
				// PhaseThrough: 45% damage reduction for passing through walls (except domain projectiles)
				const phaseMult=(p.effects.includes('phaseThrough') && !p._fromDomain)?0.55:1;
				// Meteor: more damage the farther the enemy is from the player
				let meteorDistMult=1;
				if(p.shape==='meteor'){const md=Math.hypot(p.x-(player.x+player.w/2),p.y-(player.y+player.h/2));meteorDistMult=1+Math.min(md/300,2.0);}
				// Meteor: 25% base damage nerf
				const meteorNerf=p.shape==='meteor'?0.75:1;
				// Spread damage bonus: +0.25% per degree of spread per projectile
				let spreadMult=1;
				if(p.phase&&p.phase.spread>0&&p.phase.count>1){spreadMult=1+(p.phase.spread*0.0025*p.phase.count);}
				// Item equipment boost: multiplier from equipped items matching spell components
				const itemBoost=getItemBoostForSlot(p.sourceSlot);
				const rawDmg=p.power*8*homingMult*lobMult*orbitMult*rainMult*barrageMult*dimMult*beamMult*releaseMult*elemMult*domainElemMult*phaseMult*meteorDistMult*spreadMult*meteorNerf*itemBoost;
				let dotSteal=0;
				if(p.effects.includes('burn'))dotSteal=0.5;
				if(p.effects.includes('poison'))dotSteal=0.4;
				const baseDmg=rawDmg*(1-dotSteal);
				en.hp-=baseDmg;en.flash=8;
				dmgNumbers.push({x:en.x+en.w/2,y:en.y-10,text:Math.round(baseDmg)+'',age:0,color:p.color});
				// Damage store: accumulate customizable % of damage dealt
				if(p.effects.includes('damageStore')){const dsPct=p.phase.damageStorePercent!=null?p.phase.damageStorePercent:0.5;damageStored+=baseDmg*dsPct;updateDamageStoreHUD();}
				// Damage release: consume stored damage after applying bonus
				if(p.effects.includes('damageRelease')&&damageStored>0){dmgNumbers.push({x:en.x+en.w/2,y:en.y-25,text:'⚡'+Math.round(damageStored),age:0,color:'#ffcc00'});damageStored=0;updateDamageStoreHUD();}
				applyEnemyHitEffects(p,en,rawDmg);
				/* SHATTER: tag enemy so on death it explodes into fragments */
				if(p.effects.includes('shatter')){en._shatterColor=p.color;en._shatterPower=p.power*0.3;}
				/* GRAVITY WELL: spawn a pull zone at impact point */
				if(p.effects.includes('gravityWell')&&!p._gravWellSpawned){
					p._gravWellSpawned=true;
					gravityWells.push({x:en.x+en.w/2,y:en.y+en.h/2,radius:120,life:FPS*2,age:0,color:p.color,power:p.power});
				}
				if(p.shape==='chain'&&p.chainHits<p.chainMax){p.chainHits++;p.hitTargets.add(en);let next=null,nd=Infinity;for(const e2 of getAllTargets()){if(e2===en||e2.dead||p.hitTargets.has(e2))continue;const dd2=dist(p.x,p.y,e2.x+e2.w/2,e2.y+e2.h/2);if(dd2<nd&&dd2<500){nd=dd2;next=e2;}}if(next){const ang=Math.atan2(next.y+next.h/2-p.y,next.x+next.w/2-p.x);const spd3=Math.sqrt(p.vx*p.vx+p.vy*p.vy)||8;p.vx=Math.cos(ang)*spd3;p.vy=Math.sin(ang)*spd3;spawnImpact(p.x,p.y,p.color);if(p.afterHitEffect&&p.afterHitEffect!=='none')spawnAfterHitEffect(p.x,p.y,p.afterHitEffect,p.color,Math.max(p.width,p.height));continue;}}
				if(PIERCE_SET.has(p.shape)){p.hitTargets.add(en);
					/* Vortex: pull enemies toward center + damage over time */
					if(p.shape==='vortex'){
						const dx4=p.x-(en.x+en.w/2), dy4=p.y-(en.y+en.h/2);
						const d4=Math.sqrt(dx4*dx4+dy4*dy4)||1;
						const pullStr=3.5;
						en.x+=dx4/d4*pullStr; en.y+=dy4/d4*pullStr;
						// DoT: deal damage every 15 frames
						if(!p._vortexDotTimer)p._vortexDotTimer=0;
						if(p.age%15===0){
							const dotDmg=p.power*0.3;
							en.hp-=dotDmg;en.flash=4;
							dmgNumbers.push({x:en.x+en.w/2,y:en.y-10,text:Math.round(dotDmg)+'🌀',age:0,color:p.color});
						}
					}
					continue;
				}
				/* Meteor: explosion on impact dealing 50% AoE damage + forced explosion effect */
				if(p.shape==='meteor'&&!p._meteorExploded){
					p._meteorExploded=true;
					const mSize=Math.max(p.width,p.height);
					const explodeR=mSize*6+mSize*mSize*0.04;
					spawnAfterHitEffect(p.x,p.y,'explosion',p.color,mSize*2.5);
					for(const e2 of getAllTargets()){
						if(e2.dead||e2===en)continue;
						const dd2=Math.hypot(p.x-(e2.x+e2.w/2),p.y-(e2.y+e2.h/2));
						if(dd2<explodeR){
							const falloff=1-dd2/explodeR;
							const splashDmg=rawDmg*0.5*falloff;
							e2.hp-=splashDmg;e2.flash=8;
							dmgNumbers.push({x:e2.x+e2.w/2,y:e2.y-10,text:Math.round(splashDmg)+'💥',age:0,color:'#ff6600'});
						}
					}
				}
				p.hasHit=true;spawnImpact(p.x,p.y,p.color);if(p.afterHitEffect&&p.afterHitEffect!=='none')spawnAfterHitEffect(p.x,p.y,p.afterHitEffect,p.color,Math.max(p.width,p.height));
				if(!p.phaseTriggered&&p.phase.nextTrigger==='onHit'&&p.phaseIdx+1<p.spell.phases.length){p.phaseTriggered=true;if(p.effects.includes('resetProjectiles'))spawnPhase(p.spell,p.phaseIdx+1,p.x,p.y,p.facing,undefined,p.isUltimate,p.castId,p.sourceSlot);else morphProjectile(p,p.phaseIdx+1);}
				break;
			}
		}

		/* DISPEL — destroy enemy projectiles and spell walls on contact */
		if(p.effects.includes('dispel')&&!p.hasHit){
			const dR=Math.max(p.width,p.height)*0.8;
			for(let ei=enemyProjectiles.length-1;ei>=0;ei--){
				const ep=enemyProjectiles[ei];
				if(dist(p.x,p.y,ep.x,ep.y)<dR+Math.max(ep.width,ep.height)*0.5){
					spawnImpact(ep.x,ep.y,'#aa88ff');
					dmgNumbers.push({x:ep.x,y:ep.y-10,text:'🚫 Dispelled!',age:0,color:'#aa88ff'});
					enemyProjectiles.splice(ei,1);
				}
			}
			for(let wi=spellWalls.length-1;wi>=0;wi--){
				const sw=spellWalls[wi];
				if(p.x>=sw.x-dR&&p.x<=sw.x+sw.w+dR&&p.y>=sw.y-dR&&p.y<=sw.y+sw.h+dR){
					spawnImpact(sw.x+sw.w/2,sw.y+sw.h/2,'#aa88ff');
					dmgNumbers.push({x:sw.x+sw.w/2,y:sw.y-10,text:'🚫 Wall Dispelled!',age:0,color:'#aa88ff'});
					spellWalls.splice(wi,1);
				}
			}
			// Dispel cuts enemy beams: shorten beam to dispel hit point
			for(const ep of enemyProjectiles){
				if(ep.shape!=='beam')continue;
				const bx0=ep.startX||ep.x,by0=ep.startY||ep.y;
				const bAng=ep.beamAngle!=null?ep.beamAngle:(ep.vx>=0?0:Math.PI);
				const bLen=ep.beamLen||0;
				// Check if dispel projectile intersects beam line
				const dirX=Math.cos(bAng),dirY=Math.sin(bAng);
				// Project dispel pos onto beam line
				const toPx=p.x-bx0,toPy=p.y-by0;
				const proj=toPx*dirX+toPy*dirY; // distance along beam
				if(proj>0&&proj<bLen){
					const nearX=bx0+dirX*proj,nearY=by0+dirY*proj;
					const perpDist=Math.hypot(p.x-nearX,p.y-nearY);
					if(perpDist<dR+ep.height*0.5){
						// Cut beam at this point
						ep.beamLen=Math.max(0,proj-5);
						spawnImpact(nearX,nearY,'#aa88ff');
						dmgNumbers.push({x:nearX,y:nearY-10,text:'🚫 Beam Cut!',age:0,color:'#aa88ff'});
					}
				}
			}
		}

		/* wall collision — tilemap for dungeons, ground/platforms for open-sky modes */
		const skipWall=p.shape==='nova'||p.shape==='vortex'||p.effects.includes('phaseThrough')||p._fromDomain||p.behavior==='stationary'||p.behavior==='selfCast'||p.behavior==='underfoot'||p.behavior==='aroundSelf'||p.behavior==='ground'||(p.behavior==='orbit'&&p.age<p.orbitDur);
		/* Ground/platform collision in open-sky modes */
		if(!skipWall&&!p.hasHit&&!p.isSolidPlatform&&(IS_SANDBOX||IS_RAID||IS_OPENWORLD)){
			let groundHit=false;
			// Ground collision
			if(p.y>=GROUND_Y){ groundHit=true; p.y=GROUND_Y-1; }
			// Ceiling collision
			const ceilY=IS_RAID?RAID_CONFIG.ceilY:0;
			if(p.y<=ceilY){ groundHit=true; p.y=ceilY+1; }
			// Platform collision
			if(!groundHit){
				for(const plat of sandboxPlatforms){
					if(p.x>=plat.x&&p.x<=plat.x+plat.w&&p.y>=plat.y&&p.y<=plat.y+plat.h){
						groundHit=true;break;
					}
				}
			}
			if(groundHit){
				spawnImpact(p.x,p.y,p.color);if(p.afterHitEffect&&p.afterHitEffect!=='none')spawnAfterHitEffect(p.x,p.y,p.afterHitEffect,p.color,Math.max(p.width,p.height));p.hasHit=true;
				if(!p.phaseTriggered&&p.phase.nextTrigger==='onHit'&&p.phaseIdx+1<p.spell.phases.length){p.phaseTriggered=true;if(p.effects.includes('resetProjectiles'))spawnPhase(p.spell,p.phaseIdx+1,p.x,p.y,p.facing,undefined,p.isUltimate,p.castId,p.sourceSlot);else morphProjectile(p,p.phaseIdx+1);}
			}
		}
		if(!skipWall&&!p.hasHit&&!p.isSolidPlatform&&!IS_SANDBOX&&!IS_RAID&&!IS_OPENWORLD){
			let wallHit=false;
			let wallNormalX=0, wallNormalY=0; // for ricochet bounce direction
			const tc=Math.floor(p.x/TILE),tr2=Math.floor(p.y/TILE);
			if(isSolid(tc,tr2)){
				wallHit=true;
				// Determine bounce normal: check which adjacent tile is open
				const fromLeft=!isSolid(tc-1,tr2), fromRight=!isSolid(tc+1,tr2);
				const fromUp=!isSolid(tc,tr2-1), fromDown=!isSolid(tc,tr2+1);
				if(fromLeft||fromRight) wallNormalX=fromLeft?-1:1;
				if(fromUp||fromDown) wallNormalY=fromUp?-1:1;
				if(wallNormalX===0&&wallNormalY===0) wallNormalY=-1; // default up
			}
			if(!wallHit){for(const sw of spellWalls){if(p.x>=sw.x&&p.x<=sw.x+sw.w&&p.y>=sw.y&&p.y<=sw.y+sw.h){wallHit=true;
				const cx=sw.x+sw.w/2,cy=sw.y+sw.h/2;wallNormalX=p.x<cx?-1:1;wallNormalY=p.y<cy?-1:1;break;}}}
			/* solidify platforms block all non-platform projectiles */
			if(!wallHit){for(const sp of projectiles){if(!sp.isSolidPlatform||sp===p)continue;const sw2=sp.width*3,sh2=sp.height*1.5;if(p.x>=sp.x-sw2/2&&p.x<=sp.x+sw2/2&&p.y>=sp.y-sh2/2&&p.y<=sp.y+sh2/2){wallHit=true;wallNormalX=p.x<sp.x?-1:1;wallNormalY=p.y<sp.y?-1:1;break;}}}
			if(wallHit){
				/* RICOCHET: bounce off walls instead of being destroyed (max 5 bounces) */
				if(p.effects.includes('ricochet')&&(p._bounces||0)<5){
					p._bounces=(p._bounces||0)+1;
					// Push out of the wall
					p.x-=p.vx;p.y-=p.vy;
					// Reflect velocity using the wall normal
					if(wallNormalX!==0) p.vx=Math.abs(p.vx)*wallNormalX;
					if(wallNormalY!==0) p.vy=Math.abs(p.vy)*wallNormalY;
					// If only one normal detected fall back to full reflect
					if(wallNormalX===0) p.vx=-p.vx;
					if(wallNormalY===0&&wallNormalX===0) p.vy=-p.vy;
					// Update beam angle for beams
					if(p.shape==='beam') p.beamAngle=Math.atan2(p.vy,p.vx);
					// Update aim angle for behaviors like homing to stay functional
					p.aimAngle=Math.atan2(p.vy,p.vx);
					p.facing=p.vx>=0?1:-1;
					spawnImpact(p.x,p.y,p.color);
					p.hitTargets.clear(); // can re-hit after bounce
				} else {
					spawnImpact(p.x,p.y,p.color);if(p.afterHitEffect&&p.afterHitEffect!=='none')spawnAfterHitEffect(p.x,p.y,p.afterHitEffect,p.color,Math.max(p.width,p.height));p.hasHit=true;
					if(!p.phaseTriggered&&p.phase.nextTrigger==='onHit'&&p.phaseIdx+1<p.spell.phases.length){p.phaseTriggered=true;if(p.effects.includes('resetProjectiles'))spawnPhase(p.spell,p.phaseIdx+1,p.x,p.y,p.facing,undefined,p.isUltimate,p.castId,p.sourceSlot);else morphProjectile(p,p.phaseIdx+1);}
				}
			}
		}

		/* after delay trigger */
		if(!p.phaseTriggered&&p.phase.nextTrigger==='afterDelay'&&p.age>p.maxAge*0.6){
			p.phaseTriggered=true;
			if(p.phaseIdx+1<p.spell.phases.length){if(p.effects.includes('resetProjectiles')){spawnPhase(p.spell,p.phaseIdx+1,p.x,p.y,p.facing,undefined,p.isUltimate,p.castId,p.sourceSlot);} else morphProjectile(p,p.phaseIdx+1);}
		}
		/* timed release */
		if(!p.timedReleaseTriggered&&p.effects.includes('timedRelease')&&p.age>=p.timedReleaseDelay){p.timedReleaseTriggered=true;applyPlayerEffects(p);spawnImpact(p.x,p.y,p.color);}
		/* phase fork */
		if(p.effects.includes('phaseFork')&&p.phaseIdx+1<p.spell.phases.length){
			if(p.phaseForkCount<p.phaseForkRepeats&&p.age>=p.phaseForkNextAge){p.phaseForkCount++;p.phaseForkNextAge=p.age+p.phaseForkDelay;const dm=1/(1+p.phaseForkCount*0.3);spawnPhase(p.spell,p.phaseIdx+1,p.x,p.y,p.facing,dm,p.isUltimate,p.castId,p.sourceSlot);spawnImpact(p.x,p.y,p.color);}}

		/* expire */
		const shouldRemove=!p._held&&(p.age>=p.maxAge||(p.hasHit&&!PIERCE_SET.has(p.shape)));
		if(shouldRemove){
			/* Meteor: explode on expire/ground contact too */
			if(p.shape==='meteor'&&!p._meteorExploded){
				p._meteorExploded=true;
				const mSize=Math.max(p.width,p.height);
				const explodeR=mSize*6+mSize*mSize*0.04;
				spawnAfterHitEffect(p.x,p.y,'explosion',p.color,mSize*2.5);
				for(const e2 of enemies){
					if(e2.dead)continue;
					const dd2=Math.hypot(p.x-(e2.x+e2.w/2),p.y-(e2.y+e2.h/2));
					if(dd2<explodeR){
						const falloff=1-dd2/explodeR;
						const splashDmg=p.power*8*0.5*falloff;
						e2.hp-=splashDmg;e2.flash=8;
						dmgNumbers.push({x:e2.x+e2.w/2,y:e2.y-10,text:Math.round(splashDmg)+'💥',age:0,color:'#ff6600'});
					}
				}
			}
			if(!p.phaseTriggered&&p.phase.nextTrigger==='onExpire'&&p.phaseIdx+1<p.spell.phases.length){p.phaseTriggered=true;if(p.effects.includes('resetProjectiles')){spawnPhase(p.spell,p.phaseIdx+1,p.x,p.y,p.facing,undefined,p.isUltimate,p.castId,p.sourceSlot);projectiles.splice(i,1);}else{morphProjectile(p,p.phaseIdx+1);}continue;}
			projectiles.splice(i,1);continue;
		}
		if(p.x<-100||p.x>WORLD_W+100||p.y<-600||p.y>WORLD_H+100)projectiles.splice(i,1);
	}
}

/* =============================================================
   UPDATE ENEMY PROJECTILES (hits player)
   ============================================================= */
function updateEnemyProjectiles(){
	for(let i=enemyProjectiles.length-1;i>=0;i--){
		const p=enemyProjectiles[i];
		p.age++;
		
		// Homing projectiles track player
		if(p.homing){
			const tx = player.x + player.w/2;
			const ty = player.y + player.h/2;
			const angle = Math.atan2(ty - p.y, tx - p.x);
			const speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
			const turnRate = p.homingStrength || 0.05;
			const curAngle = Math.atan2(p.vy, p.vx);
			let diff = angle - curAngle;
			while(diff > Math.PI) diff -= Math.PI*2;
			while(diff < -Math.PI) diff += Math.PI*2;
			const newAngle = curAngle + Math.sign(diff) * Math.min(Math.abs(diff), turnRate);
			p.vx = Math.cos(newAngle) * speed;
			p.vy = Math.sin(newAngle) * speed;
		}
		
		p.vy+=p.gravity;
		p.x+=p.vx;p.y+=p.vy;
		p.rotAngle+=p.rotSpeed;

		/* Spell wall collision — walls block enemy projectiles */
		let wallBlocked=false;
		for(const sw of spellWalls){
			const pb={x:p.x-p.width/2,y:p.y-p.height/2,w:p.width,h:p.height};
			if(pb.x<sw.x+sw.w&&pb.x+pb.w>sw.x&&pb.y<sw.y+sw.h&&pb.y+pb.h>sw.y){
				wallBlocked=true;
				spawnImpact(p.x,p.y,'#88ccff');
				dmgNumbers.push({x:p.x,y:p.y-10,text:'🧱 Blocked!',age:0,color:'#88bbff'});
				enemyProjectiles.splice(i,1);
				break;
			}
		}
		if(wallBlocked)continue;

		// Lingering projectiles (lava pools etc.)
		if(p.linger&&p.hasHit&&!p.lingerDone){
			p.lingerTimer++;
			p.vx=0;p.vy=0;
			// damage player if standing on the linger
			if(p.lingerTimer-p.lingerLastDmg>=p.lingerDmgInterval){
				if(circRect(p.x,p.y,p.width*1.5,player.x,player.y,player.w,player.h)&&player.iFrames<=0){
					damagePlayer(p.power*0.4,p.effects);
					p.lingerLastDmg=p.lingerTimer;
				}
			}
			if(p.lingerTimer>=p.lingerMax){enemyProjectiles.splice(i,1);}
			continue;
		}

		// AoE expanding ring
		if(p.aoe){
			p.aoeTimer++;
			const r=(p.aoeTimer/p.aoeMax)*p.aoeRadius;
			if(!p.hasHit&&circRect(p.x,p.y,r,player.x,player.y,player.w,player.h)&&player.iFrames<=0){
				damagePlayer(p.power,p.effects);p.hasHit=true;
			}
			if(p.aoeTimer>=p.aoeMax){enemyProjectiles.splice(i,1);}
			continue;
		}

		// Hit player
		if(!p.hasHit){
			const hr=Math.max(p.width,p.height)*0.6;
			if(circRect(p.x,p.y,hr,player.x,player.y,player.w,player.h)&&player.iFrames<=0){
				damagePlayer(p.power,p.effects);
				spawnImpact(p.x,p.y,p.color);
				if(p.linger){
					// Convert to lingering pool
					p.hasHit=true;p.vy=0;p.vx=0;
					// snap to nearest floor
					for(let row=Math.floor(p.y/TILE);row<MAP_ROWS;row++){
						if(isSolid(Math.floor(p.x/TILE),row)){p.y=row*TILE;break;}
					}
				} else if(!p.pierce){
					enemyProjectiles.splice(i,1);continue;
				} else {
					p.hasHit=false; // pierce resets
				}
			}
		}

		// Wall collision
		if(!p.hasHit&&!p.aoe){
			const tc=Math.floor(p.x/TILE),tr3=Math.floor(p.y/TILE);
			let epWall=false;
			if(isSolid(tc,tr3)) epWall=true;
			/* solidify platforms block enemy projectiles too */
			if(!epWall){for(const sp of projectiles){if(!sp.isSolidPlatform)continue;const sw2=sp.width*3,sh2=sp.height*1.5;if(p.x>=sp.x-sw2/2&&p.x<=sp.x+sw2/2&&p.y>=sp.y-sh2/2&&p.y<=sp.y+sh2/2){epWall=true;break;}}}
			if(epWall){
				if(p.linger){
					p.hasHit=true;p.vx=0;p.vy=0;
					p.y=tr3*TILE;
				} else {
					spawnImpact(p.x,p.y,p.color);
					enemyProjectiles.splice(i,1);continue;
				}
			}
		}

		// Out of bounds or expired
		if(p.age>=p.maxAge||p.x<-100||p.x>WORLD_W+100||p.y<-200||p.y>WORLD_H+100){
			enemyProjectiles.splice(i,1);
		}
	}
}

/* =============================================================
   DAMAGE PLAYER
   ============================================================= */
function damagePlayer(amount,effects){
	if(player.iFrames>0)return;
	const defReduction = 1 - (stats.magicDefence * 0.008);
	const vowDefMult = Math.max(0.3, 1 - vowDefenseBonus * 0.05);
	if(shield>0){const blocked=Math.min(shield,amount);shield-=blocked;amount-=blocked;dmgNumbers.push({x:player.x+player.w/2,y:player.y-30,text:'🛡️ -'+Math.round(blocked),age:0,color:'#88bbff'});}
	const dmg = amount * Math.max(0.2, defReduction) * vowDefMult;
	health -= dmg;
	player.iFrames = 30;
	player.flash = 10;
	dmgNumbers.push({x:player.x+player.w/2,y:player.y-20,text:'-'+Math.round(dmg),age:0,color:'#ff4444'});

	if(effects){
		for(const fx of effects){
			switch(fx){
				case 'burn':
					player.dots.push({type:'burn',dmg:amount*0.2,ticks:4,interval:60,timer:0,color:'#ff6a00'});
					break;
				case 'freeze':
					player.slowTimer=Math.max(player.slowTimer,90);
					break;
				case 'poison':
					player.dots.push({type:'poison',dmg:amount*0.15,ticks:5,interval:75,timer:0,color:'#44dd44'});
					break;
				case 'horizontalLaunch':
					// Launch player horizontally based on projectile direction
					player.vx = (player.x+player.w/2 < WORLD_W/2 ? 1 : -1) * amount * 0.5;
					dmgNumbers.push({x:player.x+player.w/2,y:player.y-30,text:'LAUNCHED!',age:0,color:'#ff8800'});
					break;
				case 'stun':
					player.stunTimer=Math.max(player.stunTimer,45);
					break;
			}
		}
	}

	if(health<=0){
		health=0;
		respawnPlayer();
	}
	updateHealthHUD();
}

function respawnPlayer(){
	setTimeout(()=>{
		health=maxHealth;
		mana=IS_SANDBOX?Infinity:maxMana;
		player.x=playerSpawn.x;
		player.y=playerSpawn.y;
		player.vx=0;player.vy=0;player.launchVx=0;
		player.dots=[];player.slowTimer=0;player.stunTimer=0;
		player.iFrames=60;
		player.ultCharging=false;player.ultChargeTimer=0;
		updateHealthHUD();updateManaHUD();
		dmgNumbers.push({x:player.x+player.w/2,y:player.y-20,text:'Respawned!',age:0,color:'#ffcc00'});
		// Clear boss telegraphs on respawn
		bossTelegraphs.length=0;
		// Reset boss room lock when respawning
		if(IS_DUNGEON && (bossState.phase === 'active' || bossState.phase === 'cutscene')){
			bossState.phase = 'inactive';
			bossState.timer = 0;
			// Remove boss enemy so it re-spawns with next cutscene
			const bossIdx = enemies.findIndex(e => e.typeDef && e.typeDef.isBoss);
			if(bossIdx >= 0) enemies.splice(bossIdx, 1);
			// Remove lock wall tiles (restore to air)
			if(BOSS_LOCK_WALL){
			const lx = Math.floor(BOSS_LOCK_WALL.x / TILE);
			const ly = Math.floor(BOSS_LOCK_WALL.y / TILE);
			const rx = Math.ceil((BOSS_LOCK_WALL.x + BOSS_LOCK_WALL.w) / TILE);
			const ry = Math.ceil((BOSS_LOCK_WALL.y + BOSS_LOCK_WALL.h) / TILE);
			for(let r = ly; r < ry; r++){
				for(let c = lx; c < rx; c++){
					if(r >= 0 && r < MAP_ROWS && c >= 0 && c < MAP_COLS){
						tileMap[r][c] = 1; // air
					}
				}
			}
			computeTileEdges();
			}
			bossState.lockWall = null;
		}
	},500);
}

/* =============================================================
   APPLY EFFECTS (player spell effects on self / ally orb)

function applyPlayerEffects(proj){
	const ultMult=proj.isUltimate?3:1;
	const ePow=proj.phase.effectPower||1;
	const eDur=proj.phase.effectDuration||1;
	for(const fx of proj.effects){
		switch(fx){
			case'healSelf':health=Math.min(maxHealth,health+proj.power*5*ePow*ultMult);updateHealthHUD();dmgNumbers.push({x:player.x+player.w/2,y:player.y-10,text:'+'+Math.round(proj.power*5*ePow*ultMult),age:0,color:'#44ff88'});break;
			case'shield':shield+=Math.round(proj.power*3*ePow*ultMult);dmgNumbers.push({x:player.x+player.w/2,y:player.y-20,text:'🛡️ Shield +'+Math.round(proj.power*3*ePow*ultMult),age:0,color:'#88bbff'});break;
			case'lifesteal':mana=Math.min(maxMana,mana+proj.power*3*ePow*ultMult);dmgNumbers.push({x:player.x+player.w/2,y:player.y-10,text:'+'+Math.round(proj.power*3*ePow*ultMult)+'💧',age:0,color:'#bb44ff'});break;
			case'speedBoost':playerBuffs.speedTimer=Math.round(300*eDur*ultMult);playerBuffs.speedMult=proj.isUltimate?2.5:1.8;dmgNumbers.push({x:player.x+player.w/2,y:player.y-10,text:'🏃 Speed!',age:0,color:'#ffcc00'});break;
			case'jumpBoost':playerBuffs.jumpTimer=Math.round(300*eDur*ultMult);playerBuffs.jumpMult=proj.isUltimate?2.0:1.5;dmgNumbers.push({x:player.x+player.w/2,y:player.y-20,text:'⬆️ Jump!',age:0,color:'#66ff66'});break;
			case'manaRegen':playerBuffs.manaRegenTimer=Math.round(300*eDur*ultMult);playerBuffs.manaRegenMult=proj.isUltimate?6:3;dmgNumbers.push({x:player.x+player.w/2,y:player.y-10,text:'💧 Regen!',age:0,color:'#66ccff'});break;
			case'forceJump':player.vy=player.jumpPow*(playerBuffs.jumpTimer>0?playerBuffs.jumpMult:1)*(proj.isUltimate?1.5:1);player.onGround=false;break;
			case'horizontalLaunch':player.launchVx=proj.facing*proj.power*3.5*ePow*(proj.isUltimate?2:1);dmgNumbers.push({x:player.x+player.w/2,y:player.y-10,text:'🚀 Launched!',age:0,color:'#ff8800'});break;
			case'damageHeal':if(damageStored>0){const healAmt=damageStored*0.5;health=Math.min(maxHealth,health+healAmt);updateHealthHUD();dmgNumbers.push({x:player.x+player.w/2,y:player.y-20,text:'+'+Math.round(healAmt)+' 💚',age:0,color:'#44ff88'});damageStored=0;updateDamageStoreHUD();}break;
		}
	}
}

/* Apply hit effects on enemy (from player spells) */
function applyEnemyHitEffects(proj,en,rawDmg){
	const ultMult=proj.isUltimate?3:1;
	const _vb2=getVowBoostsForSlot(proj.sourceSlot!=null?proj.sourceSlot:-1);
	const vowFxMult=1+_vb2.effects*0.15; // vow effect power boost
	const ePow=(proj.phase.effectPower||1)*vowFxMult;
	const eDur=(proj.phase.effectDuration||1)*vowFxMult;
	for(const fx of proj.effects){
		switch(fx){
			case'burn':{if(rawDmg){const stolen=rawDmg*0.5;const tks=Math.round(5*eDur*ultMult);en.dots.push({type:'burn',dmg:(stolen*1.25)/tks,ticks:tks,interval:60,timer:0,color:'#ff6a00'});}break;}
			case'poison':{if(rawDmg){const stolen=rawDmg*0.4;const tks=Math.round(6*eDur*ultMult);en.dots.push({type:'poison',dmg:(stolen*1.25)/tks,ticks:tks,interval:75,timer:0,color:'#44dd44'});}break;}
			case'freeze':en.slowTimer=Math.max(en.slowTimer,Math.round(90*eDur*ultMult));en.flash=15;break;
			case'knockback':en.x+=proj.facing*40*ePow*ultMult;break;
			case'pull':{const dx2=player.x+player.w/2-(en.x+en.w/2);const dy2=player.y+player.h/2-(en.y+en.h/2);const d2=Math.sqrt(dx2*dx2+dy2*dy2)||1;en.x+=dx2/d2*50*ePow*ultMult;en.y+=dy2/d2*30*ePow*ultMult;break;}
			case'stun':en.stunTimer=Math.max(en.stunTimer,Math.round(60*eDur*ultMult));break;
			case'horizontalLaunch':en.vx=proj.facing*(proj.power*3.5*ePow*ultMult);dmgNumbers.push({x:en.x+en.w/2,y:en.y-10,text:proj.isUltimate?'⚡ MEGA LAUNCH!':'LAUNCHED!',age:0,color:'#ff8800'});break;
			case'forceJump':en.y-=60*ePow*ultMult;dmgNumbers.push({x:en.x+en.w/2,y:en.y-10,text:'🚀 Launched!',age:0,color:'#ff8800'});break;
		}
	}
}

   ============================================================= */
/* Update gravity wells: pull enemies toward center, expire */
function updateGravityWells(){
	for(let i=gravityWells.length-1;i>=0;i--){
		const gw=gravityWells[i];
		gw.age++;
		if(gw.age>=gw.life){gravityWells.splice(i,1);continue;}
		// Pull all targets within radius
		for(const en of getAllTargets()){
			if(en.dead) continue;
			const dx=gw.x-(en.x+en.w/2), dy=gw.y-(en.y+en.h/2);
			const d=Math.sqrt(dx*dx+dy*dy)||1;
			if(d<gw.radius){
				const strength=3*(1-d/gw.radius)*(1-gw.age/gw.life);
				en.x+=dx/d*strength; en.y+=dy/d*strength;
			}
		}
	}
}

/* Update training dummies (sandbox and openworld mode) */
function updateDummies(){
	if(!IS_SANDBOX && !IS_OPENWORLD) return;
	const now = Date.now();
	for(let i = 0; i < dummies.length; i++){
		const d = dummies[i];
		
		// Track previous HP to detect new damage
		if(d._prevHp === undefined) d._prevHp = d.hp;
		const newDmg = d._prevHp - d.hp;
		if(newDmg > 0){
			dummyDmgAccum[i].push({time: now, dmg: newDmg});
		}
		d._prevHp = d.hp;
		
		// Prune old damage entries (older than 3 sec)
		dummyDmgAccum[i] = dummyDmgAccum[i].filter(e => now - e.time < 3000);
		
		// Flash timer
		if(d.flash > 0) d.flash--;
		if(d.stunTimer > 0) d.stunTimer--;
		if(d.slowTimer > 0) d.slowTimer--;
		
		// Process DoTs
		for(let di = d.dots.length - 1; di >= 0; di--){
			const dot = d.dots[di];
			dot.timer++;
			if(dot.timer >= dot.interval){
				dot.timer = 0;
				d.hp -= dot.dmg;
				d.flash = 4;
				dmgNumbers.push({x: d.x + d.w/2, y: d.y - 10, text: Math.round(dot.dmg) + '', age: 0, color: dot.color});
				dot.ticks--;
				if(dot.ticks <= 0) d.dots.splice(di, 1);
			}
		}
		
		// Auto respawn HP after 2 seconds of no damage
		if(d.hp <= 0 || d.hp < d.maxHp){
			const lastDmgTime = dummyDmgAccum[i].length > 0 ? dummyDmgAccum[i][dummyDmgAccum[i].length - 1].time : 0;
			if(now - lastDmgTime > 2000){
				d.hp = d.maxHp;
				d._prevHp = d.maxHp; // Reset tracking for accurate DPS
				d.dots = [];
				dummyDmgAccum[i] = []; // Clear accumulator on respawn
			}
		}
	}
}

/* Update slimes (openworld tutorial enemies) */
function updateSlimes(){
	if(!IS_OPENWORLD) return;
	for(const s of slimes){
		if(s.dead){
			s.deathTimer++;
			if(s.deathTimer > 180){
				// Respawn at original location
				s.x = s.spawnX;
				s.y = OPENWORLD_CONFIG.groundY - s.h;
				s.hp = s.maxHp;
				s.dead = false;
				s.deathTimer = 0;
				s.dots = [];
			}
			continue;
		}
		
		// Flash/stun timers
		if(s.flash > 0) s.flash--;
		if(s.stunTimer > 0) s.stunTimer--;
		if(s.slowTimer > 0) s.slowTimer--;
		
		// Process DoTs
		for(let di = s.dots.length - 1; di >= 0; di--){
			const dot = s.dots[di];
			dot.timer++;
			if(dot.timer >= dot.interval){
				dot.timer = 0;
				s.hp -= dot.dmg;
				s.flash = 4;
				dmgNumbers.push({x: s.x + s.w/2, y: s.y - 10, text: Math.round(dot.dmg) + '', age: 0, color: dot.color});
				dot.ticks--;
				if(dot.ticks <= 0) s.dots.splice(di, 1);
			}
		}
		
		// Death check
		if(s.hp <= 0){
			s.dead = true;
			s.deathTimer = 0;
			// XP/loot
			dmgNumbers.push({x: s.x + s.w/2, y: s.y - 30, text: '+' + SLIME_TYPE.xp + ' XP', age: 0, color: '#ffcc00'});
			for(let v = 0; v < 15; v++){
				particles.push({x: s.x + s.w/2, y: s.y + s.h/2,
					vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6 - 3,
					life: 30 + Math.random() * 20, color: SLIME_TYPE.color});
			}
			continue;
		}
		
		// AI: hop toward player if in range
		const dx = player.x + player.w/2 - (s.x + s.w/2);
		const dist = Math.abs(dx);
		
		if(s.grounded && s.stunTimer <= 0){
			s.jumpTimer++;
			if(dist < SLIME_TYPE.aggroRange && s.jumpTimer >= SLIME_TYPE.jumpCooldown){
				// Jump toward player
				s.vy = SLIME_TYPE.jumpForce;
				s.vx = Math.sign(dx) * (2 + Math.random() * 2);
				s.grounded = false;
				s.jumpTimer = 0;
			}
		}
		
		// Physics
		s.vy += 0.4; // gravity
		s.x += s.vx;
		s.y += s.vy;
		
		// Ground collision
		if(s.y + s.h >= GROUND_Y){
			s.y = GROUND_Y - s.h;
			s.vy = 0;
			s.vx *= 0.5;
			s.grounded = true;
		}
		
		// Platform collision
		const plat = checkPlatformLanding(s.x, s.y, s.w, s.h, s.vy);
		if(plat && s.vy >= 0){
			s.y = plat.y - s.h;
			s.vy = 0;
			s.vx *= 0.5;
			s.grounded = true;
		}
		
		// World bounds
		if(s.x < 0){ s.x = 0; s.vx = 0; }
		if(s.x + s.w > WORLD_W){ s.x = WORLD_W - s.w; s.vx = 0; }
		
		// Damage player on contact
		if(!s.dead && player.iFrames <= 0){
			if(s.x < player.x + player.w && s.x + s.w > player.x &&
			   s.y < player.y + player.h && s.y + s.h > player.y){
				damagePlayer(SLIME_TYPE.damage, []);
				spawnImpact(player.x + player.w/2, player.y + player.h/2, SLIME_TYPE.color);
			}
		}
	}
}

/* Update NPCs (openworld) */
function updateNpcs(){
	if(!IS_OPENWORLD) return;
	nearbyNpc = null;
	for(const npc of npcs){
		const dx = Math.abs((player.x + player.w/2) - (npc.x + npc.w/2));
		const dy = Math.abs((player.y + player.h/2) - (npc.y + npc.h/2));
		if(dx < 80 && dy < 80){
			nearbyNpc = npc;
			break;
		}
	}
	// Show/hide interact prompt
	const prompt = document.getElementById('interactPrompt');
	if(nearbyNpc && !dialogueActive){
		prompt.style.display = 'block';
	} else {
		prompt.style.display = 'none';
	}

/* Update tutorial hints (openworld) - disappear when action is completed */
function updateTutorialHints(){
	if(!IS_OPENWORLD) return;
	// Check for new hints
	for(const hint of tutorialHints){
		if(!hint.shown && !hint.completed && player.x > hint.x - 100 && player.x < hint.x + 200){
			hint.shown = true;
			currentHint = hint.text;
			currentHintObj = hint;
			document.getElementById('tutorialHint').textContent = currentHint;
			document.getElementById('tutorialHint').style.display = 'block';
		}
	}
	// Check if current hint action is completed
	if(currentHintObj && currentHintObj.check && currentHintObj.check()){
		currentHintObj.completed = true;
		currentHint = null;
		currentHintObj = null;
		document.getElementById('tutorialHint').style.display = 'none';
	}
}

/* Dialogue system functions */
function startDialogue(lines, callback){
	dialogueQueue = lines;
	dialogueIndex = 0;
	dialogueActive = true;
	dialogueCallback = callback || null;
	showDialogueLine();
	document.getElementById('dialogueOverlay').style.display = 'flex';
}

function showDialogueLine(){
	if(dialogueIndex >= dialogueQueue.length){
		endDialogue();
		return;
	}
	const line = dialogueQueue[dialogueIndex];
	document.getElementById('dialogueName').textContent = line.name;
	document.getElementById('dialogueIcon').textContent = line.icon || '';
	typewriterTarget = line.text;
	typewriterText = '';
	typewriterTimer = 0;
	document.getElementById('dialogueText').textContent = '';
}

function advanceDialogue(){
	if(!dialogueActive) return;
	if(typewriterText.length < typewriterTarget.length){
		typewriterText = typewriterTarget;
		document.getElementById('dialogueText').textContent = typewriterText;
		return;
	}
	dialogueIndex++;
	showDialogueLine();
}

function endDialogue(){
	dialogueActive = false;
	document.getElementById('dialogueOverlay').style.display = 'none';
	if(dialogueCallback) dialogueCallback();
	dialogueCallback = null;
}

function updateTypewriter(){
	if(!dialogueActive) return;
	typewriterTimer++;
	if(typewriterTimer % 2 === 0 && typewriterText.length < typewriterTarget.length){
		typewriterText += typewriterTarget[typewriterText.length];
		document.getElementById('dialogueText').textContent = typewriterText;
	}
}

/* NPC interaction */
function tryInteractNpc(){
	if(!nearbyNpc || dialogueActive) return;
	startDialogue(nearbyNpc.dialogues);
}

/* Update raid boss */
function updateRaidBoss(){
	if(!IS_RAID || !raidBoss) return;
	
	if(raidBoss.dead){
		raidBoss.deathTimer++;
		// Victory after death animation
		if(raidBoss.deathTimer === 120){
			showRaidVictory();
		}
		return;
	}
	
	// Timers
	raidBoss.animTimer++;
	if(raidBoss.flash > 0) raidBoss.flash--;
	if(raidBoss.stunTimer > 0) raidBoss.stunTimer--;
	if(raidBoss.slowTimer > 0) raidBoss.slowTimer--;
	if(raidBoss.armRaised > 0) raidBoss.armRaised--;
	if(raidBoss.slamTimer > 0) raidBoss.slamTimer--;
	if(raidBoss.globalCd > 0) raidBoss.globalCd--;
	if(raidBoss.phaseTransition > 0) raidBoss.phaseTransition--;
	
	// Process DoTs
	for(let di = raidBoss.dots.length - 1; di >= 0; di--){
		const dot = raidBoss.dots[di];
		dot.timer++;
		if(dot.timer >= dot.interval){
			dot.timer = 0;
			raidBoss.hp -= dot.dmg;
			raidBoss.flash = 4;
			dmgNumbers.push({x: raidBoss.x + raidBoss.w/2, y: raidBoss.y - 10, text: Math.round(dot.dmg) + '', age: 0, color: dot.color});
			dot.ticks--;
			if(dot.ticks <= 0) raidBoss.dots.splice(di, 1);
		}
	}
	
	// Death check
	if(raidBoss.hp <= 0){
		raidBoss.dead = true;
		raidBoss.deathTimer = 0;
		dmgNumbers.push({x: raidBoss.x + raidBoss.w/2, y: raidBoss.y - 40, text: '💀 DEFEATED!', age: 0, color: '#ffcc00'});
		for(let v = 0; v < 50; v++){
			particles.push({x: raidBoss.x + Math.random() * raidBoss.w, y: raidBoss.y + Math.random() * raidBoss.h,
				vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10 - 4,
				life: 60 + Math.random() * 40, color: ['#ff2244','#cc1133','#ff6644','#ffcc00'][v % 4]});
		}
		return;
	}
	
	// Phase transitions
	const hpPct = raidBoss.hp / raidBoss.maxHp;
	if(hpPct <= 0.65 && raidBoss.phase === 1){
		raidBoss.phase = 2;
		raidBoss.phaseTransition = 150;
		showRaidWarning('⚠️ PHASE 2 — WRATH UNLEASHED', 2000);
		dmgNumbers.push({x: raidBoss.x + raidBoss.w/2, y: raidBoss.y - 50, text: '🌑 PHASE 2', age: 0, color: '#ff4466'});
		for(let v = 0; v < 30; v++){
			particles.push({x: raidBoss.x + Math.random() * raidBoss.w, y: raidBoss.y + Math.random() * raidBoss.h,
				vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10 - 4,
				life: 60 + Math.random() * 30, color: ['#ff2244','#cc1133','#ff6644','#440011'][v % 4]});
		}
	}
	if(hpPct <= 0.30 && raidBoss.phase === 2){
		raidBoss.phase = 3;
		raidBoss.phaseTransition = 180;
		showRaidWarning('💀 FINAL PHASE — JUDGEMENT', 2500);
		dmgNumbers.push({x: raidBoss.x + raidBoss.w/2, y: raidBoss.y - 50, text: '💀 PHASE 3', age: 0, color: '#ff0033'});
		for(let v = 0; v < 40; v++){
			particles.push({x: raidBoss.x + Math.random() * raidBoss.w, y: raidBoss.y + Math.random() * raidBoss.h,
				vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.5) * 12 - 5,
				life: 80 + Math.random() * 40, color: ['#ff0022','#ff4400','#ffcc00','#880000'][v % 4]});
		}
	}
	
	// Don't attack during transition
	if(raidBoss.phaseTransition > 0) return;
	
	// Attack logic
	if(raidBoss.stunTimer <= 0 && raidBoss.globalCd <= 0){
		raidBossAttack();
	}
	
	// Laser update
	if(raidBoss.laserActive){
		raidBoss.laserTimer++;
		raidBoss.laserAngle += 0.008 * raidBoss.laserSweepDir;
		// Damage player if in laser path
		const lx = raidBoss.x + raidBoss.w/2, ly = raidBoss.y + raidBoss.h/2;
		const laserLen = 2000;
		const dx = Math.cos(raidBoss.laserAngle), dy = Math.sin(raidBoss.laserAngle);
		for(let t = 0; t < laserLen; t += 30){
			const px = lx + dx * t, py = ly + dy * t;
			if(px > player.x && px < player.x + player.w && py > player.y && py < player.y + player.h){
				if(player.iFrames <= 0){
					damagePlayer(12, []);
				}
				break;
			}
		}
	}
	
	// Light orbs (Absolute Void attack)
	if(raidBoss._voidDarkness && raidBoss._voidDarknessTimer > 0){
		raidBoss._voidDarknessTimer--;
		// Damage player if not near light orbs
		let inLight = false;
		for(const orb of raidBoss._lightOrbs){
			orb.age++;
			const d = dist(player.x + player.w/2, player.y + player.h/2, orb.x, orb.y);
			if(d < orb.radius) inLight = true;
		}
		if(!inLight && raidBoss._voidDarknessTimer % 30 === 0){
			damagePlayer(8, []);
			dmgNumbers.push({x: player.x + player.w/2, y: player.y - 20, text: '🌑 Darkness!', age: 0, color: '#440044'});
		}
		if(raidBoss._voidDarknessTimer <= 0){
			raidBoss._voidDarkness = false;
			raidBoss._lightOrbs = [];
		}
	}
}

/* Raid boss attacks */
function raidBossAttack(){
	if(!IS_RAID || !raidBoss || raidBoss.dead) return;
	
	let maxIdx = 8; // Phase 1: 8 attacks
	if(raidBoss.phase >= 2) maxIdx = 14;
	if(raidBoss.phase >= 3) maxIdx = 17;
	
	let idx;
	do { idx = Math.floor(Math.random() * maxIdx); } while(idx === raidBoss.lastAttack && maxIdx > 1);
	raidBoss.lastAttack = idx;
	
	const attacks = [
		raidAttackVoidSlam,        // 0 — Ground slam
		raidAttackAbyssalLaser,    // 1 — Laser beam
		raidAttackDarkOrbs,        // 2 — Homing orbs
		raidAttackGravityCrush,    // 3 — Pull + crush
		raidAttackVoidPillars,     // 4 — Ground pillars
		raidAttackShadowWave,      // 5 — Wave of projectiles
		raidAttackVoidDash,        // 6 — Boss dash
		raidAttackTeleportStrike,  // 7 — Teleport + burst
		raidAttackDimensionalRift, // 8 — Portals
		raidAttackMeteorBarrage,   // 9 — Meteors
		raidAttackVoidCage,        // 10 — Closing cage
		raidAttackSoulDrain,       // 11 — Healing channel
		raidAttackShadowBlinkBarrage,// 12 — Rapid teleport
		raidAttackVoidDash,        // 13 — Dash again
		raidAttackAbsoluteVoid,    // 14 — Darkness mechanic
		raidAttackJudgementStrike, // 15 — Targeted slam
		raidAttackVoidStorm,       // 16 — Everything at once
	];
	
	if(attacks[idx]) attacks[idx]();
	const baseCd = raidBoss.phase >= 3 ? 50 : raidBoss.phase >= 2 ? 70 : 100;
	raidBoss.globalCd = baseCd + Math.floor(Math.random() * 30);
}

function updateEnemies(){
	for(const en of enemies){
		if(en.dead){en.deathTimer++;continue;}

		en.animTimer++;
		if(en.attackAnimTimer>0)en.attackAnimTimer--;
		if(en.flash>0)en.flash--;
		if(en.stunTimer>0)en.stunTimer--;
		if(en.slowTimer>0)en.slowTimer--;

		// DoTs
		for(let di=en.dots.length-1;di>=0;di--){
			const dot=en.dots[di];dot.timer++;
			if(dot.timer>=dot.interval){dot.timer=0;en.hp-=dot.dmg;en.flash=4;
				dmgNumbers.push({x:en.x+en.w/2,y:en.y-10,text:Math.round(dot.dmg)+'',age:0,color:dot.color});
				dot.ticks--;if(dot.ticks<=0)en.dots.splice(di,1);}
		}

		// Death check
		if(en.hp<=0){en.dead=true;en.deathTimer=0;
			spawnImpact(en.x+en.w/2,en.y+en.h/2,en.typeDef.color);
			/* SHATTER: on death, explode into damaging fragments that hit nearby enemies */
			if(en._shatterColor){
				const cx=en.x+en.w/2,cy=en.y+en.h/2;
				const shardCount=8;
				for(let si=0;si<shardCount;si++){
					const sa=si*Math.PI*2/shardCount+(Math.random()-0.5)*0.3;
					const sSpd=5+Math.random()*4;
					const shard={spell:{phases:[]},phaseIdx:0,phase:{effects:[],width:1,height:1,speed:1,duration:0.5},
						x:cx,y:cy,vx:Math.cos(sa)*sSpd,vy:Math.sin(sa)*sSpd-1,
						facing:Math.cos(sa)>=0?1:-1,age:0,maxAge:Math.round(FPS*0.5),
						width:6,height:6,power:en._shatterPower||1,
						color:en._shatterColor,trail:'none',shape:'missile',behavior:'straight',
						effects:[],trailParts:[],orbitAngle:0,orbitRadius:0,orbitSpeed:0,orbitDur:0,
						orbitOriginX:0,orbitOriginY:0,startX:cx,startY:cy,beamLen:0,beamAngle:0,
						chainHits:0,chainMax:0,hasHit:false,phaseTriggered:true,
						hitTargets:new Set([en]),aimAngle:sa,
						timedReleaseDelay:0,timedReleaseTriggered:true,
						phaseForkDelay:0,phaseForkRepeats:0,phaseForkCount:0,phaseForkNextAge:9999,
						isSolidPlatform:false,isUltimate:false,castId:-1,sourceSlot:-1,randomDelay:0,
						afterHitEffect:'none',polygonSides:6,
					};
					projectiles.push(shard);
				}
				dmgNumbers.push({x:cx,y:cy-20,text:'💎 SHATTER!',age:0,color:en._shatterColor});
			}
			if(en.typeDef.isBoss){
				const isIceBoss = en.type === 'frostColossus';
				const isEarthBoss = en.type === 'earthColossus';
				const bossEmoji = isIceBoss ? '❄️' : isEarthBoss ? '🪨' : '🐉';
				dmgNumbers.push({x:en.x+en.w/2,y:en.y-30,text:bossEmoji+' BOSS DEFEATED!',age:0,color:'#ffdd00'});
				// Victory explosion
				const deathColors = isIceBoss ? ['#2244ff','#4488ff','#88ccff','#aaeeff'] : isEarthBoss ? ['#8b7340','#c4a032','#ffcc33','#aa66ff'] : ['#ff4400','#ffaa00','#ffdd00','#ff6600'];
				for(let v=0;v<30;v++) particles.push({x:en.x+Math.random()*en.w,y:en.y+Math.random()*en.h,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8-3,life:60+Math.random()*40,color:deathColors[v%4]});
				// Unlock boss room
				bossState.phase = 'defeated';
				grantBossRewards();
				if(bossState.lockWall){
					const lx = Math.floor(BOSS_LOCK_WALL.x / TILE);
					const ly = Math.floor(BOSS_LOCK_WALL.y / TILE);
					const rx = Math.ceil((BOSS_LOCK_WALL.x + BOSS_LOCK_WALL.w) / TILE);
					const ry = Math.ceil((BOSS_LOCK_WALL.y + BOSS_LOCK_WALL.h) / TILE);
					for(let r = ly; r < ry; r++){
						for(let c = lx; c < rx; c++){
							if(r >= 0 && r < MAP_ROWS && c >= 0 && c < MAP_COLS) tileMap[r][c] = 1;
						}
					}
					computeTileEdges();
					bossState.lockWall = null;
				}
			} else {
				dmgNumbers.push({x:en.x+en.w/2,y:en.y-10,text:'Defeated!',age:0,color:'#ffcc00'});
			}
			continue;
		}

		if(en.stunTimer>0)continue;

		// Charging movement
		if(en.charging){
			en.chargeTimer--;
			en.vx=en.chargeVx;
			en.vy=en.chargeVy;
			if(!en.typeDef.flies)en.vy+=GRAVITY;
			moveEntityTile(en);
			// Imp charge: throw fire swords during charge
			if(en.type==='imp'&&!en.chargeCastDone&&en.chargeTimer<25){
				en.chargeCastDone=true;
				for(let si=0;si<3;si++){
					const sa=-0.4+si*0.4;
					const spd=5;
					spawnEnemyProj(en.x+en.w/2,en.y+en.h/2,Math.cos(sa)*spd*en.facing,Math.sin(sa)*spd-1,{
						color:'#dd2222',color2:'#ff6644',power:8,width:10,height:10,
						shape:'sword',effects:['horizontalLaunch'],trail:'flame',rotSpeed:0.25,maxAge:160,
					});
				}
			}
			// Serpent strike: contact damage
			if(en.type==='flameSerpent'&&!en.chargeCastDone){
				if(rectRect(en,player)&&player.iFrames<=0){
					damagePlayer(21*DIFF_DMG_MULT,[]);en.chargeCastDone=true;
				}
			}
			// Fire sprite dash: leave trail
			if(en.type==='fireSprite'&&en.chargeTimer%3===0){
				spawnEnemyProj(en.x+en.w/2,en.y+en.h/2,0,0,{
					color:'#ffaa00',color2:'#ffee44',power:4,width:10,height:10,
					shape:'circle',maxAge:40,
				});
			}
			// Dragon charge: leave fire trail + contact damage
			if(en.type==='fireDragon'){
				if(en.chargeTimer%3===0){
					spawnEnemyProj(en.x+en.w/2,en.y+en.h,0,0,{
						color:'#ff5500',color2:'#ffaa00',power:14,width:22,height:22,
						shape:'circle',trail:'flame',maxAge:70,
						linger:true,lingerMax:100,lingerDmgInterval:25,effects:['burn'],
					});
				}
				if(!en.chargeCastDone&&rectRect(en,player)&&player.iFrames<=0){
					damagePlayer(63*DIFF_DMG_MULT,['horizontalLaunch']);en.chargeCastDone=true;
				}
			}
			// Frost Colossus charge: leave ice trail + contact damage
			if(en.type==='frostColossus'){
				if(en.chargeTimer%3===0){
					spawnEnemyProj(en.x+en.w/2,en.y+en.h,0,0,{
						color:'#4488ff',color2:'#88ccff',power:16,width:24,height:24,
						shape:'circle',trail:'ice',maxAge:80,
						linger:true,lingerMax:120,lingerDmgInterval:30,effects:['freeze'],
					});
				}
				if(!en.chargeCastDone&&rectRect(en,player)&&player.iFrames<=0){
					damagePlayer(77*DIFF_DMG_MULT,['horizontalLaunch']);en.chargeCastDone=true;
				}
			}
			if(en.chargeTimer<=0){en.charging=false;en.vx=0;en.bossCharging=false;}
			// Clamp boss to arena
			if(en.typeDef.isBoss && BOSS_ROOM_RECT && bossState.phase==='active'){
				const br=BOSS_ROOM_RECT;
				if(en.x<br.x+20) en.x=br.x+20;
				if(en.x+en.w>br.x+br.w-20) en.x=br.x+br.w-20-en.w;
				if(en.y<br.y+20) en.y=br.y+20;
				if(en.y+en.h>br.y+br.h-20) en.y=br.y+br.h-20-en.h;
				if(en.typeDef.flies) en.baseY=en.y-en.flyOffset;
			}
			continue;
		}

		// Distance to player
		const dx=player.x+player.w/2-(en.x+en.w/2);
		const dy=player.y+player.h/2-(en.y+en.h/2);
		const playerDist=Math.sqrt(dx*dx+dy*dy);
		// Bosses always see the player in their room (no LoS requirement)
		const bossAlwaysSees = en.typeDef.isBoss && bossState.phase === 'active';
		const canSee=bossAlwaysSees||(en.typeDef.isBoss?(playerDist<en.typeDef.detectRange):(playerDist<en.typeDef.detectRange&&hasLineOfSight(en.x+en.w/2,en.y+en.h/2,player.x+player.w/2,player.y+player.h/2)));

		// Face player
		if(canSee) en.facing = dx > 0 ? 1 : -1;

		// Flying enemy hover
		if(en.typeDef.flies){
			const hoverAmp = en.typeDef.isBoss ? 35 : 15;
			const hoverSpd = en.typeDef.isBoss ? 0.02 : 0.04;
			en.flyOffset = Math.sin(en.animTimer * hoverSpd) * hoverAmp;
			// Flying bosses: gently drift baseY toward player Y within room bounds
			if(en.typeDef.isBoss && BOSS_ROOM_RECT && bossState.phase==='active'){
				const targetY = player.y + player.h/2 - en.h/2 - 60;
				const br = BOSS_ROOM_RECT;
				const clampedTarget = Math.max(br.y+20, Math.min(targetY, br.y+br.h-en.h-20));
				const driftSpeed = en.type === 'fireDragon' ? 0.025 : 0.01;
				en.baseY += (clampedTarget - en.baseY) * driftSpeed;
			}
			en.y = en.baseY + en.flyOffset;
		}

		// Speed modifier
		const spdMult = en.slowTimer > 0 ? 0.4 : 1;

		// State machine
		if(canSee){
			en.state = 'alert';
			en.alertTimer = 180;

			// Spell casting
			const spells = en.typeDef.spells;
			// Boss phase system
			const isBoss = en.typeDef.isBoss;
			let maxSpellIdx = spells.length;
			let cdMult = 1;
			if(isBoss){
				const hpPct = en.hp / en.maxHp;
				if(!en.bossPhase) en.bossPhase = 1;
				if(hpPct <= 0.5 && en.bossPhase === 1){
					// Phase transition!
					en.bossPhase = 2;
					en.bossPhaseTransition = 120; // 2 second transition animation
					const isIceBoss = en.type === 'frostColossus';
					const isEarthBoss = en.type === 'earthColossus';
					// Roar/shatter shockwave
					spawnEnemyProj(en.x+en.w/2,en.y+en.h/2,0,0,{
						color: isIceBoss ? '#2244ff' : isEarthBoss ? '#8b6914' : '#ff2200',
						color2: isIceBoss ? '#88bbff' : isEarthBoss ? '#c4a032' : '#ff8800',
						power:20,width:10,height:10,
						shape:'ring',maxAge:50,aoe:true,aoeRadius:300,aoeMax:50,
						effects:['horizontalLaunch'],
					});
					const phaseEmoji = isIceBoss ? '❄️' : isEarthBoss ? '🪨' : '🔥';
					const phaseSuffix = isIceBoss ? 'UNLEASHED' : isEarthBoss ? 'AWAKENED' : 'ENRAGED';
					const phaseColor = isIceBoss ? '#4488ff' : isEarthBoss ? '#c4a032' : '#ff4400';
					dmgNumbers.push({x:en.x+en.w/2,y:en.y-40,text: phaseEmoji+' PHASE 2 — '+phaseSuffix+'!',age:0,color:phaseColor});
					const phaseColors = isIceBoss ? ['#2244ff','#4488ff','#88bbff'] : isEarthBoss ? ['#8b6914','#c4a032','#ffcc33'] : ['#ff2200','#ff6600','#ffaa00'];
					for(let v=0;v<20;v++) particles.push({x:en.x+Math.random()*en.w,y:en.y+Math.random()*en.h,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-2,life:40+Math.random()*30,color:phaseColors[v%3]});
				}
				if(en.bossPhaseTransition > 0){ en.bossPhaseTransition--; continue; } // Can't act during transition
				if(en.bossPhase === 1){
					maxSpellIdx = 5; // Only first 5 attacks
					cdMult = 1;
				} else {
					maxSpellIdx = 8; // All 8 attacks
					cdMult = 0.7; // 30% faster cooldowns
				}
			}

			for(let si=0;si<Math.min(spells.length,maxSpellIdx);si++){
				if(en.spellCooldowns[si]>0){en.spellCooldowns[si]--;continue;}
				const sp=spells[si];
				if(playerDist<=sp.range){
					// Cast this spell
					const fn=CAST_FNS[sp.castFn];
					if(fn) fn(en);
					en.attackAnimTimer = ATTACK_ANIM_DURATION;
					en.spellCooldowns[si]=Math.round(sp.cooldown * cdMult * DIFF_CD_MULT);
					// Rotate to next spell
					en.currentSpell=(si+1)%maxSpellIdx;
					// Limit attacks per burst: 1 in phase 1, 2 in phase 2
					if(isBoss){
						if(!en.bossBurstCount) en.bossBurstCount = 0;
						en.bossBurstCount++;
						const maxBurst = en.bossPhase >= 2 ? 2 : 1;
						if(en.bossBurstCount >= maxBurst){ en.bossBurstCount = 0; break; }
					} else { break; }
					break;
				}
			}
			// Reset burst counter each frame for bosses
			if(isBoss && !en.bossBurstCount) en.bossBurstCount = 0;

			// Move toward player (but keep some distance for ranged enemies)
			const preferredDist = isBoss ? 350 : en.typeDef.detectRange * 0.5;
			if(playerDist > preferredDist + 30){
				en.vx = (dx > 0 ? 1 : -1) * en.typeDef.moveSpeed * spdMult;
			} else if(playerDist < preferredDist - 30){
				en.vx = (dx > 0 ? -1 : 1) * en.typeDef.moveSpeed * spdMult * 0.5;
			} else {
				en.vx = 0;
			}
		} else {
			if(en.alertTimer>0){en.alertTimer--;en.state='alert';}
			else en.state='patrol';

			// Patrol
			if(en.state==='patrol'&&en.patrol){
				en.vx = en.patrolDir * en.typeDef.moveSpeed * 0.5 * spdMult;
				if(en.x <= en.patrol[0]) en.patrolDir = 1;
				else if(en.x + en.w >= en.patrol[1]) en.patrolDir = -1;
				en.facing = en.patrolDir;
			} else {
				en.vx *= 0.9;
			}
		}

		// Apply gravity + movement for non-flying enemies
		if(!en.typeDef.flies){
			en.vy += GRAVITY;
			if(en.vy > 18) en.vy = 18;
			moveEntityTile(en);
		} else {
			en.vy = 0;
			// Flying enemies skip tile collision — apply vx directly
			en.x += en.vx;
			if(en.x < 0) en.x = 0;
			if(en.x + en.w > WORLD_W) en.x = WORLD_W - en.w;
		}
		// Clamp boss to arena bounds
		if(en.typeDef.isBoss && BOSS_ROOM_RECT && bossState.phase==='active'){
			const br=BOSS_ROOM_RECT;
			if(en.x<br.x+20) en.x=br.x+20;
			if(en.x+en.w>br.x+br.w-20) en.x=br.x+br.w-20-en.w;
			if(en.y<br.y+20) en.y=br.y+20;
			if(en.y+en.h>br.y+br.h-20) en.y=br.y+br.h-20-en.h;
			if(en.typeDef.flies) en.baseY=en.y-en.flyOffset;
		}

		// Solidify platform collision for enemies (platforms block enemies)
		for(const p of projectiles){
			if(!p.isSolidPlatform) continue;
			const sw2=p.width*3, sh2=p.height*1.5;
			const platBox={x:p.x-sw2/2, y:p.y-sh2/2, w:sw2, h:sh2};
			if(rectRect(en, platBox)){
				const oL=(en.x+en.w)-platBox.x, oR=(platBox.x+platBox.w)-en.x;
				const oT=(en.y+en.h)-platBox.y, oB=(platBox.y+platBox.h)-en.y;
				const m=Math.min(oL,oR,oT,oB);
				if(m===oT){en.y=platBox.y-en.h;en.vy=0;if(!en.typeDef.flies)en.onGround=true;}
				else if(m===oB){en.y=platBox.y+platBox.h;en.vy=0;}
				else if(m===oL){en.x=platBox.x-en.w;en.vx=0;}
				else{en.x=platBox.x+platBox.w;en.vx=0;}
			}
		}

		// Cooldown tick (for spells not yet checked)
		for(let si=0;si<en.spellCooldowns.length;si++){
			if(en.spellCooldowns[si]>0&&!canSee) en.spellCooldowns[si]--;
		}
	}
}

/* =============================================================
   MAIN UPDATE
   ============================================================= */
let castPressed = false;
function update(){
	/* Boss cutscene — freeze gameplay during cutscene */
	if(bossState.phase === 'cutscene'){
		updateBossCutscene();
		// Still update particles for visual effect
		for(let i=particles.length-1;i>=0;i--){
			const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.vx*=0.97;p.life--;
			if(p.life<=0)particles.splice(i,1);
		}
		// Animate enemies (so dragon keeps flapping etc.)
		for(const en of enemies){ if(!en.dead) en.animTimer++; }
		return;
	}

	/* Boss room trigger — check if player enters boss area */
	if(bossState.phase === 'inactive' && bossSpawnDef){
		if(DUNGEON_TYPE === 'fire' && player.y > BOSS_ROOM_TRIGGER_Y && player.x > BOSS_ROOM_RECT.x - 50){
			startBossCutscene();
		} else if(DUNGEON_TYPE === 'ice' && player.x > BOSS_ROOM_TRIGGER_X && player.y > BOSS_ROOM_RECT.y && player.y < BOSS_ROOM_RECT.y + BOSS_ROOM_RECT.h){
			startBossCutscene();
		} else if(DUNGEON_TYPE === 'earth' && BOSS_ROOM_TRIGGER_X && player.x > BOSS_ROOM_TRIGGER_X && player.y > BOSS_ROOM_TRIGGER_Y){
			startBossCutscene();
		}
	}

	/* Earth boss step-on spot mechanic */
	if(DUNGEON_TYPE === 'earth' && bossState.phase === 'active'){
		bossStepSpotTimer++;
		// Spawn new spots periodically
		if(bossStepSpotTimer >= BOSS_STEP_SPOT_INTERVAL && bossStepSpots.length < 3){
			bossStepSpotTimer = 0;
			const br = BOSS_ROOM_RECT;
			if(br){
				const spotX = br.x + 100 + Math.random() * (br.w - 200);
				// Find ground level at this X
				let spotY = br.y + br.h - 80;
				const col = Math.floor(spotX / TILE);
				for(let row = Math.floor(br.y / TILE); row < MAP_ROWS; row++){
					if(isSolid(col, row)){ spotY = row * TILE - 10; break; }
				}
				bossStepSpots.push({
					x: spotX, y: spotY, w: 60, h: 20,
					timer: 0, maxTimer: 300, // 5 second lifetime
					activated: false, glowTimer: 0,
				});
				dmgNumbers.push({x:spotX, y:spotY-30, text:'⭐ Step Here!', age:0, color:'#ffcc00'});
			}
		}
		// Update spots
		for(let si = bossStepSpots.length - 1; si >= 0; si--){
			const spot = bossStepSpots[si];
			spot.timer++; spot.glowTimer++;
			// Check if player is standing on spot
			if(!spot.activated && player.x + player.w > spot.x && player.x < spot.x + spot.w &&
				player.y + player.h > spot.y - 5 && player.y + player.h < spot.y + spot.h + 10){
				spot.activated = true;
				// Reward: weaken boss (stun + damage) and heal player
				for(const en of enemies){
					if(en.typeDef.isBoss && !en.dead){
						en.stunTimer = 90; // 1.5 second stun
						en.hp -= en.maxHp * 0.03; // 3% max HP damage
						dmgNumbers.push({x:en.x+en.w/2, y:en.y-30, text:'⚡ Weakened!', age:0, color:'#ffcc00'});
						spawnImpact(en.x+en.w/2, en.y+en.h/2, '#ffcc00');
					}
				}
				health = Math.min(maxHealth, health + 15);
				updateHealthHUD();
				dmgNumbers.push({x:player.x+player.w/2, y:player.y-20, text:'+15 ⭐', age:0, color:'#44ff88'});
				for(let v=0;v<12;v++) particles.push({x:spot.x+spot.w/2,y:spot.y,vx:(Math.random()-0.5)*6,vy:-2-Math.random()*4,life:25+Math.random()*15,color:{r:255,g:200+Math.random()*55|0,b:0}});
			}
			// Remove expired or activated (after animation)
			if(spot.timer >= spot.maxTimer || (spot.activated && spot.timer > 30)){
				bossStepSpots.splice(si, 1);
			}
		}
	}

	/* Player stunned */
	if(player.stunTimer>0){player.stunTimer--;player.vx*=0.5;}

	/* Player movement */
	if(player.stunTimer<=0&&!player.ultCharging){
		let mx=0;
		if(keys['a']||keys['arrowleft'])mx-=1;
		if(keys['d']||keys['arrowright'])mx+=1;
		if(mx!==0){ player.facing=mx; player.hasMoved=true; }
		else { const worldMX=mouseScreenX+camera.x; player.facing=worldMX>player.x+player.w/2?1:-1; }
		const spdM=player.slowTimer>0?0.5:1;
		const vowSpdMult=1+vowSpeedBonus*0.08;
		const vowMvPenalty=Math.max(0.5, 1 - vowMovementPenalty*0.01); // movement vow sacrifice
		const currentSpeed=player.speed*(playerBuffs.speedTimer>0?playerBuffs.speedMult:1)*spdM*vowSpdMult*vowMvPenalty;
		player.vx=mx*currentSpeed;
		if(player.launchVx){player.vx+=player.launchVx;player.launchVx*=0.88;if(Math.abs(player.launchVx)<0.5)player.launchVx=0;}
		if((keys['w']||keys['arrowup']||keys[' '])&&player.onGround){
			const vowJmpMult=1+vowJumpBonus*0.08;
			const currentJump=player.jumpPow*(playerBuffs.jumpTimer>0?playerBuffs.jumpMult:1)*vowJmpMult;
			player.vy=currentJump;player.onGround=false;
			player.hasJumped=true;
		}
	}
	if(player.ultCharging){player.vx=0;}
	player.vy+=GRAVITY;
	if(player.vy>18)player.vy=18;
	moveEntityTile(player);

	/* Solidify platform & spell wall collision */
	for(const p of projectiles){
		if(!p.isSolidPlatform) continue;
		const sw2=p.width*3, sh2=p.height*1.5;
		const platBox={x:p.x-sw2/2, y:p.y-sh2/2, w:sw2, h:sh2};
		if(rectRect(player, platBox)){
			const oL=(player.x+player.w)-platBox.x, oR=(platBox.x+platBox.w)-player.x;
			const oT=(player.y+player.h)-platBox.y, oB=(platBox.y+platBox.h)-player.y;
			const m=Math.min(oL,oR,oT,oB);
			if(m===oT){player.y=platBox.y-player.h;player.vy=0;player.onGround=true;}
			else if(m===oB){player.y=platBox.y+platBox.h;player.vy=0;}
			else if(m===oL){player.x=platBox.x-player.w;player.vx=0;}
			else{player.x=platBox.x+platBox.w;player.vx=0;}
		}
	}
	for(const sw of spellWalls){
		if(rectRect(player, sw)){
			const oL=(player.x+player.w)-sw.x, oR=(sw.x+sw.w)-player.x;
			const oT=(player.y+player.h)-sw.y, oB=(sw.y+sw.h)-player.y;
			const m=Math.min(oL,oR,oT,oB);
			if(m===oT){player.y=sw.y-player.h;player.vy=0;player.onGround=true;}
			else if(m===oB){player.y=sw.y+sw.h;player.vy=0;}
			else if(m===oL){player.x=sw.x-player.w;player.vx=0;}
			else{player.x=sw.x+sw.w;player.vx=0;}
		}
	}

	/* Casting */
	const wantCast=mouseDown;
	if(wantCast&&!castPressed){castPressed=true;castSpell();}
	if(!wantCast)castPressed=false;
	if(player.castTimer>0)player.castTimer--;
	if(player.iFrames>0)player.iFrames--;
	if(player.slowTimer>0)player.slowTimer--;
	if(player.flash>0)player.flash--;

	/* Player sprite animation */
	if(player.castTimer>0) playerAnimState = 'attack';
	else if(Math.abs(player.vx) > 0.5 || (!player.onGround && Math.abs(player.vy) > 1)) playerAnimState = 'walk';
	else playerAnimState = 'idle';
	playerAnimTimer++;
	if(playerAnimTimer >= PLAYER_SPRITE_FPS){
		playerAnimTimer = 0;
		playerAnimFrame = (playerAnimFrame + 1) % PLAYER_SPRITE_COLS;
	}

	/* Ultimate charge-up */
	if(player.ultCharging){
		player.ultChargeTimer++;
		// Spawn swirling particles during charge
		if(player.ultChargeTimer%3===0){
			const angle=player.ultChargeTimer*0.15;
			const radius=20+player.ultChargeTimer*0.15;
			particles.push({x:player.x+player.w/2+Math.cos(angle)*radius,y:player.y+player.h/2+Math.sin(angle)*radius,vx:(Math.random()-0.5)*2,vy:-1-Math.random()*2,life:20+Math.random()*15,color:player.ultChargeColor});
		}
		if(player.ultChargeTimer>=player.ultChargeDuration){
			// Charge complete — fire the ultimate!
			player.ultCharging=false;
			player.castTimer=25;player.castColor=player.ultChargeColor;
			const spell=player.ultChargeSpell;
			const castId=nextCastId++;spellHitCounts[castId]=0;
			spawnPhase(spell,0,player.x+player.w/2,player.y+player.h/2-6,player.ultChargeFacing,1,true,castId,player.ultChargeSlot);
			// Big release burst
			for(let v=0;v<25;v++) particles.push({x:player.x+player.w/2,y:player.y+player.h/2,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8-2,life:30+Math.random()*20,color:player.ultChargeColor});
		}
	}

	/* Cooldowns */
	let anyCDChanged=false;
	for(let i=0;i<10;i++){if(spellCooldowns[i]>0){spellCooldowns[i]--;anyCDChanged=true;}}
	if(anyCDChanged)renderHotbar();

	/* Update boss telegraphs */
	for(let ti=bossTelegraphs.length-1;ti>=0;ti--){
		bossTelegraphs[ti].timer++;
		if(bossTelegraphs[ti].timer>=bossTelegraphs[ti].duration) bossTelegraphs.splice(ti,1);
	}

	/* Update player minions */
	for(let mi=playerMinions.length-1;mi>=0;mi--){
		const m=playerMinions[mi];
		m.age++;m.animTimer++;
		if(m.age>=m.maxAge||m.hp<=0){
			spawnImpact(m.x+m.w/2,m.y+m.h/2,m.color);
			playerMinions.splice(mi,1);continue;
		}
		// Find nearest alive enemy
		let nearest=null,nearDist=m.detectRange||600;
		for(const en of enemies){
			if(en.dead)continue;
			const dd=Math.hypot(en.x+en.w/2-m.x-m.w/2,en.y+en.h/2-m.y-m.h/2);
			if(dd<nearDist){nearest=en;nearDist=dd;}
		}
		m.target=nearest;
		// Fly toward target
		if(nearest){
			const dx=nearest.x+nearest.w/2-m.x-m.w/2;
			const dy=nearest.y+nearest.h/2-m.y-m.h/2;
			const dist2=Math.hypot(dx,dy)||1;
			const speed=m.moveSpeed||2.5;
			const stopDist=m.summonClose?60:200;
			if(dist2>stopDist){m.vx+=(dx/dist2)*speed*0.1;m.vy+=(dy/dist2)*speed*0.1;}
			m.facing=dx>0?1:-1;
		}
		m.vx*=0.92;m.vy*=0.92;
		m.x+=m.vx;m.y+=m.vy;
		// Enemy projectiles can damage minions
		for(let ei=enemyProjectiles.length-1;ei>=0;ei--){
			const ep=enemyProjectiles[ei];
			if(ep.hasHit||ep.aoe||ep.linger)continue;
			const hitR2=Math.max(ep.width,ep.height)*0.5;
			if(circRect(ep.x,ep.y,hitR2,m.x,m.y,m.w,m.h)){
				m.hp-=ep.power*2;
				spawnImpact(ep.x,ep.y,ep.color);
				ep.hasHit=true;
			}
		}
		// Fire next spell phase periodically
		m.fireTimer++;
		if(m.fireTimer>=m.fireCooldown&&m.phaseIdx+1<m.spell.phases.length){
			m.fireTimer=0;
			const castId=nextCastId++;spellHitCounts[castId]=0;
			spawnPhase(m.spell,m.phaseIdx+1,m.x+m.w/2,m.y+m.h/2,m.facing,0.6,m.isUltimate,castId,m.sourceSlot);
			spawnImpact(m.x+m.w/2,m.y+m.h/2,m.color);
		}
	}

	/* Mana regen */
	if(IS_SANDBOX){
		// Infinite mana in sandbox mode
		mana = maxMana;
		totalMana = 999999;
		updateTotalManaHUD();
	} else {
		const curRegen=baseManaRegen*(playerBuffs.manaRegenTimer>0?playerBuffs.manaRegenMult:1);
		mana=Math.min(maxMana,mana+curRegen);
	}
	updateManaHUD();

	/* Player DoTs */
	for(let di=player.dots.length-1;di>=0;di--){
		const dot=player.dots[di];dot.timer++;
		if(dot.timer>=dot.interval){dot.timer=0;
			health-=dot.dmg;
			dmgNumbers.push({x:player.x+player.w/2,y:player.y-10,text:'-'+Math.round(dot.dmg),age:0,color:dot.color});
			dot.ticks--;if(dot.ticks<=0)player.dots.splice(di,1);
			if(health<=0){health=0;respawnPlayer();}
			updateHealthHUD();
		}
	}

	/* Player buffs */
	if(playerBuffs.speedTimer>0)playerBuffs.speedTimer--;
	if(playerBuffs.jumpTimer>0)playerBuffs.jumpTimer--;
	if(playerBuffs.manaRegenTimer>0)playerBuffs.manaRegenTimer--;

	/* Active Domain Expansion */
	if(activeDomain){
		activeDomain.age++;
		// Update domain particles
		for(const p of activeDomain.particles){
			p.x += p.vx;
			p.y += p.vy;
			p.vx += (Math.random()-0.5)*0.2;
			p.vy += (Math.random()-0.5)*0.2;
			// Wrap around domain bounds
			const halfW = activeDomain.w/2, halfH = activeDomain.h/2;
			if(p.x < -halfW) p.x = halfW;
			if(p.x > halfW) p.x = -halfW;
			if(p.y < -halfH) p.y = halfH;
			if(p.y > halfH) p.y = -halfH;
		}
		// Trigger waves after short delay
		if(!activeDomain.phaseTriggered && activeDomain.age > 30){
			activeDomain.phaseTriggered = true;
			activeDomain.waveCount = 0;
			// Calculate wave interval to spread 35 waves across entire domain (60 sec = 3600 frames)
			// Base interval ~100 frames with some randomness
			activeDomain.nextWaveAge = activeDomain.age + 30 + Math.floor(Math.random() * 60);
		}
		// Spawn waves of phase 2 projectiles from random positions in domain (35 waves total)
		if(activeDomain.phaseTriggered && activeDomain.waveCount < 35 && activeDomain.age >= activeDomain.nextWaveAge){
			const spell = activeDomain.spell;
			if(spell.phases.length > 1){
				// Visual feedback (show wave number every 5 waves)
				if(activeDomain.waveCount % 5 === 0){
					dmgNumbers.push({x:activeDomain.x,y:activeDomain.y-50,text:`⚔️ Wave ${activeDomain.waveCount+1}/35`,age:0,color:activeDomain.color});
				}
				shakeScreen(5, 8);
				// Spawn projectiles from random positions in domain
				spawnPhase(spell, 1, activeDomain.x, activeDomain.y, player.facing, 1, activeDomain.isUltimate, activeDomain.castId, activeDomain.sourceSlot);
			}
			activeDomain.waveCount++;
			// Spread waves across entire domain duration (60 sec = 3600 frames / 35 waves = ~103 frames)
			// Use 80-130 frames interval (1.3-2.2 seconds)
			activeDomain.nextWaveAge = activeDomain.age + 80 + Math.floor(Math.random() * 50);
		}
		// Domain expires
		if(activeDomain.age >= activeDomain.maxAge){
			dmgNumbers.push({x:activeDomain.x,y:activeDomain.y,text:'Domain Collapse',age:0,color:'#888'});
			// Restore hidden platforms
			if(activeDomain.hiddenPlatforms && activeDomain.hiddenPlatforms.length > 0){
				for(const plat of activeDomain.hiddenPlatforms){
					sandboxPlatforms.push(plat);
				}
			}
			activeDomain = null;
		}
	}

	/* Projectiles */
	updateProjectiles();
	updateEnemyProjectiles();

	/* Enemies */
	updateDummies();
	updateSlimes();
	updateNpcs();
	updateTutorialHints();
	updateTypewriter();
	updateRaidBoss();
	updateEnemies();
	updateGravityWells();
	updateRaidIndicators();
	
	/* Notification fade */
	if(notifyTimer > 0){
		notifyTimer--;
		if(notifyTimer <= 0){
			document.getElementById('notification').style.opacity = '0';
		}
	}

	/* Particles */
	for(let i=particles.length-1;i>=0;i--){
		const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.vx*=0.97;p.life--;
		if(p.life<=0)particles.splice(i,1);
	}
	for(let i=ambientParticles.length-1;i>=0;i--){
		const p=ambientParticles[i];p.x+=p.vx;p.y+=p.vy;p.life--;
		if(p.life<=0)ambientParticles.splice(i,1);
	}
	// Spawn ambient particles from decorations
	for(const dec of dungeon.decorations){
		if((dec.type==='embers'||dec.type==='snowfall')&&Math.random()<0.08){
			spawnAmbientParticle(dec);
		}
	}

	/* Dmg numbers */
	for(let i=dmgNumbers.length-1;i>=0;i--){
		dmgNumbers[i].age++;dmgNumbers[i].y-=0.8;
		if(dmgNumbers[i].age>60)dmgNumbers.splice(i,1);
	}

	/* Spell walls */
	for(let i=spellWalls.length-1;i>=0;i--){spellWalls[i].timer--;if(spellWalls[i].timer<=0)spellWalls.splice(i,1);}

	updateCamera();
}

/* =============================================================
   RENDER
   ============================================================= */
function render(){
	ctx.clearRect(0,0,canvas.width,canvas.height);
	
	// Apply screen shake
	ctx.save();
	ctx.translate(camera.shakeX, camera.shakeY);

	/* Background fill */
	if(IS_SANDBOX){
		// Gradient sky for sandbox mode
		const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
		grad.addColorStop(0, SANDBOX_CONFIG.bgColor);
		grad.addColorStop(1, SANDBOX_CONFIG.bgColor2);
		ctx.fillStyle = grad;
		ctx.fillRect(0, 0, canvas.width, canvas.height);
		
		// Draw sandbox ground
		const groundScreenY = SANDBOX_CONFIG.groundY - camera.y;
		ctx.fillStyle = '#3a3a4a';
		ctx.fillRect(0, groundScreenY, canvas.width, canvas.height - groundScreenY + 200);
		// Ground top edge
		ctx.fillStyle = '#4a4a5a';
		ctx.fillRect(0, groundScreenY, canvas.width, 4);
		
		// Draw sandbox platforms
		for(const plat of sandboxPlatforms){
			const px = plat.x - camera.x, py = plat.y - camera.y;
			if(px + plat.w < -50 || px > canvas.width + 50) continue;
			ctx.fillStyle = '#4a4a5f';
			ctx.fillRect(px, py, plat.w, plat.h);
			ctx.fillStyle = '#5a5a6f';
			ctx.fillRect(px, py, plat.w, 3);
		}
		
		// Draw training dummies
		for(let i = 0; i < dummies.length; i++){
			const d = dummies[i];
			const dx = d.x - camera.x, dy = d.y - camera.y;
			if(dx + d.w < -50 || dx > canvas.width + 50) continue;
			
			// Dummy body
			ctx.fillStyle = d.flash > 0 ? '#ffffff' : '#cc8844';
			ctx.fillRect(dx, dy, d.w, d.h);
			// Dummy face (X eyes for target)
			ctx.strokeStyle = '#442211';
			ctx.lineWidth = 2;
			ctx.beginPath();
			ctx.moveTo(dx + 6, dy + 12); ctx.lineTo(dx + 12, dy + 18);
			ctx.moveTo(dx + 12, dy + 12); ctx.lineTo(dx + 6, dy + 18);
			ctx.moveTo(dx + 16, dy + 12); ctx.lineTo(dx + 22, dy + 18);
			ctx.moveTo(dx + 22, dy + 12); ctx.lineTo(dx + 16, dy + 18);
			ctx.stroke();
			// HP bar
			const hpPct = Math.max(0, d.hp / d.maxHp);
			ctx.fillStyle = 'rgba(0,0,0,0.6)';
			ctx.fillRect(dx - 5, dy - 12, d.w + 10, 6);
			ctx.fillStyle = hpPct > 0.5 ? '#44ff88' : hpPct > 0.25 ? '#ffaa44' : '#ff4444';
			ctx.fillRect(dx - 5, dy - 12, (d.w + 10) * hpPct, 6);
			
			// Total damage in last 3 seconds
			const accum = dummyDmgAccum[i];
			if(accum && accum.length > 0){
				const totalDmg = accum.reduce((sum, e) => sum + e.dmg, 0);
				ctx.fillStyle = '#ffcc00';
				ctx.font = 'bold 12px monospace';
				ctx.textAlign = 'center';
				ctx.fillText(Math.round(totalDmg) + ' dmg', dx + d.w/2, dy - 18);
			}
		}
	} else if(IS_RAID){
		// Gradient void sky for raid mode
		const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
		grad.addColorStop(0, RAID_CONFIG.bgColor);
		grad.addColorStop(1, RAID_CONFIG.bgColor2);
		ctx.fillStyle = grad;
		ctx.fillRect(0, 0, canvas.width, canvas.height);
		
		// Void darkness overlay (Absolute Void attack)
		if(raidBoss && raidBoss._voidDarkness){
			ctx.fillStyle = 'rgba(0,0,0,0.7)';
			ctx.fillRect(0, 0, canvas.width, canvas.height);
			// Light orbs
			for(const orb of raidBoss._lightOrbs){
				const ox = orb.x - camera.x, oy = orb.y - camera.y;
				const pulse = 0.8 + Math.sin(orb.age * 0.1) * 0.2;
				const glow = ctx.createRadialGradient(ox, oy, 0, ox, oy, orb.radius * pulse);
				glow.addColorStop(0, 'rgba(255,255,200,0.8)');
				glow.addColorStop(0.5, 'rgba(255,220,100,0.3)');
				glow.addColorStop(1, 'transparent');
				ctx.fillStyle = glow;
				ctx.beginPath(); ctx.arc(ox, oy, orb.radius * pulse, 0, Math.PI * 2); ctx.fill();
			}
		}
		
		// Draw raid ground
		const groundScreenY = RAID_CONFIG.groundY - camera.y;
		ctx.fillStyle = '#1a1a2a';
		ctx.fillRect(0, groundScreenY, canvas.width, canvas.height - groundScreenY + 200);
		ctx.fillStyle = '#2a2a3a';
		ctx.fillRect(0, groundScreenY, canvas.width, 4);
		
		// Draw raid platforms
		for(const plat of sandboxPlatforms){
			if(plat.y === RAID_CONFIG.groundY) continue; // Skip ground
			const px = plat.x - camera.x, py = plat.y - camera.y;
			if(px + plat.w < -50 || px > canvas.width + 50) continue;
			ctx.fillStyle = '#2a2a3f';
			ctx.fillRect(px, py, plat.w, plat.h);
			ctx.fillStyle = '#3a3a4f';
			ctx.fillRect(px, py, plat.w, 3);
		}
		
		// Draw raid indicators (telegraphs)
		for(const ind of raidIndicators){
			const ix = ind.x - camera.x, iy = ind.y - camera.y;
			const progress = ind.age / ind.maxAge;
			ctx.globalAlpha = 0.3 + progress * 0.4;
