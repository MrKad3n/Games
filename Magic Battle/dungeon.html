function computeStats(){
	const s={...playerData.baseStats};
	for(const slotKey of['staff','robe','relic1','relic2']){
		const id=playerData.equipment[slotKey];
		if(!id||!ITEM_DB[id])continue;
		for(const k in ITEM_DB[id].stats)s[k]=(s[k]||0)+ITEM_DB[id].stats[k];
	}
	return s;
}

/* --- Spell cost helpers --- */
const SHAPE_MANA={missile:5,orb:8,blade:7,beam:10,ring:12,cone:10,nova:15,chain:18,wall:12,solidify:10,allyOrb:6};
const SHAPE_CTRL={missile:0,orb:1,blade:2,beam:4,ring:5,cone:4,nova:7,chain:9,wall:6,solidify:4,allyOrb:1};
const BEH_MANA={straight:0,lob:2,homing:5,boomerang:4,groundSurge:5,orbit:8,spiral:6,rain:8,barrage:8,stationary:0,underfoot:3,selfCast:2,aroundSelf:5};
const BEH_CTRL={straight:0,lob:1,homing:3,boomerang:3,groundSurge:4,orbit:6,spiral:5,rain:7,barrage:7,stationary:0,underfoot:2,selfCast:1,aroundSelf:3};
const FX_MANA={burn:5,freeze:5,knockback:3,pull:4,poison:5,stun:7,healSelf:6,shield:6,lifesteal:8,speedBoost:4,jumpBoost:4,manaRegen:5,timedRelease:3,phaseFork:6,resetProjectiles:0,forceJump:4,horizontalLaunch:5};
const FX_CTRL={burn:2,freeze:2,knockback:1,pull:3,poison:3,stun:5,healSelf:4,shield:4,lifesteal:6,speedBoost:3,jumpBoost:3,manaRegen:4,timedRelease:2,phaseFork:5,resetProjectiles:0,forceJump:2,horizontalLaunch:2};

function calcSpellCost(spell){
	if(!spell||!spell.phases.length)return 0;
	let cost=5;
	for(const ph of spell.phases){
		cost+=(SHAPE_MANA[ph.shape]||0)+(BEH_MANA[ph.behavior]||0);
		cost+=ph.power*50+(ph.count-1)*4+(ph.width-1)*2+(ph.height-1)*2;
		if(ph.shape==='chain'&&ph.chainStunTime>0)cost+=ph.chainStunTime*25;
		for(const fx of ph.effects)cost+=(FX_MANA[fx]||0);
	}
	cost*=(0.6+spell.phases.length*0.4);
	return Math.round(cost);
}
function calcSpellCtrl(spell){
	if(!spell||!spell.phases.length)return 0;
	let req=0;
	for(const ph of spell.phases){
		req=Math.max(req,SHAPE_CTRL[ph.shape]||0,BEH_CTRL[ph.behavior]||0);
		for(const fx of ph.effects)req=Math.max(req,FX_CTRL[fx]||0);
	}
	req+=(spell.phases.length-1)*3;
	return req;
}

/* =============================================================
   TILEMAP GENERATION
   ============================================================= */
const WORLD_W = dungeon.worldW;
const WORLD_H = dungeon.worldH;
const MAP_COLS = Math.ceil(WORLD_W / TILE);
const MAP_ROWS = Math.ceil(WORLD_H / TILE);

// 0 = solid wall, 1 = air
const tileMap = [];
for(let r=0;r<MAP_ROWS;r++) tileMap[r] = new Uint8Array(MAP_COLS);

for(const c of dungeon.corridors){
	const sc = Math.floor(c.x / TILE);
	const ec = Math.ceil((c.x + c.w) / TILE);
	const sr = Math.floor(c.y / TILE);
	const er = Math.ceil((c.y + c.h) / TILE);
	for(let r = sr; r < er && r < MAP_ROWS; r++)
		for(let col = sc; col < ec && col < MAP_COLS; col++)
			if(r >= 0 && col >= 0) tileMap[r][col] = 1;
}

function isSolid(col, row){
	if(row < 0 || row >= MAP_ROWS || col < 0 || col >= MAP_COLS) return true;
	return tileMap[row][col] === 0;
}

// Precompute tile edge flags for rendering (is there air adjacent?)
const tileEdges = [];
for(let r=0;r<MAP_ROWS;r++){
	tileEdges[r] = [];
	for(let c=0;c<MAP_COLS;c++){
		if(tileMap[r][c]===0){
			tileEdges[r][c] = {
				airTop: r>0 && tileMap[r-1][c]===1,
				airBot: r<MAP_ROWS-1 && tileMap[r+1][c]===1,
				airLeft: c>0 && tileMap[r][c-1]===1,
				airRight: c<MAP_COLS-1 && tileMap[r][c+1]===1,
			};
		} else {
			tileEdges[r][c] = null;
		}
	}
}

		if(sp){
			const cost = calcSpellCost(sp);
			const req = calcSpellCtrl(sp);
			const usable = stats.magicControl >= req;
			const color = sp.phases[0]?.color || '#888';
			let cdHtml = '';
			if(spellCooldowns[i] > 0){
				const pct = (spellCooldowns[i] / spellMaxCooldowns[i]) * 100;
				cdHtml = `<div class="hb-cd-overlay" style="height:${pct}%"></div>`;
			}
			const costLabel = isUlt ? `${cost*10}⚡` : `${cost}💧`;
			el.innerHTML = `<span class="hb-key">${keyLabel}</span>
				<div class="hb-dot" style="background:${usable?color:'#555'}"></div>
				<div class="hb-name" style="${usable?'':'color:#666;text-decoration:line-through'}">${sp.name}</div>
				<div class="hb-mana" style="${isUlt?'color:#ffaa00':''}">${costLabel}</div>${cdHtml}`;
		} else {
			el.innerHTML = `<span class="hb-key">${keyLabel}</span><div class="hb-name" style="color:#555">—</div>`;
		}
		bar.appendChild(el);
	}
}

/* =============================================================
   COLLISION HELPERS
   ============================================================= */
function rectRect(a, b){
	return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}
function circRect(cx,cy,cr,rx,ry,rw,rh){
	const nx=Math.max(rx,Math.min(cx,rx+rw));
	const ny=Math.max(ry,Math.min(cy,ry+rh));
	return(cx-nx)**2+(cy-ny)**2<=cr*cr;
}
function dist(x1,y1,x2,y2){return Math.sqrt((x2-x1)**2+(y2-y1)**2);}

/* Tilemap collision for an entity */
function moveEntityTile(ent){
	// Horizontal
	ent.x += ent.vx;
	const left = Math.floor(ent.x / TILE);
	const right = Math.floor((ent.x + ent.w - 0.1) / TILE);
	const top = Math.floor(ent.y / TILE);
	const bottom = Math.floor((ent.y + ent.h - 0.1) / TILE);
	for(let r = top; r <= bottom; r++){
		for(let c = left; c <= right; c++){
			if(isSolid(c, r)){
				if(ent.vx > 0) ent.x = c * TILE - ent.w;
				else if(ent.vx < 0) ent.x = (c + 1) * TILE;
				ent.vx = 0;
			}
		}
	}
	// Vertical
	ent.y += ent.vy;
	const left2 = Math.floor(ent.x / TILE);
	const right2 = Math.floor((ent.x + ent.w - 0.1) / TILE);
	const top2 = Math.floor(ent.y / TILE);
	const bottom2 = Math.floor((ent.y + ent.h - 0.1) / TILE);
	ent.onGround = false;
	for(let r = top2; r <= bottom2; r++){
		for(let c = left2; c <= right2; c++){
			if(isSolid(c, r)){
				if(ent.vy > 0){ ent.y = r * TILE - ent.h; ent.onGround = true; }
				else if(ent.vy < 0) ent.y = (r + 1) * TILE;
				ent.vy = 0;
			}
		}
	}
}

/* Check if there's a clear line of sight between two points (no solid tiles in the way) */
function hasLineOfSight(x1,y1,x2,y2){
	const dx=x2-x1, dy=y2-y1;
	const d=Math.sqrt(dx*dx+dy*dy);
	const steps=Math.ceil(d/TILE);
	for(let i=0;i<=steps;i++){
		const t=i/steps;
		const col=Math.floor((x1+dx*t)/TILE);
		const row=Math.floor((y1+dy*t)/TILE);
		if(isSolid(col,row)) return false;
	}
	return true;
}

/* =============================================================
   CAST PLAYER SPELLS (adapted from sandbox)
   ============================================================= */
function castSpell(){
	const spell=playerData.spells[activeSlot];
	if(!spell||!spell.phases.length)return;
	const controlDiscount=Math.max(0.3,1-stats.magicControl*0.015);
	const cost=Math.round(calcSpellCost(spell)*controlDiscount);
	const req=calcSpellCtrl(spell);
	const isUlt=(activeSlot===9&&spell.isUltimate);

	if(isUlt){
		// Ultimate: costs totalMana instead of regular mana
		const ultCost=cost*10;
		if(stats.magicControl<req||totalMana<ultCost||spellCooldowns[activeSlot]>0)return;
		totalMana-=ultCost;
		updateTotalManaHUD();
		const cd=60+spell.phases.length*15;
		spellCooldowns[activeSlot]=cd; spellMaxCooldowns[activeSlot]=cd;
		player.castTimer=20; player.castColor=spell.phases[0]?.color||'#ffaa00';
		// ultimate effects multiplier flag
		const castId=nextCastId++;spellHitCounts[castId]=0;
		spawnPhase(spell,0,player.x+player.w/2,player.y+player.h/2-6,player.facing,1,true,castId);
	} else {
		if(stats.magicControl<req||mana<cost||spellCooldowns[activeSlot]>0)return;
		mana-=cost;
		// accumulate total mana from normal spell casts
		totalMana+=cost;
		updateTotalManaHUD();
		const cd=30+spell.phases.length*10;
		spellCooldowns[activeSlot]=cd; spellMaxCooldowns[activeSlot]=cd;
		player.castTimer=12; player.castColor=spell.phases[0]?.color||'#4488ff';
		const castId=nextCastId++;spellHitCounts[castId]=0;
		spawnPhase(spell,0,player.x+player.w/2,player.y+player.h/2-6,player.facing,undefined,undefined,castId);
	}
}

function spawnPhase(spell,phaseIdx,originX,originY,facing,dmgMult,isUltimate,castId){
	if(phaseIdx>=spell.phases.length)return;
	let totalProj=1;
	for(const p of spell.phases)totalProj*=(p.behavior==='aroundSelf'?(p.aroundSelfCount||4):(p.count||1));
	if(totalProj>1000)return;
	const ph=spell.phases[phaseIdx];
	const count=ph.behavior==='aroundSelf'?(ph.aroundSelfCount||4):(ph.count||1);
	const baseAngle=facing===1?0:Math.PI;
	const powerMult=dmgMult||1;
	const selfBehaviors=['underfoot','selfCast','aroundSelf','stationary'];
	const selfPowerBonus=ph.behavior==='stationary'?2.0:selfBehaviors.includes(ph.behavior)?1.0:0;
	const ultFlag=!!(isUltimate||spell.isUltimate);

	for(let i=0;i<count;i++){
		let spreadAngle=0;
		if(count>1){const sr=(ph.spread||0)*Math.PI/180;spreadAngle=((i/(count-1))-0.5)*sr;}
		const angle=baseAngle+spreadAngle;
		const spd=(ph.speed||1)*7;
		const proj={
			spell,phaseIdx,phase:ph,
			x:originX+facing*16,y:originY,
			vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,
			facing,age:0,maxAge:(ph.duration||1)*FPS,
			width:(ph.width||1)*10,height:(ph.height||1)*10,
			power:((ph.power||1)/count+0.05+selfPowerBonus)*(1+stats.magicPower*0.08)*powerMult,
			color:ph.color||'#4488ff',trail:ph.trail||'none',
			shape:ph.shape||'missile',behavior:ph.behavior||'straight',
			effects:ph.effects||[],trailParts:[],
			orbitAngle:i*(Math.PI*2/count),orbitRadius:(ph.orbitRadius||80),
			orbitSpeed:(ph.orbitSpeed||3),orbitDur:(ph.orbitDuration||1.5)*FPS,
			orbitOriginX:originX,orbitOriginY:originY,
			startX:originX+facing*16,startY:originY,
			beamLen:0,beamAngle:angle,
			chainHits:0,chainMax:3,hasHit:false,phaseTriggered:false,
			hitTargets:new Set(),
			timedReleaseDelay:(ph.timedReleaseDelay||0.5)*FPS,timedReleaseTriggered:false,
			phaseForkDelay:(ph.phaseForkDelay||1)*FPS,phaseForkRepeats:ph.phaseForkRepeats||1,
			phaseForkCount:0,phaseForkNextAge:(ph.phaseForkDelay||1)*FPS,
			isSolidPlatform:false,
			isUltimate:ultFlag,
			castId:castId!=null?castId:-1,
		};
		if(ph.shape==='solidify'){proj.isSolidPlatform=true;proj.vx=0;proj.vy=0;}
		if(ph.behavior==='rain'){const s2=200*(ph.width||1);proj.x=originX+(i-(count-1)/2)*(s2/Math.max(count-1,1));proj.y=originY-(ph.rainHeight||150);proj.vx=0;proj.vy=spd*0.8;proj.startX=proj.x;proj.startY=proj.y;proj.facing=1;proj.beamAngle=Math.PI/2;}
		if(ph.behavior==='barrage'){const s2=200*(ph.height||1);proj.x=originX+facing*120;proj.y=originY+(i-(count-1)/2)*(s2/Math.max(count-1,1));proj.vx=facing*spd*0.8;proj.vy=0;proj.startX=proj.x;proj.startY=proj.y;proj.beamAngle=facing===1?0:Math.PI;}
		if(ph.behavior==='stationary'){proj.vx=0;proj.vy=0;}
		if(ph.behavior==='groundSurge'){proj.vy=0;proj.vx=facing*spd;}
		if(ph.behavior==='underfoot'){proj.x=player.x+player.w/2;proj.y=player.y+player.h+4;proj.vx=0;proj.vy=0;}
		if(ph.behavior==='selfCast'){proj.x=player.x+player.w/2;proj.y=player.y+player.h/2;proj.vx=0;proj.vy=0;}
		if(ph.behavior==='aroundSelf'){const radius=ph.aroundSelfRadius||50;const sa=(i/count)*Math.PI*2;proj.x=player.x+player.w/2+Math.cos(sa)*radius;proj.y=player.y+player.h/2+Math.sin(sa)*radius;proj.vx=0;proj.vy=0;}
		projectiles.push(proj);
	}
}

function morphProjectile(proj,phaseIdx,dmgMult){
	const spell=proj.spell;
	if(phaseIdx>=spell.phases.length)return;
	const ph=spell.phases[phaseIdx];
	const count=ph.behavior==='aroundSelf'?(ph.aroundSelfCount||4):(ph.count||1);
	const powerMult=dmgMult||1;
	const selfBehaviors=['underfoot','selfCast','aroundSelf','stationary'];
	const selfPB=ph.behavior==='stationary'?2.0:selfBehaviors.includes(ph.behavior)?1.0:0;
	const spd=(ph.speed||1)*7;
	const ox=proj.x,oy=proj.y,of=proj.facing;
	function applyPh(p,si){
		const ba=of===1?0:Math.PI;let sa=0;
		if(count>1){const sr=(ph.spread||0)*Math.PI/180;sa=((si/(count-1))-0.5)*sr;}
		const angle=ba+sa;
		p.phaseIdx=phaseIdx;p.phase=ph;p.age=0;p.maxAge=(ph.duration||1)*FPS;
		p.width=(ph.width||1)*10;p.height=(ph.height||1)*10;
		p.power=((ph.power||1)/count+0.05+selfPB)*(1+stats.magicPower*0.08)*powerMult;
		p.color=ph.color||'#4488ff';p.trail=ph.trail||'none';
		p.shape=ph.shape||'missile';p.behavior=ph.behavior||'straight';
		p.effects=ph.effects||[];p.trailParts=[];p.hasHit=false;p.phaseTriggered=false;
		p.hitTargets=new Set();p.startX=ox;p.startY=oy;
		p.beamLen=0;p.beamAngle=angle;p.chainHits=0;p.chainMax=3;
		p.timedReleaseDelay=(ph.timedReleaseDelay||0.5)*FPS;p.timedReleaseTriggered=false;
		p.phaseForkDelay=(ph.phaseForkDelay||1)*FPS;p.phaseForkRepeats=ph.phaseForkRepeats||1;
		p.phaseForkCount=0;p.phaseForkNextAge=(ph.phaseForkDelay||1)*FPS;p.isSolidPlatform=false;
		p.isUltimate=proj.isUltimate||false;
		p.vx=Math.cos(angle)*spd;p.vy=Math.sin(angle)*spd;
		if(ph.shape==='solidify'){p.isSolidPlatform=true;p.vx=0;p.vy=0;}
		if(ph.behavior==='rain'){p.vx=0;p.vy=spd*0.8;p.startX=ox;p.startY=oy;p.beamAngle=Math.PI/2;}
		if(ph.behavior==='barrage'){const s2=200*(ph.height||1);p.x=ox+of*120;p.y=oy+(si-(count-1)/2)*(s2/Math.max(count-1,1));p.vx=of*spd*0.8;p.vy=0;p.startX=p.x;p.startY=p.y;p.beamAngle=of===1?0:Math.PI;}
		if(ph.behavior==='stationary'){p.vx=0;p.vy=0;}
		if(ph.behavior==='groundSurge'){p.vy=0;p.vx=of*spd;}
		if(ph.behavior==='underfoot'){p.x=ox;p.y=oy+4;p.vx=0;p.vy=0;}
		if(ph.behavior==='selfCast'){p.x=ox;p.y=oy;p.vx=0;p.vy=0;}
		if(ph.behavior==='aroundSelf'){const radius=ph.aroundSelfRadius||50;const sa2=(si/count)*Math.PI*2;p.x=ox+Math.cos(sa2)*radius;p.y=oy+Math.sin(sa2)*radius;p.vx=0;p.vy=0;}
		if(ph.behavior==='orbit'){p.orbitOriginX=ox;p.orbitOriginY=oy;p.orbitAngle=si*(Math.PI*2/count);p.orbitRadius=ph.orbitRadius||80;p.orbitSpeed=ph.orbitSpeed||3;p.orbitDur=(ph.orbitDuration||1.5)*FPS;}
	}
	applyPh(proj,0);
	for(let i=1;i<count;i++){
		const clone={spell,phaseIdx,phase:ph,x:ox,y:oy,facing:of,orbitAngle:0,orbitRadius:80,orbitSpeed:3,orbitDur:90,orbitOriginX:ox,orbitOriginY:oy,trailParts:[],castId:proj.castId!=null?proj.castId:-1};
		applyPh(clone,i);projectiles.push(clone);
	}
}

/* =============================================================
   UPDATE PLAYER PROJECTILES (hits enemies)
   ============================================================= */
function updateProjectiles(){
	for(let i=projectiles.length-1;i>=0;i--){
		const p=projectiles[i];
		p.age++;
		p.trailParts.push({x:p.x,y:p.y,age:0});
		if(p.trailParts.length>MAX_TRAIL)p.trailParts.shift();
		for(const tp of p.trailParts)tp.age++;

		/* behavior movement */
		switch(p.behavior){
			case'straight':break;
			case'lob':p.vy+=0.25;break;
			case'homing':{
				let cl=null,cd2=Infinity;
				for(const e of enemies){if(e.dead)continue;const dd=dist(p.x,p.y,e.x+e.w/2,e.y+e.h/2);if(dd<cd2){cd2=dd;cl=e;}}
				if(cl){
					if(p.shape==='beam'){const des=Math.atan2(cl.y+cl.h/2-p.startY,cl.x+cl.w/2-p.startX);let diff=des-p.beamAngle;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;p.beamAngle+=Math.min(0.08,Math.abs(diff))*Math.sign(diff);}
					else{const des=Math.atan2(cl.y+cl.h/2-p.y,cl.x+cl.w/2-p.x);const cur=Math.atan2(p.vy,p.vx);let diff=des-cur;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;const turn=Math.min(0.08,Math.abs(diff))*Math.sign(diff);const na=cur+turn;const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);p.vx=Math.cos(na)*spd;p.vy=Math.sin(na)*spd;}
				}break;
			}
			case'boomerang':{const prog=p.age/p.maxAge;if(prog>0.45){const dx2=p.startX-p.x,dy2=p.startY-p.y;const d2=Math.sqrt(dx2*dx2+dy2*dy2)||1;const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);p.vx=(dx2/d2)*spd*1.02;p.vy=(dy2/d2)*spd*1.02;}break;}
			case'groundSurge':p.vy+=0.6;{const fc=Math.floor(p.x/TILE);const fr=Math.floor((p.y+4)/TILE);if(isSolid(fc,fr)){p.y=fr*TILE-4;p.vy=-1.5;}}break;
			case'orbit':{
				if(p.age<p.orbitDur){p.orbitAngle+=p.orbitSpeed*0.05;p.orbitOriginX+=(player.x+player.w/2-p.orbitOriginX)*0.15;p.orbitOriginY+=(player.y+player.h/2-6-p.orbitOriginY)*0.15;p.x=p.orbitOriginX+Math.cos(p.orbitAngle)*p.orbitRadius;p.y=p.orbitOriginY+Math.sin(p.orbitAngle)*p.orbitRadius*0.6;p.vx=0;p.vy=0;
				}else if(p.age===Math.ceil(p.orbitDur)){let tgt=null,td=Infinity;for(const e of enemies){if(e.dead)continue;const dd=dist(p.x,p.y,e.x+e.w/2,e.y+e.h/2);if(dd<td){td=dd;tgt=e;}}const spd2=(p.phase.speed||1)*9;if(tgt){const ang2=Math.atan2(tgt.y+tgt.h/2-p.y,tgt.x+tgt.w/2-p.x);p.vx=Math.cos(ang2)*spd2;p.vy=Math.sin(ang2)*spd2;}else{p.vx=p.facing*spd2;p.vy=0;}}break;
			}
			case'spiral':{const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy)||(p.phase.speed||1)*7;const ba2=p.facing===1?0:Math.PI;const sa2=ba2+p.age*0.06;const out=0.3+p.age*0.008;p.vx=Math.cos(sa2)*spd*out;p.vy=Math.sin(sa2)*spd*out;break;}
			case'rain':case'barrage':if(p.shape==='cone'){p.vx=0;p.vy=0;p.x=p.startX;p.y=p.startY;}break;
			case'stationary':break;
			case'underfoot':break;
			case'selfCast':break;
			case'aroundSelf':break;
		}
		if(!(p.behavior==='orbit'&&p.age<p.orbitDur)){p.x+=p.vx;p.y+=p.vy;}
		if(p.shape==='beam'){p.beamLen=Math.min(p.beamLen+12,400*(p.phase.width||1));p.x=p.startX;p.y=p.startY;}
		if(PIERCE_SET.has(p.shape)&&p.age>0&&p.age%60===0)p.hitTargets.clear();

		/* hit enemies */
		const hitR=Math.max(p.width,p.height)*0.7;
		if((p.shape==='allyOrb'||p.behavior==='selfCast')&&!p.hasHit){
			if(circRect(p.x,p.y,hitR,player.x,player.y,player.w,player.h)){
				applyPlayerEffects(p);spawnImpact(p.x,p.y,p.color);p.hasHit=true;
				if(!p.phaseTriggered&&p.phase.nextTrigger==='onHit'&&p.phaseIdx+1<p.spell.phases.length){p.phaseTriggered=true;if(p.effects.includes('resetProjectiles'))spawnPhase(p.spell,p.phaseIdx+1,p.x,p.y,p.facing,undefined,p.isUltimate,p.castId);else morphProjectile(p,p.phaseIdx+1);}
			}
		}
		if(p.shape!=='allyOrb'&&p.behavior!=='selfCast')
		for(const en of enemies){
			if(en.dead)continue;
			if(p.hitTargets.has(en))continue;
			let hit=false;
			if(p.shape==='beam'){
				const bx0=p.startX,by0=p.startY;const endX=bx0+Math.cos(p.beamAngle)*p.beamLen;const endY=by0+Math.sin(p.beamAngle)*p.beamLen;
				const halfH=p.height/2;const steps=Math.max(3,Math.floor(p.beamLen/40));
				for(let s=0;s<=steps;s++){const t=s/steps;const sx=bx0+(endX-bx0)*t;const sy=by0+(endY-by0)*t;if(sx+halfH>en.x&&sx-halfH<en.x+en.w&&sy+halfH>en.y&&sy-halfH<en.y+en.h){hit=true;break;}}
			}else if(p.shape==='nova'||p.shape==='ring'){hit=circRect(p.x,p.y,(p.age/p.maxAge)*p.width*8,en.x,en.y,en.w,en.h);}
			else if(p.shape==='cone'){const cL=(p.age/p.maxAge)*200*(p.phase.width||1);const cH=cL*0.4*(p.phase.width||1);
				if(p.behavior==='rain'){const dx3=en.x+en.w/2-p.x,dy3=en.y+en.h/2-p.y;hit=dy3>0&&dy3<cL&&Math.abs(dx3)<cH*(dy3/cL);}
				else{const dx3=en.x+en.w/2-p.startX,dy3=en.y+en.h/2-p.startY;const along=p.facing===1?dx3:-dx3;hit=along>0&&along<cL&&Math.abs(dy3)<cH*(along/cL);}
			}
			else if(p.shape==='wall'){hit=rectRect({x:p.x-p.width,y:p.y-p.height*3,w:p.width*2,h:p.height*6},en);}
			else if(p.shape==='solidify'){const sw=p.width*3,sh=p.height*1.5;hit=rectRect({x:p.x-sw/2,y:p.y-sh/2,w:sw,h:sh},en);}
			else{hit=circRect(p.x,p.y,hitR,en.x,en.y,en.w,en.h);}

			if(hit){
				const homingMult=p.behavior==='homing'?0.5:1;
				const hitNum=(p.castId>=0&&spellHitCounts[p.castId]!=null)?spellHitCounts[p.castId]++:0;
				const dimMult=1/(1+hitNum*0.15);
				const beamMult=p.shape==='beam'?0.5:1;
				const baseDmg=p.power*8*homingMult*dimMult*beamMult;
				en.hp-=baseDmg;en.flash=8;
				dmgNumbers.push({x:en.x+en.w/2,y:en.y-10,text:Math.round(baseDmg)+'',age:0,color:p.color});
				applyEnemyHitEffects(p,en);
				if(p.shape==='chain'&&p.chainHits<p.chainMax){p.chainHits++;p.hitTargets.add(en);let next=null,nd=Infinity;for(const e2 of enemies){if(e2===en||e2.dead||p.hitTargets.has(e2))continue;const dd2=dist(p.x,p.y,e2.x+e2.w/2,e2.y+e2.h/2);if(dd2<nd&&dd2<500){nd=dd2;next=e2;}}if(next){const ang=Math.atan2(next.y+next.h/2-p.y,next.x+next.w/2-p.x);const spd3=Math.sqrt(p.vx*p.vx+p.vy*p.vy)||8;p.vx=Math.cos(ang)*spd3;p.vy=Math.sin(ang)*spd3;spawnImpact(p.x,p.y,p.color);continue;}}
				if(PIERCE_SET.has(p.shape)){p.hitTargets.add(en);continue;}
				p.hasHit=true;spawnImpact(p.x,p.y,p.color);
				if(!p.phaseTriggered&&p.phase.nextTrigger==='onHit'&&p.phaseIdx+1<p.spell.phases.length){p.phaseTriggered=true;if(p.effects.includes('resetProjectiles'))spawnPhase(p.spell,p.phaseIdx+1,p.x,p.y,p.facing,undefined,p.isUltimate,p.castId);else morphProjectile(p,p.phaseIdx+1);}
				break;
			}
		}

		/* wall collision */
		const skipWall=PIERCE_SET.has(p.shape)||p.behavior==='stationary'||p.behavior==='selfCast'||p.behavior==='underfoot'||p.behavior==='aroundSelf'||(p.behavior==='orbit'&&p.age<p.orbitDur);
		if(!skipWall&&!p.hasHit){
			const tc=Math.floor(p.x/TILE),tr2=Math.floor(p.y/TILE);
			if(isSolid(tc,tr2)){
				spawnImpact(p.x,p.y,p.color);p.hasHit=true;
				if(!p.phaseTriggered&&p.phase.nextTrigger==='onHit'&&p.phaseIdx+1<p.spell.phases.length){p.phaseTriggered=true;if(p.effects.includes('resetProjectiles'))spawnPhase(p.spell,p.phaseIdx+1,p.x,p.y,p.facing,undefined,p.isUltimate,p.castId);else morphProjectile(p,p.phaseIdx+1);}
			}
		}

		/* after delay trigger */
		if(!p.phaseTriggered&&p.phase.nextTrigger==='afterDelay'&&p.age>p.maxAge*0.6){
			p.phaseTriggered=true;
			if(p.phaseIdx+1<p.spell.phases.length){if(p.effects.includes('resetProjectiles')){spawnPhase(p.spell,p.phaseIdx+1,p.x,p.y,p.facing,undefined,p.isUltimate,p.castId);} else morphProjectile(p,p.phaseIdx+1);}
		}
		/* timed release */
		if(!p.timedReleaseTriggered&&p.effects.includes('timedRelease')&&p.age>=p.timedReleaseDelay){p.timedReleaseTriggered=true;applyPlayerEffects(p);spawnImpact(p.x,p.y,p.color);}
		/* phase fork */
		if(p.effects.includes('phaseFork')&&p.phaseIdx+1<p.spell.phases.length){
			if(p.phaseForkCount<p.phaseForkRepeats&&p.age>=p.phaseForkNextAge){p.phaseForkCount++;p.phaseForkNextAge=p.age+p.phaseForkDelay;const dm=1/(1+p.phaseForkCount*0.3);const ec2=calcSpellCost(p.spell)*0.15;if(mana>=ec2){mana-=ec2;spawnPhase(p.spell,p.phaseIdx+1,p.x,p.y,p.facing,dm,p.isUltimate,p.castId);spawnImpact(p.x,p.y,p.color);}}}

		/* expire */
		const shouldRemove=p.age>=p.maxAge||(p.hasHit&&!PIERCE_SET.has(p.shape));
		if(shouldRemove){
			if(!p.phaseTriggered&&p.phase.nextTrigger==='onExpire'&&p.phaseIdx+1<p.spell.phases.length){p.phaseTriggered=true;if(p.effects.includes('resetProjectiles')){spawnPhase(p.spell,p.phaseIdx+1,p.x,p.y,p.facing,undefined,p.isUltimate,p.castId);projectiles.splice(i,1);}else{morphProjectile(p,p.phaseIdx+1);}continue;}
			projectiles.splice(i,1);continue;
		}
		if(p.x<-100||p.x>WORLD_W+100||p.y<-600||p.y>WORLD_H+100)projectiles.splice(i,1);
	}
}

/* =============================================================
   UPDATE ENEMY PROJECTILES (hits player)
   ============================================================= */
function updateEnemyProjectiles(){
	for(let i=enemyProjectiles.length-1;i>=0;i--){
		const p=enemyProjectiles[i];
		p.age++;
		p.vy+=p.gravity;
		p.x+=p.vx;p.y+=p.vy;
		p.rotAngle+=p.rotSpeed;

		// Lingering projectiles (lava pools etc.)
		if(p.linger&&p.hasHit&&!p.lingerDone){
			p.lingerTimer++;
			p.vx=0;p.vy=0;
			// damage player if standing on the linger
			if(p.lingerTimer-p.lingerLastDmg>=p.lingerDmgInterval){
				if(circRect(p.x,p.y,p.width*1.5,player.x,player.y,player.w,player.h)&&player.iFrames<=0){
					damagePlayer(p.power*0.4,p.effects);
					p.lingerLastDmg=p.lingerTimer;
				}
			}
			if(p.lingerTimer>=p.lingerMax){enemyProjectiles.splice(i,1);}
			continue;
		}

		// AoE expanding ring
		if(p.aoe){
			p.aoeTimer++;
			const r=(p.aoeTimer/p.aoeMax)*p.aoeRadius;
			if(!p.hasHit&&circRect(p.x,p.y,r,player.x,player.y,player.w,player.h)&&player.iFrames<=0){
				damagePlayer(p.power,p.effects);p.hasHit=true;
			}
			if(p.aoeTimer>=p.aoeMax){enemyProjectiles.splice(i,1);}
			continue;
		}

		// Hit player
		if(!p.hasHit){
			const hr=Math.max(p.width,p.height)*0.6;
			if(circRect(p.x,p.y,hr,player.x,player.y,player.w,player.h)&&player.iFrames<=0){
				damagePlayer(p.power,p.effects);
				spawnImpact(p.x,p.y,p.color);
				if(p.linger){
					// Convert to lingering pool
					p.hasHit=true;p.vy=0;p.vx=0;
					// snap to nearest floor
					for(let row=Math.floor(p.y/TILE);row<MAP_ROWS;row++){
						if(isSolid(Math.floor(p.x/TILE),row)){p.y=row*TILE;break;}
					}
				} else if(!p.pierce){
					enemyProjectiles.splice(i,1);continue;
				} else {
					p.hasHit=false; // pierce resets
				}
			}
		}

		// Wall collision
		if(!p.hasHit&&!p.aoe){
			const tc=Math.floor(p.x/TILE),tr3=Math.floor(p.y/TILE);
			if(isSolid(tc,tr3)){
				if(p.linger){
					p.hasHit=true;p.vx=0;p.vy=0;
					// snap to floor
					p.y=tr3*TILE;
				} else {
					spawnImpact(p.x,p.y,p.color);
					enemyProjectiles.splice(i,1);continue;
				}
			}
		}

		// Out of bounds or expired
		if(p.age>=p.maxAge||p.x<-100||p.x>WORLD_W+100||p.y<-200||p.y>WORLD_H+100){
			enemyProjectiles.splice(i,1);
		}
	}
}

/* =============================================================
   DAMAGE PLAYER
   ============================================================= */
function damagePlayer(amount,effects){
	const defReduction = 1 - (stats.magicDefence * 0.015);
	const dmg = amount * Math.max(0.2, defReduction);
	health -= dmg;
	player.iFrames = 30;
	player.flash = 10;
	dmgNumbers.push({x:player.x+player.w/2,y:player.y-20,text:'-'+Math.round(dmg),age:0,color:'#ff4444'});

	if(effects){
		for(const fx of effects){
			switch(fx){
				case 'burn':
					player.dots.push({type:'burn',dmg:amount*0.2,ticks:4,interval:20,timer:0,color:'#ff6a00'});
					break;
				case 'freeze':
					player.slowTimer=Math.max(player.slowTimer,90);
					break;
				case 'poison':
					player.dots.push({type:'poison',dmg:amount*0.15,ticks:5,interval:25,timer:0,color:'#44dd44'});
					break;
				case 'horizontalLaunch':
					// Launch player horizontally based on projectile direction
					player.vx = (player.x+player.w/2 < WORLD_W/2 ? 1 : -1) * amount * 1.5;
					dmgNumbers.push({x:player.x+player.w/2,y:player.y-30,text:'LAUNCHED!',age:0,color:'#ff8800'});
					break;
				case 'stun':
					player.stunTimer=Math.max(player.stunTimer,45);
					break;
			}
		}
	}

	if(health<=0){
		health=0;
		respawnPlayer();
	}
	updateHealthHUD();
}

function respawnPlayer(){
	setTimeout(()=>{
		health=maxHealth;
		mana=maxMana;
		player.x=dungeon.playerStart.x;
		player.y=dungeon.playerStart.y;
		player.vx=0;player.vy=0;
		player.dots=[];player.slowTimer=0;player.stunTimer=0;
		player.iFrames=60;
		updateHealthHUD();updateManaHUD();
		dmgNumbers.push({x:player.x+player.w/2,y:player.y-20,text:'Respawned!',age:0,color:'#ffcc00'});
	},500);
}

/* =============================================================
   APPLY EFFECTS (player spell effects on self / ally orb)
   ============================================================= */
function applyPlayerEffects(proj){
	const ultMult=proj.isUltimate?3:1;
	const ePow=proj.phase.effectPower||1;
	const eDur=proj.phase.effectDuration||1;
	for(const fx of proj.effects){
		switch(fx){
			case'healSelf':health=Math.min(maxHealth,health+proj.power*5*ePow*ultMult);updateHealthHUD();dmgNumbers.push({x:player.x+player.w/2,y:player.y-10,text:'+'+Math.round(proj.power*5*ePow*ultMult),age:0,color:'#44ff88'});break;
			case'shield':dmgNumbers.push({x:player.x+player.w/2,y:player.y-20,text:proj.isUltimate?'⚡🛡️ MEGA Shield!':'🛡️ Shield',age:0,color:'#88bbff'});break;
			case'lifesteal':mana=Math.min(maxMana,mana+proj.power*3*ePow*ultMult);dmgNumbers.push({x:player.x+player.w/2,y:player.y-10,text:'+'+Math.round(proj.power*3*ePow*ultMult)+'💧',age:0,color:'#bb44ff'});break;
			case'speedBoost':playerBuffs.speedTimer=Math.round(300*eDur*ultMult);playerBuffs.speedMult=proj.isUltimate?2.5:1.8;dmgNumbers.push({x:player.x+player.w/2,y:player.y-10,text:'🏃 Speed!',age:0,color:'#ffcc00'});break;
			case'jumpBoost':playerBuffs.jumpTimer=Math.round(300*eDur*ultMult);playerBuffs.jumpMult=proj.isUltimate?2.0:1.5;dmgNumbers.push({x:player.x+player.w/2,y:player.y-20,text:'⬆️ Jump!',age:0,color:'#66ff66'});break;
			case'manaRegen':playerBuffs.manaRegenTimer=Math.round(300*eDur*ultMult);playerBuffs.manaRegenMult=proj.isUltimate?6:3;dmgNumbers.push({x:player.x+player.w/2,y:player.y-10,text:'💧 Regen!',age:0,color:'#66ccff'});break;
			case'forceJump':player.vy=player.jumpPow*(playerBuffs.jumpTimer>0?playerBuffs.jumpMult:1)*(proj.isUltimate?1.5:1);player.onGround=false;break;
			case'horizontalLaunch':player.launchVx=proj.facing*proj.power*12*ePow*(proj.isUltimate?2:1);dmgNumbers.push({x:player.x+player.w/2,y:player.y-10,text:'🚀 Launched!',age:0,color:'#ff8800'});break;
		}
	}
}

/* Apply hit effects on enemy (from player spells) */
function applyEnemyHitEffects(proj,en){
	const ultMult=proj.isUltimate?3:1;
	const ePow=proj.phase.effectPower||1;
	const eDur=proj.phase.effectDuration||1;
	for(const fx of proj.effects){
		switch(fx){
			case'burn':en.dots.push({type:'burn',dmg:proj.power*0.3*ePow*ultMult,ticks:Math.round(5*eDur*ultMult),interval:20,timer:0,color:'#ff6a00'});break;
			case'poison':en.dots.push({type:'poison',dmg:proj.power*0.2*ePow*ultMult,ticks:Math.round(6*eDur*ultMult),interval:25,timer:0,color:'#44dd44'});break;
			case'freeze':en.slowTimer=Math.max(en.slowTimer,Math.round(90*eDur*ultMult));en.flash=15;break;
			case'knockback':en.x+=proj.facing*40*ePow*ultMult;break;
			case'pull':{const dx2=player.x+player.w/2-(en.x+en.w/2);const dy2=player.y+player.h/2-(en.y+en.h/2);const d2=Math.sqrt(dx2*dx2+dy2*dy2)||1;en.x+=dx2/d2*50*ePow*ultMult;en.y+=dy2/d2*30*ePow*ultMult;break;}
			case'stun':en.stunTimer=Math.max(en.stunTimer,Math.round(60*eDur*ultMult));break;
			case'horizontalLaunch':en.vx=proj.facing*(proj.power*12*ePow*ultMult);dmgNumbers.push({x:en.x+en.w/2,y:en.y-10,text:proj.isUltimate?'⚡ MEGA LAUNCH!':'LAUNCHED!',age:0,color:'#ff8800'});break;
			case'forceJump':en.y-=60*ePow*ultMult;dmgNumbers.push({x:en.x+en.w/2,y:en.y-10,text:'🚀 Launched!',age:0,color:'#ff8800'});break;
		}
	}
}

/* =============================================================
   PARTICLES / IMPACT
   ============================================================= */
function hexToRgb(hex){return{r:parseInt(hex.slice(1,3),16)||100,g:parseInt(hex.slice(3,5),16)||150,b:parseInt(hex.slice(5,7),16)||255};}
function spawnImpact(x,y,color){
	if(particles.length>MAX_PARTICLES)return;
	const rgb=hexToRgb(color);
	const count=particles.length>MAX_PARTICLES*0.7?4:8;
	for(let i=0;i<count;i++){
		const ang=Math.random()*Math.PI*2;const spd=1.5+Math.random()*3.5;
		particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:18+Math.random()*12|0,maxLife:30,r:2+Math.random()*2.5,color:rgb});
	}
}

/* Ambient ember/snow/dust particles */
const ambientParticles = [];
function spawnAmbientParticle(dec){
	if(ambientParticles.length>200)return;
	const px=dec.x+(Math.random()-0.5)*dec.area;
	const py=dec.y+(Math.random()-0.5)*dec.area*0.5;
	const col=Math.floor(px/TILE),row=Math.floor(py/TILE);
	if(isSolid(col,row))return;
	let color,vy2,life;
	if(dec.type==='embers'){color={r:255,g:100+Math.random()*80,b:20};vy2=-0.3-Math.random()*0.5;life=60+Math.random()*40;}
	else{color={r:200,g:220,b:255};vy2=0.2+Math.random()*0.3;life=80+Math.random()*40;}
	ambientParticles.push({x:px,y:py,vx:(Math.random()-0.5)*0.3,vy:vy2,life:life|0,maxLife:life|0,r:1.5+Math.random(),color});
}

/* =============================================================
   UPDATE ENEMIES
   ============================================================= */
function updateEnemies(){
	for(const en of enemies){
		if(en.dead){en.deathTimer++;continue;}

		en.animTimer++;
		if(en.flash>0)en.flash--;
		if(en.stunTimer>0)en.stunTimer--;
		if(en.slowTimer>0)en.slowTimer--;

		// DoTs
		for(let di=en.dots.length-1;di>=0;di--){
			const dot=en.dots[di];dot.timer++;
			if(dot.timer>=dot.interval){dot.timer=0;en.hp-=dot.dmg;en.flash=4;
				dmgNumbers.push({x:en.x+en.w/2,y:en.y-10,text:Math.round(dot.dmg)+'',age:0,color:dot.color});
				dot.ticks--;if(dot.ticks<=0)en.dots.splice(di,1);}
		}

		// Death check
		if(en.hp<=0){en.dead=true;en.deathTimer=0;
			spawnImpact(en.x+en.w/2,en.y+en.h/2,en.typeDef.color);
			dmgNumbers.push({x:en.x+en.w/2,y:en.y-10,text:'Defeated!',age:0,color:'#ffcc00'});
			continue;
		}

		if(en.stunTimer>0)continue;

		// Charging movement
		if(en.charging){
			en.chargeTimer--;
			en.vx=en.chargeVx;
			en.vy=en.chargeVy;
			if(!en.typeDef.flies)en.vy+=GRAVITY;
			moveEntityTile(en);
			// Imp charge: throw fire swords during charge
			if(en.type==='imp'&&!en.chargeCastDone&&en.chargeTimer<25){
				en.chargeCastDone=true;
				for(let si=0;si<3;si++){
					const sa=-0.4+si*0.4;
					const spd=5;
					spawnEnemyProj(en.x+en.w/2,en.y+en.h/2,Math.cos(sa)*spd*en.facing,Math.sin(sa)*spd-1,{
						color:'#dd2222',color2:'#ff6644',power:8,width:10,height:10,
						shape:'sword',effects:['horizontalLaunch'],trail:'flame',rotSpeed:0.25,maxAge:160,
					});
				}
			}
			// Serpent strike: contact damage
			if(en.type==='flameSerpent'&&!en.chargeCastDone){
				if(rectRect(en,player)&&player.iFrames<=0){
					damagePlayer(15,[]);en.chargeCastDone=true;
				}
			}
			// Fire sprite dash: leave trail
			if(en.type==='fireSprite'&&en.chargeTimer%3===0){
				spawnEnemyProj(en.x+en.w/2,en.y+en.h/2,0,0,{
					color:'#ffaa00',color2:'#ffee44',power:4,width:10,height:10,
					shape:'circle',maxAge:40,
				});
			}
			if(en.chargeTimer<=0){en.charging=false;en.vx=0;}
			continue;
		}

		// Distance to player
		const dx=player.x+player.w/2-(en.x+en.w/2);
		const dy=player.y+player.h/2-(en.y+en.h/2);
		const playerDist=Math.sqrt(dx*dx+dy*dy);
		const canSee=playerDist<en.typeDef.detectRange&&hasLineOfSight(en.x+en.w/2,en.y+en.h/2,player.x+player.w/2,player.y+player.h/2);

		// Face player
		if(canSee) en.facing = dx > 0 ? 1 : -1;

		// Flying enemy hover
		if(en.typeDef.flies){
			en.flyOffset = Math.sin(en.animTimer * 0.04) * 15;
			en.y = en.baseY + en.flyOffset;
		}

		// Speed modifier
		const spdMult = en.slowTimer > 0 ? 0.4 : 1;

		// State machine
		if(canSee){
			en.state = 'alert';
			en.alertTimer = 180;

			// Spell casting
			const spells = en.typeDef.spells;
			for(let si=0;si<spells.length;si++){
				if(en.spellCooldowns[si]>0){en.spellCooldowns[si]--;continue;}
				const sp=spells[si];
				if(playerDist<=sp.range){
					// Cast this spell
					const fn=CAST_FNS[sp.castFn];
					if(fn) fn(en);
					en.spellCooldowns[si]=sp.cooldown;
					// Rotate to next spell
					en.currentSpell=(si+1)%spells.length;
					break;
				}
			}

			// Move toward player (but keep some distance for ranged enemies)
			const preferredDist = en.typeDef.detectRange * 0.5;
			if(playerDist > preferredDist + 30){
				en.vx = (dx > 0 ? 1 : -1) * en.typeDef.moveSpeed * spdMult;
			} else if(playerDist < preferredDist - 30){
				en.vx = (dx > 0 ? -1 : 1) * en.typeDef.moveSpeed * spdMult * 0.5;
			} else {
				en.vx = 0;
			}
		} else {
			if(en.alertTimer>0){en.alertTimer--;en.state='alert';}
			else en.state='patrol';

			// Patrol
			if(en.state==='patrol'&&en.patrol){
				en.vx = en.patrolDir * en.typeDef.moveSpeed * 0.5 * spdMult;
				if(en.x <= en.patrol[0]) en.patrolDir = 1;
				else if(en.x + en.w >= en.patrol[1]) en.patrolDir = -1;
				en.facing = en.patrolDir;
			} else {
				en.vx *= 0.9;
			}
		}

		// Apply gravity + movement for non-flying enemies
		if(!en.typeDef.flies){
			en.vy += GRAVITY;
			if(en.vy > 18) en.vy = 18;
		} else {
			en.vy = 0;
		}
		moveEntityTile(en);

		// Cooldown tick (for spells not yet checked)
		for(let si=0;si<en.spellCooldowns.length;si++){
			if(en.spellCooldowns[si]>0&&!canSee) en.spellCooldowns[si]--;
		}
	}
}

/* =============================================================
   MAIN UPDATE
   ============================================================= */
let castPressed = false;
function update(){
	/* Player stunned */
	if(player.stunTimer>0){player.stunTimer--;player.vx*=0.5;}

	/* Player movement */
	if(player.stunTimer<=0){
		let mx=0;
		if(keys['a']||keys['arrowleft'])mx-=1;
		if(keys['d']||keys['arrowright'])mx+=1;
		if(mx!==0)player.facing=mx;
		const spdM=player.slowTimer>0?0.5:1;
		const currentSpeed=player.speed*(playerBuffs.speedTimer>0?playerBuffs.speedMult:1)*spdM;
		player.vx=mx*currentSpeed;
		if(player.launchVx){player.vx+=player.launchVx;player.launchVx*=0.88;if(Math.abs(player.launchVx)<0.5)player.launchVx=0;}
		if((keys['w']||keys['arrowup']||keys[' '])&&player.onGround){
			const currentJump=player.jumpPow*(playerBuffs.jumpTimer>0?playerBuffs.jumpMult:1);
			player.vy=currentJump;player.onGround=false;
		}
	}
	player.vy+=GRAVITY;
	if(player.vy>18)player.vy=18;
	moveEntityTile(player);

	/* Solidify platform & spell wall collision */
	for(const p of projectiles){
		if(!p.isSolidPlatform) continue;
		const sw2=p.width*3, sh2=p.height*1.5;
		const platBox={x:p.x-sw2/2, y:p.y-sh2/2, w:sw2, h:sh2};
		if(rectRect(player, platBox)){
			const oL=(player.x+player.w)-platBox.x, oR=(platBox.x+platBox.w)-player.x;
			const oT=(player.y+player.h)-platBox.y, oB=(platBox.y+platBox.h)-player.y;
			const m=Math.min(oL,oR,oT,oB);
			if(m===oT){player.y=platBox.y-player.h;player.vy=0;player.onGround=true;}
			else if(m===oB){player.y=platBox.y+platBox.h;player.vy=0;}
			else if(m===oL){player.x=platBox.x-player.w;player.vx=0;}
			else{player.x=platBox.x+platBox.w;player.vx=0;}
		}
	}
	for(const sw of spellWalls){
		if(rectRect(player, sw)){
			const oL=(player.x+player.w)-sw.x, oR=(sw.x+sw.w)-player.x;
			const oT=(player.y+player.h)-sw.y, oB=(sw.y+sw.h)-player.y;
			const m=Math.min(oL,oR,oT,oB);
			if(m===oT){player.y=sw.y-player.h;player.vy=0;player.onGround=true;}
			else if(m===oB){player.y=sw.y+sw.h;player.vy=0;}
			else if(m===oL){player.x=sw.x-player.w;player.vx=0;}
			else{player.x=sw.x+sw.w;player.vx=0;}
		}
	}

	/* Casting */
	const wantCast=keys['x']||mouseDown;
	if(wantCast&&!castPressed){castPressed=true;castSpell();}
	if(!wantCast)castPressed=false;
	if(player.castTimer>0)player.castTimer--;
	if(player.iFrames>0)player.iFrames--;
	if(player.slowTimer>0)player.slowTimer--;
	if(player.flash>0)player.flash--;

	/* Cooldowns */
	let anyCDChanged=false;
	for(let i=0;i<10;i++){if(spellCooldowns[i]>0){spellCooldowns[i]--;anyCDChanged=true;}}
	if(anyCDChanged)renderHotbar();

	/* Mana regen */
	const curRegen=baseManaRegen*(playerBuffs.manaRegenTimer>0?playerBuffs.manaRegenMult:1);
	mana=Math.min(maxMana,mana+curRegen);
	updateManaHUD();

	/* Player DoTs */
	for(let di=player.dots.length-1;di>=0;di--){
		const dot=player.dots[di];dot.timer++;
		if(dot.timer>=dot.interval){dot.timer=0;
			health-=dot.dmg;
			dmgNumbers.push({x:player.x+player.w/2,y:player.y-10,text:'-'+Math.round(dot.dmg),age:0,color:dot.color});
			dot.ticks--;if(dot.ticks<=0)player.dots.splice(di,1);
			if(health<=0){health=0;respawnPlayer();}
			updateHealthHUD();
		}
	}

	/* Player buffs */
	if(playerBuffs.speedTimer>0)playerBuffs.speedTimer--;
	if(playerBuffs.jumpTimer>0)playerBuffs.jumpTimer--;
	if(playerBuffs.manaRegenTimer>0)playerBuffs.manaRegenTimer--;

	/* Projectiles */
	updateProjectiles();
	updateEnemyProjectiles();

	/* Enemies */
	updateEnemies();

	/* Particles */
	for(let i=particles.length-1;i>=0;i--){
		const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.vx*=0.97;p.life--;
		if(p.life<=0)particles.splice(i,1);
	}
	for(let i=ambientParticles.length-1;i>=0;i--){
		const p=ambientParticles[i];p.x+=p.vx;p.y+=p.vy;p.life--;
		if(p.life<=0)ambientParticles.splice(i,1);
	}
	// Spawn ambient particles from decorations
	for(const dec of dungeon.decorations){
		if((dec.type==='embers'||dec.type==='snowfall')&&Math.random()<0.08){
			spawnAmbientParticle(dec);
		}
	}

	/* Dmg numbers */
	for(let i=dmgNumbers.length-1;i>=0;i--){
		dmgNumbers[i].age++;dmgNumbers[i].y-=0.8;
		if(dmgNumbers[i].age>60)dmgNumbers.splice(i,1);
	}

	/* Spell walls */
	for(let i=spellWalls.length-1;i>=0;i--){spellWalls[i].timer--;if(spellWalls[i].timer<=0)spellWalls.splice(i,1);}

	updateCamera();
}

/* =============================================================
   RENDER
   ============================================================= */
function render(){
	ctx.clearRect(0,0,canvas.width,canvas.height);

	/* Background fill */
	ctx.fillStyle=dungeon.bgColor;
	ctx.fillRect(0,0,canvas.width,canvas.height);

	/* Render tilemap (only visible tiles) */
	const startCol=Math.max(0,Math.floor(camera.x/TILE));
	const endCol=Math.min(MAP_COLS-1,Math.ceil((camera.x+canvas.width)/TILE));
	const startRow=Math.max(0,Math.floor(camera.y/TILE));
	const endRow=Math.min(MAP_ROWS-1,Math.ceil((camera.y+canvas.height)/TILE));

	for(let r=startRow;r<=endRow;r++){
		for(let c=startCol;c<=endCol;c++){
			const sx=c*TILE-camera.x;
			const sy=r*TILE-camera.y;
			if(tileMap[r][c]===0){
				// Solid tile (wall)
				// Base color with slight variation
				const hash = (r * 73 + c * 137) % 20;
				ctx.fillStyle = hash < 14 ? dungeon.wallColor : dungeon.wallColor2;
				ctx.fillRect(sx,sy,TILE,TILE);

				// Edge highlights
				const edges = tileEdges[r][c];
				if(edges){
					ctx.fillStyle = dungeon.wallEdge;
					if(edges.airTop) ctx.fillRect(sx,sy,TILE,3);
					if(edges.airBot) ctx.fillRect(sx,sy+TILE-3,TILE,3);
					if(edges.airLeft) ctx.fillRect(sx,sy,3,TILE);
					if(edges.airRight) ctx.fillRect(sx+TILE-3,sy,3,TILE);

					// Inner floor highlight (top of floor)
					if(edges.airTop){
						ctx.fillStyle=dungeon.floorHighlight;
						ctx.globalAlpha=0.3;
						ctx.fillRect(sx,sy,TILE,6);
						ctx.globalAlpha=1;
					}
					// Ceiling shadow
					if(edges.airBot){
						ctx.fillStyle=dungeon.ceilShadow;
						ctx.globalAlpha=0.4;
						ctx.fillRect(sx,sy+TILE-6,TILE,6);
						ctx.globalAlpha=1;
					}
				}
			} else {
				// Air tile — dungeon air color
				ctx.fillStyle = dungeon.airColor;
				ctx.fillRect(sx,sy,TILE,TILE);
			}
		}
	}

	/* Render decorations */
	renderDecorations();

	/* Render enemies */
	for(const en of enemies){
		if(en.dead){
			if(en.deathTimer<60){
				const alpha=1-en.deathTimer/60;
				ctx.globalAlpha=alpha;
				drawEnemy(en);
				ctx.globalAlpha=1;
			}
			continue;
		}
		drawEnemy(en);
	}

	/* Player projectiles */
	for(const p of projectiles){
		const px=p.x-camera.x,py=p.y-camera.y;
		const progress=p.age/p.maxAge;
		if(px<-500||px>canvas.width+500||py<-500||py>canvas.height+500)continue;
		drawTrail(p);
		if(projectiles.length<100){
			ctx.save();ctx.globalAlpha=0.25+0.2*(1-progress);
			const glow=ctx.createRadialGradient(px,py,0,px,py,p.width*3);
			glow.addColorStop(0,p.color);glow.addColorStop(1,'transparent');
			ctx.fillStyle=glow;ctx.beginPath();ctx.arc(px,py,p.width*3,0,Math.PI*2);ctx.fill();
			ctx.restore();
		}
		ctx.fillStyle=p.color;ctx.strokeStyle=p.color;ctx.globalAlpha=0.9;
		switch(p.shape){
			case'allyOrb':{const r2=p.width*1.3;ctx.fillStyle='#44ff88';ctx.beginPath();ctx.arc(px,py,r2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#aaffcc';ctx.globalAlpha=0.6;ctx.beginPath();ctx.arc(px,py,r2*0.5,0,Math.PI*2);ctx.fill();break;}
			case'missile':case'orb':{const r2=p.shape==='orb'?p.width*1.3:p.width*0.7;ctx.beginPath();ctx.arc(px,py,r2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.globalAlpha=0.6;ctx.beginPath();ctx.arc(px,py,r2*0.4,0,Math.PI*2);ctx.fill();break;}
			case'blade':{ctx.save();ctx.translate(px,py);ctx.rotate(p.age*0.3);ctx.fillRect(-p.width*1.8,-p.height*0.3,p.width*3.6,p.height*0.6);ctx.restore();break;}
			case'beam':{const bx=p.startX-camera.x,by=p.startY-camera.y;ctx.save();ctx.translate(bx,by);ctx.rotate(p.beamAngle);ctx.globalAlpha=0.7;ctx.fillRect(0,-p.height/2,p.beamLen,p.height);ctx.fillStyle='#fff';ctx.globalAlpha=0.5;ctx.fillRect(0,-p.height*0.15,p.beamLen,p.height*0.3);ctx.restore();break;}
			case'ring':{const eR=progress*p.width*8;ctx.beginPath();ctx.arc(px,py,eR,0,Math.PI*2);ctx.lineWidth=3;ctx.globalAlpha=0.7*(1-progress);ctx.stroke();break;}
			case'cone':{const cL=progress*200*(p.phase.width||1),cH=cL*0.4*(p.phase.width||1);const cx2=p.startX-camera.x,cy2=p.startY-camera.y;
				if(p.behavior==='rain'){ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.lineTo(cx2-cH,cy2+cL);ctx.lineTo(cx2+cH,cy2+cL);ctx.closePath();}
				else{ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.lineTo(cx2+p.facing*cL,cy2-cH);ctx.lineTo(cx2+p.facing*cL,cy2+cH);ctx.closePath();}
				ctx.globalAlpha=0.3*(1-progress*0.5);ctx.fill();ctx.globalAlpha=0.6;ctx.lineWidth=2;ctx.stroke();break;}
			case'nova':{const eR=progress*p.width*8;ctx.globalAlpha=0.25*(1-progress);ctx.beginPath();ctx.arc(px,py,eR,0,Math.PI*2);ctx.fill();ctx.lineWidth=3;ctx.globalAlpha=0.6*(1-progress);ctx.beginPath();ctx.arc(px,py,eR,0,Math.PI*2);ctx.stroke();break;}
			case'chain':{ctx.beginPath();ctx.arc(px,py,p.width*0.7,0,Math.PI*2);ctx.fill();break;}
			case'wall':{const ww=p.width*2,wh=p.height*6;ctx.globalAlpha=0.45;ctx.fillRect(px-ww/2,py-wh/2,ww,wh);ctx.globalAlpha=0.7;ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.strokeRect(px-ww/2,py-wh/2,ww,wh);break;}
			case'solidify':{const sw2=p.width*3,sh2=p.height*1.5;ctx.globalAlpha=0.7;ctx.fillRect(px-sw2/2,py-sh2/2,sw2,sh2);break;}
		}
		ctx.globalAlpha=1;
	}

	/* Enemy projectiles */
	for(const p of enemyProjectiles){
		const px=p.x-camera.x,py=p.y-camera.y;
		if(px<-200||px>canvas.width+200||py<-200||py>canvas.height+200)continue;

		// Lingering pool (lava etc.)
		if(p.linger&&p.hasHit){
			const alpha=1-(p.lingerTimer/p.lingerMax);
			ctx.globalAlpha=alpha*0.6;
			ctx.fillStyle=p.color;
			ctx.beginPath();ctx.ellipse(px,py,p.width*1.5,p.width*0.5,0,0,Math.PI*2);ctx.fill();
			ctx.fillStyle=p.color2;
			ctx.globalAlpha=alpha*0.3;
			ctx.beginPath();ctx.ellipse(px,py,p.width,p.width*0.3,0,0,Math.PI*2);ctx.fill();
			ctx.globalAlpha=1;
			continue;
		}

		// AoE ring
		if(p.aoe){
			const r2=(p.aoeTimer/p.aoeMax)*p.aoeRadius;
			const alpha=1-p.aoeTimer/p.aoeMax;
			ctx.globalAlpha=alpha*0.4;
			ctx.fillStyle=p.color;
			ctx.beginPath();ctx.arc(px,py,r2,0,Math.PI*2);ctx.fill();
			ctx.globalAlpha=alpha*0.8;
			ctx.strokeStyle=p.color2;ctx.lineWidth=3;
			ctx.beginPath();ctx.arc(px,py,r2,0,Math.PI*2);ctx.stroke();
			ctx.globalAlpha=1;
			continue;
		}

		// Normal projectile
		ctx.globalAlpha=0.9;
		if(p.shape==='sword'){
			ctx.save();ctx.translate(px,py);ctx.rotate(p.rotAngle);
			ctx.fillStyle=p.color;
			ctx.fillRect(-p.width*0.8,-p.height*0.15,p.width*1.6,p.height*0.3);
			ctx.fillRect(-p.width*0.15,-p.height*0.5,p.width*0.3,p.height);
			ctx.fillStyle=p.color2;ctx.globalAlpha=0.5;
			ctx.fillRect(-p.width*0.6,-p.height*0.08,p.width*1.2,p.height*0.16);
			ctx.restore();
		} else {
			// Circle
			ctx.fillStyle=p.color;
			ctx.beginPath();ctx.arc(px,py,p.width*0.6,0,Math.PI*2);ctx.fill();
			ctx.fillStyle=p.color2;ctx.globalAlpha=0.5;
			ctx.beginPath();ctx.arc(px,py,p.width*0.3,0,Math.PI*2);ctx.fill();
		}
		ctx.globalAlpha=1;
	}

	/* Particles */
	if(particles.length>MAX_PARTICLES)particles.splice(0,particles.length-MAX_PARTICLES);
	for(const p of particles){
		const alpha=p.life/p.maxLife;
		ctx.beginPath();ctx.arc(p.x-camera.x,p.y-camera.y,p.r*alpha,0,Math.PI*2);
		ctx.fillStyle=`rgba(${p.color.r},${p.color.g},${p.color.b},${alpha*0.8})`;ctx.fill();
	}
	for(const p of ambientParticles){
		const alpha=p.life/p.maxLife;
		ctx.beginPath();ctx.arc(p.x-camera.x,p.y-camera.y,p.r*alpha,0,Math.PI*2);
		ctx.fillStyle=`rgba(${p.color.r},${p.color.g},${p.color.b},${alpha*0.5})`;ctx.fill();
	}

	/* Dmg numbers */
	for(const dn of dmgNumbers){
		ctx.font='bold 14px Arial';ctx.fillStyle=dn.color;
		ctx.globalAlpha=1-dn.age/60;ctx.textAlign='center';
		ctx.fillText(dn.text,dn.x-camera.x,dn.y-camera.y);
	}
	ctx.globalAlpha=1;

	/* Player */
	if(player.iFrames<=0||(player.iFrames%4<2)){
		const ppx=player.x-camera.x,ppy=player.y-camera.y;
		ctx.fillStyle=player.flash>0?'#ff6666':'#5b7fbf';ctx.fillRect(ppx,ppy,player.w,player.h);
		ctx.fillStyle='#3a5a9e';ctx.fillRect(ppx,ppy+player.h-10,player.w,10);
		ctx.fillStyle='#c8a882';ctx.fillRect(ppx+6,ppy+2,20,16);
		ctx.fillStyle='#fff';
		const eyeX=player.facing===1?ppx+18:ppx+10;
		ctx.fillRect(eyeX,ppy+7,5,5);
		ctx.fillStyle='#222';ctx.fillRect(player.facing===1?eyeX+2:eyeX,ppy+8,3,3);
		ctx.fillStyle='#2e3a6e';ctx.beginPath();
		ctx.moveTo(ppx+4,ppy+4);ctx.lineTo(ppx+player.w/2,ppy-18);ctx.lineTo(ppx+player.w-4,ppy+4);
		ctx.closePath();ctx.fill();
		const armY=ppy+18,armX=player.facing===1?ppx+player.w:ppx;
		ctx.fillStyle='#5b7fbf';ctx.fillRect(player.facing===1?armX:armX-10,armY,10,6);
		if(player.castTimer>0){
			ctx.save();ctx.globalAlpha=0.6*(player.castTimer/12);
			ctx.beginPath();ctx.arc(player.facing===1?armX+10:armX-10,armY+3,12,0,Math.PI*2);
			ctx.fillStyle=player.castColor;ctx.fill();ctx.restore();
		}
	}

	// Stun indicator on player
	if(player.stunTimer>0){
		ctx.font='bold 12px Arial';ctx.fillStyle='#ffcc00';ctx.textAlign='center';
		ctx.fillText('⚡ Stunned',player.x+player.w/2-camera.x,player.y-25-camera.y);
	}
	if(player.slowTimer>0){
		ctx.font='bold 11px Arial';ctx.fillStyle='#66ccff';ctx.textAlign='center';
		ctx.fillText('❄️ Slowed',player.x+player.w/2-camera.x,player.y-35-camera.y);
	}
}

/* =============================================================
   DRAW TRAIL (same as sandbox)
   ============================================================= */
function drawTrail(proj){
	if(proj.trail==='none'||proj.trailParts.length<2)return;
	const trailColors={sparkle:{r:200,g:220,b:255},flame:{r:255,g:140,b:50},smoke:{r:100,g:100,b:100},ice:{r:150,g:220,b:255},lightning:{r:180,g:180,b:255}};
	const rgb=trailColors[proj.trail]||hexToRgb(proj.color);
	for(let t=0;t<proj.trailParts.length;t++){
		const tp=proj.trailParts[t];
		const alpha=((t+1)/proj.trailParts.length)*0.5;
		const r2=proj.width*0.5*((t+1)/proj.trailParts.length);
		ctx.beginPath();ctx.arc(tp.x-camera.x,tp.y-camera.y,r2,0,Math.PI*2);
		ctx.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})`;ctx.fill();
	}
	if(['sparkle','flame','lightning'].includes(proj.trail)&&particles.length<MAX_PARTICLES){
		const last=proj.trailParts[proj.trailParts.length-1];
		if(last&&Math.random()<0.25){
			particles.push({x:last.x+(Math.random()-0.5)*8,y:last.y+(Math.random()-0.5)*8,vx:(Math.random()-0.5)*1.5,vy:(Math.random()-0.5)*1.5-0.5,life:10+Math.random()*8|0,maxLife:18,r:1.5+Math.random()*1.5,color:rgb});
		}
	}
}

/* =============================================================
   DRAW ENEMY
   ============================================================= */
function drawEnemy(en){
	const ex=en.x-camera.x, ey=en.y-camera.y;
	if(ex+en.w<-50||ex>canvas.width+50||ey+en.h<-50||ey>canvas.height+50)return;

	const flashColor = en.flash>0;
	const t = en.typeDef;

	switch(en.type){
	/* === FIRE === */
	case 'imp': {
		// Wings
		ctx.fillStyle=flashColor?'#ff8888':'#aa2200';
		const wingOff=Math.sin(en.animTimer*0.15)*6;
		ctx.beginPath();ctx.moveTo(ex+en.w/2,ey+6);
		ctx.lineTo(ex-8+wingOff,ey-4);ctx.lineTo(ex+4,ey+10);ctx.closePath();ctx.fill();
		ctx.beginPath();ctx.moveTo(ex+en.w/2,ey+6);
		ctx.lineTo(ex+en.w+8-wingOff,ey-4);ctx.lineTo(ex+en.w-4,ey+10);ctx.closePath();ctx.fill();
		// Body
		ctx.fillStyle=flashColor?'#ff6666':t.color;
		ctx.fillRect(ex+2,ey+4,en.w-4,en.h-8);
		// Head
		ctx.fillStyle=flashColor?'#ff8888':t.color2;
		ctx.fillRect(ex+4,ey,en.w-8,12);
		// Eyes
		ctx.fillStyle='#ffcc00';
		const eyeOff=en.facing===1?2:0;
		ctx.fillRect(ex+6+eyeOff,ey+3,3,3);ctx.fillRect(ex+14+eyeOff,ey+3,3,3);
		// Horns
		ctx.fillStyle='#880000';
		ctx.fillRect(ex+4,ey-3,3,5);ctx.fillRect(ex+en.w-7,ey-3,3,5);
		// Tail
		ctx.strokeStyle='#aa2200';ctx.lineWidth=2;
		ctx.beginPath();ctx.moveTo(ex+en.w/2,ey+en.h-4);
		ctx.quadraticCurveTo(ex+en.w/2+en.facing*12,ey+en.h+8,ex+en.w/2+en.facing*8,ey+en.h+4);
		ctx.stroke();
		break;
	}
	case 'flameSerpent': {
		// Sinusoidal body
		ctx.fillStyle=flashColor?'#ff8866':t.color;
		const segments=6;
		for(let s=0;s<segments;s++){
			const sx2=ex+s*(en.w/segments);
			const sy2=ey+Math.sin(en.animTimer*0.08+s*0.8)*4;
			const sw=en.w/segments+2;
			ctx.fillRect(sx2,sy2,sw,en.h);
		}
		// Head
		ctx.fillStyle=flashColor?'#ffaa88':t.color2;
		const headX=en.facing===1?ex+en.w-10:ex;
		ctx.fillRect(headX,ey-2,12,en.h+4);
		// Eyes
		ctx.fillStyle='#ff0000';
		ctx.fillRect(headX+(en.facing===1?6:2),ey+2,3,3);
		// Forked tongue
		ctx.strokeStyle='#ff4444';ctx.lineWidth=1;
		const tongueX=en.facing===1?headX+12:headX;
		ctx.beginPath();ctx.moveTo(tongueX,ey+en.h/2);
		ctx.lineTo(tongueX+en.facing*8,ey+en.h/2-2);ctx.moveTo(tongueX,ey+en.h/2);
		ctx.lineTo(tongueX+en.facing*8,ey+en.h/2+2);ctx.stroke();
		break;
	}
	case 'emberMage': {
		// Robe
		ctx.fillStyle=flashColor?'#cc6644':t.color;
		ctx.beginPath();ctx.moveTo(ex+4,ey+14);ctx.lineTo(ex-2,ey+en.h);
		ctx.lineTo(ex+en.w+2,ey+en.h);ctx.lineTo(ex+en.w-4,ey+14);ctx.closePath();ctx.fill();
		// Body
		ctx.fillStyle=flashColor?'#ff8866':t.color2;
		ctx.fillRect(ex+4,ey+10,en.w-8,20);
		// Hood/Head
		ctx.fillStyle=flashColor?'#cc6644':'#662200';
		ctx.beginPath();ctx.arc(ex+en.w/2,ey+8,10,0,Math.PI*2);ctx.fill();
		// Eyes glow
		ctx.fillStyle='#ff8800';
		ctx.fillRect(ex+8,ey+5,3,4);ctx.fillRect(ex+15,ey+5,3,4);
		// Staff
		ctx.fillStyle='#553311';
		const staffX=en.facing===1?ex+en.w+2:ex-5;
		ctx.fillRect(staffX,ey-4,3,en.h+4);
		ctx.fillStyle='#ff6600';
		ctx.beginPath();ctx.arc(staffX+1,ey-6,4,0,Math.PI*2);ctx.fill();
		break;
	}
	case 'magmaGolem': {
		// Body (rocky)
		ctx.fillStyle=flashColor?'#996644':t.color;
		ctx.fillRect(ex+4,ey+12,en.w-8,en.h-16);
		// Lava cracks
		ctx.fillStyle='#ff6600';ctx.globalAlpha=0.6;
		ctx.fillRect(ex+8,ey+20,3,12);ctx.fillRect(ex+18,ey+28,4,8);
		ctx.fillRect(ex+28,ey+18,3,14);ctx.globalAlpha=1;
		// Shoulders
		ctx.fillStyle=flashColor?'#aa7755':t.color2;
		ctx.fillRect(ex,ey+10,en.w,10);
		// Head
		ctx.fillStyle=flashColor?'#996644':t.color;
		ctx.fillRect(ex+8,ey,en.w-16,14);
		// Eyes
		ctx.fillStyle='#ff4400';
		ctx.fillRect(ex+12,ey+4,4,4);ctx.fillRect(ex+24,ey+4,4,4);
		// Arms
		ctx.fillStyle=t.color2;
		ctx.fillRect(ex-6,ey+16,8,20);ctx.fillRect(ex+en.w-2,ey+16,8,20);
		// Legs
		ctx.fillRect(ex+6,ey+en.h-8,12,8);ctx.fillRect(ex+en.w-18,ey+en.h-8,12,8);
		break;
	}
	case 'fireSprite': {
		// Glowing orb
		ctx.save();
		const pulse=0.8+Math.sin(en.animTimer*0.12)*0.2;
		const glow=ctx.createRadialGradient(ex+en.w/2,ey+en.h/2,0,ex+en.w/2,ey+en.h/2,en.w*pulse);
		glow.addColorStop(0,flashColor?'#ffee88':'#ffcc44');
		glow.addColorStop(0.5,flashColor?'#ffaa44':'#ff8800');
		glow.addColorStop(1,'transparent');
		ctx.fillStyle=glow;
		ctx.beginPath();ctx.arc(ex+en.w/2,ey+en.h/2,en.w*pulse,0,Math.PI*2);ctx.fill();
		// Core
		ctx.fillStyle='#fff';ctx.globalAlpha=0.8;
		ctx.beginPath();ctx.arc(ex+en.w/2,ey+en.h/2,en.w*0.3,0,Math.PI*2);ctx.fill();
		ctx.restore();
		break;
	}

	/* === ICE === */
	case 'frostWraith': {
		ctx.save();ctx.globalAlpha=flashColor?0.9:0.6;
		ctx.fillStyle=t.color;
		// Ghostly body that waves
		const waveOff=Math.sin(en.animTimer*0.06)*4;
		ctx.beginPath();ctx.moveTo(ex+4,ey);ctx.lineTo(ex+en.w-4,ey);
		ctx.lineTo(ex+en.w+waveOff,ey+en.h);
		for(let s=en.w;s>=0;s-=6)ctx.lineTo(ex+s-waveOff,ey+en.h-(s%12<6?0:8));
		ctx.closePath();ctx.fill();
		// Eyes
		ctx.fillStyle=flashColor?'#ffffff':'#aaddff';ctx.globalAlpha=1;
		ctx.fillRect(ex+8,ey+10,4,4);ctx.fillRect(ex+16,ey+10,4,4);
		ctx.restore();
		break;
	}
	case 'iceArcher': {
		ctx.fillStyle=flashColor?'#8899bb':t.color;
		ctx.fillRect(ex+3,ey+10,en.w-6,en.h-12);
		ctx.fillStyle=flashColor?'#aabbdd':t.color2;
		ctx.fillRect(ex+5,ey,en.w-10,14);
		ctx.fillStyle='#88ccff';
		ctx.fillRect(ex+7,ey+4,3,3);ctx.fillRect(ex+14,ey+4,3,3);
		// Bow
		ctx.strokeStyle='#556677';ctx.lineWidth=2;
		const bowX=en.facing===1?ex+en.w+2:ex-4;
		ctx.beginPath();ctx.arc(bowX,ey+en.h/2,12,en.facing===1?-0.8:Math.PI-0.8,en.facing===1?0.8:Math.PI+0.8);ctx.stroke();
		break;
	}
	case 'snowBeast': {
		ctx.fillStyle=flashColor?'#bbccdd':t.color;
		ctx.fillRect(ex+4,ey+8,en.w-8,en.h-10);
		ctx.fillStyle=flashColor?'#ddeeff':t.color2;
		ctx.fillRect(ex+6,ey,en.w-12,14);
		ctx.fillStyle='#446688';
		ctx.fillRect(ex+10,ey+4,5,4);ctx.fillRect(ex+en.w-15,ey+4,5,4);
		// Fangs
		ctx.fillStyle='#fff';
		ctx.fillRect(ex+14,ey+12,3,5);ctx.fillRect(ex+en.w-17,ey+12,3,5);
		// Arms
		ctx.fillStyle=t.color;
		ctx.fillRect(ex-4,ey+14,6,16);ctx.fillRect(ex+en.w-2,ey+14,6,16);
		break;
	}
	case 'cryoMage': {
		ctx.fillStyle=flashColor?'#5588cc':t.color;
		ctx.beginPath();ctx.moveTo(ex+4,ey+14);ctx.lineTo(ex-2,ey+en.h);
		ctx.lineTo(ex+en.w+2,ey+en.h);ctx.lineTo(ex+en.w-4,ey+14);ctx.closePath();ctx.fill();
		ctx.fillStyle=flashColor?'#88bbff':t.color2;
		ctx.fillRect(ex+4,ey+10,en.w-8,20);
		ctx.fillStyle='#223366';
		ctx.beginPath();ctx.arc(ex+en.w/2,ey+8,10,0,Math.PI*2);ctx.fill();
		ctx.fillStyle='#88ddff';
		ctx.fillRect(ex+8,ey+5,3,4);ctx.fillRect(ex+15,ey+5,3,4);
		const staffX=en.facing===1?ex+en.w+2:ex-5;
		ctx.fillStyle='#445566';ctx.fillRect(staffX,ey-4,3,en.h+4);
		ctx.fillStyle='#88ddff';ctx.beginPath();ctx.arc(staffX+1,ey-6,4,0,Math.PI*2);ctx.fill();
		break;
	}
	case 'glacierSentinel': {
		ctx.fillStyle=flashColor?'#7799bb':t.color;
		ctx.fillRect(ex+4,ey+12,en.w-8,en.h-16);
		ctx.fillStyle='#88ddff';ctx.globalAlpha=0.4;
		ctx.fillRect(ex+8,ey+20,4,10);ctx.fillRect(ex+20,ey+24,3,8);ctx.fillRect(ex+30,ey+18,3,12);ctx.globalAlpha=1;
		ctx.fillStyle=flashColor?'#99bbdd':t.color2;
		ctx.fillRect(ex,ey+10,en.w,10);
		ctx.fillStyle=t.color;ctx.fillRect(ex+8,ey,en.w-16,14);
		ctx.fillStyle='#aaeeff';ctx.fillRect(ex+12,ey+4,4,4);ctx.fillRect(ex+26,ey+4,4,4);
		ctx.fillStyle=t.color2;
		ctx.fillRect(ex-6,ey+16,8,18);ctx.fillRect(ex+en.w-2,ey+16,8,18);
		ctx.fillRect(ex+6,ey+en.h-8,12,8);ctx.fillRect(ex+en.w-18,ey+en.h-8,12,8);
		break;
	}

	/* === EARTH === */
	case 'rockGolem': {
		ctx.fillStyle=flashColor?'#887744':t.color;
		ctx.fillRect(ex+4,ey+10,en.w-8,en.h-14);
		ctx.fillStyle='#999977';ctx.globalAlpha=0.4;
		ctx.fillRect(ex+8,ey+18,4,8);ctx.fillRect(ex+22,ey+22,3,10);ctx.globalAlpha=1;
		ctx.fillStyle=flashColor?'#aa9966':t.color2;
		ctx.fillRect(ex,ey+8,en.w,10);
		ctx.fillStyle=t.color;ctx.fillRect(ex+8,ey,en.w-16,12);
		ctx.fillStyle='#bbaa66';ctx.fillRect(ex+12,ey+3,4,4);ctx.fillRect(ex+24,ey+3,4,4);
		ctx.fillStyle=t.color2;
		ctx.fillRect(ex-5,ey+14,7,18);ctx.fillRect(ex+en.w-2,ey+14,7,18);
		ctx.fillRect(ex+6,ey+en.h-8,11,8);ctx.fillRect(ex+en.w-17,ey+en.h-8,11,8);
		break;
	}
	case 'vineCrawler': {
		ctx.fillStyle=flashColor?'#66aa44':t.color;
		const segs=5;
		for(let s=0;s<segs;s++){
			const sx2=ex+s*(en.w/segs);
			const sy2=ey+Math.sin(en.animTimer*0.1+s*1.0)*3;
			ctx.fillRect(sx2,sy2,en.w/segs+1,en.h);
		}
		ctx.fillStyle=flashColor?'#88cc66':t.color2;
		const headX=en.facing===1?ex+en.w-8:ex;
		ctx.fillRect(headX,ey-2,10,en.h+4);
		ctx.fillStyle='#33ff33';ctx.fillRect(headX+(en.facing===1?4:2),ey+4,3,3);
		// Leaves
		ctx.fillStyle='#44aa22';
		ctx.beginPath();ctx.moveTo(ex+en.w/2,ey-2);ctx.lineTo(ex+en.w/2-6,ey-8);ctx.lineTo(ex+en.w/2+6,ey-8);ctx.closePath();ctx.fill();
		break;
	}
	case 'caveSpider': {
		ctx.fillStyle=flashColor?'#776655':t.color;
		ctx.beginPath();ctx.ellipse(ex+en.w/2,ey+en.h/2,en.w/2,en.h/2,0,0,Math.PI*2);ctx.fill();
		ctx.fillStyle=flashColor?'#998877':t.color2;
		ctx.beginPath();ctx.ellipse(en.facing===1?ex+en.w-4:ex+4,ey+en.h/2,6,5,0,0,Math.PI*2);ctx.fill();
		// Eyes (many)
		ctx.fillStyle='#ff3333';
		const hx=en.facing===1?ex+en.w-6:ex+2;
		for(let ei=0;ei<4;ei++)ctx.fillRect(hx+(ei%2)*4,ey+en.h/2-4+Math.floor(ei/2)*4,2,2);
		// Legs
		ctx.strokeStyle=t.color;ctx.lineWidth=1.5;
		for(let l=0;l<4;l++){
			const lx=ex+4+l*(en.w-8)/3;
			ctx.beginPath();ctx.moveTo(lx,ey+en.h/2);ctx.lineTo(lx-6,ey+en.h+6);ctx.stroke();
			ctx.beginPath();ctx.moveTo(lx,ey+en.h/2);ctx.lineTo(lx+6,ey+en.h+6);ctx.stroke();
		}
		break;
	}
	case 'crystalMage': {
		ctx.fillStyle=flashColor?'#aa77cc':t.color;
		ctx.beginPath();ctx.moveTo(ex+4,ey+14);ctx.lineTo(ex-2,ey+en.h);
		ctx.lineTo(ex+en.w+2,ey+en.h);ctx.lineTo(ex+en.w-4,ey+14);ctx.closePath();ctx.fill();
		ctx.fillStyle=flashColor?'#cc99ee':t.color2;
		ctx.fillRect(ex+4,ey+10,en.w-8,20);
		ctx.fillStyle='#553377';
		ctx.beginPath();ctx.arc(ex+en.w/2,ey+8,10,0,Math.PI*2);ctx.fill();
		ctx.fillStyle='#dd88ff';
		ctx.fillRect(ex+8,ey+5,3,4);ctx.fillRect(ex+15,ey+5,3,4);
		const staffX=en.facing===1?ex+en.w+2:ex-5;
		ctx.fillStyle='#664488';ctx.fillRect(staffX,ey-4,3,en.h+4);
		ctx.fillStyle='#dd88ff';
		// Crystal tip
		ctx.beginPath();ctx.moveTo(staffX+1,ey-12);ctx.lineTo(staffX-3,ey-4);ctx.lineTo(staffX+5,ey-4);ctx.closePath();ctx.fill();
		break;
	}
	case 'mudElemental': {
		ctx.fillStyle=flashColor?'#887755':t.color;
		// Blobby body
		ctx.beginPath();
		ctx.moveTo(ex+4,ey+en.h);
		ctx.quadraticCurveTo(ex-4,ey+en.h/2,ex+6,ey+4);
		ctx.quadraticCurveTo(ex+en.w/2,ey-4,ex+en.w-6,ey+4);
		ctx.quadraticCurveTo(ex+en.w+4,ey+en.h/2,ex+en.w-4,ey+en.h);
		ctx.closePath();ctx.fill();
		// Drips
		ctx.fillStyle=flashColor?'#aa9977':t.color2;ctx.globalAlpha=0.5;
		const drip=Math.sin(en.animTimer*0.08)*3;
		ctx.fillRect(ex+6,ey+en.h,4,6+drip);ctx.fillRect(ex+en.w-10,ey+en.h,4,4+drip);ctx.globalAlpha=1;
		// Eyes
		ctx.fillStyle='#ccbb88';
		ctx.fillRect(ex+10,ey+12,4,4);ctx.fillRect(ex+en.w-14,ey+12,4,4);
		break;
	}
	default: {
		// Fallback
		ctx.fillStyle=flashColor?'#ff8888':t.color;
		ctx.fillRect(ex,ey,en.w,en.h);
		break;
	}
	}

	// HP bar
	if(en.hp<en.maxHp){
		const barW=en.w+10;
		const hpPct=Math.max(0,en.hp/en.maxHp);
		ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(ex-5,ey-10,barW,5);
		ctx.fillStyle=hpPct>0.5?'#2ecc71':(hpPct>0.25?'#f39c12':'#e74c3c');
		ctx.fillRect(ex-5,ey-10,barW*hpPct,5);
	}
	// Name
	ctx.font='9px Arial';ctx.fillStyle='#aaa';ctx.textAlign='center';
	ctx.fillText(t.name,ex+en.w/2,ey+en.h+12);
}

/* =============================================================
   RENDER DECORATIONS
   ============================================================= */
function renderDecorations(){
	for(const dec of dungeon.decorations){
		const sx=dec.x-camera.x, sy=(dec.y||0)-camera.y;
		if(sx<-200||sx>canvas.width+200)continue;

		switch(dec.type){
		case 'lava':{
			const pulse=0.6+Math.sin(Date.now()*0.003)*0.2;
			ctx.fillStyle=`rgba(255,80,0,${pulse})`;
			ctx.fillRect(sx,sy,dec.w,dec.h);
			ctx.fillStyle=`rgba(255,200,0,${pulse*0.5})`;
			ctx.fillRect(sx+4,sy+2,dec.w-8,dec.h-4);
			break;
		}
		case 'torch':{
			// Bracket
			ctx.fillStyle='#554433';
			ctx.fillRect(sx,sy,6,14);
			// Flame
			const flicker=Math.sin(Date.now()*0.008+dec.x)*3;
			ctx.fillStyle='#ff8800';
			ctx.beginPath();ctx.arc(sx+3,sy-4+flicker,5,0,Math.PI*2);ctx.fill();
			ctx.fillStyle='#ffcc44';
			ctx.beginPath();ctx.arc(sx+3,sy-4+flicker,3,0,Math.PI*2);ctx.fill();
			// Light glow
			ctx.save();ctx.globalAlpha=0.08;
			const lg=ctx.createRadialGradient(sx+3,sy-4,0,sx+3,sy-4,80);
			lg.addColorStop(0,'#ff8800');lg.addColorStop(1,'transparent');
			ctx.fillStyle=lg;ctx.beginPath();ctx.arc(sx+3,sy-4,80,0,Math.PI*2);ctx.fill();
			ctx.restore();
			break;
		}
		case 'crack':{
			ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1;
			ctx.beginPath();ctx.moveTo(sx,sy);
			ctx.lineTo(sx+dec.size*0.4,sy+dec.size*0.3);
			ctx.lineTo(sx+dec.size*0.2,sy+dec.size*0.6);
			ctx.lineTo(sx+dec.size*0.6,sy+dec.size);
			ctx.stroke();
			break;
		}
		case 'stalagmite':{
			ctx.fillStyle=dungeon.wallColor2;
			ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+8,sy-dec.h);ctx.lineTo(sx+16,sy);ctx.closePath();ctx.fill();
			break;
		}
		case 'stalactite':{
			ctx.fillStyle=dungeon.wallColor2;
			ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+8,sy+dec.h);ctx.lineTo(sx+16,sy);ctx.closePath();ctx.fill();
			break;
		}
		case 'icePool':{
			ctx.fillStyle='rgba(100,180,255,0.3)';
			ctx.fillRect(sx,sy,dec.w,dec.h);
			ctx.fillStyle='rgba(200,240,255,0.5)';
			ctx.fillRect(sx+4,sy+2,dec.w-8,dec.h-4);
			// Shimmer
			ctx.fillStyle='rgba(255,255,255,0.3)';
			ctx.fillRect(sx+dec.w*0.3,sy+3,dec.w*0.2,2);
			break;
		}
		case 'icicle':{
			ctx.fillStyle='rgba(150,220,255,0.7)';
			ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+4,sy+dec.h);ctx.lineTo(sx+8,sy);ctx.closePath();ctx.fill();
			ctx.fillStyle='rgba(220,240,255,0.5)';
			ctx.fillRect(sx+2,sy,2,dec.h*0.6);
			break;
		}
		case 'snowPile':{
			ctx.fillStyle='rgba(220,230,240,0.6)';
			ctx.beginPath();ctx.ellipse(sx+dec.w/2,sy+dec.h/2,dec.w/2,dec.h/2,0,0,Math.PI*2);ctx.fill();
			break;
		}
		case 'frostCrystal':{
			ctx.fillStyle='rgba(120,200,255,0.6)';
			ctx.save();ctx.translate(sx,sy);ctx.rotate(0.3);
			ctx.fillRect(-dec.size/4,-dec.size/2,dec.size/2,dec.size);
			ctx.rotate(1.0);
			ctx.fillRect(-dec.size/4,-dec.size/2,dec.size/2,dec.size);
			ctx.restore();
			break;
		}
		case 'mushroom':{
			// Stem
			ctx.fillStyle='#ddddbb';
			ctx.fillRect(sx+dec.size*0.35,sy-dec.size*0.2,dec.size*0.3,dec.size*0.8);
			// Cap
			ctx.fillStyle=dec.color||'#88aa44';
			ctx.beginPath();ctx.ellipse(sx+dec.size/2,sy-dec.size*0.2,dec.size/2,dec.size*0.35,0,0,Math.PI*2);ctx.fill();
			// Dots
			ctx.fillStyle='rgba(255,255,255,0.4)';
			ctx.beginPath();ctx.arc(sx+dec.size*0.3,sy-dec.size*0.3,2,0,Math.PI*2);ctx.fill();
			ctx.beginPath();ctx.arc(sx+dec.size*0.7,sy-dec.size*0.2,1.5,0,Math.PI*2);ctx.fill();
			break;
		}
		case 'vine':{
			ctx.strokeStyle='#336622';ctx.lineWidth=2;
			ctx.beginPath();ctx.moveTo(sx,sy);
			ctx.quadraticCurveTo(sx+10,sy+dec.h*0.4,sx-5,sy+dec.h*0.7);
			ctx.quadraticCurveTo(sx+8,sy+dec.h*0.9,sx+3,sy+dec.h);
			ctx.stroke();
			// Leaves
			ctx.fillStyle='#448822';
			ctx.beginPath();ctx.ellipse(sx+8,sy+dec.h*0.3,4,7,0.5,0,Math.PI*2);ctx.fill();
			ctx.beginPath();ctx.ellipse(sx-3,sy+dec.h*0.6,4,6,-0.3,0,Math.PI*2);ctx.fill();
			break;
		}
		case 'crystal':{
			ctx.fillStyle=dec.color||'#aa66ff';
			ctx.globalAlpha=0.7;
			ctx.save();ctx.translate(sx,sy);
			// Main crystal
			ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-dec.size*0.3,-dec.size);ctx.lineTo(dec.size*0.3,-dec.size);ctx.lineTo(0,0);ctx.closePath();ctx.fill();
			// Side crystal
			ctx.beginPath();ctx.moveTo(dec.size*0.2,0);ctx.lineTo(dec.size*0.1,-dec.size*0.6);ctx.lineTo(dec.size*0.5,-dec.size*0.6);ctx.lineTo(dec.size*0.2,0);ctx.closePath();ctx.fill();
			// Glow
			ctx.globalAlpha=0.15;
			const cg=ctx.createRadialGradient(0,-dec.size*0.5,0,0,-dec.size*0.5,dec.size);
			cg.addColorStop(0,dec.color||'#aa66ff');cg.addColorStop(1,'transparent');
			ctx.fillStyle=cg;ctx.beginPath();ctx.arc(0,-dec.size*0.5,dec.size,0,Math.PI*2);ctx.fill();
			ctx.restore();ctx.globalAlpha=1;
			break;
		}
		case 'roots':{
			ctx.strokeStyle='#443322';ctx.lineWidth=3;
			ctx.beginPath();ctx.moveTo(sx,sy);
			ctx.quadraticCurveTo(sx+dec.w*0.3,sy-8,sx+dec.w*0.5,sy-4);
			ctx.quadraticCurveTo(sx+dec.w*0.7,sy+6,sx+dec.w,sy);
			ctx.stroke();
			ctx.lineWidth=2;
			ctx.beginPath();ctx.moveTo(sx+dec.w*0.3,sy-6);ctx.lineTo(sx+dec.w*0.25,sy-14);ctx.stroke();
			ctx.beginPath();ctx.moveTo(sx+dec.w*0.7,sy+4);ctx.lineTo(sx+dec.w*0.75,sy-6);ctx.stroke();
			break;
		}
		}
	}
}

/* =============================================================
   GAME LOOP
   ============================================================= */
function loop(){update();render();requestAnimationFrame(loop);}
loop();
</script>
