/* =============================================================
   DOMAIN VOW SYSTEM — 4th special vow slot for Dominion Master
   ============================================================= */
let domainVowEditor = null; // temp domain vow during editing

/* Default empty multi-sacrifice domain vow */
function emptyDomainVow(){
	return {
		sacrifices: {
			health: 0, maxMana: 0, spellSlots: [], effects: [], shapes: [],
			movement: 0, visibility: 0, items: [],
			domProjectiles: false, domPlayerPower: 0, domRange: 0,
		},
		domainBuffs: {},
		vowUnlocks: [],
	};
}
/* Migrate old single-sacrifice format to new multi-sacrifice format */
function migrateDomainVow(dv){
	if(!dv) return null;
	if(dv.sacrifices) return dv; // already new format
	const nv = emptyDomainVow();
	nv.domainBuffs = dv.domainBuffs || {};
	nv.vowUnlocks = dv.vowUnlocks || [];
	const s = nv.sacrifices;
	if(dv.sacrifice === 'health') s.health = dv.amount || 10;
	else if(dv.sacrifice === 'maxMana') s.maxMana = dv.amount || 300;
	else if(dv.sacrifice === 'spellSlot') s.spellSlots = dv.slots || [];
	else if(dv.sacrifice === 'effects') s.effects = dv.sacrificedEffects || [];
	else if(dv.sacrifice === 'shapes') s.shapes = dv.sacrificedShapes || [];
	else if(dv.sacrifice === 'movement') s.movement = dv.amount || 10;
	else if(dv.sacrifice === 'visibility') s.visibility = dv.amount || 15;
	else if(dv.sacrifice === 'items') s.items = dv.sacrificedItemSlots || [];
	return nv;
}

function calcDomainVowPoints(vow){
	if(!vow || !vow.sacrifices) return 0;
	const s = vow.sacrifices;
	let pts = 0;
	// Health
	if(s.health > 0) pts += Math.floor(s.health / 5);
	// Max Mana
	if(s.maxMana > 0){ const ratio = s.maxMana / 1200; pts += Math.floor(40 * Math.pow(ratio, 1.3)); }
	// Spell Slots
	if(s.spellSlots && s.spellSlots.length > 0){
		let otherCount = 0;
		for(const other of STATE.vows){ if(other && other.sacrifice === 'spellSlot') otherCount += (other.slots||[]).filter(x=>x!==9).length; }
		const regularSlots = s.spellSlots.filter(x=>x!==9);
		const hasUlt = s.spellSlots.includes(9);
		for(let i = 0; i < regularSlots.length; i++) pts += Math.max(1, otherCount + i);
		if(hasUlt) pts += 8;
	}
	// Effects
	if(s.effects && s.effects.length > 0){
		for(const fx of s.effects){ const eff = EFFECTS[fx]; pts += (eff && eff.category === 'elemental') ? 1 : 0.5; }
		pts = Math.floor(pts);
	}
	// Shapes
	if(s.shapes) pts += s.shapes.length;
	// Movement
	if(s.movement > 0) pts += Math.floor(s.movement / 5);
	// Visibility
	if(s.visibility > 0){ pts += Math.floor(s.visibility / 15) + Math.floor(s.visibility / 30); }
	// Items
	if(s.items && s.items.length > 0){
		let otherCount = 0;
		for(const other of STATE.vows){ if(other && other.sacrifice === 'items') otherCount += (other.sacrificedItemSlots||[]).length; }
		const ITEM_PTS = [10, 15, 20, 30];
		for(let i = 0; i < s.items.length; i++){ const idx = otherCount + i; pts += idx < ITEM_PTS.length ? ITEM_PTS[idx] : 30; }
	}
	// Domain-specific sacrifices
	if(s.domProjectiles) pts += DOMAIN_SACRIFICES.domProjectiles.pts;
	if(s.domPlayerPower > 0) pts += Math.floor(s.domPlayerPower / 10) * DOMAIN_SACRIFICES.domPlayerPower.ptsPerStep;
	if(s.domRange > 0) pts += Math.floor(s.domRange / 10) * DOMAIN_SACRIFICES.domRange.ptsPerStep;
	return pts;
}

function calcDomainVowSpent(vow){
	if(!vow || !vow.domainBuffs) return 0;
	let spent = 0;
	for(const k in vow.domainBuffs){
		const info = DOMAIN_VOW_BUFFS[k];
		if(info && info.binary) spent += vow.domainBuffs[k] ? info.cost : 0;
		else spent += vow.domainBuffs[k] || 0;
	}
	if(vow.vowUnlocks) spent += vow.vowUnlocks.length * 5;
	return spent;
}

function openDomainVowEditor(){
	const existing = STATE.domainVow;
	if(existing){
		domainVowEditor = JSON.parse(JSON.stringify(migrateDomainVow(existing)));
	} else {
		domainVowEditor = emptyDomainVow();
	}
	if(!domainVowEditor.domainBuffs) domainVowEditor.domainBuffs = {};
	document.getElementById('vowModal').style.display = 'flex';
	document.getElementById('vowModalTitle').textContent = '👁️ Domain Vow Editor';
	renderDomainVowEditor();
}

function renderDomainVowEditor(){
	const v = domainVowEditor;
	const s = v.sacrifices;
	const pts = calcDomainVowPoints(v);
	const spent = calcDomainVowSpent(v);
	const remaining = pts - spent;
	let html = '';

	html += `<div style="font-size:12px;color:#e74c3c;margin-bottom:6px;padding:6px;border:1px solid rgba(231,76,60,.3);border-radius:4px;background:rgba(231,76,60,.08)">
		👁️ <strong>Domain Vow</strong> — Sacrifice <em>multiple</em> things to empower your Domain Expansion with special rules and abilities.</div>`;

	/* Cross-vow dedup for spell slots */
	const usedSlots = new Set();
	for(const other of STATE.vows){ if(other && other.sacrifice === 'spellSlot') for(const x of other.slots||[]) usedSlots.add(x); }
	const usedEffects = new Set();
	for(const other of STATE.vows){ if(other && other.sacrifice === 'effects') for(const fx of other.sacrificedEffects||[]) usedEffects.add(fx); }
	const usedShapes = new Set();
	for(const other of STATE.vows){ if(other && other.sacrifice === 'shapes') for(const sh of other.sacrificedShapes||[]) usedShapes.add(sh); }
	const usedItemSlots = new Set();
	for(const other of STATE.vows){ if(other && other.sacrifice === 'items') for(const sl of other.sacrificedItemSlots||[]) usedItemSlots.add(sl); }

	// ─── GENERAL SACRIFICES (stack globally) ───

function clampDomainBuffs(){
	// Block domainRange buff when domRange sacrifice is active
	if(domainVowEditor.sacrifices.domRange > 0) domainVowEditor.domainBuffs.domainRange = 0;
	const pts = calcDomainVowPoints(domainVowEditor);
	const spent = calcDomainVowSpent(domainVowEditor);
	if(spent > pts){
		const buffs = domainVowEditor.domainBuffs;
		// First remove binary abilities that are over budget
		for(const k in buffs){
			const info = DOMAIN_VOW_BUFFS[k];
			if(info && info.binary && buffs[k]){
				const newSpent = calcDomainVowSpent(domainVowEditor);
				if(newSpent > calcDomainVowPoints(domainVowEditor)) buffs[k] = 0;
			}
		}
		// Then proportionally reduce scalable buffs
		let total = 0;
		for(const k in buffs){ const info = DOMAIN_VOW_BUFFS[k]; if(!info || !info.binary) total += buffs[k]; }
		if(total > 0){
			const binaryCost = calcDomainVowSpent(domainVowEditor) - total;
			const available = Math.max(0, calcDomainVowPoints(domainVowEditor) - binaryCost);
			const ratio = available / total;
			for(const k in buffs){ const info = DOMAIN_VOW_BUFFS[k]; if(!info || !info.binary) buffs[k] = Math.floor(buffs[k] * ratio); }
		}
	}
}

/* ---------- Spell Code System (Export / Import) ---------- */
function encodeSpell(spell){
	const json = JSON.stringify(spell);
	return 'MB1:' + btoa(unescape(encodeURIComponent(json)));
}
function decodeSpell(code){
	try {
		code = code.trim();
		if(!code.startsWith('MB1:')) return null;
		const json = decodeURIComponent(escape(atob(code.slice(4))));
		const obj = JSON.parse(json);
		if(!obj || !obj.name || !Array.isArray(obj.phases) || obj.phases.length === 0) return null;
		// Sanitise each phase to only keep known keys
		const knownKeys = Object.keys(newPhase());
		obj.phases = obj.phases.slice(0,5).map(ph => {
			const clean = newPhase();
			for(const k of knownKeys){ if(ph[k] !== undefined) clean[k] = ph[k]; }
			return clean;
		});
		obj.name = String(obj.name).slice(0,30);
		return obj;
	} catch(e){ return null; }
}

document.getElementById('exportSpellBtn').addEventListener('click', () => {
	if(!builderSpell) return;
	const code = encodeSpell(builderSpell);
	navigator.clipboard.writeText(code).then(() => {
		const btn = document.getElementById('exportSpellBtn');
		btn.textContent = '✅ Copied!';
		setTimeout(() => { btn.textContent = '📋 Export Code'; }, 1500);
	}).catch(() => {
		prompt('Copy this spell code:', code);
	});
});

document.getElementById('importSpellBtn').addEventListener('click', () => {
	const code = prompt('Paste a spell code:');
	if(!code) return;
	const spell = decodeSpell(code);
	if(!spell){
		alert('Invalid spell code. Make sure you copied the full code starting with MB1:');
		return;
	}
	builderSpell = spell;
	renderBuilder();
});

function renderBuilder(){
	const stats = computeStats();
	const baseCost = calcSpellManaCost(builderSpell);
	const controlDiscount = Math.max(0.3, 1 - stats.magicControl * 0.015);
	const _vbBuilder = calcVowBoostsForSlot(editingSlot);
	const vowManaMult = Math.max(0.1, 1 - (_vbBuilder.manaCost||0) * 0.05);
	const cost = Math.round(baseCost * controlDiscount * vowManaMult);
	const totalDiscountPct = Math.round((1 - controlDiscount * vowManaMult) * 100);
	const req  = calcSpellControlReq(builderSpell);
	const canUse = stats.magicControl >= req;
	const isUlt = (editingSlot === 9);
	const vowPhaseBonus = _vbBuilder.phases || 0;
	const maxPhases = (isUlt ? 5 : 3) + vowPhaseBonus;

	/* Gather vow-locked effects & shapes */
	const vowLockedEffects = new Set();
	const vowLockedShapes  = new Set();
	for(const v of STATE.vows){
		if(!v) continue;
		if(v.sacrifice === 'effects') for(const fx of v.sacrificedEffects||[]) vowLockedEffects.add(fx);
		if(v.sacrifice === 'shapes')  for(const sh of v.sacrificedShapes||[])  vowLockedShapes.add(sh);
	}

	// meta
	document.getElementById('spellMeta').innerHTML = `
		<div class="prow">
			<label>${isUlt ? '⚡ Ultimate Name' : 'Spell Name'}</label>
			<input type="text" id="spellNameInput" value="${escHtml(builderSpell.name)}" maxlength="30"/>
		</div>
		${isUlt ? `<div class="meta-chip" style="background:rgba(255,170,0,.15);color:#ffaa00">⚡ ULTIMATE — Costs Total Mana (${cost*10}⚡)</div>` : `<div class="meta-chip">Mana Cost: <b style="color:var(--blue)">${cost}</b>${totalDiscountPct > 0 ? ` <span style="color:var(--green);font-size:.85em">(-${totalDiscountPct}% discount)</span>` : ''}</div>`}
		<div class="meta-chip">Control Req: <b style="color:${canUse?'var(--green)':'var(--red)'}">${req}</b> / ${stats.magicControl}</div>
		<div class="meta-chip">Phases: <b>${builderSpell.phases.length}</b>/${maxPhases}</div>
		${isUlt ? '<div class="meta-chip" style="color:#ffaa00">Max Power: 10 · Larger Size · Longer Effects</div>' : ''}
		${(() => {
			let total = 1;
			for(const p of builderSpell.phases) total *= (p.behavior==='aroundSelf' ? (p.aroundSelfCount||4) : (p.count||1));
			const over = total > 1000;
			return `<div class="meta-chip">Total Projectiles: <b style="color:${over?'var(--red)':'var(--green)'}">${total}</b>${over?' (max 1000!)':''}</div>`;
		})()}
	`;
	document.getElementById('spellNameInput').addEventListener('input', e => {
		builderSpell.name = e.target.value || 'Unnamed';
	});

	// description
	document.getElementById('spellDesc').textContent = generateSpellDescription(builderSpell);

	// phases
	const wrap = document.getElementById('phasesWrap');
	wrap.innerHTML = '';
	builderSpell.phases.forEach((ph, idx) => {
		/* Auto-strip vow-locked effects & shapes from existing phases */
		if(vowLockedEffects.size) ph.effects = ph.effects.filter(fx => !vowLockedEffects.has(fx));
		/* Auto-strip item-locked effects from existing phases */
		ph.effects = ph.effects.filter(fx => !EFFECT_ITEM_REQ[fx] || hasItemEquipped(EFFECT_ITEM_REQ[fx]));
		/* Auto-strip rank-locked effects */
		ph.effects = ph.effects.filter(fx => isEffectUnlocked(fx));
		if(vowLockedShapes.has(ph.shape) || (SHAPE_ITEM_REQ[ph.shape] && !hasItemEquipped(SHAPE_ITEM_REQ[ph.shape])) || !isShapeUnlocked(ph.shape)){
			const firstAvail = Object.keys(SHAPES).find(k => !vowLockedShapes.has(k) && isShapeUnlocked(k));
			if(firstAvail) ph.shape = firstAvail;
		}
		if((BEH_ITEM_REQ[ph.behavior] && !hasItemEquipped(BEH_ITEM_REQ[ph.behavior])) || !isBehaviorUnlocked(ph.behavior)){
			const firstAvailBeh = Object.keys(BEHAVIORS).find(k => isBehaviorUnlocked(k));
			if(firstAvailBeh) ph.behavior = firstAvailBeh;
		}
		/* Clamp power to rank max */
		const rankPow = getRankMaxPower();
		if(ph.power > rankPow) ph.power = rankPow;
		const card = document.createElement('div');
		card.className = 'phase-card';
		const isLast = idx === builderSpell.phases.length - 1;

		let html = `<h4>Phase ${idx+1}`;
		if(builderSpell.phases.length > 1){
			html += ` <button class="remove-phase" data-idx="${idx}" title="Remove phase">✕</button>`;
		}
		html += `</h4>`;

		// Shape
		html += `<div class="prow"><label>Shape</label><select data-idx="${idx}" data-prop="shape">`;
		for(const [k,v] of Object.entries(SHAPES).sort((a,b)=>(SHAPE_RANK_REQ[a[0]]??99)-(SHAPE_RANK_REQ[b[0]]??99)||a[1].controlReq-b[1].controlReq)){
			const shLocked = vowLockedShapes.has(k);
			const itemReq = SHAPE_ITEM_REQ[k];
			const itemLocked = itemReq && !hasItemEquipped(itemReq);
			const rankLocked = !isShapeUnlocked(k);
			const locked = shLocked || itemLocked || rankLocked;
			const lockLabel = shLocked ? ' 🔒 vow' : (itemLocked ? ` 🔒 ${ITEM_DB[itemReq]?.name||itemReq}` : (rankLocked ? ` 🔒 ${MAGE_RANKS[SHAPE_RANK_REQ[k]]?.name||'?'}` : ''));
			html += `<option value="${k}" ${ph.shape===k?'selected':''} ${locked?'disabled':''}>${v.icon} ${v.label} (ctrl ${v.controlReq}+)${v.dmgNote?' ['+v.dmgNote+']':''}${lockLabel}  </option>`;
		}
		html += `</select></div>`;

		// Check if this is a domain phase (phase 1 with domain behavior)
		const isDomainPhase = idx === 0 && ph.behavior === 'domain';
		// Check if spell has domain (affects subsequent phases)
		const spellHasDomain = builderSpell.phases[0]?.behavior === 'domain';

		// Behavior
		html += `<div class="prow"><label>Behavior</label><select data-idx="${idx}" data-prop="behavior">`;
		for(const [k,v] of Object.entries(BEHAVIORS).sort((a,b)=>(BEHAVIOR_RANK_REQ[a[0]]??99)-(BEHAVIOR_RANK_REQ[b[0]]??99)||a[1].controlReq-b[1].controlReq)){
			const behItemReq = BEH_ITEM_REQ[k];
			const behItemLocked = behItemReq && !hasItemEquipped(behItemReq);
			const behRankLocked = !isBehaviorUnlocked(k);
			// Domain only available for ultimates on phase 1
			const domainLocked = v.ultimateOnly && (!isUlt || idx > 0);
			// If spell has domain and this is phase 2+, behavior is forced to homing
			const forcedHoming = spellHasDomain && idx > 0 && k !== 'homing';
			const locked = behItemLocked || behRankLocked || domainLocked || forcedHoming;
			let lockLabel = behItemLocked ? ` 🔒 ${ITEM_DB[behItemReq]?.name||behItemReq}` : (behRankLocked ? ` 🔒 ${MAGE_RANKS[BEHAVIOR_RANK_REQ[k]]?.name||'?'}` : '');
			if(domainLocked && !behItemLocked && !behRankLocked) lockLabel = ' 🔒 Ult Phase 1 Only';
			if(forcedHoming && !behItemLocked && !behRankLocked) lockLabel = ' 🔒 Domain forces Homing';
			html += `<option value="${k}" ${ph.behavior===k?'selected':''} ${locked?'disabled':''}>${v.label} (ctrl ${v.controlReq}+)${v.dmgNote?' ['+v.dmgNote+']':''}${lockLabel}</option>`;
		}
		html += `</select></div>`;

		// Domain-specific settings (phase 1 only)
		if(isDomainPhase){
			if(!ph.domainElement) ph.domainElement = 'burn';
			if(!ph.domainColor) ph.domainColor = '#ff4400';
			if(!ph.domainPattern) ph.domainPattern = 'flames';
			html += `<div class="prow" style="border-top:2px solid #ffaa00;padding-top:8px;margin-top:8px"><label style="color:#ffaa00;font-weight:bold">⚡ DOMAIN EXPANSION ⚡</label></div>`;
			html += `<div class="prow" style="color:#aaa;font-size:.85em">Creates massive zone larger than screen. Next phases attack from edges with homing. Spells with same element get +50% damage while active.</div>`;
			html += `<div class="prow"><label>Domain Element</label><select data-idx="${idx}" data-prop="domainElement">`;
			for(const el of DOMAIN_ELEMENTS){
				const fx = EFFECTS[el];
				html += `<option value="${el}" ${ph.domainElement===el?'selected':''}>${fx.icon} ${fx.label}</option>`;
			}
			html += `</select></div>`;
			html += `<div class="prow"><label>Domain Color</label><input type="color" value="${ph.domainColor}" data-idx="${idx}" data-prop="domainColor"/></div>`;
			html += `<div class="prow"><label>Visual Pattern</label><select data-idx="${idx}" data-prop="domainPattern">
				<option value="flames" ${ph.domainPattern==='flames'?'selected':''}>🔥 Flames</option>
				<option value="crystals" ${ph.domainPattern==='crystals'?'selected':''}>❄️ Crystals</option>
				<option value="skulls" ${ph.domainPattern==='skulls'?'selected':''}>☠️ Skulls</option>
				<option value="lightning" ${ph.domainPattern==='lightning'?'selected':''}>⚡ Lightning</option>
				<option value="void" ${ph.domainPattern==='void'?'selected':''}>🌑 Void</option>
				<option value="stars" ${ph.domainPattern==='stars'?'selected':''}>⭐ Stars</option>
			</select></div>`;
			// Skip normal sliders for domain phase - add domain-specific ones
			html += `<div class="prow"><label>Duration: ${ph.duration.toFixed(1)}s</label>
				<div class="range-row">
					<input type="range" min="3" max="15" step="0.5" value="${ph.duration}" data-idx="${idx}" data-prop="duration"/>
					<span class="range-val">${ph.duration.toFixed(1)}s</span>
				</div></div>`;
		}

		// sliders: width, height, speed, duration, power - skip for domain phase 1
		if(!isDomainPhase){
		const isBigShape = ph.shape === 'solidify' || ph.shape === 'wall';
		// Domain spells cap power at 10 max on phase 2+
		const domainPowerCap = spellHasDomain && idx > 0;
		// Rank caps power output
		const rankPowerCap = getRankMaxPower();
		const basePowerMax = domainPowerCap ? 10 : (isUlt ? 20 : 10);
		const powerMax = Math.min(basePowerMax, rankPowerCap);
		const sliders = [
			{ prop:'width',    label:'Width',    min:0.3, max:isBigShape?(isUlt?10:6):(isUlt?8:3), step:0.1 },
			{ prop:'height',   label:'Height',   min:0.3, max:isBigShape?(isUlt?10:6):(isUlt?8:3), step:0.1 },
			{ prop:'speed',    label:'Speed',    min:0.3, max:isUlt?5:3, step:0.1 },
			{ prop:'duration', label:'Duration', min:0.3, max:(ph.behavior==='stationary'||ph.behavior==='selfCast'||ph.behavior==='ground'||ph.shape==='beam'||ph.shape==='solidify'?30:isUlt?10:5), step:0.1 },
			{ prop:'power',    label:'Power',    min:0.5, max:powerMax, step:0.1 },
		];
		for(const sl of sliders){
			html += `<div class="prow"><label>${sl.label}: ${ph[sl.prop].toFixed(1)}</label>
				<div class="range-row">
					<input type="range" min="${sl.min}" max="${sl.max}" step="${sl.step}" value="${ph[sl.prop]}" data-idx="${idx}" data-prop="${sl.prop}"/>
					<span class="range-val">${ph[sl.prop].toFixed(1)}</span>
				</div></div>`;
		}

		// count
		html += `<div class="prow"><label>Projectile Count</label>
			<input type="number" min="1" max="6" value="${ph.count}" data-idx="${idx}" data-prop="count" style="width:60px"/></div>`;

		// spread (if count > 1)
		if(ph.count > 1){
			html += `<div class="prow"><label>Spread Angle: ${ph.spread}°</label>
				<input type="range" min="0" max="360" step="5" value="${ph.spread}" data-idx="${idx}" data-prop="spread"/>
			</div>`;
		}

		// chain-specific settings
		if(ph.shape === 'chain'){
			if(ph.chainStunTime == null) ph.chainStunTime = 0;
			html += `<div class="prow" style="border-top:1px solid var(--border);padding-top:6px"><label style="color:var(--accent2)">Chain Settings</label></div>`;
			html += `<div class="prow"><label>Chain Stun: ${ph.chainStunTime.toFixed(1)}s (+${Math.round(ph.chainStunTime*25)} mana)</label>
				<div class="range-row">
					<input type="range" min="0" max="3" step="0.1" value="${ph.chainStunTime}" data-idx="${idx}" data-prop="chainStunTime"/>
					<span class="range-val">${ph.chainStunTime.toFixed(1)}</span>
				</div></div>`;
		}

		// aroundSelf-specific settings
		if(ph.behavior === 'aroundSelf'){
			if(!ph.aroundSelfCount) ph.aroundSelfCount = 4;
			html += `<div class="prow" style="border-top:1px solid var(--border);padding-top:6px"><label style="color:var(--accent2)">Around Self Settings</label></div>`;
			html += `<div class="prow"><label>Around Self Count: ${ph.aroundSelfCount}</label>
				<input type="range" min="4" max="16" step="1" value="${ph.aroundSelfCount}" data-idx="${idx}" data-prop="aroundSelfCount"/></div>`;
			html += `<div class="prow"><label>Around Self Radius: ${ph.aroundSelfRadius||50}</label>
				<input type="range" min="20" max="150" step="5" value="${ph.aroundSelfRadius||50}" data-idx="${idx}" data-prop="aroundSelfRadius"/></div>`;
		}

		// rain-specific settings
		if(ph.behavior === 'rain'){
			if(!ph.rainHeight) ph.rainHeight = 150;
			html += `<div class="prow" style="border-top:1px solid var(--border);padding-top:6px"><label style="color:var(--accent2)">Rain Settings</label></div>`;
			html += `<div class="prow"><label>Rain Height: ${ph.rainHeight}</label>
				<input type="range" min="50" max="800" step="10" value="${ph.rainHeight}" data-idx="${idx}" data-prop="rainHeight"/></div>`;
		}

		// orbit-specific settings
		if(ph.behavior === 'orbit'){
			html += `<div class="prow" style="border-top:1px solid var(--border);padding-top:6px"><label style="color:var(--accent2)">Orbit Settings</label></div>`;
			html += `<div class="prow"><label>Orbit Radius: ${ph.orbitRadius}</label>
				<input type="range" min="30" max="200" step="5" value="${ph.orbitRadius}" data-idx="${idx}" data-prop="orbitRadius"/></div>`;
			html += `<div class="prow"><label>Orbit Speed: ${ph.orbitSpeed.toFixed(1)}</label>
				<input type="range" min="0.5" max="8" step="0.5" value="${ph.orbitSpeed}" data-idx="${idx}" data-prop="orbitSpeed"/></div>`;
			html += `<div class="prow"><label>Orbit Duration: ${ph.orbitDuration.toFixed(1)}s</label>
				<input type="range" min="0.5" max="5" step="0.1" value="${ph.orbitDuration}" data-idx="${idx}" data-prop="orbitDuration"/></div>`;
		}

		// ground-specific settings (radius)
		if(ph.behavior === 'ground'){
			if(!ph.groundRadius) ph.groundRadius = 200;
			html += `<div class="prow" style="border-top:1px solid var(--border);padding-top:6px"><label style="color:var(--accent2)">Ground Settings</label></div>`;
			html += `<div class="prow"><label>Auto Lock-on</label><select data-idx="${idx}" data-prop="groundAutoLock">
				<option value="true" ${ph.groundAutoLock!==false?'selected':''}>Yes — locks to nearest enemy</option>
				<option value="false" ${ph.groundAutoLock===false?'selected':''}>No — erupts at your feet</option>
			</select></div>`;
			html += `<div class="prow"><label>Lock-on Radius: ${ph.groundRadius}px</label>
				<input type="range" min="100" max="800" step="50" value="${ph.groundRadius}" data-idx="${idx}" data-prop="groundRadius"/></div>`;
		}

		// summon-specific settings (range, health, speed)
		if(ph.shape === 'summon'){
			if(ph.summonRange==null) ph.summonRange = 0;
			if(ph.summonHealth==null) ph.summonHealth = 0;
			if(ph.summonSpeed==null) ph.summonSpeed = 0;
			html += `<div class="prow" style="border-top:1px solid var(--border);padding-top:6px"><label style="color:var(--accent2)">Summon Upgrades</label></div>`;
			html += `<div class="prow"><label>+Range: ${ph.summonRange} (${600+ph.summonRange*100}px)</label>
				<input type="range" min="0" max="10" step="1" value="${ph.summonRange}" data-idx="${idx}" data-prop="summonRange"/></div>`;
			html += `<div class="prow"><label>+Health: ${ph.summonHealth} (${40+ph.summonHealth*10} HP)</label>
				<input type="range" min="0" max="10" step="1" value="${ph.summonHealth}" data-idx="${idx}" data-prop="summonHealth"/></div>`;
			html += `<div class="prow"><label>+Speed: ${ph.summonSpeed} (${(2.5+ph.summonSpeed*0.5).toFixed(1)})</label>
				<input type="range" min="0" max="10" step="1" value="${ph.summonSpeed}" data-idx="${idx}" data-prop="summonSpeed"/></div>`;
			html += `<div class="prow"><label>Close Range</label><select data-idx="${idx}" data-prop="summonClose">
				<option value="false" ${!ph.summonClose?'selected':''}>No — stay at range</option>
				<option value="true" ${ph.summonClose?'selected':''}>Yes — rush enemies</option>
			</select></div>`;
		}
		} // end if(!isDomainPhase)

		// effects — grouped by category (domain phase only shows domain element, already handled above)
		if(!isDomainPhase){
		html += `<div class="prow"><label>Effects</label></div>`;
		const catOrder = ['elemental','movement','cc','support','buff','utility','store'];
		for(const cat of catOrder){
			const catInfo = EFFECT_CATEGORIES[cat];
			const catEffects = Object.entries(EFFECTS).filter(([k,v])=>v.category===cat).sort((a,b)=>(EFFECT_RANK_REQ[a[0]]??99)-(EFFECT_RANK_REQ[b[0]]??99)||a[1].controlReq-b[1].controlReq);
			if(!catEffects.length) continue;
			html += `<div class="prow" style="margin-top:4px"><label style="font-size:.85em;color:var(--accent2)">${catInfo.label}${catInfo.exclusive?' <span style="color:#ff6b6b;font-size:.8em"> (pick one)</span>':''}</label><div class="fx-grid">`;
			for(const [k,v] of catEffects){
				const active = ph.effects.includes(k);
				const vowLocked = vowLockedEffects.has(k);
				const fxItemReq = EFFECT_ITEM_REQ[k];
				const fxItemLocked = fxItemReq && !hasItemEquipped(fxItemReq);
				const fxRankLocked = !isEffectUnlocked(k);
				// check if another exclusive effect in this category is already active
				const blocked = vowLocked || fxItemLocked || fxRankLocked || (!active && catInfo.exclusive && catEffects.some(([k2])=>k2!==k && ph.effects.includes(k2)));
				const lockLabel = vowLocked ? ' 🔒 vow' : (fxItemLocked ? ` 🔒 ${ITEM_DB[fxItemReq]?.name||fxItemReq}` : (fxRankLocked ? ` 🔒 ${MAGE_RANKS[EFFECT_RANK_REQ[k]]?.name||'?'}` : ''));
				html += `<div class="fx-chip ${active&&!vowLocked&&!fxItemLocked&&!fxRankLocked?'active':''} ${blocked?'blocked':''}" data-idx="${idx}" data-fx="${k}" data-cat="${cat}" title="${v.desc} (ctrl ${v.controlReq}+)${v.dmgNote?' ['+v.dmgNote+']':''}${vowLocked?' — sacrificed by binding vow' : (fxItemLocked ? ' — requires '+(ITEM_DB[fxItemReq]?.name||fxItemReq) : (fxRankLocked ? ' — requires '+MAGE_RANKS[EFFECT_RANK_REQ[k]]?.name+' rank' : (blocked ? ' — already have one from this category' : '')))}">${v.icon} ${v.label}${v.dmgNote?' <span style="font-size:9px;color:#ff9;opacity:0.7">['+v.dmgNote+']</span>' : ''}${lockLabel}</div>`;
			}
			html += `</div></div>`;
		}

		// effect intensity settings (for burn/poison/freeze/stun)
		const tunableEffects = ['burn','poison','freeze','stun'];
		const hasTunable = ph.effects.some(fx => tunableEffects.includes(fx));
		if(hasTunable){
			if(!ph.effectPower) ph.effectPower = 1;
			if(!ph.effectDuration) ph.effectDuration = 1;
			const onlyBurnPoison = ph.effects.filter(fx => tunableEffects.includes(fx)).every(fx => fx==='burn'||fx==='poison');
			html += `<div class="prow" style="border-top:1px solid var(--border);padding-top:6px"><label style="color:var(--accent2)">Effect Intensity</label></div>`;
			if(!onlyBurnPoison){
				html += `<div class="prow"><label>Effect Power: ${ph.effectPower.toFixed(1)}x</label>
					<input type="range" min="0.5" max="3" step="0.1" value="${ph.effectPower}" data-idx="${idx}" data-prop="effectPower"/></div>`;
			} else {
				html += `<div class="prow"><label style="color:#888">Effect Power: N/A (burn/poison use hit damage)</label></div>`;
			}
			html += `<div class="prow"><label>Effect Duration: ${ph.effectDuration.toFixed(1)}x</label>
				<input type="range" min="0.5" max="3" step="0.1" value="${ph.effectDuration}" data-idx="${idx}" data-prop="effectDuration"/></div>`;
		}

		// damage store percentage (if damageStore effect is active)
		if(ph.effects.includes('damageStore')){
			if(ph.damageStorePercent == null) ph.damageStorePercent = 0.5;
			const dsPct = Math.round(ph.damageStorePercent * 100);
			html += `<div class="prow" style="border-top:1px solid var(--border);padding-top:6px"><label style="color:var(--accent2)">Damage Store Settings</label></div>`;
			html += `<div class="prow"><label>Store Percent: ${dsPct}%</label>
				<div class="range-row">
					<input type="range" min="0.1" max="1" step="0.05" value="${ph.damageStorePercent}" data-idx="${idx}" data-prop="damageStorePercent"/>
					<span class="range-val">${dsPct}%</span>
				</div></div>`;
		}

		// timed release settings (if timedRelease effect is active)
		if(ph.effects.includes('timedRelease')){
			const trd = ph.timedReleaseDelay != null ? ph.timedReleaseDelay : 0.5;
			html += `<div class="prow" style="border-top:1px solid var(--border);padding-top:6px"><label style="color:var(--accent2)">Timed Release Settings</label></div>`;
			html += `<div class="prow"><label>Trigger Delay: ${trd.toFixed(1)}s</label>
				<div class="range-row">
					<input type="range" min="0" max="4" step="0.1" value="${trd}" data-idx="${idx}" data-prop="timedReleaseDelay"/>
					<span class="range-val">${trd.toFixed(1)}</span>
				</div></div>`;
		}

		// phase fork settings (if phaseFork effect is active)
		if(ph.effects.includes('phaseFork')){
			const pfd = ph.phaseForkDelay != null ? ph.phaseForkDelay : 1;
			const pfr = ph.phaseForkRepeats != null ? ph.phaseForkRepeats : 1;
			html += `<div class="prow" style="border-top:1px solid var(--border);padding-top:6px"><label style="color:var(--accent2)">Phase Fork Settings</label></div>`;
			html += `<div class="prow"><label>Fork Delay: ${pfd.toFixed(1)}s</label>
				<div class="range-row">
					<input type="range" min="0" max="5" step="0.1" value="${pfd}" data-idx="${idx}" data-prop="phaseForkDelay"/>
					<span class="range-val">${pfd.toFixed(1)}</span>
				</div></div>`;
			html += `<div class="prow"><label>Repeat Casts: ${pfr}</label>
				<div class="range-row">
					<input type="range" min="1" max="25" step="1" value="${pfr}" data-idx="${idx}" data-prop="phaseForkRepeats"/>
					<span class="range-val">${pfr}</span>
				</div></div>`;
		}

		// random delay settings
		if(ph.effects.includes('randomDelay')){
			const rdMax = ph.randomDelayMax != null ? ph.randomDelayMax : 0.5;
			html += `<div class="prow" style="border-top:1px solid var(--border);padding-top:6px"><label style="color:var(--accent2)">Random Delay Settings</label></div>`;
			html += `<div class="prow"><label>Max Delay: ${rdMax.toFixed(1)}s</label>
				<div class="range-row">
					<input type="range" min="0.1" max="3" step="0.1" value="${rdMax}" data-idx="${idx}" data-prop="randomDelayMax"/>
					<span class="range-val">${rdMax.toFixed(1)}</span>
				</div></div>`;
		}
		} // end if(!isDomainPhase) for effects

		// color (available for all phases including domain)
		html += `<div class="prow"><label>Color</label>
			<input type="color" value="${ph.color}" data-idx="${idx}" data-prop="color"/></div>`;

		// These options don't apply to domain phase 1
		if(!isDomainPhase){
		// noHit toggle — spell doesn't damage enemies/players
		html += `<div class="prow"><label>No Hit (Harmless)</label><select data-idx="${idx}" data-prop="noHit">
			<option value="false" ${!ph.noHit?'selected':''}>Off — deals damage normally</option>
			<option value="true" ${ph.noHit?'selected':''}>On — visual only, no damage</option>
		</select></div>`;

		// holdDown toggle — hold projectile at player before releasing
		html += `<div class="prow"><label>Hold Down</label><select data-idx="${idx}" data-prop="holdDown">
			<option value="false" ${!ph.holdDown?'selected':''}>Off — fires immediately</option>
			<option value="true" ${ph.holdDown?'selected':''}>On — hold before throwing</option>
		</select></div>`;

		// trail
		html += `<div class="prow"><label>Trail</label><select data-idx="${idx}" data-prop="trail">`;
		for(const t of TRAILS){
			html += `<option value="${t}" ${ph.trail===t?'selected':''}>${t.charAt(0).toUpperCase()+t.slice(1)}</option>`;
		}
		html += `</select></div>`;

		// after-hit effect
		html += `<div class="prow"><label>After-Hit Effect</label><select data-idx="${idx}" data-prop="afterHitEffect">`;
		for(const [k,v] of Object.entries(AFTER_HIT_EFFECTS)){
			const sel = (ph.afterHitEffect||'none')===k ? 'selected' : '';
			html += `<option value="${k}" ${sel}>${v.icon} ${v.label}</option>`;
		}
		html += `</select></div>`;

		// polygon-specific settings
		if(ph.shape === 'polygon'){
			if(!ph.polygonSides) ph.polygonSides = 6;
			html += `<div class="prow" style="border-top:1px solid var(--border);padding-top:6px"><label style="color:var(--accent2)">Polygon Settings</label></div>`;
			html += `<div class="prow"><label>Sides: ${ph.polygonSides}</label>
				<div class="range-row">
					<input type="range" min="3" max="12" step="1" value="${ph.polygonSides}" data-idx="${idx}" data-prop="polygonSides"/>
					<span class="range-val">${ph.polygonSides}</span>
				</div></div>`;
		}

		// vortex-specific settings
		if(ph.shape === 'vortex'){
			const vDur = ph.vortexDuration != null ? ph.vortexDuration : 1;
			html += `<div class="prow" style="border-top:1px solid var(--border);padding-top:6px"><label style="color:var(--accent2)">Vortex Settings</label></div>`;
			html += `<div class="prow"><label>Duration: ${vDur.toFixed(1)}x</label>
				<div class="range-row">
					<input type="range" min="0.5" max="4" step="0.5" value="${vDur}" data-idx="${idx}" data-prop="vortexDuration"/>
					<span class="range-val">${vDur.toFixed(1)}x</span>
				</div></div>`;
		}
		} // end if(!isDomainPhase) for noHit/trail/etc

		// next trigger (not for last phase)
		if(!isLast){
			html += `<div class="prow" style="border-top:1px solid var(--border);padding-top:6px"><label>Trigger Next Phase</label><select data-idx="${idx}" data-prop="nextTrigger">`;
			for(const [k,v] of Object.entries(TRIGGERS)){
				html += `<option value="${k}" ${ph.nextTrigger===k?'selected':''}>${v.label}</option>`;
			}
			html += `</select></div>`;
			// arrow between phases
			html += `<div class="arrow-between">→</div>`;
		}

		card.innerHTML = html;
		wrap.appendChild(card);
	});

	// wire up events in phase cards
	wrap.querySelectorAll('.remove-phase').forEach(btn => {
		btn.addEventListener('click', () => {
			builderSpell.phases.splice(+btn.dataset.idx, 1);
			renderBuilder();
		});
	});
	wrap.querySelectorAll('select[data-prop], input[type=color][data-prop]').forEach(el => {
		el.addEventListener('change', () => {
			const prop = el.dataset.prop;
			let val = el.value;
			if(val === 'true') val = true;
			else if(val === 'false') val = false;
			builderSpell.phases[+el.dataset.idx][prop] = val;
			renderBuilder();
		});
	});
	wrap.querySelectorAll('input[type=range][data-prop]').forEach(el => {
		el.addEventListener('input', () => {
			const val = parseFloat(el.value);
			const prop = el.dataset.prop;
			if (prop === 'aroundSelfCount' || prop === 'aroundSelfRadius' || prop === 'rainHeight' || prop === 'polygonSides') {
				builderSpell.phases[+el.dataset.idx][prop] = Math.round(val);
				renderBuilder(); return;
			}
			builderSpell.phases[+el.dataset.idx][prop] = val;
			const row = el.closest('.prow');
			const valSpan = row.querySelector('.range-val');
			if(valSpan) valSpan.textContent = val.toFixed ? val.toFixed(1) : val;
			const lbl = row.querySelector('label');
			if(lbl){
				const prop = el.dataset.prop;
				const niceLabel = prop.charAt(0).toUpperCase() + prop.slice(1).replace(/([A-Z])/g,' $1');
				lbl.textContent = `${niceLabel}: ${typeof val==='number'&&val%1!==0?val.toFixed(1):val}${prop.includes('uration')?'s':prop==='spread'?'°':''}`;
			}
			updateBuilderMeta();
		});
	});
	wrap.querySelectorAll('input[type=number][data-prop]').forEach(el => {
		el.addEventListener('change', () => {
			builderSpell.phases[+el.dataset.idx][el.dataset.prop] = Math.max(1,Math.min(6,+el.value));
			renderBuilder();
		});
	});
	wrap.querySelectorAll('.fx-chip').forEach(el => {
		el.addEventListener('click', () => {
			if(el.classList.contains('blocked')) return;
			const ph = builderSpell.phases[+el.dataset.idx];
			const fx = el.dataset.fx;
			const i = ph.effects.indexOf(fx);
			if(i >= 0){
				ph.effects.splice(i,1);
			} else {
				const cat = EFFECTS[fx]?.category;
				if(cat && EFFECT_CATEGORIES[cat]?.exclusive){
					for(const [k2,v2] of Object.entries(EFFECTS)){
						if(v2.category===cat && k2!==fx){
							const j = ph.effects.indexOf(k2);
							if(j>=0) ph.effects.splice(j,1);
						}
					}
				}
				ph.effects.push(fx);
			}
			renderBuilder();
		});
	});
}

function updateBuilderMeta(){
	const stats = computeStats();
	const baseCost = calcSpellManaCost(builderSpell);
	const controlDiscount = Math.max(0.3, 1 - stats.magicControl * 0.015);
	const _vbMeta = calcVowBoostsForSlot(editingSlot);
	const vowManaMeta = Math.max(0.1, 1 - (_vbMeta.manaCost||0) * 0.05);
	const cost = Math.round(baseCost * controlDiscount * vowManaMeta);
	const totalDiscountPct = Math.round((1 - controlDiscount * vowManaMeta) * 100);
	const req  = calcSpellControlReq(builderSpell);
	const canUse = stats.magicControl >= req;
	const meta = document.getElementById('spellMeta');
	const chips = meta.querySelectorAll('.meta-chip');
	if(chips[0]) chips[0].innerHTML = `Mana Cost: <b style="color:var(--blue)">${cost}</b>${totalDiscountPct > 0 ? ` <span style="color:var(--green);font-size:.85em">(-${totalDiscountPct}% discount)</span>` : ''}`;
	if(chips[1]) chips[1].innerHTML = `Control Req: <b style="color:${canUse?'var(--green)':'var(--red)'}">${req}</b> / ${stats.magicControl}`;
	if(chips[2]) {
		let total = 1;
		for(const p of builderSpell.phases) total *= (p.behavior==='aroundSelf' ? (p.aroundSelfCount||4) : (p.count||1));
		const over = total > 1000;
		chips[2].innerHTML = `Phases: <b>${builderSpell.phases.length}</b>/5`;
		if(chips[3]) chips[3].innerHTML = `Total Projectiles: <b style="color:${over?'var(--red)':'var(--green)'}">${total}</b>${over?' (max 1000!)':''}`;
	}
	document.getElementById('spellDesc').textContent = generateSpellDescription(builderSpell);
}

/* =============================================================
   SPELL DESCRIPTION GENERATOR
   ============================================================= */
function generateSpellDescription(spell){
	if(!spell || !spell.phases.length) return 'Empty spell.';
	const parts = [];
	spell.phases.forEach((ph, i) => {
		const shape = SHAPES[ph.shape]?.label || ph.shape;
		const beh   = BEHAVIORS[ph.behavior]?.label || ph.behavior;
		let s = '';
		if(i === 0) s += 'Cast '; else s += 'Then ';
		if(ph.count > 1) s += `${ph.count} `;
		s += `${shape.toLowerCase()}${ph.count>1?'s':''} `;

		// behavior description
		switch(ph.behavior){
			case 'straight':    s += 'flying forward'; break;
			case 'lob':         s += 'arcing through the air'; break;
			case 'homing':      s += 'homing toward the target'; break;
			case 'boomerang':   s += 'that returns to you'; break;
			case 'groundSurge': s += 'surging along the ground'; break;
			case 'orbit':       s += `orbiting you for ${ph.orbitDuration.toFixed(1)}s then launching`; break;
			case 'rain':        s += 'raining from above'; break;
			case 'ground':      s += 'erupting from the ground'; break;
			case 'stationary':  s += 'placed at your position'; break;
			case 'selfCast':    s += 'conjured at your feet'; break;
		}

		if(ph.power > 1.5) s += ' with great force';
		else if(ph.power < 0.7) s += ' gently';

		if(ph.effects.length){
			s += ', applying ' + ph.effects.map(fx => EFFECTS[fx]?.label?.toLowerCase()||fx).join(' & ');
		}

		s += '.';

		if(i < spell.phases.length - 1){
			const trig = ph.nextTrigger;
			if(trig === 'onHit') s += ' On hit:';
			else if(trig === 'afterDelay') s += ' After a moment:';
			else if(trig === 'onExpire') s += ' When it fades:';
		}

		if(ph.effects.includes('phaseFork')){
			const pfd = ph.phaseForkDelay||1;
			const pfr = ph.phaseForkRepeats||1;
			s += ` Also forks to next phase after ${pfd.toFixed(1)}s`;
			if(pfr > 1) s += ` (${pfr}× repeats)`;
			s += '.';
		}

		parts.push(s);
	});
	return parts.join(' ');
}

/* =============================================================
   SPELL PREVIEW (canvas animation)
   ============================================================= */
let previewRAF = null;
const previewCanvas = document.getElementById('spellPreview');
const pctx = previewCanvas.getContext('2d');

function startPreview(){
	stopPreview();
	resizePreview();
	previewRAF = requestAnimationFrame(previewLoop);
}
function stopPreview(){ if(previewRAF){ cancelAnimationFrame(previewRAF); previewRAF = null; } }
function resizePreview(){
	const rect = previewCanvas.getBoundingClientRect();
	previewCanvas.width = rect.width;
	previewCanvas.height = rect.height;
}

let previewTime = 0;
function previewLoop(){
	previewTime += 0.016;
	drawPreview();
	previewRAF = requestAnimationFrame(previewLoop);
}

function drawPreview(){
	const W = previewCanvas.width, H = previewCanvas.height;
	if(W === 0 || H === 0){ resizePreview(); return; }
	pctx.clearRect(0,0,W,H);

	// background
	pctx.fillStyle = '#0e0c1a';
	pctx.fillRect(0,0,W,H);

	// ground line
	const groundY = H - 20;
	pctx.fillStyle = '#2a2a3d';
	pctx.fillRect(0, groundY, W, 20);
	pctx.fillStyle = '#3d3d56';
	pctx.fillRect(0, groundY, W, 3);

	// caster
	const cx = 80, cy = groundY - 24;
	pctx.fillStyle = '#5b7fbf';
	pctx.fillRect(cx - 8, cy - 24, 16, 24);
	// hat
	pctx.fillStyle = '#2e3a6e';
	pctx.beginPath();
	pctx.moveTo(cx - 8, cy - 22);
	pctx.lineTo(cx, cy - 42);
	pctx.lineTo(cx + 8, cy - 22);
	pctx.closePath();
	pctx.fill();

	// target dummy
	const tx = W - 100, ty = groundY - 24;
	pctx.fillStyle = '#8b4040';
	pctx.fillRect(tx - 8, ty - 24, 16, 24);
	pctx.fillStyle = '#555';
	pctx.fillRect(tx - 12, ty - 8, 24, 3); // arms
	pctx.font = '10px Arial';
	pctx.fillStyle = '#aaa';
	pctx.textAlign = 'center';
	pctx.fillText('Target', tx, ty + 14);

	if(!builderSpell || !builderSpell.phases.length) return;

	// animate phases
	const totalCycle = builderSpell.phases.reduce((s,ph) => s + ph.duration + 0.3, 0) + 0.5;
	const t = previewTime % totalCycle;

	let elapsed = 0;
	for(let pi = 0; pi < builderSpell.phases.length; pi++){
		const ph = builderSpell.phases[pi];
		const phStart = elapsed;
		const phEnd = phStart + ph.duration;
		elapsed = phEnd + 0.3;

		if(t < phStart || t > phEnd + 0.5) continue;

		const localT = Math.min((t - phStart) / ph.duration, 1);
		const color = ph.color || '#4488ff';

		// draw projectile(s) for this phase
		for(let ci = 0; ci < ph.count; ci++){
			const spreadAngle = ph.count > 1 ? ((ci / (ph.count-1)) - 0.5) * (ph.spread * Math.PI / 180) : 0;

			let px, py, size;
			size = 4 * ph.width;

			switch(ph.behavior){
				case 'straight': {
					const originX = pi === 0 ? cx + 16 : (cx + tx)/2;
					const originY = pi === 0 ? cy - 12 : (cy + ty)/2 - 20;
					px = originX + (tx - originX) * localT;
					py = originY + Math.sin(spreadAngle) * 40 + (ty - 12 - originY) * localT;
					break;
				}
				case 'lob': {
					const originX = pi === 0 ? cx + 16 : (cx + tx)/2;
					px = originX + (tx - originX) * localT;
					py = cy - 12 - Math.sin(localT * Math.PI) * 80 * ph.height + spreadAngle * 20;
					break;
				}
				case 'homing': {
					const originX = pi === 0 ? cx + 16 : cx + 60;
					const startY = cy - 30 + ci * 20;
					const curve = Math.sin(localT * Math.PI * 0.7) * 30;
					px = originX + (tx - originX) * localT;
					py = startY + (ty - 12 - startY) * localT + curve;
					break;
				}
				case 'boomerang': {
					const originX = pi === 0 ? cx + 16 : (cx + tx)/2;
					const dist = (tx - originX) * 0.7;
					px = originX + Math.sin(localT * Math.PI) * dist;
					py = cy - 12 - Math.sin(localT * Math.PI * 2) * 20 + spreadAngle * 30;
					break;
				}
				case 'orbit': {
					const angle = localT * Math.PI * 2 * ph.orbitSpeed + ci * (Math.PI * 2 / ph.count);
					const r = ph.orbitRadius * 0.4;
					if(localT < 0.7){
						px = cx + Math.cos(angle) * r;
						py = cy - 12 + Math.sin(angle) * r * 0.5;
					} else {
						const launchT = (localT - 0.7) / 0.3;
						const startX = cx + Math.cos(angle) * r;
						const startY = cy - 12 + Math.sin(angle) * r * 0.5;
						px = startX + (tx - startX) * launchT;
						py = startY + (ty - 12 - startY) * launchT;
					}
					break;
				}
				case 'rain': {
					const spread2 = (tx - cx) * 0.6;
					const startX = cx + spread2 * 0.3 + ci * (spread2 / Math.max(ph.count-1,1));
					px = startX;
					py = -10 + (groundY + 10) * localT;
					break;
				}
				case 'groundSurge': {
					const originX = pi === 0 ? cx + 16 : (cx + tx)/2;
					px = originX + (tx - originX) * localT;
					py = groundY - 6 + Math.sin(localT * 20) * 3;
					size *= 0.8;
					break;
				}
				case 'ground': {
					px = tx;
					const rise = Math.min(localT * 3, 1);
					py = groundY - rise * 40 * ph.height;
					const pulse3 = 1 + Math.sin(localT * Math.PI * 6) * 0.15;
					size *= pulse3;
					break;
				}
				case 'selfCast': {
					px = cx;
					py = cy - 12;
					const pulse2 = 1 + Math.sin(localT * Math.PI * 4) * 0.3;
					size *= pulse2;
					break;
				}
				case 'aroundSelf': {
					const asCount = ph.aroundSelfCount || 4;
					const asR = (ph.aroundSelfRadius || 50) * 0.4;
					const asAngle = (ci / asCount) * Math.PI * 2 + previewTime * 2;
					px = cx + Math.cos(asAngle) * asR;
					py = cy - 12 + Math.sin(asAngle) * asR * 0.5;
					break;
				}
				case 'underfoot': {
					px = cx;
					py = groundY - 6;
					const pulse4 = 1 + Math.sin(localT * Math.PI * 4) * 0.3;
					size *= pulse4;
					break;
				}
				case 'barrage': {
					const originX = pi === 0 ? cx + 16 : (cx + tx)/2;
					const bSpread = 60 * (ph.height || 1);
					px = originX + (tx - originX) * localT;
					py = cy - 12 + (ci - (ph.count-1)/2) * (bSpread / Math.max(ph.count-1,1));
					break;
				}
				case 'zigzag': {
					const originX = pi === 0 ? cx + 16 : (cx + tx)/2;
					const originY2 = pi === 0 ? cy - 12 : (cy + ty)/2 - 20;
					px = originX + (tx - originX) * localT;
					py = originY2 + Math.sin(localT * 20) * 15 + (ty - 12 - originY2) * localT;
					break;
				}
				case 'teleport': {
					const originX = pi === 0 ? cx + 16 : (cx + tx)/2;
					const blinks = 4;
					const blinkPhase = localT * blinks;
					const blinkFrac = blinkPhase - Math.floor(blinkPhase);
					const blinkProg = Math.floor(blinkPhase) / blinks;
					px = originX + (tx - originX) * blinkProg;
					py = cy - 12;
					pctx.globalAlpha = blinkFrac < 0.3 ? 0.3 : 0.9;
					break;
				}
				case 'stationary':
				default: {
					px = pi === 0 ? cx + 40 : (cx + tx) / 2;
					py = cy - 12;
					const pulse = 1 + Math.sin(localT * Math.PI * 4) * 0.3;
					size *= pulse;
					break;
				}
			}

			// glow
			pctx.save();
			pctx.globalAlpha = 0.3 + 0.3 * (1 - localT);
			const glow = pctx.createRadialGradient(px, py, 0, px, py, size * 3);
			glow.addColorStop(0, color);
			glow.addColorStop(1, 'transparent');
			pctx.fillStyle = glow;
			pctx.beginPath();
			pctx.arc(px, py, size * 3, 0, Math.PI * 2);
			pctx.fill();
			pctx.restore();

			// shape body
			pctx.fillStyle = color;
			pctx.globalAlpha = 0.9;
			switch(ph.shape){
				case 'blade': {
					pctx.save();
					pctx.translate(px, py);
					pctx.rotate(localT * Math.PI * 2);
					pctx.fillRect(-size*1.5, -size*0.3, size*3, size*0.6);
					pctx.restore();
					break;
				}
				case 'beam': {
					const originX = pi === 0 ? cx + 16 : (cx + tx)/2;
					pctx.fillRect(originX, py - size*0.5, (tx - originX) * localT, size);
					break;
				}
				case 'ring': {
					pctx.beginPath();
					pctx.arc(px, py, size * (1 + localT * 4), 0, Math.PI * 2);
					pctx.strokeStyle = color;
					pctx.lineWidth = 2;
					pctx.stroke();
					break;
				}
				case 'cone': {
					pctx.save();
					pctx.translate(pi===0?cx+16:(cx+tx)/2, py);
					pctx.beginPath();
					pctx.moveTo(0, 0);
					const coneLen = (tx - cx) * localT * 0.7;
					pctx.lineTo(coneLen, -coneLen*0.4*ph.width);
					pctx.lineTo(coneLen, coneLen*0.4*ph.width);
					pctx.closePath();
					pctx.globalAlpha = 0.35;
					pctx.fill();
					pctx.restore();
					break;
				}
				case 'nova': {
					pctx.beginPath();
					pctx.arc(px, py, localT * 60 * ph.width, 0, Math.PI * 2);
					pctx.globalAlpha = 0.3 * (1 - localT);
					pctx.fill();
					pctx.beginPath();
					pctx.arc(px, py, localT * 60 * ph.width, 0, Math.PI * 2);
					pctx.strokeStyle = color;
					pctx.lineWidth = 2;
					pctx.globalAlpha = 0.6 * (1 - localT);
					pctx.stroke();
					break;
				}
				case 'wall': {
					const ww = size * 2 * ph.width;
					const wh = size * 6 * ph.height;
					pctx.globalAlpha = 0.5;
					pctx.fillRect(px - ww/2, py - wh/2, ww, wh);
					break;
				}
				case 'solidify': {
					const sw = size * 3 * ph.width;
					const sht = size * 1.5 * ph.height;
					pctx.globalAlpha = 0.7;
					pctx.fillRect(px - sw/2, py - sht/2, sw, sht);
					pctx.strokeStyle = color;
					pctx.lineWidth = 2;
					pctx.strokeRect(px - sw/2, py - sht/2, sw, sht);
					pctx.globalAlpha = 0.25;
					pctx.fillStyle = '#fff';
					pctx.fillRect(px - sw/2 + 2, py - sht/2 + 2, sw - 4, 3);
					break;
				}
				case 'spike': {
					pctx.save();
					pctx.translate(px, py);
					const spikeAng = Math.atan2(py - (cy - 12), px - (pi===0?cx+16:(cx+tx)/2)) || 0;
					pctx.rotate(spikeAng);
					pctx.beginPath();
					pctx.moveTo(size * 2, 0);
					pctx.lineTo(-size, -size * 0.8);
					pctx.lineTo(-size * 0.3, 0);
					pctx.lineTo(-size, size * 0.8);
					pctx.closePath();
					pctx.fill();
					pctx.restore();
					break;
				}
				case 'chain': {
					// draw multiple jump points
					const jumps = 3;
					for(let j = 0; j <= Math.floor(localT * jumps); j++){
						const jx = px + j * 40;
						const jy = py + (j%2?-1:1)*15;
						pctx.beginPath();
						pctx.arc(jx, jy, size, 0, Math.PI*2);
						pctx.fill();
						if(j > 0){
							pctx.strokeStyle = color;
							pctx.lineWidth = 1;
							pctx.globalAlpha = 0.4;
							pctx.beginPath();
							pctx.moveTo(jx - 40, jy + (j%2?1:-1)*30);
							pctx.lineTo(jx, jy);
							pctx.stroke();
						}
					}
					break;
				}
				case 'polygon': {
					pctx.save();
					pctx.translate(px, py);
					pctx.rotate(previewTime * 1.5);
					const pgR = size * 1.2;
					const pgS = ph.polygonSides || 6;
					pctx.beginPath();
					for(let si = 0; si <= pgS; si++){
						const a = si * Math.PI * 2 / pgS;
						if(si===0) pctx.moveTo(Math.cos(a)*pgR, Math.sin(a)*pgR);
						else pctx.lineTo(Math.cos(a)*pgR, Math.sin(a)*pgR);
					}
					pctx.closePath();
					pctx.fill();
					pctx.strokeStyle = color;
					pctx.lineWidth = 1.5;
					pctx.stroke();
					pctx.restore();
					break;
				}
				case 'meteor': {
					pctx.save();
					pctx.translate(px, py);
					const mR = size * 1.5;
					// color cycling
					const mPhase = (previewTime * 1.5) % 3;
					const mColors = [['#ff4400','#ffcc00'],['#ff00cc','#ff66ff'],['#4488ff','#88ddff']];
					const mI = Math.floor(mPhase), mN = (mI+1)%3, mF = mPhase - mI;
					const mCore = `rgb(${Math.round(parseInt(mColors[mI][0].slice(1,3),16)*(1-mF)+parseInt(mColors[mN][0].slice(1,3),16)*mF)},${Math.round(parseInt(mColors[mI][0].slice(3,5),16)*(1-mF)+parseInt(mColors[mN][0].slice(3,5),16)*mF)},${Math.round(parseInt(mColors[mI][0].slice(5,7),16)*(1-mF)+parseInt(mColors[mN][0].slice(5,7),16)*mF)})`;
					// body
					pctx.fillStyle = '#553322';
					pctx.beginPath(); pctx.arc(0,0,mR,0,Math.PI*2); pctx.fill();
					pctx.fillStyle = mCore; pctx.globalAlpha = 0.8;
					pctx.beginPath(); pctx.arc(0,0,mR*0.5,0,Math.PI*2); pctx.fill();
					// glow
					pctx.globalAlpha = 0.3;
					const mg = pctx.createRadialGradient(0,0,mR*0.3,0,0,mR*2);
					mg.addColorStop(0, mCore); mg.addColorStop(1,'transparent');
					pctx.fillStyle = mg;
					pctx.beginPath(); pctx.arc(0,0,mR*2,0,Math.PI*2); pctx.fill();
					pctx.restore();
					break;
				}
				case 'vortex': {
					pctx.save();
					pctx.translate(px, py);
					const vR = size * 2 * (1 + localT * 0.5);
					// void body
					const vg = pctx.createRadialGradient(0,0,0,0,0,vR);
					vg.addColorStop(0,'rgba(10,0,20,0.8)');
					vg.addColorStop(0.5, color);
					vg.addColorStop(1,'transparent');
					pctx.globalAlpha = 0.6;
					pctx.fillStyle = vg;
					pctx.beginPath(); pctx.arc(0,0,vR,0,Math.PI*2); pctx.fill();
					// spiral arms
					pctx.lineWidth = 1.5; pctx.strokeStyle = color; pctx.globalAlpha = 0.5;
					for(let arm = 0; arm < 3; arm++){
						pctx.beginPath();
						const baseA = arm * Math.PI * 2 / 3 + previewTime * 3;
						for(let t2 = 0; t2 < 12; t2++){
							const a2 = baseA + t2 * 0.3;
							const r2 = vR * 0.1 + vR * 0.8 * (t2/12);
							pctx.lineTo(Math.cos(a2)*r2, Math.sin(a2)*r2);
						}
						pctx.stroke();
					}
					pctx.restore();
					break;
				}
				case 'summon': {
					pctx.save();
					pctx.translate(px, py);
					const sR = size * 1.2;
					pctx.strokeStyle = color;
					pctx.lineWidth = 2;
					pctx.globalAlpha = 0.6 + Math.sin(previewTime * 4) * 0.2;
					pctx.beginPath(); pctx.arc(0,0,sR,0,Math.PI*2); pctx.stroke();
					pctx.globalAlpha = 0.4;
					for(let si = 0; si < 5; si++){
						const a = si * Math.PI * 2 / 5 - Math.PI/2 + previewTime * 2;
						pctx.beginPath();
						pctx.moveTo(0,0);
						pctx.lineTo(Math.cos(a)*sR*0.8, Math.sin(a)*sR*0.8);
						pctx.stroke();
					}
					pctx.restore();
					break;
				}
				case 'allyOrb': {
					pctx.fillStyle = '#44ff88';
					pctx.beginPath();
					pctx.arc(px, py, size * 1.3, 0, Math.PI * 2);
					pctx.fill();
					break;
				}
				default: {
					pctx.beginPath();
					pctx.arc(px, py, size, 0, Math.PI * 2);
					pctx.fill();
				}
			}
			pctx.globalAlpha = 1;

			// trail particles
			if(ph.trail !== 'none'){
				const trailColors = {
					sparkle:'rgba(200,220,255,',flame:'rgba(255,140,50,',
					smoke:'rgba(100,100,100,',ice:'rgba(150,220,255,',
					lightning:'rgba(180,180,255,'
				};
				const tc = trailColors[ph.trail] || 'rgba(200,200,200,';
				for(let tp = 0; tp < 4; tp++){
					const tpx = px - (ph.behavior==='stationary'?0:6+tp*4) + (Math.random()-0.5)*6;
					const tpy = py + (Math.random()-0.5)*8;
					const ta = 0.6 - tp*0.15;
					pctx.fillStyle = tc + ta +')';
					pctx.beginPath();
					pctx.arc(tpx, tpy, 1.5+Math.random()*1.5, 0, Math.PI*2);
					pctx.fill();
				}
			}
		}
	}

	// label
	pctx.font = '10px Arial';
	pctx.fillStyle = '#666';
	pctx.textAlign = 'left';
	pctx.fillText('Preview (looping)', 6, 14);

	// Predicted damage output
	if(builderSpell && builderSpell.phases.length){
		const stats = computeStats();
		pctx.font = '10px Arial';
		pctx.textAlign = 'right';
		let yOff = 14;
		for(let pi = 0; pi < builderSpell.phases.length; pi++){
			const ph = builderSpell.phases[pi];
			if(ph.noHit || ph.shape === 'allyOrb' || ph.shape === 'summon' || ph.shape === 'solidify') continue;
			let baseDmg = (ph.power || 1) * 8;
			// behavior multipliers
			if(ph.behavior === 'homing') baseDmg *= 0.5;
			if(ph.behavior === 'lob') baseDmg *= 1.25;
			if(ph.behavior === 'orbit') baseDmg *= 0.7;
			if(ph.behavior === 'rain') baseDmg *= 1.5;
			if(ph.behavior === 'barrage') baseDmg *= 1.35;
			if(ph.behavior === 'ground') baseDmg *= 1.4;
			// shape multipliers
			if(ph.shape === 'beam') baseDmg *= 0.65;
			if(ph.shape === 'meteor') baseDmg *= 0.75;
			// effects
			const hasElem = ph.effects.includes('burn')||ph.effects.includes('freeze')||ph.effects.includes('poison')||ph.effects.includes('stun');
			if(hasElem) baseDmg *= 1;
			if(ph.effects.includes('phaseThrough')) baseDmg *= 0.55;
			// spread bonus
			if(ph.spread > 0 && ph.count > 1) baseDmg *= 1 + (ph.spread * 0.0025 * ph.count);
			const totalPerCast = baseDmg * (ph.count || 1);
			pctx.fillStyle = ph.color || '#4488ff';
			pctx.fillText(`P${pi+1}: ~${Math.round(baseDmg)} × ${ph.count||1} = ~${Math.round(totalPerCast)} dmg`, W - 6, yOff);
			yOff += 13;
		}
	}
}

/* =============================================================
   UTILITY
   ============================================================= */
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* =============================================================
   RENDER ALL
   ============================================================= */
function renderAll(){
	renderStats();
	renderEquipment();
	renderInventory();
	renderSpellSlots();
	renderVowSlots();
}

/* =============================================================
   EVENT WIRING
   ============================================================= */
document.getElementById('searchBox').addEventListener('input', e => {
	searchTerm = e.target.value.trim();
	invPage = 0;
	renderInventory();
});
document.getElementById('prevPage').addEventListener('click', () => { invPage--; renderInventory(); });
document.getElementById('nextPage').addEventListener('click', () => { invPage++; renderInventory(); });

// Crafting search + filter
document.getElementById('craftSearchBox').addEventListener('input', e => {
	craftSearch = e.target.value.trim();
	renderCraftList();
});
document.getElementById('craftFilter').addEventListener('change', e => {
	craftTypeFilter = e.target.value;
	renderCraftList();
});

document.getElementById('testBtn').addEventListener('click', () => {
	// Clear inventory (not spells)
	STATE.inventory = [];
	STATE.equipment = { staff:null, robe:null, relic1:null, relic2:null };
	// Give one of every item in ITEM_DB (ingredients get extra for crafting)
	for (const [id, item] of Object.entries(ITEM_DB)) {
		const qty = item.type === 'ingredient' ? 50 : 1;
		STATE.inventory.push({ itemId: id, qty });
	}
	saveState();
	renderAll();
});

// close modal on overlay click
document.getElementById('spellModal').addEventListener('click', e => {
	if(e.target === document.getElementById('spellModal')) closeSpellBuilder();
});

// keyboard shortcut: Escape closes modal
document.addEventListener('keydown', e => {
	if(e.key === 'Escape'){
		if(document.getElementById('spellModal').classList.contains('open')) closeSpellBuilder();
	}
});

/* =============================================================
   INIT
   ============================================================= */
/* Hide the back/menu button when loaded inside an iframe (e.g. open world overlay) */
if(window.self !== window.top){
	const bb = document.getElementById('backBtn');
	if(bb) bb.style.display = 'none';
}
renderAll();
</script>
