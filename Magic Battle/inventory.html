<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Magic Battle — Inventory</title>
<style>
/* ============================================================
   ROOT & RESET
   ============================================================ */
:root{
	--bg:#12101e;--panel:rgba(255,255,255,.05);--panel2:rgba(255,255,255,.08);
	--border:rgba(255,255,255,.15);--text:#e8eaff;--muted:#9ea4c4;
	--accent:#6c5ce7;--accent2:#a29bfe;--green:#28a745;--red:#e74c3c;
	--blue:#3498db;--gold:#f1c40f;--orange:#e67e22;--purple:#9b59b6;
	--slot-bg:rgba(255,255,255,.04);--slot-hover:rgba(255,255,255,.1);
	--rarity-common:#aaa;--rarity-uncommon:#2ecc71;--rarity-rare:#3498db;
	--rarity-epic:#9b59b6;--rarity-legendary:#f39c12;--rarity-mythical:#cc44ff;
	--rarity-mythic:#ffd700;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text)}
button{cursor:pointer;font-family:inherit}
input,select{font-family:inherit}

/* ============================================================
   LAYOUT – three-column with top bar
   ============================================================ */
#topBar{
	display:flex;align-items:center;justify-content:space-between;
	padding:10px 18px;background:rgba(0,0,0,.35);border-bottom:1px solid var(--border);
	height:52px;
}
#topBar h1{font-size:20px;letter-spacing:1px}
#backBtn{
	padding:6px 16px;font-size:13px;background:rgba(255,255,255,.1);color:#ccc;
	border:1px solid var(--border);border-radius:5px;transition:background .2s;
}
#backBtn:hover{background:rgba(255,255,255,.2)}

/* stats bar */
.stats-bar{display:flex;gap:16px;align-items:center}
.stat-chip{
	display:flex;align-items:center;gap:5px;padding:4px 10px;
	background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:6px;
	font-size:12px;
}
.stat-chip .stat-icon{font-size:15px}
.stat-chip .stat-val{font-weight:700;color:#fff}

/* columns */
#mainWrap{display:flex;height:calc(100vh - 52px);overflow:hidden}
#leftCol{width:240px;min-width:200px;border-right:1px solid var(--border);padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
#centerCol{flex:1;padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
#rightCol{width:280px;min-width:240px;border-left:1px solid var(--border);padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}

/* ============================================================
   PANEL GENERIC
   ============================================================ */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px}
.panel h3{font-size:14px;margin-bottom:10px;color:var(--accent2);text-transform:uppercase;letter-spacing:.5px}

/* ============================================================
   EQUIPMENT SLOTS (left col)
   ============================================================ */
.equip-slot{
	display:flex;align-items:center;gap:10px;padding:8px 10px;
	background:var(--slot-bg);border:2px dashed var(--border);border-radius:8px;
	min-height:56px;cursor:pointer;transition:background .2s,border-color .2s;
	position:relative;
}
.equip-slot:hover{background:var(--slot-hover);border-color:rgba(255,255,255,.3)}
.equip-slot.filled{border-style:solid}
.equip-slot .eq-icon{font-size:26px;width:36px;text-align:center;flex-shrink:0}
.equip-slot .eq-info{display:flex;flex-direction:column;gap:2px;overflow:hidden}
.equip-slot .eq-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.equip-slot .eq-sub{font-size:11px;color:var(--muted)}
.equip-slot .eq-label{font-size:11px;color:var(--muted);font-style:italic}
.equip-slot .unequip-btn{
	position:absolute;top:4px;right:6px;background:none;border:none;color:var(--red);
	font-size:14px;opacity:.6;transition:opacity .2s;
}
.equip-slot .unequip-btn:hover{opacity:1}

/* ============================================================
   INVENTORY GRID (center col)
   ============================================================ */
.inv-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.inv-toolbar input[type=text]{
	flex:1;min-width:160px;padding:7px 12px;font-size:13px;
	background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:6px;
	color:#fff;outline:none;transition:border-color .2s;
}
.inv-toolbar input:focus{border-color:var(--accent)}
.inv-page-info{font-size:12px;color:var(--muted);white-space:nowrap}
.inv-page-btn{
	padding:4px 10px;font-size:13px;background:rgba(255,255,255,.08);
	color:#ccc;border:1px solid var(--border);border-radius:5px;transition:background .2s;
}
.inv-page-btn:hover:not(:disabled){background:rgba(255,255,255,.16)}
.inv-page-btn:disabled{opacity:.35;cursor:default}

.inv-grid{
	display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px;
}
.inv-cell{
	aspect-ratio:1;background:var(--slot-bg);border:2px solid transparent;
	border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;
	position:relative;cursor:pointer;transition:background .15s,border-color .15s,transform .15s;
	overflow:hidden;
}
.inv-cell:hover{background:var(--slot-hover);transform:scale(1.04)}
.inv-cell.selected{border-color:var(--accent);background:rgba(108,92,231,.15)}
.inv-cell .cell-icon{font-size:28px;pointer-events:none}
.inv-cell .cell-name{font-size:10px;text-align:center;margin-top:2px;opacity:.85;pointer-events:none;padding:0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.inv-cell .cell-qty{
	position:absolute;bottom:3px;right:5px;font-size:10px;font-weight:700;
	color:var(--gold);pointer-events:none;
}
.inv-cell[data-rarity=common]{border-color:var(--rarity-common)}
.inv-cell[data-rarity=uncommon]{border-color:var(--rarity-uncommon)}
.inv-cell[data-rarity=rare]{border-color:var(--rarity-rare)}
.inv-cell[data-rarity=epic]{border-color:var(--rarity-epic)}
.inv-cell[data-rarity=legendary]{border-color:var(--rarity-legendary)}
.inv-cell[data-rarity=mythical]{border-color:var(--rarity-mythical);box-shadow:0 0 8px rgba(204,68,255,0.4)}
.inv-cell[data-rarity=mythic]{border-color:var(--rarity-mythic);box-shadow:0 0 10px rgba(255,215,0,0.5),0 0 20px rgba(255,215,0,0.2)}

/* item tooltip */
.tooltip{
	position:fixed;z-index:1000;max-width:240px;padding:10px 14px;
	background:#1c1a30;border:1px solid var(--border);border-radius:8px;
	pointer-events:none;font-size:12px;line-height:1.45;
	box-shadow:0 6px 20px rgba(0,0,0,.6);display:none;
}
.tooltip .tt-name{font-size:14px;font-weight:700;margin-bottom:3px}
.tooltip .tt-type{font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:capitalize}
.tooltip .tt-stat{color:var(--green)}
.tooltip .tt-desc{color:var(--muted);margin-top:4px;font-style:italic}

/* ============================================================
   SPELL SLOTS (right col)
   ============================================================ */
.spell-slot{
	display:flex;align-items:center;gap:10px;padding:8px 10px;
	background:var(--slot-bg);border:1px solid var(--border);border-radius:8px;
	min-height:48px;cursor:pointer;transition:background .2s,border-color .2s;
}
.spell-slot:hover{background:var(--slot-hover);border-color:rgba(255,255,255,.3)}
.spell-slot .sp-num{font-size:11px;color:var(--muted);min-width:14px}
.spell-slot .sp-color{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.spell-slot .sp-name{font-size:13px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spell-slot .sp-mana{font-size:11px;color:var(--blue)}
.spell-slot .sp-empty{font-size:12px;color:var(--muted);font-style:italic}
.ultimate-slot{border-color:rgba(255,170,0,.4);background:rgba(255,170,0,.08)}
.ultimate-slot:hover{border-color:rgba(255,170,0,.6);background:rgba(255,170,0,.15)}
.ultimate-slot .sp-mana{color:#ffaa00}

/* ============================================================
   SPELL BUILDER MODAL
   ============================================================ */
.modal-overlay{
	position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;
	display:none;align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal{
	width:min(96vw,1100px);max-height:92vh;background:#181630;
	border:1px solid var(--border);border-radius:12px;overflow:hidden;
	display:flex;flex-direction:column;
}
.modal-head{
	display:flex;align-items:center;justify-content:space-between;
	padding:12px 18px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--border);
}
.modal-head h2{font-size:17px}
.modal-head .close-btn{
	background:none;border:none;color:var(--red);font-size:22px;
	line-height:1;transition:opacity .2s;opacity:.7;
}
.modal-head .close-btn:hover{opacity:1}

.modal-body{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:14px}

/* spell meta row */
.spell-meta{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.spell-meta label{font-size:12px;color:var(--muted)}
.spell-meta input[type=text]{
	padding:5px 10px;font-size:14px;background:rgba(255,255,255,.07);
	border:1px solid var(--border);border-radius:5px;color:#fff;width:200px;
}
.spell-meta .meta-chip{
	padding:4px 10px;border-radius:5px;font-size:12px;
	background:rgba(255,255,255,.06);border:1px solid var(--border);
}
.spell-meta .meta-chip b{color:#fff}

/* spell description (auto-generated) */
.spell-desc{
	padding:8px 12px;background:rgba(108,92,231,.08);border:1px solid rgba(108,92,231,.2);
	border-radius:6px;font-size:12px;color:var(--muted);line-height:1.5;
	font-style:italic;min-height:36px;
}

/* phases container */
.phases-wrap{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px}
.phase-card{
	min-width:260px;max-width:280px;flex-shrink:0;background:var(--panel2);
	border:1px solid var(--border);border-radius:8px;padding:12px;
	display:flex;flex-direction:column;gap:8px;position:relative;
}
.phase-card h4{font-size:13px;color:var(--accent2);display:flex;align-items:center;justify-content:space-between}
.phase-card h4 .remove-phase{
	background:none;border:none;color:var(--red);font-size:14px;opacity:.6;cursor:pointer;
}
.phase-card h4 .remove-phase:hover{opacity:1}

.phase-card .arrow-between{
	position:absolute;top:50%;right:-20px;color:var(--accent);font-size:20px;
	transform:translateY(-50%);pointer-events:none;
}

/* form rows inside phase card */
.prow{display:flex;flex-direction:column;gap:3px}
.prow label{font-size:11px;color:var(--muted)}
.prow select,.prow input[type=range],.prow input[type=number],.prow input[type=color]{
	width:100%;font-size:12px;padding:4px 6px;
	background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:4px;
	color:#fff;
}
.prow input[type=range]{padding:2px 0;cursor:pointer}
.prow input[type=color]{height:28px;padding:2px;cursor:pointer}
.prow select option{background:#1c1a30;color:#e8eaff;padding:6px 8px}
.prow select:focus{border-color:var(--accent);outline:none}
.prow select{cursor:pointer}
.prow .range-row{display:flex;align-items:center;gap:6px}
.prow .range-val{font-size:11px;min-width:28px;text-align:right;color:#fff}

/* effects checkboxes */
.fx-grid{display:flex;flex-wrap:wrap;gap:4px}
.fx-chip{
	padding:3px 8px;font-size:11px;border-radius:4px;
	background:rgba(255,255,255,.06);border:1px solid var(--border);
	cursor:pointer;transition:background .15s,border-color .15s;user-select:none;
}
.fx-chip.active{background:rgba(108,92,231,.25);border-color:var(--accent)}
.fx-chip.blocked{opacity:0.35;cursor:not-allowed;text-decoration:line-through}

/* add phase button */
.add-phase-btn{
	min-width:80px;align-self:center;padding:10px 16px;font-size:13px;
	background:rgba(108,92,231,.15);border:2px dashed var(--accent);border-radius:8px;
	color:var(--accent2);transition:background .2s;flex-shrink:0;
}
.add-phase-btn:hover{background:rgba(108,92,231,.3)}

/* preview canvas */
#spellPreview{
	width:100%;height:180px;background:#0e0c1a;border:1px solid var(--border);
	border-radius:8px;
}

/* modal footer */
.modal-foot{
	display:flex;justify-content:flex-end;gap:10px;padding:12px 18px;
	border-top:1px solid var(--border);background:rgba(0,0,0,.2);
}
.btn{padding:8px 20px;font-size:13px;border:none;border-radius:6px;transition:background .2s,transform .15s}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#7c6cf0}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#c0392b}
.btn-ghost{background:rgba(255,255,255,.08);color:#ccc;border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(255,255,255,.15)}

/* context menu for inventory (equip / use) */
.ctx-menu{
	position:fixed;z-index:600;background:#1c1a30;border:1px solid var(--border);
	border-radius:6px;overflow:hidden;min-width:140px;box-shadow:0 4px 16px rgba(0,0,0,.6);
	display:none;
}
.ctx-menu.open{display:block}
.ctx-item{
	padding:8px 14px;font-size:13px;cursor:pointer;transition:background .15s;
}
.ctx-item:hover{background:rgba(108,92,231,.2)}

/* scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.22)}

/* ============================================================
   TABS
   ============================================================ */
.tab-btn{
	padding:8px 18px;font-size:13px;font-weight:600;
	background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:6px 6px 0 0;
	color:var(--muted);cursor:pointer;transition:background .2s,color .2s;
}
.tab-btn.active{background:var(--panel);color:var(--accent2);border-bottom-color:transparent}
.tab-btn:hover:not(.active){background:rgba(255,255,255,.1)}

/* ============================================================
   SPELL DICTIONARY
   ============================================================ */
.dict-cat-btn{
	padding:6px 14px;font-size:12px;font-weight:600;
	background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:6px;
	color:var(--muted);cursor:pointer;transition:background .2s,color .2s;
}
.dict-cat-btn.active{background:var(--accent2);color:#111;border-color:var(--accent2)}
.dict-cat-btn:hover:not(.active){background:rgba(255,255,255,.12)}
.dict-card{
	background:var(--slot-bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;
}
.dict-card h4{margin:0 0 6px;font-size:14px;display:flex;align-items:center;gap:6px}
.dict-card .dict-tags{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0}
.dict-tag{
	padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;
	background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
}
.dict-tag.mana{color:#5dade2;border-color:rgba(93,173,226,.3)}
.dict-tag.ctrl{color:#f39c12;border-color:rgba(243,156,18,.3)}
.dict-tag.rank{color:#8e44ad;border-color:rgba(142,68,173,.3)}
.dict-tag.dmg-up{color:#2ecc71;border-color:rgba(46,204,113,.3)}
.dict-tag.dmg-down{color:#e74c3c;border-color:rgba(231,76,60,.3)}
.dict-tag.ult{color:#ffcc00;border-color:rgba(255,204,0,.3);background:rgba(255,204,0,.1)}
.dict-detail{font-size:12px;color:var(--muted);line-height:1.5;margin:4px 0}
.dict-detail b{color:#ddd}
.dict-section-title{font-size:16px;font-weight:700;color:var(--accent2);margin:8px 0 4px;padding-bottom:4px;border-bottom:1px solid var(--border)}

/* ============================================================
   CRAFTING
   ============================================================ */
.craft-card{
	display:flex;align-items:center;gap:12px;padding:10px 14px;
	background:var(--slot-bg);border:1px solid var(--border);border-radius:8px;
	transition:background .15s;
}
.craft-card:hover{background:var(--slot-hover)}
.craft-icon{font-size:28px;width:40px;text-align:center;flex-shrink:0}
.craft-info{flex:1;display:flex;flex-direction:column;gap:3px}
.craft-name{font-size:14px;font-weight:700}
.craft-name[data-rarity=common]{color:var(--rarity-common)}
.craft-name[data-rarity=uncommon]{color:var(--rarity-uncommon)}
.craft-name[data-rarity=rare]{color:var(--rarity-rare)}
.craft-name[data-rarity=epic]{color:var(--rarity-epic)}
.craft-name[data-rarity=legendary]{color:var(--rarity-legendary)}
.craft-name[data-rarity=mythical]{color:var(--rarity-mythical);text-shadow:0 0 6px rgba(204,68,255,0.5)}
.craft-desc{font-size:11px;color:var(--muted);font-style:italic}
.craft-ingredients{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.craft-ing{
	display:flex;align-items:center;gap:3px;padding:2px 7px;
	font-size:11px;border-radius:4px;
	background:rgba(255,255,255,.06);border:1px solid var(--border);
}
.craft-ing.has{color:var(--green);border-color:rgba(40,167,69,.4)}
.craft-ing.missing{color:var(--red);border-color:rgba(231,76,60,.4)}
.craft-btn{
	padding:8px 16px;font-size:12px;font-weight:700;border:none;border-radius:6px;
	background:var(--accent);color:#fff;cursor:pointer;transition:background .2s,opacity .2s;
	flex-shrink:0;
}
.craft-btn:hover:not(:disabled){background:#7c6cf0}
.craft-btn:disabled{opacity:.35;cursor:not-allowed}

@keyframes fadeUp{
	0%{opacity:1;transform:translate(-50%,-50%) scale(1)}
	100%{opacity:0;transform:translate(-50%,-80%) scale(1.1)}
}
.st-chapter{margin-bottom:6px}
.st-chapter-head{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;border:1px solid rgba(204,102,68,0.25);background:rgba(204,102,68,0.08);cursor:pointer;user-select:none;transition:background .15s}
.st-chapter-head:hover{background:rgba(204,102,68,0.16)}
.st-chapter-head .st-arrow{transition:transform .2s;font-size:10px;color:#cc6644}
.st-chapter-head.open .st-arrow{transform:rotate(90deg)}
.st-chapter-head .st-ch-title{flex:1;font-size:13px;font-weight:bold;color:#cc6644}
.st-chapter-head .st-ch-prog{font-size:11px;color:var(--muted)}
.st-chapter-body{display:none;padding:4px 0 0 18px}
.st-chapter-head.open+.st-chapter-body{display:block}
.st-chapter.all-done .st-chapter-head{border-color:rgba(40,167,69,0.3);background:rgba(40,167,69,0.06)}
.st-chapter.all-done .st-ch-title{color:#28a745}
.st-chapter.all-done .st-arrow{color:#28a745}
</style>
</head>
<body>

<!-- ==================== TOP BAR ==================== -->
<div id="topBar">
	<button id="backBtn" onclick="location.href='index.html'">← Menu</button>
	<h1>Inventory</h1>
	<div class="stats-bar" id="statsBar"></div>
</div>

<!-- ==================== MAIN LAYOUT ==================== -->
<div id="mainWrap">

	<!-- LEFT: Equipment -->
	<div id="leftCol">
		<div class="panel">
			<h3>Equipment</h3>
			<div id="equipSlots" style="display:flex;flex-direction:column;gap:8px"></div>
		</div>
		<div class="panel">
			<h3>Base Stats</h3>
			<div id="baseStatsPanel" style="font-size:12px;line-height:1.8;color:var(--muted)"></div>
		</div>
	</div>

	<!-- CENTER: Inventory Grid + Crafting -->
	<div id="centerCol">
		<!-- Tab bar -->
		<div style="display:flex;gap:4px;margin-bottom:4px;flex-wrap:wrap">
			<button class="tab-btn active" data-tab="inventory" onclick="switchTab('inventory')">📦 Inventory</button>
			<button class="tab-btn" data-tab="crafting" onclick="switchTab('crafting')">🔨 Crafting</button>
			<button class="tab-btn" data-tab="quests" onclick="switchTab('quests')">🗺️ Quests</button>
			<button class="tab-btn" data-tab="bestiary" onclick="switchTab('bestiary')">📖 Bestiary</button>
			<button class="tab-btn" data-tab="dictionary" onclick="switchTab('dictionary')">📚 Spell Dictionary</button>
		</div>

		<!-- Inventory Tab -->
		<div id="inventoryTab" class="panel" style="flex:1;display:flex;flex-direction:column">
			<h3>Inventory</h3>
			<div class="inv-toolbar">
				<input type="text" id="searchBox" placeholder="Search items..." autocomplete="off"/>
				<button class="inv-page-btn" id="prevPage">◀</button>
				<span class="inv-page-info" id="pageInfo">1 / 1</span>
				<button class="inv-page-btn" id="nextPage">▶</button>
				<button class="inv-page-btn" id="testBtn" style="margin-left:auto;padding:4px 12px;background:rgba(243,156,18,.25);border-color:var(--rarity-legendary);color:var(--rarity-legendary);font-size:11px;border-radius:5px" title="Clear inventory and give one of every item">🧪 Test All</button>
			</div>
			<div class="inv-grid" id="invGrid"></div>
		</div>

		<!-- Crafting Tab -->
		<div id="craftingTab" class="panel" style="flex:1;display:none;flex-direction:column;overflow-y:auto">

/* Build reverse lookup: which items boost each shape/behavior/effect */
const SHAPE_BOOST_ITEMS = {};  // shape key -> [{ itemId, boost }]
const BEH_BOOST_ITEMS = {};    // behavior key -> [{ itemId, boost }]
const EFFECT_BOOST_ITEMS = {}; // effect key -> [{ itemId, boost }]
for(const [itemId, data] of Object.entries(ITEM_BOOSTS)){
	for(const sh of (data.shapes||[])){
		if(!SHAPE_BOOST_ITEMS[sh]) SHAPE_BOOST_ITEMS[sh] = [];
		SHAPE_BOOST_ITEMS[sh].push({ itemId, boost: data.boost });
	}
	for(const bh of (data.behaviors||[])){
		if(!BEH_BOOST_ITEMS[bh]) BEH_BOOST_ITEMS[bh] = [];
		BEH_BOOST_ITEMS[bh].push({ itemId, boost: data.boost });
	}
	for(const fx of (data.effects||[])){
		if(!EFFECT_BOOST_ITEMS[fx]) EFFECT_BOOST_ITEMS[fx] = [];
		EFFECT_BOOST_ITEMS[fx].push({ itemId, boost: data.boost });
	}
}

/* Check if player has an item equipped (in any slot) */
function hasItemEquipped(itemId){
	for(const slotKey of ['staff','robe','relic1','relic2']){
		if(STATE.equipment[slotKey] === itemId) return true;
	}
	return false;
}

/* Calculate total boost for a spell based on equipped items */
function getSpellBoost(spell){
	let totalBoost = 1.0;
	const checked = new Set();
	
	// Iterate through all phases of the spell
	const phases = spell.phases || [];
	for(const phase of phases){
		// Check shape boosts
		if(phase.shape && SHAPE_BOOST_ITEMS[phase.shape]){
			for(const item of SHAPE_BOOST_ITEMS[phase.shape]){
				if(!checked.has(item.itemId) && hasItemEquipped(item.itemId)){
					totalBoost *= item.boost;
					checked.add(item.itemId);
				}
			}
		}
		
		// Check behavior boosts
		if(phase.behavior && BEH_BOOST_ITEMS[phase.behavior]){
			for(const item of BEH_BOOST_ITEMS[phase.behavior]){
				if(!checked.has(item.itemId) && hasItemEquipped(item.itemId)){
					totalBoost *= item.boost;
					checked.add(item.itemId);
				}
			}
		}
		
		// Check effect boosts
		for(const fx of (phase.effects || [])){
			if(EFFECT_BOOST_ITEMS[fx]){
				for(const item of EFFECT_BOOST_ITEMS[fx]){
					if(!checked.has(item.itemId) && hasItemEquipped(item.itemId)){
						totalBoost *= item.boost;
						checked.add(item.itemId);
					}
				}
			}
		}
	}
	
	return totalBoost;
}

/* Check if a shape/behavior/effect is unlocked — ALL UNLOCKED BY DEFAULT */
function getVowUnlocks(){
	const unlocks = new Set();
	for(const v of STATE.vows){
		if(!v || !v.vowUnlocks) continue;
		for(const u of v.vowUnlocks) unlocks.add(u);
	}
	return unlocks;
}

   ============================================================= */
function loadState(){
	try {
		const raw = localStorage.getItem('magicBattle_playerData');
		if(raw){
			const s = JSON.parse(raw);
			// ensure arrays are correct length
			if(!s.spells || s.spells.length < 10) s.spells = (s.spells||[]).concat(new Array(10).fill(null)).slice(0,10);
			if(!s.vows) s.vows = [null, null, null];
			if(s.domainVow === undefined) s.domainVow = null;
			if(s.mageRank == null) s.mageRank = 0;
			if(s.xp == null) s.xp = 0;
			if(!s.mageClass) s.mageClass = 'none';
			return s;
		}
	} catch(e){}
	const s = defaultPlayerState();
	s.spells[0] = makeDefaultSpell();
	return s;
}

/* Calculate and update spell boosts based on equipped items */
function updateSpellBoosts(){
	if(!STATE.spellBoosts) STATE.spellBoosts = [];
	for(let i=0; i<10; i++){
		const spell = STATE.spells[i];
		if(!spell || !spell.phases || !spell.phases.length){
			STATE.spellBoosts[i] = 1.0;
			continue;
		}
		STATE.spellBoosts[i] = getSpellBoost(spell);
	}
}

function saveState(){
	updateSpellBoosts();
	localStorage.setItem('magicBattle_playerData', JSON.stringify(STATE));
}

/* =============================================================
   COMPUTED STATS (base + equipment)
   ============================================================= */
function computeStats(){
	const s = {...STATE.baseStats};
	for(const slotKey of ['staff','robe','relic1','relic2']){
		const id = STATE.equipment[slotKey];
		if(!id) continue;
		const item = ITEM_DB[id];
		if(!item) continue;
		for(const k in item.stats) s[k] = (s[k]||0) + item.stats[k];
	}
	return s;
}

/* Points earned per sacrifice — vowIdx enables cumulative scaling across vows */
function calcVowPoints(vow, vowIdx){
	if(!vow) return 0;
	if(vow.sacrifice === 'health') return Math.floor(vow.amount / 5); // 5% = 1 point
	if(vow.sacrifice === 'maxMana'){
		// Scaling: more points the more you sacrifice, up to 40 at 1200
		const amt = vow.amount || 0;
		// Quadratic scaling: pts = 40 * (amt/1200)^1.5 roughly
		const ratio = amt / 1200;
		return Math.floor(40 * Math.pow(ratio, 1.3));
	}
	if(vow.sacrifice === 'effects'){
		// 0.5 pts per effect, 1 pt for elemental effects
		let pts = 0;
		for(const fx of (vow.sacrificedEffects||[])){
			const eff = EFFECTS[fx];
			pts += (eff && eff.category === 'elemental') ? 1 : 0.5;
		}
		return Math.floor(pts);
	}
	if(vow.sacrifice === 'shapes'){
		return (vow.sacrificedShapes||[]).length; // 1 pt per shape
	}
	if(vow.sacrifice === 'movement'){
		// 10% = 2 pts, 20% = 4 pts ... up to 50% = 10 pts
		return Math.floor((vow.amount || 0) / 5);
	}
	if(vow.sacrifice === 'visibility'){
		// 15% = 1 pt, 30% = 3 pts, 45% = 5 pts, 60% = 8 pts (scales slightly)
		const amt = vow.amount || 0;
		return Math.floor(amt / 15) + Math.floor(amt / 30);
	}
	if(vow.sacrifice === 'spellSlot'){
		let otherCount = 0;
		if(vowIdx != null){
			for(let i = 0; i < STATE.vows.length; i++){
				if(i === vowIdx) continue;
				const other = STATE.vows[i];
				if(other && other.sacrifice === 'spellSlot'){
					otherCount += (other.slots||[]).filter(s => s !== 9).length;
				}
			}
		}
		let pts = 0;
		const regularSlots = (vow.slots||[]).filter(s => s !== 9);
		const hasUlt = (vow.slots||[]).includes(9);
		const n = regularSlots.length;
		for(let i = 0; i < n; i++) pts += Math.max(1, otherCount + i);
		if(hasUlt) pts += 8;
		return pts;
	}
	if(vow.sacrifice === 'items'){
		const slots = vow.sacrificedItemSlots || [];
		const ITEM_PTS = [10, 15, 20, 30];
		// Count how many item slots are sacrificed across OTHER vows
		let otherCount = 0;
		if(vowIdx != null){
			for(let i = 0; i < STATE.vows.length; i++){
				if(i === vowIdx) continue;
				const other = STATE.vows[i];
				if(other && other.sacrifice === 'items') otherCount += (other.sacrificedItemSlots||[]).length;
			}
		}
		let pts = 0;
		for(let i = 0; i < slots.length; i++){
			const idx = otherCount + i;
			pts += idx < ITEM_PTS.length ? ITEM_PTS[idx] : 30;
		}
		return pts;
	}
	return 0;
}
function calcVowSpent(vow){
	if(!vow) return 0;
	let spent = 0;
	if(vow.boostAmount != null) spent += vow.boostAmount;
	else if(vow.boosts){ for(const k in vow.boosts) spent+=vow.boosts[k]; }
	/* Each vow unlock costs 5 points */
	if(vow.vowUnlocks) spent += vow.vowUnlocks.length * 5;
	return spent;
}
function calcVowBoostsForSlot(slot){
	const globalBoosts = new Set(['maxHealth','jumpHeight','playerSpeed','defense','elementalDmg','critChance','spellVamp','thorns','manaEfficiency']);
	const b = {power:0,size:0,speed:0,count:0,duration:0,effects:0,phases:0,maxHealth:0,manaCost:0,cooldown:0,jumpHeight:0,playerSpeed:0,defense:0,elementalDmg:0,_sizeBonus:false};
	for(const v of STATE.vows){
		if(!v) continue;
		/* New format: single boostType + boostAmount */
		if(v.boostType != null){
			if(globalBoosts.has(v.boostType)){ b[v.boostType] = (b[v.boostType]||0) + (v.boostAmount||0); continue; }
			if(v.targetSlot !== slot) continue;
			b[v.boostType] = (b[v.boostType]||0) + (v.boostAmount||0);
			if(v.sizeBonus) b._sizeBonus = true;
		} else if(v.boosts){
			/* Legacy format */
			if(v.targetSlot !== slot) continue;
			for(const k in v.boosts) b[k] = (b[k]||0) + v.boosts[k];
		}
	}
	return b;
}

/* =============================================================
   SPELL COST / CONTROL REQUIREMENT CALCULATORS
   ============================================================= */
function calcSpellManaCost(spell){
	if(!spell || !spell.phases.length) return 0;
	let cost = 5;
	for(const ph of spell.phases){
		cost += (SHAPES[ph.shape]?.manaCost||0);
		cost += (BEHAVIORS[ph.behavior]?.manaCost||0);
		// power costs scale — count multiplies power cost (rain/barrage much cheaper)
		const isAreaBeh = ph.behavior === 'rain' || ph.behavior === 'barrage';
		const countMult = 1 + (ph.count - 1) * (isAreaBeh ? 0.1 : 0.4);
		const powerCost = ph.power * 50 * countMult;
		cost += powerCost;
		cost += (ph.count - 1) * (isAreaBeh ? 1 : 4);
		cost += (ph.width - 1) * 2;
		cost += (ph.height - 1) * 2;
		// chain stun costs significant mana
		if (ph.shape === 'chain' && ph.chainStunTime > 0) cost += ph.chainStunTime * 25;
		for(const fx of ph.effects) cost += (EFFECTS[fx]?.manaCost||0);
		// effect intensity scaling: higher power/duration = much more mana
		// burn/poison only scale with duration (not power)
		const tunableFx = ['burn','poison','freeze','stun'];
		const hasTunable = ph.effects.some(fx => tunableFx.includes(fx));
		if(hasTunable){
			const onlyBurnPoison = ph.effects.filter(fx => tunableFx.includes(fx)).every(fx => fx==='burn'||fx==='poison');
			const ep = onlyBurnPoison ? 1 : (ph.effectPower || 1);
			const ed = (ph.effectDuration || 1);
			cost += (ep * ep * 12) + (ed * ed * 8);
		}
		// phase fork: significant upfront mana cost
		if(ph.effects.includes('phaseFork')){
			cost += (ph.phaseForkRepeats || 1) * 35;
		}
	}
	cost *= (0.6 + spell.phases.length * 0.4);
	return Math.round(cost);
}

function calcSpellControlReq(spell){
	if(!spell || !spell.phases.length) return 0;
	let req = 0;
	for(const ph of spell.phases){
		req = Math.max(req, SHAPES[ph.shape]?.controlReq||0);
		req = Math.max(req, BEHAVIORS[ph.behavior]?.controlReq||0);
		for(const fx of ph.effects) req = Math.max(req, EFFECTS[fx]?.controlReq||0);
	}
	req += (spell.phases.length - 1) * 3;
	return req;
}

/* =============================================================
   RENDER: STATS BAR (top)
   ============================================================= */
function renderStats(){
	const s = computeStats();
	const defs = [
		{ key:'magicPower',    label:'Power',    icon:'⚔️',  color:'#e74c3c' },
		{ key:'magicControl',  label:'Control',  icon:'🎯',  color:'#9b59b6' },
		{ key:'manaRegen',     label:'Mana Regen', icon:'💧',  color:'#3498db' },
		{ key:'magicDefence',  label:'Defence',  icon:'🛡️',  color:'#2ecc71' },
	];
	document.getElementById('statsBar').innerHTML = defs.map(d =>
		`<div class="stat-chip"><span class="stat-icon">${d.icon}</span>${d.label}: <span class="stat-val" style="color:${d.color}">${s[d.key]}</span></div>`
	).join('');

	// base stats panel (left col)
	const base = STATE.baseStats;
	document.getElementById('baseStatsPanel').innerHTML = defs.map(d => {
		const bonus = s[d.key] - base[d.key];
		return `${d.icon} ${d.label}: <b style="color:#fff">${base[d.key]}</b>` +
			(bonus > 0 ? ` <span style="color:var(--green)">+${bonus}</span>` : '') +
			` = <b style="color:${d.color}">${s[d.key]}</b>`;
	}).join('<br>');

	// Rank display
	const rank = getPlayerRank();
	const info = MAGE_RANKS[rank];
	const xp = STATE.xp || 0;
	const nextRank = rank < MAGE_RANKS.length - 1 ? MAGE_RANKS[rank + 1] : null;
	let rankHtml = `<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border)">`;
	rankHtml += `<span style="font-size:14px;font-weight:bold;color:${info.color}">${info.icon} ${info.name}</span>`;
	if(nextRank){
		const pct = Math.max(0, Math.min(100, ((xp - info.xpReq) / (nextRank.xpReq - info.xpReq)) * 100));
		rankHtml += `<div style="margin-top:4px;height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden">
			<div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#6c5ce7,#a29bfe);border-radius:4px"></div>
		</div>`;
		rankHtml += `<div style="font-size:10px;color:var(--muted);margin-top:2px">${xp} / ${nextRank.xpReq} XP — Next: ${nextRank.icon} ${nextRank.name} (max power ${nextRank.maxPower})</div>`;
	} else {
		rankHtml += `<div style="font-size:10px;color:var(--muted);margin-top:2px">${xp} XP — MAX RANK (power cap ${info.maxPower})</div>`;
	}
	rankHtml += `</div>`;
	document.getElementById('baseStatsPanel').innerHTML += rankHtml;

	// Mage class display
	const cls = MAGE_CLASSES.find(c => c.id === (STATE.mageClass || 'none')) || MAGE_CLASSES[0];
	let classHtml = `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">`;
	classHtml += `<div style="display:flex;align-items:center;justify-content:space-between">`;
	classHtml += `<span style="font-size:14px;font-weight:bold;color:${cls.color}">${cls.icon} ${cls.name}</span>`;
	classHtml += `<button onclick="openClassSelect()" style="font-size:10px;padding:2px 8px;background:rgba(255,255,255,.1);border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer">Change</button>`;
	classHtml += `</div>`;
	classHtml += `<div style="font-size:10px;color:var(--muted);margin-top:2px">${cls.desc}</div>`;
	classHtml += `</div>`;
	document.getElementById('baseStatsPanel').innerHTML += classHtml;
}

/* =============================================================
   MAGE CLASS SELECTION
   ============================================================= */
function openClassSelect(){
	// remove existing modal if any
	let old = document.getElementById('classSelectModal');
	if(old) old.remove();

	const overlay = document.createElement('div');
	overlay.id = 'classSelectModal';
	overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:9999';
	overlay.addEventListener('click', e => { if(e.target === overlay) overlay.remove(); });

	let html = `<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;max-width:360px;width:90%">`;
	html += `<div style="font-size:16px;font-weight:bold;color:#fff;margin-bottom:12px;text-align:center">Choose Mage Class</div>`;
	for(const cls of MAGE_CLASSES){
		if(cls.id === 'none') continue; // skip unspecialized from list
		const isActive = STATE.mageClass === cls.id;
		const border = isActive ? `2px solid ${cls.color}` : '1px solid var(--border)';
		const bg = isActive ? 'rgba(255,255,255,.08)' : 'rgba(255,255,255,.03)';
		html += `<div onclick="selectMageClass('${cls.id}')" style="cursor:pointer;padding:10px;margin-bottom:6px;border-radius:6px;border:${border};background:${bg}">`;
		html += `<span style="font-size:14px;font-weight:bold;color:${cls.color}">${cls.icon} ${cls.name}</span>`;
		html += `<div style="font-size:11px;color:var(--muted);margin-top:2px">${cls.desc}</div>`;
		html += `</div>`;
	}
	html += `<div onclick="selectMageClass('none')" style="cursor:pointer;padding:8px;text-align:center;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.03);font-size:11px;color:var(--muted)">⚪ Remove Specialization</div>`;
	html += `</div>`;

	overlay.innerHTML = html;
	document.body.appendChild(overlay);
}

function selectMageClass(id){
	STATE.mageClass = id;
	saveState();
	const modal = document.getElementById('classSelectModal');
	if(modal) modal.remove();
	renderStats();
}

function renderEquipment(){
	const wrap = document.getElementById('equipSlots');
	wrap.innerHTML = '';
	for(const slotKey of ['staff','robe','relic1','relic2']){
		const id = STATE.equipment[slotKey];
		const item = id ? ITEM_DB[id] : null;
		const el = document.createElement('div');
		el.className = 'equip-slot' + (item ? ' filled' : '');
		if(item){
			const statStr = Object.entries(item.stats).map(([k,v])=>{
				const nice = k.replace('magic','').replace(/([A-Z])/,' $1');
				return `+${v} ${nice}`;
			}).join(', ');
			const boost = ITEM_BOOSTS[id];
			const boostStr = boost ? `<div class="eq-sub" style="color:#f0c060;font-size:10px">⚡ ${boost.desc}</div>` : '';
			el.innerHTML = `
				<div class="eq-icon">${item.icon}</div>
				<div class="eq-info">
					<div class="eq-name" style="color:var(--rarity-${item.rarity})">${item.name}</div>
					<div class="eq-sub">${statStr}</div>
					${boostStr}
				</div>
				<button class="unequip-btn" data-slot="${slotKey}" title="Unequip">✕</button>
			`;
			el.querySelector('.unequip-btn').addEventListener('click', e => {
				e.stopPropagation();
				unequipItem(slotKey);
			});
		} else {
			el.innerHTML = `
				<div class="eq-icon" style="opacity:.3">${EQUIP_LABELS[slotKey].icon}</div>
				<div class="eq-label">${EQUIP_LABELS[slotKey].label} — empty</div>
			`;
		}
		wrap.appendChild(el);
	}
}

function unequipItem(slotKey){
	const id = STATE.equipment[slotKey];
	if(!id) return;
	STATE.equipment[slotKey] = null;
	addToInventory(id, 1);
	saveState(); renderAll();
}

/* =============================================================
   RENDER: INVENTORY GRID (center)
   ============================================================= */
function getFilteredInventory(){
	if(!searchTerm) return STATE.inventory;
	const q = searchTerm.toLowerCase();
	return STATE.inventory.filter(entry => {
		const item = ITEM_DB[entry.itemId];
		return item && (item.name.toLowerCase().includes(q) || item.type.toLowerCase().includes(q));
	});
}

function renderInventory(){
	const filtered = getFilteredInventory();
	const totalPages = Math.max(1, Math.ceil(filtered.length / INV_PAGE_SIZE));
	if(invPage >= totalPages) invPage = totalPages - 1;
	if(invPage < 0) invPage = 0;

	document.getElementById('pageInfo').textContent = `${invPage+1} / ${totalPages}`;
	document.getElementById('prevPage').disabled = invPage === 0;
	document.getElementById('nextPage').disabled = invPage >= totalPages - 1;

	const start = invPage * INV_PAGE_SIZE;
	const pageItems = filtered.slice(start, start + INV_PAGE_SIZE);

	const grid = document.getElementById('invGrid');
	grid.innerHTML = '';
	for(let i = 0; i < INV_PAGE_SIZE; i++){
		const cell = document.createElement('div');
		cell.className = 'inv-cell';
		if(pageItems[i]){
			const entry = pageItems[i];
			const item = ITEM_DB[entry.itemId];
			if(item){
				cell.setAttribute('data-rarity', item.rarity);
				cell.setAttribute('data-item-id', entry.itemId);
				cell.innerHTML = `
					<span class="cell-icon">${item.icon}</span>
					<span class="cell-name">${item.name}</span>
					${entry.qty > 1 ? `<span class="cell-qty">x${entry.qty}</span>` : ''}
				`;
				cell.addEventListener('mouseenter', e => showTooltip(e, item, entry.qty));
				cell.addEventListener('mousemove', e => moveTooltip(e));
				cell.addEventListener('mouseleave', hideTooltip);
				cell.addEventListener('contextmenu', e => { e.preventDefault(); openCtxMenu(e, entry); });
				cell.addEventListener('click', e => openCtxMenu(e, entry));
			}
		}
		grid.appendChild(cell);
	}
}

/* =============================================================
   TOOLTIP
   ============================================================= */
const tooltipEl = document.getElementById('tooltip');
function showTooltip(e, item, qty){
	const statLines = Object.entries(item.stats).map(([k,v])=>{
		const nice = k.replace('magic','Magic ');
		return `<div class="tt-stat">+${v} ${nice}</div>`;
	}).join('');
	// Show item boost if it has one
	const boostData = ITEM_BOOSTS[item.id];
	const boostLine = boostData ? `<div class="tt-stat" style="color:#f0c060;font-size:10px">⚡ ${boostData.desc}</div>` : '';
	tooltipEl.innerHTML = `
		<div class="tt-name" style="color:var(--rarity-${item.rarity})">${item.name}${qty>1?' x'+qty:''}</div>
		<div class="tt-type">${item.type} · ${item.rarity}</div>
		${statLines}
		${boostLine}
		<div class="tt-desc">${item.desc}</div>
	`;
	tooltipEl.style.display = 'block';
	moveTooltip(e);
}
function moveTooltip(e){
	let x = e.clientX + 14, y = e.clientY + 14;
	const r = tooltipEl.getBoundingClientRect();
	if(x + r.width > window.innerWidth) x = e.clientX - r.width - 8;
	if(y + r.height > window.innerHeight) y = e.clientY - r.height - 8;
	tooltipEl.style.left = x+'px'; tooltipEl.style.top = y+'px';
}
function hideTooltip(){ tooltipEl.style.display = 'none'; }

   ============================================================= */
const ctxMenu = document.getElementById('ctxMenu');
let ctxEntry = null;

function openCtxMenu(e, entry){
	ctxEntry = entry;
	const item = ITEM_DB[entry.itemId];
	if(!item) return;
	ctxMenu.innerHTML = '';
	const equipTypes = { staff:['staff'], robe:['robe'], relic:['relic1','relic2'] };
	const slots = equipTypes[item.type];
	if(slots){
		for(const sl of slots){
			const opt = document.createElement('div');
			opt.className = 'ctx-item';
			opt.textContent = `Equip → ${EQUIP_LABELS[sl].label}`;
			opt.addEventListener('click', () => { equipItem(entry, sl); closeCtxMenu(); });
			ctxMenu.appendChild(opt);
		}
	}
	// always show cancel
	const cancel = document.createElement('div');
	cancel.className = 'ctx-item';
	cancel.textContent = 'Cancel';
	cancel.addEventListener('click', closeCtxMenu);
	ctxMenu.appendChild(cancel);

	ctxMenu.classList.add('open');
	let x = e.clientX, y = e.clientY;
	ctxMenu.style.left = x+'px'; ctxMenu.style.top = y+'px';
	setTimeout(()=>{
		const r = ctxMenu.getBoundingClientRect();
		if(r.right > window.innerWidth) ctxMenu.style.left = (x - r.width)+'px';
		if(r.bottom > window.innerHeight) ctxMenu.style.top = (y - r.height)+'px';
	},0);
}
function closeCtxMenu(){ ctxMenu.classList.remove('open'); ctxEntry = null; }
document.addEventListener('click', e => { if(!ctxMenu.contains(e.target)) closeCtxMenu(); });

/* =============================================================
   EQUIP / INVENTORY HELPERS
   ============================================================= */
function equipItem(entry, slotKey){
	const prevId = STATE.equipment[slotKey];
	// put old item back
	if(prevId) addToInventory(prevId, 1);
	STATE.equipment[slotKey] = entry.itemId;
	removeFromInventory(entry.itemId, 1);
	saveState(); renderAll();
}

function addToInventory(itemId, qty){
	const existing = STATE.inventory.find(e => e.itemId === itemId);
	if(existing) existing.qty += qty;
	else STATE.inventory.push({ itemId, qty });
}

function removeFromInventory(itemId, qty){
	const idx = STATE.inventory.findIndex(e => e.itemId === itemId);
	if(idx === -1) return;
	STATE.inventory[idx].qty -= qty;
	if(STATE.inventory[idx].qty <= 0) STATE.inventory.splice(idx, 1);
}

function rankName(idx){
	return MAGE_RANKS[idx] ? (MAGE_RANKS[idx].icon + ' ' + MAGE_RANKS[idx].name) : 'Rank '+idx;
}

function dictTag(cls, text){
	return '<span class="dict-tag '+cls+'">'+text+'</span>';
}

function renderDictSection(cat){
	// Update active category button
	document.querySelectorAll('.dict-cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
	const el = document.getElementById('dictContent');
	if(!el) return;

	if(cat === 'shapes')    el.innerHTML = renderDictShapes();
	else if(cat === 'behaviors') el.innerHTML = renderDictBehaviors();
	else if(cat === 'effects')   el.innerHTML = renderDictEffects();
	else if(cat === 'domains')   el.innerHTML = renderDictDomains();
	else if(cat === 'ultimates') el.innerHTML = renderDictUltimates();
	else if(cat === 'phases')    el.innerHTML = renderDictPhases();
}

	html += '<p class="dict-detail">Ultimate spells are placed in <b>Spell Slot 0</b> (key 0). They use <b>Total Mana</b> instead of regular mana. Total Mana accumulates from normal spell casts (2× mana spent is added to your Total Mana pool).</p>';

	html += '<div class="dict-card">';
	html += '<h4>⚡ How Ultimates Work</h4>';
	html += '<p class="dict-detail"><b>Cost:</b> Spell mana cost × 10 (paid from Total Mana, not regular mana).</p>';
	html += '<p class="dict-detail"><b>Necromancer Domain:</b> Costs ×2 (20k+ instead of 10k+).</p>';
	html += '<p class="dict-detail"><b>Charge Time:</b> 3 seconds (180 frames at 60fps). You are vulnerable during the charge.</p>';
	html += '<p class="dict-detail"><b>Control Discount:</b> Same as normal spells — higher Magic Control reduces effective mana cost by 1.5% per point (min ×0.3).</p>';
	html += '<p class="dict-detail"><b>Cooldown Formula:</b> 24 + (avgPower × 16) + (rawCost × 0.15) + 180 (charge duration). Modified by Vow cooldown reductions.</p>';
	html += '</div>';

	html += '<div class="dict-card">';
	html += '<h4>📊 Total Mana Accumulation</h4>';
	html += '<p class="dict-detail">Every time you cast a normal spell, <b>2× the mana spent</b> is added to your Total Mana pool. Cast more spells to charge your ultimate faster!</p>';
	html += '<p class="dict-detail">The HUD bar shows your progress toward the ultimate\'s cost.</p>';
	html += '</div>';

	html += '<div class="dict-card">';
	html += '<h4>🔷 Domain as Ultimate</h4>';
	html += '<p class="dict-detail">Domain Expansion behavior is <b>ultimate-only</b> — it can only be used in Slot 0 as Phase 1. The domain phase creates the zone, and subsequent phases fire projectiles from the domain edges.</p>';
	html += '<p class="dict-detail"><b>Domain element:</b> Set the elemental type (burn/freeze/poison/stun/lifesteal) for +50% damage matching bonus.</p>';
	html += '</div>';

	return html;
}

/* ---------- PHASES & TRIGGERS ---------- */
function renderDictPhases(){
	let html = '<div class="dict-section-title">🔗 Phases & Triggers</div>';
	html += '<p class="dict-detail">Spells can have multiple <b>phases</b>. Each phase has its own shape, behavior, effects, and triggers. Phases fire sequentially based on their trigger condition.</p>';

	html += '<div class="dict-card">';
	html += '<h4>📐 Phase Triggers</h4>';
	for(const [id, t] of Object.entries(TRIGGERS)){
		html += '<p class="dict-detail"><b>'+t.label+':</b> '+t.desc+'</p>';
	}
	html += '</div>';

	html += '<div class="dict-card">';
	html += '<h4>💰 Multi-Phase Cost Scaling</h4>';
	html += '<p class="dict-detail"><b>Total cost multiplier:</b> ×(0.6 + phases × 0.25). A 1-phase spell costs ×0.85, 2-phase ×1.1, 3-phase ×1.35, etc.</p>';
	html += '<p class="dict-detail"><b>Control requirement:</b> Highest single component control + (phases − 1) × 3. Each extra phase adds +3 control requirement.</p>';
	html += '</div>';

	html += '<div class="dict-card">';
	html += '<h4>🔄 Same Shape</h4>';
	html += '<p class="dict-detail">The "Same" shape re-uses the previous phase\'s shape. This lets you apply different behaviors or effects to the same projectile form without re-specifying the shape. Costs 0 mana and 0 control.</p>';
	html += '</div>';

	html += '<div class="dict-card">';
	html += '<h4>🔄 Reset Projectiles</h4>';
	html += '<p class="dict-detail">Adding the "Reset Projectiles" effect causes the next phase to spawn fresh projectiles from the caster instead of morphing the existing ones into the new phase. Free (0 mana, 0 control).</p>';
	html += '</div>';

	html += '<div class="dict-card">';
	html += '<h4>🔀 Phase Fork</h4>';
	html += '<p class="dict-detail">Phase Fork triggers the next phase after a delay <b>without ending the current phase</b>. Both phases run simultaneously. Each repeat costs +35 extra mana.</p>';
	html += '</div>';

	html += '<div class="dict-card">';
	html += '<h4>💰 Mana Cost Formula</h4>';
	html += '<p class="dict-detail">Per phase: <b>base 5</b> + shape mana + behavior mana + (power × 50 × countMult) + (count − 1) × 4 + (width − 1) × 2 + (height − 1) × 2 + effect mana costs.</p>';
	html += '<p class="dict-detail"><b>Count multiplier:</b> 1 + (count − 1) × 0.4 for most behaviors. Rain/Barrage use 0.1 instead of 0.4.</p>';
	html += '<p class="dict-detail"><b>Chain stun:</b> +25 mana per stun-second. <b>Ground radius:</b> +3 mana per 50px over 200. <b>Summon:</b> +4/range, +3/health, +3/speed.</p>';
	html += '<p class="dict-detail"><b>Phase Fork repeats:</b> +35 mana per repeat.</p>';
	html += '<p class="dict-detail"><b>Final multiplier:</b> total × (0.6 + phases × 0.25).</p>';
	html += '</div>';

	html += '<div class="dict-card">';
	html += '<h4>🎮 Control Requirement</h4>';
	html += '<p class="dict-detail">The highest control value among all shapes, behaviors, and effects across all phases, plus <b>+(phases − 1) × 3</b> for multi-phase complexity.</p>';
	html += '<p class="dict-detail">Higher Magic Control stat reduces mana cost by 1.5% per point (minimum ×0.3 multiplier).</p>';
	html += '</div>';

	html += '<div class="dict-card">';
	html += '<h4>📊 Damage Formula</h4>';
	html += '<p class="dict-detail"><b>Base damage:</b> power × 8 × (all multipliers)</p>';
	html += '<p class="dict-detail"><b>Behavior multipliers:</b> Homing ×0.5 | Lob ×1.25 | Orbit ×0.7 | Rain ×1.5 | Barrage ×1.35 | Ground ×1.4 | Stationary ×2.0 power</p>';
	html += '<p class="dict-detail"><b>Shape multipliers:</b> Beam ×0.65 | Meteor ×0.75 (base) + distance scaling up to ×3.0 | Vortex 30% DoT</p>';
	html += '<p class="dict-detail"><b>Effect multipliers:</b> Phase Through ×0.55 (not from domain) | Elemental Vow +7%/pt | Domain element match +50%</p>';
	html += '<p class="dict-detail"><b>Diminishing returns:</b> Each consecutive hit on same target: ×1/(1 + hitCount × 0.04). Domain projectiles are exempt.</p>';
	html += '<p class="dict-detail"><b>Spread bonus:</b> +0.25% per degree of spread per projectile count.</p>';
	html += '</div>';

	return html;
}

function switchTab(tab){
	document.getElementById('inventoryTab').style.display = tab === 'inventory' ? 'flex' : 'none';
	document.getElementById('craftingTab').style.display  = tab === 'crafting'  ? 'flex' : 'none';
	document.getElementById('questTab').style.display     = tab === 'quests'    ? 'flex' : 'none';
	document.getElementById('bestiaryTab').style.display  = tab === 'bestiary'  ? 'flex' : 'none';
	document.getElementById('dictionaryTab').style.display= tab === 'dictionary'? 'flex' : 'none';
	document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
	if(tab === 'crafting') renderCraftList();
	if(tab === 'quests') renderQuestList();
	if(tab === 'bestiary') renderBestiary();
	if(tab === 'dictionary') renderDictSection('shapes');
}

function renderSpellTeacherQuests(wrap){
	let stSaved = null;
	try { stSaved = JSON.parse(localStorage.getItem('magicBattle_spellTeacherQuests')); } catch(e){}
	const currentIndex = stSaved ? (stSaved.qi || 0) : 0;

	const header = document.createElement('div');
	header.style.cssText = 'font-size:14px;font-weight:bold;color:#cc6644;padding:10px 0 6px 4px;border-bottom:1px solid rgba(204,102,68,0.25);margin-bottom:6px;';
	header.textContent = '🔮 Spell Teacher — Mira';
	wrap.appendChild(header);

	const totalDone = Math.min(currentIndex, SPELL_TEACHER_QUEST_DEFS.length);
	const totalAll = SPELL_TEACHER_QUEST_DEFS.length;
	const overallProg = document.createElement('div');
	overallProg.style.cssText = 'font-size:11px;color:var(--muted);margin-bottom:8px;padding-left:4px;';
	overallProg.textContent = totalDone + ' / ' + totalAll + ' quests completed';
	wrap.appendChild(overallProg);

	for(const ch of SPELL_TEACHER_CHAPTERS){
		const chDiv = document.createElement('div');
		chDiv.className = 'st-chapter';
		const chCount = ch.end - ch.start + 1;
		const chDone = Math.max(0, Math.min(currentIndex, ch.end + 1) - ch.start);
		const allDone = chDone >= chCount;
		const containsCurrent = currentIndex >= ch.start && currentIndex <= ch.end;
		if(allDone) chDiv.classList.add('all-done');

		// Header
		const head = document.createElement('div');
		head.className = 'st-chapter-head' + (containsCurrent ? ' open' : '');
		head.innerHTML = '<span class="st-arrow">▶</span>'
			+ '<span class="st-ch-title">' + (allDone ? '✅ ' : '') + ch.name + '</span>'
			+ '<span class="st-ch-prog">' + chDone + '/' + chCount + '</span>';
		head.onclick = function(){ this.classList.toggle('open'); };
		chDiv.appendChild(head);

		// Body
		const body = document.createElement('div');
		body.className = 'st-chapter-body';
		for(let i = ch.start; i <= ch.end; i++){
			const q = SPELL_TEACHER_QUEST_DEFS[i];
			if(!q) continue;
			const isComplete = i < currentIndex;
			const isCurrent = i === currentIndex;
			const row = document.createElement('div');
			row.style.cssText = 'padding:8px 10px;margin-bottom:4px;border-radius:6px;border:1px solid '
				+ (isCurrent ? 'rgba(108,92,231,0.6)' : isComplete ? 'rgba(40,167,69,0.25)' : 'rgba(255,255,255,0.06)')
				+ ';background:' + (isCurrent ? 'rgba(108,92,231,0.12)' : isComplete ? 'rgba(40,167,69,0.05)' : 'rgba(255,255,255,0.02)') + ';';
			const icon = isComplete ? '✅' : isCurrent ? '📜' : '🔒';
			const titleColor = isComplete ? '#28a745' : isCurrent ? '#f1c40f' : '#555';
			const descColor = isComplete ? '#5a8a5a' : isCurrent ? '#bbb' : '#444';
			row.innerHTML = '<div style="display:flex;align-items:center;gap:6px;">'
				+ '<span style="font-size:15px;">' + icon + '</span>'
				+ '<div style="flex:1;">'
				+ '<div style="font-size:12px;font-weight:bold;color:' + titleColor + ';">' + q.title + '</div>'
				+ '<div style="font-size:10px;color:' + descColor + ';margin-top:1px;">' + q.desc + '</div>'
				+ (q.npc && isCurrent ? '<div style="font-size:9px;color:#cc6644;margin-top:2px;">NPC: ' + q.npc + '</div>' : '')
				+ '</div>'
				+ (isCurrent ? '<span style="font-size:9px;color:#6c5ce7;white-space:nowrap;">IN PROGRESS</span>' : '')
				+ '</div>';
			body.appendChild(row);
		}
		chDiv.appendChild(body);
		wrap.appendChild(chDiv);
	}

	if(currentIndex >= SPELL_TEACHER_QUEST_DEFS.length){
		const complete = document.createElement('div');
		complete.style.cssText = 'text-align:center;padding:12px;color:#28a745;font-size:13px;font-weight:bold;margin-top:4px;';
		complete.textContent = '🎓 All Spell Teacher lessons completed — Spell Master!';
		wrap.appendChild(complete);
	}
}

function renderQuestSection(wrap, title, defs, storageKey, slimeQuestIndex){
	let saved = null;
	try { saved = JSON.parse(localStorage.getItem(storageKey)); } catch(e){}
	const currentIndex = saved ? (saved.questIndex || 0) : 0;
	const slimesKilled = saved ? (saved.slimesKilled || 0) : 0;

	// Section header
	const header = document.createElement('div');
	header.style.cssText = 'font-size:14px;font-weight:bold;color:#f1c40f;padding:10px 0 6px 4px;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:6px;';
	header.textContent = title;
	wrap.appendChild(header);

	for(let i = 0; i < defs.length; i++){
		const q = defs[i];
		const isComplete = i < currentIndex;
		const isCurrent = i === currentIndex;

		const row = document.createElement('div');
		row.style.cssText = 'padding:10px 12px;margin-bottom:6px;border-radius:8px;border:1px solid ' +
			(isCurrent ? 'rgba(108,92,231,0.6)' : isComplete ? 'rgba(40,167,69,0.3)' : 'rgba(255,255,255,0.08)') +
			';background:' + (isCurrent ? 'rgba(108,92,231,0.12)' : isComplete ? 'rgba(40,167,69,0.06)' : 'rgba(255,255,255,0.02)') + ';';

		const icon = isComplete ? '\u2705' : isCurrent ? '\ud83d\udcdc' : '\ud83d\udd12';
		const titleColor = isComplete ? '#28a745' : isCurrent ? '#f1c40f' : '#666';
		const descColor = isComplete ? '#5a8a5a' : isCurrent ? '#bbb' : '#555';

		let descText = q.desc;
		if(slimeQuestIndex >= 0 && i === slimeQuestIndex && isCurrent) descText = q.desc + ' (' + slimesKilled + '/5)';

		row.innerHTML = '<div style="display:flex;align-items:center;gap:8px;">' +
			'<span style="font-size:18px;">' + icon + '</span>' +
			'<div style="flex:1;">' +
			'<div style="font-size:13px;font-weight:bold;color:' + titleColor + ';">' + q.title + '</div>' +
			'<div style="font-size:11px;color:' + descColor + ';margin-top:2px;">' + descText + '</div>' +
			(q.npc && isCurrent ? '<div style="font-size:10px;color:#6c5ce7;margin-top:3px;">NPC: ' + q.npc + '</div>' : '') +
			'</div>' +
			(isCurrent ? '<span style="font-size:10px;color:#6c5ce7;white-space:nowrap;">IN PROGRESS</span>' : '') +
			'</div>';

		wrap.appendChild(row);
	}

	if(currentIndex >= defs.length){
		const complete = document.createElement('div');
		complete.style.cssText = 'text-align:center;padding:12px;color:#28a745;font-size:13px;font-weight:bold;margin-top:4px;';
		complete.textContent = '\ud83c\udf89 All ' + title.toLowerCase() + ' completed!';
		wrap.appendChild(complete);
	}
}

/* Sync graveyard quest progress based on graveyardStage localStorage value.
   Quests 2+ complete in city/dungeon modes where checkQuestCompletion doesn't run
   for graveyard quests, so questIndex can fall behind the actual stage. */
function syncGraveyardQuestProgress(){
	const gStage = parseInt(localStorage.getItem('magicBattle_graveyardStage')||'0');
	if(gStage < 1) return;
	const key = 'magicBattle_graveyardQuests';
	let saved = null;
	try { saved = JSON.parse(localStorage.getItem(key)); } catch(e){}
	if(!saved) saved = { questIndex:0, flags:{}, slimesKilled:0 };
	// graveyardStage >= N means quest N+1 is done (stage 1 → quests 0,1 done → index 2)
	const minIndex = gStage + 1;
	if(saved.questIndex < minIndex){
		saved.questIndex = minIndex;
		localStorage.setItem(key, JSON.stringify(saved));
	}
}

function syncDeepRootQuestProgress(){
	const drStage = parseInt(localStorage.getItem('magicBattle_deepRootStage')||'0');
	if(drStage < 1) return;
	const key = 'magicBattle_deepRootQuests';
	let saved = null;
	try { saved = JSON.parse(localStorage.getItem(key)); } catch(e){}
	if(!saved) saved = { questIndex:0, flags:{} };
	// Stages 1-2 map 1:1 to quest indices; stage 3+ maps to drStage-1
	// because "Find the Corrupted Tree" was merged with "Enter the Corruption".
	// Stage 9 also collapses with 8 (both map to "The Deep Root Horror" quest).
	const minIndex = drStage <= 2 ? drStage : drStage <= 8 ? drStage - 1 : drStage - 2;
	if(saved.questIndex < minIndex){
		saved.questIndex = minIndex;
		localStorage.setItem(key, JSON.stringify(saved));
	}
}

function syncStormIslandsQuestProgress(){
	const siData = JSON.parse(localStorage.getItem('magicBattle_stormIslandsQuest') || '{}');
	const stage = siData.stage || 0;
	if(stage < 1) return;
	const key = 'magicBattle_stormIslandsQuest';
	const minIndex = stage;
	if(!siData.questIndex || siData.questIndex < minIndex){
		siData.questIndex = minIndex;
		localStorage.setItem(key, JSON.stringify(siData));
	}
}

function renderQuestList(){
	const wrap = document.getElementById('questList');
	wrap.innerHTML = '';

	syncGraveyardQuestProgress();
	syncDeepRootQuestProgress();
	syncStormIslandsQuestProgress();

	function qp(key){ try { const s = JSON.parse(localStorage.getItem(key)); return s ? (s.questIndex||0) : 0; } catch(e){ return 0; } }
	const tutorialDone  = qp('magicBattle_tutorialQuests')    >= 10;
	const cityDone      = qp('magicBattle_cityQuests')        >= 10;
	const sylvarisDone  = qp('magicBattle_sylvarisQuests')    >= 19;
	const observatoryDone = qp('magicBattle_observatoryQuests') >= 3;

	// ===== MAIN STORY =====
	const mainHeader = document.createElement('div');
	mainHeader.style.cssText = 'font-size:16px;font-weight:bold;color:#e8c840;padding:12px 0 8px 4px;border-bottom:2px solid rgba(232,200,64,0.3);margin-bottom:8px;letter-spacing:1px;';
	mainHeader.textContent = '📖 Main Story';
	wrap.appendChild(mainHeader);

	renderQuestSection(wrap, 'Tutorial Quests', TUTORIAL_QUEST_DEFS, 'magicBattle_tutorialQuests', 8);

	if(tutorialDone)  renderQuestSection(wrap, 'City Quests', CITY_QUEST_DEFS, 'magicBattle_cityQuests', -1);
	else              renderLockedSection(wrap, 'City Quests', 'Complete Tutorial Quests to unlock.');

	if(cityDone)      renderQuestSection(wrap, 'Sylvaris Wildes', SYLVARIS_QUEST_DEFS, 'magicBattle_sylvarisQuests', -1);
	else              renderLockedSection(wrap, 'Sylvaris Wildes', 'Complete City Quests to unlock.');

	if(sylvarisDone)  renderQuestSection(wrap, 'Observatory', OBSERVATORY_QUEST_DEFS, 'magicBattle_observatoryQuests', -1);
	else              renderLockedSection(wrap, 'Observatory', 'Complete Sylvaris Wildes quests to unlock.');

	if(observatoryDone) renderQuestSection(wrap, 'Dragon Graveyard', GRAVEYARD_QUEST_DEFS, 'magicBattle_graveyardQuests', -1);
	else                renderLockedSection(wrap, 'Dragon Graveyard', 'Complete Observatory quests to unlock.');

	const graveyardDone = parseInt(localStorage.getItem('magicBattle_graveyardStage')||'0') >= 7;
	if(graveyardDone) renderQuestSection(wrap, 'Deep Root Prophecy', DEEP_ROOT_QUEST_DEFS, 'magicBattle_deepRootQuests', -1);
	else if(observatoryDone) renderLockedSection(wrap, 'Deep Root Prophecy', 'Complete Dragon Graveyard quests to unlock.');

	const playerData = JSON.parse(localStorage.getItem('magicBattle_playerData') || 'null');
	const deepRootDone = parseInt(localStorage.getItem('magicBattle_deepRootStage')||'0') >= 11;
	const hasArchmageRank = playerData && playerData.mageRank >= 4;
	if(deepRootDone && hasArchmageRank) renderQuestSection(wrap, 'Recovering the Old Society', OLD_SOCIETY_QUEST_DEFS, 'magicBattle_oldSocietyQuests', -1);
	else if(graveyardDone) renderLockedSection(wrap, 'Recovering the Old Society', 'Complete all main quests and reach Archmage rank to unlock.');

	// ===== SIDE QUESTS =====
	const sideHeader = document.createElement('div');
	sideHeader.style.cssText = 'font-size:16px;font-weight:bold;color:#5cb8e6;padding:16px 0 8px 4px;border-bottom:2px solid rgba(92,184,230,0.3);margin-bottom:8px;margin-top:12px;letter-spacing:1px;';
	sideHeader.textContent = '🌊 Side Quests';
	wrap.appendChild(sideHeader);

	const hasMageRank = playerData && playerData.mageRank >= 3;
	if(hasMageRank) renderQuestSection(wrap, 'Storm Islands', STORM_ISLANDS_QUEST_DEFS, 'magicBattle_stormIslandsQuest', -1);
	else            renderLockedSection(wrap, 'Storm Islands', 'Reach Mage rank to unlock.');

	// ===== SPELL TEACHER =====
	const stHeader = document.createElement('div');
	stHeader.style.cssText = 'font-size:16px;font-weight:bold;color:#cc6644;padding:16px 0 8px 4px;border-bottom:2px solid rgba(204,102,68,0.3);margin-bottom:8px;margin-top:12px;letter-spacing:1px;';
	stHeader.textContent = '📖 Spell Training';
	wrap.appendChild(stHeader);

	if(cityDone) renderSpellTeacherQuests(wrap);
	else         renderLockedSection(wrap, 'Spell Teacher — Mira', 'Complete City Quests to unlock.');
}

function loadBestiary(){
	try{
		const raw = localStorage.getItem('magicBattle_bestiary');
		if(raw) return JSON.parse(raw);
	}catch(e){}
	return {};
}
function saveBestiary(data){
	localStorage.setItem('magicBattle_bestiary', JSON.stringify(data));
}

function renderBestiary(){
	const wrap = document.getElementById('bestiaryList');
	wrap.innerHTML = '';
	const discovered = loadBestiary();
	const total = BESTIARY_ENTRIES.length;
	const found = BESTIARY_ENTRIES.filter(e => discovered[e.id]).length;
	document.getElementById('bestiaryCount').textContent = `(${found} / ${total} discovered)`;

	// Group by zone
	const zones = [];
	const zoneMap = {};
	for(const entry of BESTIARY_ENTRIES){
		if(!zoneMap[entry.zone]){ zoneMap[entry.zone] = []; zones.push(entry.zone); }
		zoneMap[entry.zone].push(entry);
	}

	let num = 0;
	for(const zone of zones){
		const zoneHeader = document.createElement('div');
		zoneHeader.style.cssText = 'font-size:13px;font-weight:bold;color:var(--accent2);padding:8px 0 4px 4px;border-bottom:1px solid rgba(255,255,255,0.06);margin-top:8px;';
		zoneHeader.textContent = zone;
		wrap.appendChild(zoneHeader);

		for(const entry of zoneMap[zone]){
			num++;
			const unlocked = !!discovered[entry.id];
			const row = document.createElement('div');
			row.style.cssText = `padding:8px 12px;border-radius:8px;border:1px solid ${unlocked ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.03)'};background:${unlocked ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.2)'};display:flex;align-items:center;gap:10px;`;
			if(unlocked){
				const kills = discovered[entry.id] || 0;
				row.innerHTML = `<span style="font-size:11px;color:var(--muted);min-width:24px">#${num}</span>`
					+ `<span style="font-size:18px">${entry.icon}</span>`
					+ `<div style="flex:1"><div style="font-size:13px;font-weight:bold;color:${entry.boss ? 'var(--rarity-legendary)' : '#fff'}">${entry.name}${entry.boss ? ' ⭐' : ''}</div>`
					+ `<div style="font-size:11px;color:var(--muted)">HP: ${entry.hp.toLocaleString()} · Defeated: ${kills}x</div></div>`;
			} else {
				row.innerHTML = `<span style="font-size:11px;color:#444;min-width:24px">#${num}</span>`
					+ `<span style="font-size:18px;filter:brightness(0.2)">❓</span>`
					+ `<div style="flex:1"><div style="font-size:13px;font-weight:bold;color:#444">???</div>`
					+ `<div style="font-size:11px;color:#333">Not yet discovered</div></div>`;
			}
			wrap.appendChild(row);
		}
	}
}

function getIngredientCount(itemId){
	const e = STATE.inventory.find(e => e.itemId === itemId);
	return e ? e.qty : 0;
}

function canCraft(recipe){
	return recipe.ingredients.every(ing => getIngredientCount(ing.itemId) >= ing.qty);
}

function renderCraftList(){
	const wrap = document.getElementById('craftList');
	wrap.innerHTML = '';
	const RARITY_ORDER = { common:0, uncommon:1, rare:2, epic:3, legendary:4, mythical:5 };
	let recipes = CRAFTING_RECIPES.slice();

	// Filter by type
	if(craftTypeFilter !== 'all'){
		recipes = recipes.filter(r => ITEM_DB[r.result]?.type === craftTypeFilter);
	}
	// Filter by search
	if(craftSearch){
		const q = craftSearch.toLowerCase();
		recipes = recipes.filter(r => {
			const item = ITEM_DB[r.result];
			if(!item) return false;
			if(item.name.toLowerCase().includes(q)) return true;
			return r.ingredients.some(ing => (ITEM_DB[ing.itemId]?.name||'').toLowerCase().includes(q));
		});
	}
	// Sort: craftable first, then by rarity
	recipes.sort((a,b) => {
		const ca = canCraft(a) ? 0 : 1;
		const cb = canCraft(b) ? 0 : 1;
		if(ca !== cb) return ca - cb;
		return (RARITY_ORDER[ITEM_DB[a.result]?.rarity]||0) - (RARITY_ORDER[ITEM_DB[b.result]?.rarity]||0);
	});

	if(!recipes.length){
		wrap.innerHTML = '<div style="text-align:center;color:#666;padding:20px">No recipes found.</div>';
		return;
	}

	for(const recipe of recipes){
		const item = ITEM_DB[recipe.result];
		if(!item) continue;
		const craftable = canCraft(recipe);
		const card = document.createElement('div');
		card.className = 'craft-card';
		if(!craftable) card.style.opacity = '0.55';

		// Icon
		const iconDiv = document.createElement('div');
		iconDiv.className = 'craft-icon';
		iconDiv.textContent = item.icon;
		card.appendChild(iconDiv);

		// Info
		const info = document.createElement('div');
		info.className = 'craft-info';

		const nameEl = document.createElement('div');
		nameEl.className = 'craft-name';
		nameEl.style.color = `var(--rarity-${item.rarity})`;
		nameEl.textContent = item.name;
		info.appendChild(nameEl);

		// Stats summary
		const statsLine = document.createElement('div');
		statsLine.style.cssText = 'font-size:10px;color:#999;margin-bottom:4px';
		const statKeys = Object.entries(item.stats||{}).filter(([,v])=>v!==0);
		statsLine.textContent = statKeys.map(([k,v])=>`${k.replace(/([A-Z])/g,' $1').trim()}: ${v>0?'+':''}${v}`).join(', ') || item.desc || '';
		info.appendChild(statsLine);

		// Ingredients row
		const ingRow = document.createElement('div');
		ingRow.className = 'craft-ingredients';
		for(const ing of recipe.ingredients){
			const ingItem = ITEM_DB[ing.itemId];
			if(!ingItem) continue;
			const have = getIngredientCount(ing.itemId);
			const el = document.createElement('span');
			el.className = 'craft-ing ' + (have >= ing.qty ? 'has' : 'missing');
			el.textContent = `${ingItem.icon} ${have}/${ing.qty}`;
			el.title = ingItem.name;
			ingRow.appendChild(el);
		}
		info.appendChild(ingRow);
		card.appendChild(info);

		// Craft button
		const btn = document.createElement('button');
		btn.className = 'craft-btn';
		btn.textContent = craftable ? 'Craft' : '🔒';
		btn.disabled = !craftable;
		btn.addEventListener('click', () => craftItem(recipe));
		card.appendChild(btn);

		wrap.appendChild(card);
	}
}

function craftItem(recipe){
	if(!canCraft(recipe)) return;
	// Consume ingredients
	for(const ing of recipe.ingredients){
		removeFromInventory(ing.itemId, ing.qty);
	}
	// Add result
	addToInventory(recipe.result, recipe.qty);
	saveState();
	renderCraftList();
	renderInventory();

	// Flash feedback
	const btn = document.querySelector('.craft-card .craft-btn');
	if(btn){
		const flash = document.createElement('div');
		flash.textContent = `✨ Crafted ${ITEM_DB[recipe.result]?.name}!`;
		flash.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);color:var(--rarity-' + (ITEM_DB[recipe.result]?.rarity||'common') + ');padding:12px 24px;border-radius:8px;font-size:16px;font-weight:bold;z-index:9999;pointer-events:none;animation:fadeUp .8s ease forwards';
		document.body.appendChild(flash);
		setTimeout(() => flash.remove(), 900);
	}
}

function renderSpellSlots(){
	const wrap = document.getElementById('spellSlots');
	wrap.innerHTML = '';
	const stats = computeStats();
	for(let i = 0; i < 10; i++){
		const sp = STATE.spells[i];
		const el = document.createElement('div');
		const isUlt = (i === 9);
		el.className = 'spell-slot' + (isUlt ? ' ultimate-slot' : '');
		if(sp){
			const baseCost = calcSpellManaCost(sp);
			const controlDiscount = Math.max(0.3, 1 - stats.magicControl * 0.015);
			const _vbSlot = calcVowBoostsForSlot(i);
			const vowManaSlot = Math.max(0.1, 1 - (_vbSlot.manaCost||0) * 0.05);
			const cost = Math.round(baseCost * controlDiscount * vowManaSlot);
			const req  = calcSpellControlReq(sp);
			const canUse = stats.magicControl >= req;
			el.innerHTML = `
				<span class="sp-num">${isUlt ? '⚡0' : (i+1)}</span>
				<span class="sp-color" style="background:${sp.phases[0]?.color||'#888'}"></span>
				<span class="sp-name" style="${canUse?'':'color:var(--red);text-decoration:line-through'}">${sp.name}</span>
				<span class="sp-mana">${isUlt ? (cost*10)+' ⚡' : cost+' 💧'}</span>
			`;
			if(!canUse) el.title = `Requires ${req} Control (you have ${stats.magicControl})`;
		} else {
			el.innerHTML = `<span class="sp-num">${isUlt ? '⚡0' : (i+1)}</span><span class="sp-empty">${isUlt ? 'Ultimate — click to create' : 'Empty — click to create'}</span>`;
		}
		el.addEventListener('click', () => openSpellBuilder(i));
		wrap.appendChild(el);
	}
}

function renderVowSlots(){

				? `🔒 Slots: ${(v.slots||[]).map(s=>s===9?'Ult':(s+1)).join(',')}`
				: v.sacrifice === 'health' ? `❤️ -${v.amount} HP` : `💧 -${v.amount} Mana`;
			const targetLabel = v.targetSlot===9?'⚡Ult':`Spell ${(v.targetSlot||0)+1}`;
			let boostLabel = '';
			if(v.boostType != null){
				const info = VOW_BOOST_TYPES[v.boostType];

				if(v.sizeBonus) boostLabel += ' 🎨+50%sz';

				boostLabel = Object.entries(v.boosts).filter(([k,val])=>val>0).map(([k,val])=>`${VOW_BOOST_TYPES[k]?.icon||''}${val}`).join(' ');
			}
			el.innerHTML = `<span class="sp-num" style="background:rgba(200,50,50,.3);color:#ff6666">V${i+1}</span>
				<span class="sp-name" style="color:#ff9999">${sacLabel} → ${targetLabel}</span>
				<span class="sp-mana" style="color:#ffcc44">${boostLabel} (${spent}/${pts})</span>`;
		} else {
			el.innerHTML = `<span class="sp-num" style="background:rgba(100,100,100,.2);color:#888">V${i+1}</span>
				<span class="sp-empty" style="color:#666">Empty — click to create vow</span>`;
		}
		el.addEventListener('click', () => openVowEditor(i));
		wrap.appendChild(el);
	}

	/* 4th slot: Domain Vow (only visible for dominion class) */
	if(STATE.mageClass === 'dominion'){
		const dv = STATE.domainVow ? migrateDomainVow(STATE.domainVow) : null;
		const del = document.createElement('div');
		del.className = 'spell-slot';
		del.style.cursor = 'pointer';
		if(dv){
			const pts = calcDomainVowPoints(dv);
			const spent = calcDomainVowSpent(dv);
			// Build sacrifice summary
			const sacParts = [];
			const s = dv.sacrifices;
			if(s.health > 0) sacParts.push(`❤️-${s.health}%`);
			if(s.maxMana > 0) sacParts.push(`💧-${s.maxMana}`);
			if(s.spellSlots && s.spellSlots.length) sacParts.push(`🔒${s.spellSlots.length}`);
			if(s.effects && s.effects.length) sacParts.push(`✨${s.effects.length}`);
			if(s.shapes && s.shapes.length) sacParts.push(`⬡${s.shapes.length}`);
			if(s.movement > 0) sacParts.push(`🐢-${s.movement}%`);
			if(s.visibility > 0) sacParts.push(`🌫️-${s.visibility}%`);
			if(s.items && s.items.length) sacParts.push(`🎒${s.items.length}`);
			if(s.domProjectiles) sacParts.push('🚫Proj');
			if(s.domPlayerPower > 0) sacParts.push(`💔-${s.domPlayerPower}%`);
			if(s.domRange > 0) sacParts.push(`📐-${s.domRange}%`);
			const sacLabel = sacParts.length > 0 ? sacParts.join(' ') : 'No sacrifice';
			let boostLabel = '';
			if(dv.domainBuffs){
				boostLabel = Object.entries(dv.domainBuffs).filter(([k,v])=>v>0).map(([k,v])=>{
					const info = DOMAIN_VOW_BUFFS[k];
					return `${info?info.icon:''}${info&&info.binary?'':v}`;

			del.innerHTML = `<span class="sp-num" style="background:rgba(231,76,60,.35);color:#e74c3c">👁️</span>
				<span class="sp-name" style="color:#e74c3c">${sacLabel} → Domain</span>
				<span class="sp-mana" style="color:#ffcc44">${boostLabel} (${spent}/${pts})</span>`;

				<span class="sp-empty" style="color:#888">Domain Vow — click to create</span>`;
		}
		del.addEventListener('click', () => openDomainVowEditor());
		wrap.appendChild(del);
	}
}

function openVowEditor(slotIdx){
	editingVowSlot = slotIdx;
	domainVowEditor = null; // ensure domain editor is cleared
	const existing = STATE.vows[slotIdx];
	if(existing){
		vowEditor = JSON.parse(JSON.stringify(existing));
		/* Migrate from old boosts dict to new single-boost format */
		if(vowEditor.boosts && vowEditor.boostType == null){
			let best = null, bestVal = 0;
			for(const k in vowEditor.boosts){
				if(vowEditor.boosts[k] > bestVal){ bestVal = vowEditor.boosts[k]; best = k; }
			}
			vowEditor.boostType = best || 'power';
			vowEditor.boostAmount = bestVal || 0;
			vowEditor.sizeBonus = false;
			delete vowEditor.boosts;
		}
	} else {
		vowEditor = { sacrifice:'health', amount:30, slots:[], targetSlot:0, boostType:'power', boostAmount:0, sizeBonus:false };
	}
	if(vowEditor.targetSlot == null) vowEditor.targetSlot = 0;
	document.getElementById('vowModal').style.display = 'flex';
	document.getElementById('vowModalTitle').textContent = `Vow Editor — Slot ${slotIdx+1}`;
	renderVowEditor();
}

function renderVowEditor(){
	const v = vowEditor;
	const pts = calcVowPoints(v, editingVowSlot);
	const spent = calcVowSpent(v);
	const remaining = pts - spent;
	let html = '';

	/* Compute spell slots already sacrificed by OTHER vows (cross-vow dedup) */
	const usedSlots = new Set();
	for(let i = 0; i < STATE.vows.length; i++){
		if(i === editingVowSlot) continue;
		const other = STATE.vows[i];
		if(other && other.sacrifice === 'spellSlot'){
			for(const s of other.slots||[]) usedSlots.add(s);
		}
	}

	// Target spell slot selector
	const globalBoosts = new Set(['maxHealth','jumpHeight','playerSpeed','defense','elementalDmg','critChance','spellVamp','thorns','manaEfficiency']);
	const isGlobal = globalBoosts.has(v.boostType);
	if(!isGlobal){
		html += `<div style="font-size:13px;color:var(--muted);margin-bottom:2px">Target Spell (boosts apply to this spell only):</div>`;
		html += `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">`;
		for(let s=0;s<10;s++){
			const isTarget = v.targetSlot === s;
			const label = s===9?'⚡Ult':`${s+1}`;
			const spellName = STATE.spells[s]?.name || (s===9?'Ultimate':'Empty');
			html += `<div class="fx-chip ${isTarget?'active':''}" data-targetslot="${s}" style="cursor:pointer;padding:4px 8px;font-size:11px" title="${spellName}">${label}</div>`;
		}
		html += `</div>`;
	} else {
		html += `<div style="font-size:12px;color:#88bbff;margin-bottom:8px">🌐 This boost applies globally (not spell-specific)</div>`;
	}

	// Sacrifice type
	html += `<div style="font-size:13px;color:var(--muted)">Sacrifice something for power:</div>`;
	html += `<div style="display:flex;gap:6px;flex-wrap:wrap">`;
	for(const [k,info] of Object.entries(VOW_SACRIFICES)){
		const sel = v.sacrifice===k;
		html += `<div class="fx-chip ${sel?'active':''}" data-sac="${k}" style="cursor:pointer;padding:6px 10px;font-size:12px">${info.icon} ${info.label}</div>`;
	}
	html += `</div>`;

	// Amount / slot selection
	if(v.sacrifice === 'health'){
		html += `<div style="display:flex;align-items:center;gap:8px"><label style="font-size:12px;color:var(--muted)">Health to sacrifice: ${v.amount}%</label>

	} else if(v.sacrifice === 'maxMana'){
		html += `<div style="display:flex;align-items:center;gap:8px"><label style="font-size:12px;color:var(--muted)">Mana to sacrifice: ${v.amount} (${pts} pts)</label>
			<input type="range" min="100" max="1200" step="100" value="${v.amount}" id="vowAmount" style="flex:1"/></div>`;
	} else if(v.sacrifice === 'effects'){
		if(!v.sacrificedEffects) v.sacrificedEffects = [];
		/* Collect effects already sacrificed by OTHER vows */
		const usedEffects = new Set();
		for(let i = 0; i < STATE.vows.length; i++){
			if(i === editingVowSlot) continue;
			const other = STATE.vows[i];
			if(other && other.sacrifice === 'effects'){
				for(const fx of other.sacrificedEffects||[]) usedEffects.add(fx);

		html += `<div style="display:flex;gap:4px;flex-wrap:wrap">`;

			const isSac = v.sacrificedEffects.includes(fx);

				html += `<div class="fx-chip" style="padding:3px 7px;font-size:10px;opacity:0.35;cursor:not-allowed;text-decoration:line-through" title="Already sacrificed">${info.icon} ${info.label}</div>`;

			}
		}

	} else if(v.sacrifice === 'shapes'){
		if(!v.sacrificedShapes) v.sacrificedShapes = [];

		const usedShapes = new Set();
		for(let i = 0; i < STATE.vows.length; i++){

		for(const [sh,info] of Object.entries(SHAPES)){
			const isSac = v.sacrificedShapes.includes(sh);

			if(takenByOther && !isSac){
				html += `<div class="fx-chip" style="padding:3px 7px;font-size:10px;opacity:0.35;cursor:not-allowed;text-decoration:line-through" title="Already sacrificed">${info.icon} ${info.label}</div>`;
			} else {
				html += `<div class="fx-chip ${isSac?'active':''}" data-sacshape="${sh}" style="cursor:pointer;padding:3px 7px;font-size:10px">${info.icon} ${info.label}</div>`;

		if(info) allLocked.push({type:'behavior',key:bh,label:`${info.icon||'⚙️'} ${info.label}`,itemId, tag:'behavior:'+bh});

	for(const [fx, itemId] of Object.entries(EFFECT_ITEM_REQ)){
		const info = EFFECTS[fx];
		if(info) allLocked.push({type:'effect',key:fx,label:`${info.icon} ${info.label}`,itemId, tag:'effect:'+fx});
	}
	/* Gather unlocks from OTHER vows to avoid duplicates */
	const otherUnlocks = new Set();
	for(let i=0;i<STATE.vows.length;i++){
		if(i===editingVowSlot) continue;
		const other = STATE.vows[i];
		if(other && other.vowUnlocks) for(const u of other.vowUnlocks) otherUnlocks.add(u);
	}
	if(allLocked.length){
		html += `<div style="font-size:13px;color:var(--muted);margin-top:8px;border-top:1px solid var(--border);padding-top:6px">🔓 Unlock item-gated abilities (5 pts each):</div>`;
		html += `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px">`;
		for(const lock of allLocked){

			}

			else vowEditor.slots = vowEditor.slots || [];

	const amtEl = document.getElementById('vowAmount');
	if(amtEl){

	document.querySelectorAll('#vowModalBody [data-sacshape]').forEach(el => {

			const newPts = calcVowPoints(vowEditor, editingVowSlot);
			if((vowEditor.boostAmount||0) > newPts) vowEditor.boostAmount = newPts;
