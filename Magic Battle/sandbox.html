				const cL=progress*200*(p.phase.width||1), cH=cL*0.4*(p.phase.width||1);
				if(p.behavior==='rain'){
					// rain cone points downward and stays at spawn pos
					const cx2=p.startX-camera.x,cy2=p.startY-camera.y;
					ctx.beginPath();ctx.moveTo(cx2,cy2);
					ctx.lineTo(cx2-cH,cy2+cL);ctx.lineTo(cx2+cH,cy2+cL);
					ctx.closePath();ctx.globalAlpha=0.3*(1-progress*0.5);ctx.fill();
					ctx.globalAlpha=0.6;ctx.lineWidth=2;ctx.stroke();
				} else if(p.behavior==='barrage'){
					// barrage cone points horizontally from spawn pos
					const cx2=p.startX-camera.x,cy2=p.startY-camera.y;
					ctx.beginPath();ctx.moveTo(cx2,cy2);
					ctx.lineTo(cx2+p.facing*cL,cy2-cH);ctx.lineTo(cx2+p.facing*cL,cy2+cH);
					ctx.closePath();ctx.globalAlpha=0.3*(1-progress*0.5);ctx.fill();
					ctx.globalAlpha=0.6;ctx.lineWidth=2;ctx.stroke();
				} else {
					const cx2=p.startX-camera.x,cy2=p.startY-camera.y;
					ctx.beginPath();ctx.moveTo(cx2,cy2);
					ctx.lineTo(cx2+p.facing*cL,cy2-cH);ctx.lineTo(cx2+p.facing*cL,cy2+cH);
					ctx.closePath();ctx.globalAlpha=0.3*(1-progress*0.5);ctx.fill();
					ctx.globalAlpha=0.6;ctx.lineWidth=2;ctx.stroke();
				}
				break;
			}
			case 'nova':{
				const eR=progress*p.width*8;
				ctx.globalAlpha=0.25*(1-progress);
				ctx.beginPath();ctx.arc(px,py,eR,0,Math.PI*2);ctx.fill();
				ctx.lineWidth=3;ctx.globalAlpha=0.6*(1-progress);
				ctx.beginPath();ctx.arc(px,py,eR,0,Math.PI*2);ctx.stroke();
				break;
			}
			case 'chain':{
				ctx.beginPath();ctx.arc(px,py,p.width*0.7,0,Math.PI*2);ctx.fill();
				if(p.trailParts.length>1){
					ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.globalAlpha=0.7;
					ctx.beginPath();
					ctx.moveTo(p.trailParts[0].x-camera.x,p.trailParts[0].y-camera.y);
					for(let t=1;t<p.trailParts.length;t++){
						const tp=p.trailParts[t];
						ctx.lineTo(tp.x-camera.x+(Math.random()-0.5)*6,tp.y-camera.y+(Math.random()-0.5)*6);
					}
					ctx.lineTo(px,py);ctx.stroke();
				}
				break;
			}
			case 'wall':{
				const ww=p.width*2,wh=p.height*6;
				ctx.globalAlpha=0.45;ctx.fillRect(px-ww/2,py-wh/2,ww,wh);
				ctx.globalAlpha=0.7;ctx.strokeStyle=p.color;ctx.lineWidth=2;
				ctx.strokeRect(px-ww/2,py-wh/2,ww,wh);
				break;
			}
			case 'solidify':{
				const sw2=p.width*3,sh2=p.height*1.5;
				ctx.globalAlpha=0.7;ctx.fillRect(px-sw2/2,py-sh2/2,sw2,sh2);
				ctx.globalAlpha=0.9;ctx.strokeStyle=p.color;ctx.lineWidth=2;
				ctx.strokeRect(px-sw2/2,py-sh2/2,sw2,sh2);
				ctx.globalAlpha=0.2;ctx.fillStyle='#fff';
				ctx.fillRect(px-sw2/2+2,py-sh2/2+2,sw2-4,3);
				break;
			}
			case 'spike':{
				ctx.save();ctx.translate(px,py);
				const skA=Math.atan2(p.vy,p.vx);
				ctx.rotate(skA);
				const sk=Math.max(p.width,p.height)*0.9;
				ctx.beginPath();
				ctx.moveTo(sk*2,0);
				ctx.lineTo(-sk,-sk*0.8);
				ctx.lineTo(-sk*0.3,0);
				ctx.lineTo(-sk,sk*0.8);
				ctx.closePath();
				ctx.fill();
				ctx.fillStyle='#fff';ctx.globalAlpha=0.5;
				ctx.beginPath();
				ctx.moveTo(sk*1.5,0);
				ctx.lineTo(-sk*0.2,-sk*0.25);
				ctx.lineTo(-sk*0.2,sk*0.25);
				ctx.closePath();
				ctx.fill();
				ctx.restore();
				break;
			}
			case 'polygon':{
				ctx.save();ctx.translate(px,py);
				ctx.rotate(p.age*0.04);
				const pgR=Math.max(p.width,p.height)*1.0;
				const pgSides=p.polygonSides||6;
				ctx.beginPath();
				for(let si=0;si<=pgSides;si++){
					const a=si*Math.PI*2/pgSides;
					if(si===0) ctx.moveTo(Math.cos(a)*pgR,Math.sin(a)*pgR);
					else ctx.lineTo(Math.cos(a)*pgR,Math.sin(a)*pgR);
				}
				ctx.closePath();
				ctx.fill();
				ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.globalAlpha=0.9;
				ctx.stroke();
				ctx.fillStyle='#fff';ctx.globalAlpha=0.25;
				ctx.beginPath();
				for(let si=0;si<=pgSides;si++){
					const a=si*Math.PI*2/pgSides;
					const ir=pgR*0.45;
					if(si===0) ctx.moveTo(Math.cos(a)*ir,Math.sin(a)*ir);
					else ctx.lineTo(Math.cos(a)*ir,Math.sin(a)*ir);
				}
				ctx.closePath();ctx.fill();
				ctx.restore();
				break;
			}
			case 'slash':{
				ctx.save();ctx.translate(px,py);
				const skA=Math.atan2(p.vy,p.vx);
				ctx.rotate(skA - Math.PI/2);
				const sR=Math.max(p.width,p.height)*1.5;
				ctx.lineWidth=3+sR*0.15;ctx.lineCap='round';
				ctx.strokeStyle=p.color;ctx.globalAlpha=0.85;
				ctx.beginPath();ctx.arc(0,0,sR,Math.PI*0.15,Math.PI*0.85);ctx.stroke();
				ctx.strokeStyle='#fff';ctx.lineWidth=1.5+sR*0.05;ctx.globalAlpha=0.6;
				ctx.beginPath();ctx.arc(0,0,sR*0.85,Math.PI*0.2,Math.PI*0.8);ctx.stroke();
				ctx.globalAlpha=0.2;ctx.fillStyle=p.color;
				ctx.beginPath();ctx.arc(0,0,sR*1.3,Math.PI*0.1,Math.PI*0.9);
				ctx.arc(0,0,sR*0.5,Math.PI*0.9,Math.PI*0.1,true);ctx.closePath();ctx.fill();
				ctx.restore();
				break;
			}
			case 'meteor':{
				ctx.save();ctx.translate(px,py);
				const mR=Math.max(p.width,p.height)*1.5;
				const skA=Math.atan2(p.vy,p.vx);
				ctx.rotate(skA);
				// color phase cycling based on age
				const cPhase=(p.age*0.03)%3;
				const coreColors=[['#ff4400','#ffcc00'],['#ff00cc','#ff66ff'],['#4488ff','#88ddff']];
				const cIdx=Math.floor(cPhase),cNext=(cIdx+1)%3,cFrac=cPhase-cIdx;
				function lerpC(a,b,t){const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16);const r=((pa>>16)*(1-t)+(pb>>16)*t)|0;const g=(((pa>>8)&0xff)*(1-t)+((pb>>8)&0xff)*t)|0;const bl=((pa&0xff)*(1-t)+(pb&0xff)*t)|0;return '#'+((r<<16)|(g<<8)|bl).toString(16).padStart(6,'0');}
				const coreC=lerpC(coreColors[cIdx][0],coreColors[cNext][0],cFrac);
				const glowC=lerpC(coreColors[cIdx][1],coreColors[cNext][1],cFrac);
				// outer heatwave glow
				ctx.globalAlpha=0.15;const heatGlow=ctx.createRadialGradient(0,0,mR*0.5,0,0,mR*2.5);
				heatGlow.addColorStop(0,coreC);heatGlow.addColorStop(0.5,coreC+'44');heatGlow.addColorStop(1,'transparent');
				ctx.fillStyle=heatGlow;ctx.beginPath();ctx.arc(0,0,mR*2.5,0,Math.PI*2);ctx.fill();
				// rocky body with cracks
				ctx.globalAlpha=1;ctx.fillStyle='#553322';ctx.beginPath();ctx.arc(0,0,mR,0,Math.PI*2);ctx.fill();
				ctx.fillStyle='#8b6644';ctx.globalAlpha=0.7;
				for(let ci=0;ci<5;ci++){const ca=ci*1.25+p.age*0.01;ctx.beginPath();ctx.arc(Math.cos(ca)*mR*0.4,Math.sin(ca)*mR*0.35,mR*0.3,0,Math.PI*2);ctx.fill();}
				// molten core
				ctx.fillStyle=coreC;ctx.globalAlpha=0.8;ctx.beginPath();ctx.arc(0,0,mR*0.45,0,Math.PI*2);ctx.fill();
				ctx.fillStyle=glowC;ctx.globalAlpha=0.6;ctx.beginPath();ctx.arc(0,0,mR*0.25,0,Math.PI*2);ctx.fill();
				// flame trail
				ctx.globalAlpha=0.5;
				for(let fi=1;fi<=6;fi++){const fx=-mR*fi*0.65,fy=(Math.sin(p.age*0.4+fi*1.2)*mR*0.25);
					const tR=mR*(0.7-fi*0.09);ctx.fillStyle=fi<3?coreC:glowC;
					ctx.beginPath();ctx.arc(fx,fy,Math.max(tR,2),0,Math.PI*2);ctx.fill();}
				// ember sparks
				ctx.globalAlpha=0.7;ctx.fillStyle=glowC;
				for(let si=0;si<3;si++){const sx=-mR*(1.5+si*0.8)+Math.sin(p.age*0.5+si)*mR*0.3;const sy=Math.cos(p.age*0.7+si*2)*mR*0.5;ctx.beginPath();ctx.arc(sx,sy,1.5+Math.random(),0,Math.PI*2);ctx.fill();}
				ctx.restore();break;
			}
			case 'vortex':{
				ctx.save();ctx.translate(px,py);
				const vR=p.width*3+p.width*2*(p.age/p.maxAge);
				// dark void background
				const voidGrad=ctx.createRadialGradient(0,0,0,0,0,vR);
				voidGrad.addColorStop(0,'rgba(10,0,20,0.8)');voidGrad.addColorStop(0.5,p.color);voidGrad.addColorStop(1,'transparent');
				ctx.globalAlpha=0.5*(1-progress*0.5);ctx.fillStyle=voidGrad;ctx.beginPath();ctx.arc(0,0,vR,0,Math.PI*2);ctx.fill();
				// distortion rings
				ctx.lineWidth=2;ctx.strokeStyle=p.color;
				for(let ri=0;ri<3;ri++){
					ctx.globalAlpha=0.4*(1-progress)*(1-ri*0.25);
					const rr=vR*(0.4+ri*0.25);ctx.beginPath();
					ctx.ellipse(0,0,rr,rr*0.6,p.age*0.03+ri*0.8,0,Math.PI*2);ctx.stroke();
				}
				// spinning debris/energy arms
				ctx.lineWidth=3;
				for(let arm=0;arm<4;arm++){
					ctx.globalAlpha=0.7*(1-progress);ctx.strokeStyle=arm%2===0?p.color:'#fff';
					ctx.beginPath();
					const baseA=arm*Math.PI/2+p.age*0.08;
					for(let t=0;t<20;t++){const a2=baseA+t*0.3;const r2=vR*0.1+vR*0.8*(t/20);const wobble=Math.sin(p.age*0.2+t*0.5)*r2*0.05;ctx.lineTo(Math.cos(a2)*(r2+wobble),Math.sin(a2)*(r2+wobble));}
					ctx.stroke();
				}
				// glowing eye center
				ctx.globalAlpha=0.9*(1-progress*0.3);
				const eyeGrad=ctx.createRadialGradient(0,0,0,0,0,vR*0.2);
				eyeGrad.addColorStop(0,'#fff');eyeGrad.addColorStop(0.5,p.color);eyeGrad.addColorStop(1,'transparent');
				ctx.fillStyle=eyeGrad;ctx.beginPath();ctx.arc(0,0,vR*0.2,0,Math.PI*2);ctx.fill();
				// energy crackles
				ctx.globalAlpha=0.6;ctx.strokeStyle='#fff';ctx.lineWidth=1;
				for(let li=0;li<3;li++){const la=p.age*0.15+li*2.1;const lr=vR*(0.3+Math.sin(p.age*0.1+li)*0.3);
					ctx.beginPath();ctx.moveTo(Math.cos(la)*lr*0.2,Math.sin(la)*lr*0.2);
					ctx.lineTo(Math.cos(la+0.3)*lr*0.6,Math.sin(la+0.2)*lr*0.5);
					ctx.lineTo(Math.cos(la+0.1)*lr,Math.sin(la+0.4)*lr*0.8);ctx.stroke();}
				ctx.restore();break;
			}
			case 'summon':{
				// Draw summoning circle
				ctx.save();ctx.translate(px,py);
				const sr=p.width*1.2;
				ctx.strokeStyle=p.color;ctx.lineWidth=2;
				ctx.globalAlpha=0.6+Math.sin(p.age*0.1)*0.2;
				ctx.beginPath();ctx.arc(0,0,sr,0,Math.PI*2);ctx.stroke();
				ctx.rotate(p.age*0.08);
				ctx.beginPath();ctx.arc(0,0,sr*0.6,0,Math.PI*2);ctx.stroke();
				// Inner star
				ctx.fillStyle=p.color;ctx.globalAlpha=0.7;
				for(let si=0;si<5;si++){const a=si*Math.PI*2/5-Math.PI/2;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*sr*0.8,Math.sin(a)*sr*0.8);ctx.stroke();}
				ctx.restore();
				break;
			}
		}
		ctx.globalAlpha=1;
	}

	/* particles — cap to MAX_PARTICLES */
	if (particles.length > MAX_PARTICLES) particles.splice(0, particles.length - MAX_PARTICLES);
	for(const p of particles){
		const alpha=p.life/p.maxLife;
		ctx.beginPath();ctx.arc(p.x-camera.x,p.y-camera.y,p.r*alpha,0,Math.PI*2);
		ctx.fillStyle=`rgba(${p.color.r},${p.color.g},${p.color.b},${alpha*0.8})`;
		ctx.fill();
	}

	/* dmg numbers (individual small hits) */
	for(const dn of dmgNumbers){
		ctx.font='bold 14px Arial';ctx.fillStyle=dn.color;
		ctx.globalAlpha=1-dn.age/60;ctx.textAlign='center';
		ctx.fillText(dn.text,dn.x-camera.x,dn.y-camera.y);
	}
	ctx.globalAlpha=1;

	/* damage accumulator per dummy — big number above dummy */
	for (let di = 0; di < dummies.length; di++) {
		const acc = dummyDmgAccum[di];
		if (acc.total <= 0) continue;
		const d = dummies[di];
		const sx = (d.x + d.w/2) - camera.x;
		const sy = d.y - 32 - camera.y;
		const alpha = Math.min(1, acc.timer / 30); // fade in last 0.5s
		ctx.save();
		ctx.globalAlpha = alpha;
		ctx.font = 'bold 18px Arial';
		ctx.textAlign = 'center';
		ctx.fillStyle = '#000';
		ctx.fillText(Math.round(acc.total), sx+1, sy+1);
		ctx.fillStyle = '#ffdd44';
		ctx.fillText(Math.round(acc.total), sx, sy);
		ctx.font = '10px Arial';
		ctx.fillStyle = '#ccc';
		ctx.fillText('Total Dmg', sx, sy - 16);
		ctx.restore();
	}

	/* player */
	const ppx=player.x-camera.x, ppy=player.y-camera.y;
	if(PLAYER_SPRITE.complete && PLAYER_SPRITE.naturalWidth > 0){
		const cols=PLAYER_SPRITE_COLS,rows=PLAYER_SPRITE_ROWS;
		const fw=PLAYER_SPRITE.naturalWidth/cols;
		const fh=PLAYER_SPRITE.naturalHeight/rows;
		const row=PLAYER_SPRITE_ROW[playerAnimState]||0;
		const col=playerAnimFrame%cols;
		const _fitScale=Math.min(player.w/fw,player.h/fh)*2;
		const dw=fw*_fitScale,dh=fh*_fitScale;
		const drawX=ppx+player.w/2-dw/2;
		const drawY=ppy+player.h-dh;
		ctx.save();
		if(player.facing===-1){ctx.translate(ppx+player.w/2,0);ctx.scale(-1,1);ctx.drawImage(PLAYER_SPRITE,col*fw,row*fh,fw,fh,-dw/2,drawY,dw,dh);}
		else{ctx.drawImage(PLAYER_SPRITE,col*fw,row*fh,fw,fh,drawX,drawY,dw,dh);}
		ctx.restore();
	} else {
		ctx.fillStyle='#5b7fbf';ctx.fillRect(ppx,ppy,player.w,player.h);
		ctx.fillStyle='#3a5a9e';ctx.fillRect(ppx,ppy+player.h-10,player.w,10);
		ctx.fillStyle='#c8a882';ctx.fillRect(ppx+6,ppy+2,20,16);
		ctx.fillStyle='#fff';
		const eyeX=player.facing===1?ppx+18:ppx+10;
		ctx.fillRect(eyeX,ppy+7,5,5);
		ctx.fillStyle='#222';ctx.fillRect(player.facing===1?eyeX+2:eyeX,ppy+8,3,3);
		ctx.fillStyle='#2e3a6e';ctx.beginPath();
		ctx.moveTo(ppx+4,ppy+4);ctx.lineTo(ppx+player.w/2,ppy-18);ctx.lineTo(ppx+player.w-4,ppy+4);
		ctx.closePath();ctx.fill();
	}
	const armY=ppy+18, armX=player.facing===1?ppx+player.w:ppx;
	if(player.castTimer>0){
		ctx.save();ctx.globalAlpha=0.6*(player.castTimer/12);
		ctx.beginPath();ctx.arc(player.facing===1?armX+10:armX-10,armY+3,12,0,Math.PI*2);
		ctx.fillStyle=player.castColor;ctx.fill();ctx.restore();
	}
}

/* =============================================================
   DRAW TRAIL
   ============================================================= */
function drawTrail(proj){
	if(proj.trail==='none'||proj.trailParts.length<2) return;
	const trailColors={
		sparkle:{r:200,g:220,b:255},flame:{r:255,g:140,b:50},
		smoke:{r:100,g:100,b:100},ice:{r:150,g:220,b:255},
		lightning:{r:180,g:180,b:255},
	};
	const rgb=trailColors[proj.trail]||hexToRgb(proj.color);
	for(let t=0;t<proj.trailParts.length;t++){
		const tp=proj.trailParts[t];
		const alpha=((t+1)/proj.trailParts.length)*0.5;
		const r=proj.width*0.5*((t+1)/proj.trailParts.length);
		ctx.beginPath();ctx.arc(tp.x-camera.x,tp.y-camera.y,r,0,Math.PI*2);
		ctx.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})`;ctx.fill();
	}
	if(['sparkle','flame','lightning'].includes(proj.trail) && particles.length < MAX_PARTICLES){
		const last=proj.trailParts[proj.trailParts.length-1];
		if(last&&Math.random()<0.25){
			particles.push({
				x:last.x+(Math.random()-0.5)*8,y:last.y+(Math.random()-0.5)*8,
				vx:(Math.random()-0.5)*1.5,vy:(Math.random()-0.5)*1.5-0.5,
				life:10+Math.random()*8|0,maxLife:18,
				r:1.5+Math.random()*1.5,color:rgb,
			});
		}
	}
}

/* =============================================================
   LOOP
   ============================================================= */
function loop(){update();render();requestAnimationFrame(loop);}
loop();
</script>
