<!doctype html>
<html lang="en">
	<!--NOT THE MAIN SANDBOX HTML FILE-->
	<!--THIS IS JUST FOR REFERENCE-->
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Magic Battle — Sandbox</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
		canvas { display: block; }

		#hud {
			position: fixed; top: 14px; left: 14px;
			color: #c8c8e0; font: 13px/1.4 Arial, sans-serif;
			text-shadow: 1px 1px 2px #000;
			pointer-events: none; z-index: 10;
		}
		#backBtn {
			position: fixed; top: 12px; right: 14px; z-index: 10;
			padding: 8px 18px; font: 14px Arial, sans-serif;
			background: rgba(255,255,255,0.12); color: #ddd;
			border: 1px solid rgba(255,255,255,0.25); border-radius: 6px;
			cursor: pointer; transition: background .2s;
		}
		#backBtn:hover { background: rgba(255,255,255,0.22); }

		/* ---- spell hotbar ---- */
		#hotbar {
			position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
			display: flex; gap: 4px; z-index: 10; pointer-events: none;
		}
		.hb-slot {
			width: 52px; height: 56px; background: rgba(0,0,0,0.55);
			border: 2px solid rgba(255,255,255,0.2); border-radius: 7px;
			display: flex; flex-direction: column; align-items: center;
			justify-content: center; position: relative; transition: border-color .15s, background .15s;
			overflow: hidden;
		}
		.hb-slot.active { border-color: #6c5ce7; background: rgba(108,92,231,0.25); }
		.hb-cd-overlay {
			position: absolute; bottom: 0; left: 0; right: 0;
			background: rgba(0,0,0,0.6); pointer-events: none;
		}
		.hb-key { font-size: 10px; color: #888; position: absolute; top: 2px; left: 5px; }
		.hb-dot { width: 8px; height: 8px; border-radius: 50%; margin-bottom: 2px; }
		.hb-name { font-size: 9px; color: #bbb; max-width: 48px; text-align: center;
			overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
		.hb-mana { font-size: 9px; color: #3498db; }

		/* ---- mana bar ---- */
		#manaWrap {
			position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
			width: 260px; z-index: 10; pointer-events: none;
		}
		#manaBarBg {
			width: 100%; height: 12px; background: rgba(0,0,0,0.5);
			border: 1px solid rgba(52,152,219,0.4); border-radius: 6px;
			overflow: hidden;
		}
		#manaBarFill {
			height: 100%; background: linear-gradient(90deg, #2980b9, #3498db);
			border-radius: 6px; transition: width .1s;
		}
		#manaText {
			text-align: center; font-size: 11px; color: #5dade2;
			text-shadow: 1px 1px 2px #000; margin-top: 2px;
		}
		#totalManaWrap {
			position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
			width: 220px; z-index: 10; pointer-events: none;
		}
		#totalManaBarBg {
			width: 100%; height: 10px; background: rgba(0,0,0,0.5);
			border: 1px solid rgba(255,170,0,0.4); border-radius: 5px; overflow: hidden;
		}
		#totalManaBarFill {
			height: 100%; background: linear-gradient(90deg, #cc8800, #ffaa00);
			border-radius: 5px; transition: width .15s;
		}
		#totalManaText {
			text-align: center; font-size: 10px; color: #ffcc44;
			text-shadow: 1px 1px 2px #000; margin-top: 1px;
		}
		.hb-ult { border-color: rgba(255,170,0,.5) !important; background: rgba(255,170,0,.15) !important; }
		.hb-ult.active { border-color: #ffaa00 !important; background: rgba(255,170,0,.3) !important; }
	</style>
</head>

	<canvas id="game"></canvas>

	<div id="manaWrap">
		<div id="manaBarBg"><div id="manaBarFill" style="width:100%"></div></div>

	</div>
	<div id="totalManaWrap">
		<div id="totalManaBarBg"><div id="totalManaBarFill" style="width:0%"></div></div>

	</div>

	<div id="hotbar"></div>

<script>
/* =========================================================
   Magic Battle — Sandbox Mode  (full spell system)
   ========================================================= */

const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

/* =============================================================
   LOAD PLAYER DATA FROM LOCALSTORAGE
   ============================================================= */
let playerData;
try {
	const raw = localStorage.getItem('magicBattle_playerData');
	playerData = raw ? JSON.parse(raw) : null;
} catch(e) { playerData = null; }

if (!playerData) {
	playerData = {
		baseStats: { magicPower:10, magicControl:5, manaRegen:100, magicDefence:8 },
		equipment: { staff:null, robe:null, relic1:null, relic2:null },
		inventory: [],
		spells: new Array(10).fill(null),
	};
	playerData.spells[0] = {
		name:'Magic Missile',
		phases:[{ shape:'missile',behavior:'straight',width:1,height:1,speed:1.5,
			duration:1,power:1,count:1,spread:0,effects:[],color:'#4488ff',trail:'sparkle',
			nextTrigger:'onHit',orbitRadius:80,orbitSpeed:3,orbitDuration:1.5 }]
	};
}

/* --- item DB (stat lookup for equipped items) --- */
const ITEM_DB={
	oak_staff:{stats:{magicPower:3}},crystal_staff:{stats:{magicPower:5,magicControl:2}},
	void_staff:{stats:{magicPower:12,magicControl:5}},elder_staff:{stats:{magicPower:18,magicControl:8,manaRegen:20}},
	linen_robe:{stats:{magicDefence:2}},silk_robe:{stats:{magicDefence:4,manaRegen:10}},
	arcane_robe:{stats:{magicDefence:7,manaRegen:25,magicControl:3}},shadow_robe:{stats:{magicDefence:12,magicPower:5}},
	mana_gem:{stats:{manaRegen:15}},fire_ring:{stats:{magicPower:6}},frost_amulet:{stats:{magicDefence:5,magicControl:3}},
	chaos_orb:{stats:{magicPower:8,magicControl:6}},phoenix_feather:{stats:{magicPower:10,manaRegen:30,magicDefence:5}},
	storm_staff:{stats:{magicPower:8,magicControl:4}},blood_staff:{stats:{magicPower:14,manaRegen:15}},
	stardust_staff:{stats:{magicPower:22,magicControl:10,manaRegen:25}},bone_staff:{stats:{magicPower:4,magicDefence:2}},
	prism_staff:{stats:{magicPower:7,magicControl:5}},ember_robe:{stats:{magicDefence:6,magicPower:4}},
	void_robe:{stats:{magicDefence:10,manaRegen:20,magicControl:4}},
	celestial_robe:{stats:{magicDefence:18,manaRegen:40,magicControl:6,magicPower:8}},
	hunter_cloak:{stats:{magicDefence:3,magicControl:2}},tide_robe:{stats:{magicDefence:5,manaRegen:20}},
	sun_medallion:{stats:{magicPower:10,magicDefence:4}},moon_pendant:{stats:{manaRegen:25,magicControl:5}},
	dragon_heart:{stats:{magicPower:15,manaRegen:35,magicDefence:8}},
	world_seed:{stats:{manaRegen:50,magicDefence:10,magicControl:8}},
	thunder_tooth:{stats:{magicPower:7,magicControl:3}},ghost_lantern:{stats:{manaRegen:12,magicDefence:3}},
	bloodstone:{stats:{magicPower:8,magicDefence:4}},wind_charm:{stats:{magicControl:4,manaRegen:8}},
	eye_of_eternity:{stats:{magicPower:12,magicControl:12,manaRegen:30,magicDefence:6}},
	crystal_crown:{stats:{magicControl:8,magicPower:6,magicDefence:3}},
};

let vowSacrificedItemSlots = new Set();

function computeStats() {
	const s = { ...playerData.baseStats };
	for (const slotKey of ['staff','robe','relic1','relic2']) {
		if(vowSacrificedItemSlots.has(slotKey)) continue;
		const id = playerData.equipment[slotKey];
		if (!id || !ITEM_DB[id]) continue;
		for (const k in ITEM_DB[id].stats) s[k] = (s[k]||0) + ITEM_DB[id].stats[k];
	}
	return s;
}

const stats = computeStats();

/* --- spell cost / control helpers (mirrored from inventory) --- */
const SHAPE_MANA = {missile:5,orb:8,blade:7,beam:10,ring:12,cone:10,nova:15,chain:18,wall:12,solidify:10,spike:8,polygon:9,allyOrb:6,meteor:16,vortex:18,slash:7,same:0};
const SHAPE_CTRL = {missile:0,orb:1,blade:2,beam:4,ring:5,cone:4,nova:7,chain:9,wall:6,solidify:4,spike:3,polygon:3,allyOrb:1,meteor:6,vortex:7,slash:2,same:0};
const BEH_MANA   = {straight:0,lob:2,homing:5,boomerang:4,groundSurge:5,orbit:8,spiral:6,rain:8,barrage:8,stationary:0,underfoot:3,selfCast:2,aroundSelf:5,ground:4,zigzag:5};
const BEH_CTRL   = {straight:0,lob:1,homing:3,boomerang:3,groundSurge:4,orbit:6,spiral:5,rain:7,barrage:7,stationary:0,underfoot:2,selfCast:1,aroundSelf:3,ground:3,zigzag:4};
const FX_MANA    = {burn:5,freeze:5,knockback:3,pull:4,poison:5,stun:7,healSelf:6,shield:6,lifesteal:8,speedBoost:4,jumpBoost:4,manaRegen:5,timedRelease:3,phaseFork:6,resetProjectiles:0,forceJump:4,horizontalLaunch:5,randomDelay:2,evenDelay:2,phaseThrough:20,damageStore:4,damageRelease:6,damageHeal:5,dispel:25,ricochet:18,shatter:8,gravityWell:10};
const FX_CTRL    = {burn:2,freeze:2,knockback:1,pull:3,poison:3,stun:5,healSelf:4,shield:4,lifesteal:6,speedBoost:3,jumpBoost:3,manaRegen:4,timedRelease:2,phaseFork:5,resetProjectiles:0,forceJump:2,horizontalLaunch:2,randomDelay:1,evenDelay:1,phaseThrough:6,damageStore:2,damageRelease:4,damageHeal:3,dispel:4,ricochet:6,shatter:6,gravityWell:7};

/* --- Damage Store (for sandbox testing) --- */
let damageStored = 0;

/* --- Vow Boosts (read from playerData, per spell slot) --- */
if(!playerData.vows) playerData.vows = [null,null,null];
function getVowBoostsForSlot(slot){
	const globalBoosts = new Set(['maxHealth','jumpHeight','playerSpeed','defense','elementalDmg']);
	const b = {power:0,size:0,speed:0,count:0,duration:0,effects:0,phases:0,maxHealth:0,manaCost:0,cooldown:0,jumpHeight:0,playerSpeed:0,defense:0,elementalDmg:0,_sizeBonus:false};
	for(const v of playerData.vows){
		if(!v) continue;
		if(v.boostType != null){
			if(globalBoosts.has(v.boostType)){ b[v.boostType] = (b[v.boostType]||0) + (v.boostAmount||0); continue; }
			if(v.targetSlot !== slot) continue;
			b[v.boostType] = (b[v.boostType]||0) + (v.boostAmount||0);
			if(v.sizeBonus) b._sizeBonus = true;
		} else if(v.boosts){
			if(v.targetSlot !== slot) continue;
			for(const k in v.boosts) b[k]=(b[k]||0)+v.boosts[k];
		}
	}
	return b;
}
/* --- Vow Sacrifices --- */
let vowHealthPenalty=0, vowManaPenalty=0, vowLockedSlots=new Set(), vowMaxHealthBonus=0;
let vowJumpBonus=0, vowSpeedBonus=0, vowDefenseBonus=0, vowElementalDmgBonus=0;
let vowLockedEffects=new Set(), vowLockedShapes=new Set();
function applyVowSacrifices(){
	vowHealthPenalty=0; vowManaPenalty=0; vowLockedSlots=new Set(); vowMaxHealthBonus=0;
	vowJumpBonus=0; vowSpeedBonus=0; vowDefenseBonus=0; vowElementalDmgBonus=0;
	vowLockedEffects=new Set(); vowLockedShapes=new Set(); vowSacrificedItemSlots=new Set();
	for(const v of playerData.vows){
		if(!v) continue;
		if(v.sacrifice==='health') vowHealthPenalty+=v.amount;
		else if(v.sacrifice==='maxMana') vowManaPenalty+=v.amount;
		else if(v.sacrifice==='spellSlot'){
			for(const s of v.slots||[]) vowLockedSlots.add(s);
		}
		else if(v.sacrifice==='effects'){
			for(const fx of v.sacrificedEffects||[]) vowLockedEffects.add(fx);
		}
		else if(v.sacrifice==='shapes'){
			for(const sh of v.sacrificedShapes||[]) vowLockedShapes.add(sh);
		}
		else if(v.sacrifice==='items'){
			for(const sl of v.sacrificedItemSlots||[]) vowSacrificedItemSlots.add(sl);
		}
		if(v.boostType==='maxHealth') vowMaxHealthBonus += (v.boostAmount||0) * 5;
		if(v.boostType==='jumpHeight') vowJumpBonus += (v.boostAmount||0);
		if(v.boostType==='playerSpeed') vowSpeedBonus += (v.boostAmount||0);
		if(v.boostType==='defense') vowDefenseBonus += (v.boostAmount||0);
		if(v.boostType==='elementalDmg') vowElementalDmgBonus += (v.boostAmount||0);
	}
}
applyVowSacrifices();
function updateDamageStoreHUD(){
	const wrap=document.getElementById('damageStoreWrap');
	const txt=document.getElementById('damageStoreText');
	if(damageStored>0){wrap.style.display='block';txt.textContent='🔥 Stored: '+Math.round(damageStored);}
	else{wrap.style.display='none';}
}

function calcSpellCost(spell) {
	if (!spell || !spell.phases.length) return 0;
	let cost = 5;
	for (const ph of spell.phases) {
		cost += (SHAPE_MANA[ph.shape]||0) + (BEH_MANA[ph.behavior]||0);
		const isAreaBeh = ph.behavior === 'rain' || ph.behavior === 'barrage';
		const countMult = 1 + (ph.count - 1) * (isAreaBeh ? 0.1 : 0.4);
		cost += ph.power * 50 * countMult + (ph.count-1)*(isAreaBeh?1:4) + (ph.width-1)*2 + (ph.height-1)*2;
		if (ph.shape === 'chain' && ph.chainStunTime > 0) cost += ph.chainStunTime * 25;
		if (ph.behavior === 'ground' && ph.groundRadius > 200) cost += Math.floor((ph.groundRadius - 200) / 50) * 3;
		if (ph.shape === 'summon') { cost += (ph.summonRange || 0) * 4 + (ph.summonHealth || 0) * 3 + (ph.summonSpeed || 0) * 3; }
		for (const fx of ph.effects) cost += (FX_MANA[fx]||0);
		// phase fork: significant upfront cost based on repeats
		if (ph.effects.includes('phaseFork')) {
			const repeats = ph.phaseForkRepeats || 1;
			cost += repeats * 35;
		}
	}
	cost *= (0.6 + spell.phases.length * 0.25);
	return Math.round(cost);
}

function calcSpellCtrl(spell) {
	if (!spell || !spell.phases.length) return 0;
	let req = 0;
	for (const ph of spell.phases) {
		req = Math.max(req, SHAPE_CTRL[ph.shape]||0, BEH_CTRL[ph.behavior]||0);
		for (const fx of ph.effects) req = Math.max(req, FX_CTRL[fx]||0);
	}
	req += (spell.phases.length - 1) * 3;
	return req;
}

/* =============================================================
   CONSTANTS
   ============================================================= */
const GRAVITY      = 0.55;
const GROUND_THICK = 60;
const WORLD_W      = 4000;
const WORLD_H      = 2400;
const FPS          = 60;

/* =============================================================
   CAMERA
   ============================================================= */
const camera = { x: 0, y: 0 };
function updateCamera() {
	camera.x = player.x - canvas.width / 2;
	camera.y = player.y - canvas.height / 2;
	camera.x = Math.max(0, Math.min(camera.x, WORLD_W - canvas.width));
	camera.y = Math.max(0, Math.min(camera.y, WORLD_H - canvas.height));
}

/* =============================================================
   PLATFORMS
   ============================================================= */
const platforms = [
	{ x:0, y:WORLD_H-GROUND_THICK, w:WORLD_W, h:GROUND_THICK },
	{ x:500,y:2000,w:300,h:24 },{ x:1000,y:1800,w:400,h:24 },
	{ x:1600,y:1600,w:350,h:24 },{ x:2200,y:1850,w:280,h:24 },
	{ x:2700,y:1650,w:320,h:24 },{ x:3200,y:1900,w:250,h:24 },
	{ x:800,y:1500,w:200,h:24 },{ x:1400,y:1350,w:260,h:24 },
	{ x:2000,y:1450,w:300,h:24 },{ x:2800,y:1400,w:220,h:24 },
	{ x:3400,y:1550,w:280,h:24 },
	{ x:0,y:0,w:20,h:WORLD_H },
	{ x:WORLD_W-20,y:0,w:20,h:WORLD_H },
];

/* =============================================================
   TRAINING DUMMIES
   ============================================================= */
const dummies = [
	{ x:1200, y:WORLD_H-GROUND_THICK-48, w:28, h:48, hp:5000, maxHp:5000, flash:0, dots:[], stunTimer:0, slowTimer:0 },
	{ x:2000, y:WORLD_H-GROUND_THICK-48, w:28, h:48, hp:5000, maxHp:5000, flash:0, dots:[], stunTimer:0, slowTimer:0 },
	{ x:1600, y:1600-48, w:28, h:48, hp:5000, maxHp:5000, flash:0, dots:[], stunTimer:0, slowTimer:0 },
	{ x:2700, y:1650-48, w:28, h:48, hp:5000, maxHp:5000, flash:0, dots:[], stunTimer:0, slowTimer:0 },
	{ x:3200, y:1900-48, w:28, h:48, hp:5000, maxHp:5000, flash:0, dots:[], stunTimer:0, slowTimer:0 },
];
// store original positions for respawn
const dummySpawns = dummies.map(d => ({ x:d.x, y:d.y }));

/* temporary spell walls created by Solidify effect */
const spellWalls = [];

/* player buffs from spell effects */
const playerBuffs = { speedTimer:0, speedMult:1, jumpTimer:0, jumpMult:1, manaRegenTimer:0, manaRegenMult:1 };

/* =============================================================
   INPUT
   ============================================================= */
const keys = {};
window.addEventListener('keydown', e => {
	keys[e.key.toLowerCase()] = true;
	const digit = e.key >= '0' && e.key <= '9' ? (+e.key === 0 ? 9 : +e.key - 1) : -1;
	if (digit >= 0 && digit < 10) selectSpellSlot(digit);
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

let mouseDown = false;
let mouseScreenX = 0, mouseScreenY = 0;
canvas.addEventListener('mousedown', e => { mouseDown = true; mouseScreenX = e.clientX; mouseScreenY = e.clientY; });
canvas.addEventListener('mouseup',   () => { mouseDown = false; releaseHeldProjectiles(); });
canvas.addEventListener('mousemove', e => { mouseScreenX = e.clientX; mouseScreenY = e.clientY; });

function releaseHeldProjectiles(){
	const worldMX=mouseScreenX+camera.x;
	const worldMY=mouseScreenY+camera.y;
	for(const p of projectiles){
		if(!p._held)continue;
		p._held=false;
		const ang=Math.atan2(worldMY-p.y,worldMX-p.x);
		const spd=(p.phase.speed||1)*7;
		p.vx=Math.cos(ang)*spd;p.vy=Math.sin(ang)*spd;
		p.age=0;p.hitDummies.clear();
	}
}

/* =============================================================
   PLAYER
   ============================================================= */
const player = {
	x: 400, y: WORLD_H - GROUND_THICK - 48,
	w: 32, h: 48,
	vx: 0, vy: 0, launchVx: 0,
	speed: 5.5,
	jumpPow: -13.5,
	onGround: false,
	facing: 1,
	castTimer: 0,
	castColor: '#4488ff',
};

/* === PLAYER SPRITE === */
const PLAYER_SPRITE=new Image();
PLAYER_SPRITE.src='images/assests/player-sheet.png';
const PLAYER_SPRITE_COLS=6, PLAYER_SPRITE_ROWS=4;
const PLAYER_SPRITE_ROW={idle:0,walk:1,attack:2,defeat:3};
const PLAYER_SPRITE_FPS=8;
const PLAYER_SPRITE_SCALE=2.5;
let playerAnimFrame=0,playerAnimTimer=0,playerAnimState='idle';

/* =============================================================
   MANA
   ============================================================= */
const maxMana = Infinity;
let mana = Infinity;
const baseManaRegen = 0.05 + (stats.manaRegen||0) * 0.001;

function updateManaHUD() {
	document.getElementById('manaBarFill').style.width = '100%';
	document.getElementById('manaText').textContent = '∞';
}

/* Total Mana — accumulates from every spell cast, used for ultimate */
let totalMana = Infinity;
function updateTotalManaHUD(){
	document.getElementById('totalManaBarFill').style.width = '100%';
	document.getElementById('totalManaText').textContent = '⚡ Total Mana: ∞';
}
updateTotalManaHUD();

/* =============================================================
   SPELL HOTBAR
   ============================================================= */
let activeSlot = 0;
const spellCooldowns = new Array(10).fill(0);
const spellMaxCooldowns = new Array(10).fill(1);

function selectSpellSlot(idx) { activeSlot = idx; renderHotbar(); }

function renderHotbar() {
	const bar = document.getElementById('hotbar');
	bar.innerHTML = '';
	for (let i = 0; i < 10; i++) {
		const sp = playerData.spells[i];
		const isUlt = (i === 9 && sp && sp.isUltimate);
		const el = document.createElement('div');
		el.className = 'hb-slot' + (i === activeSlot ? ' active' : '') + (isUlt ? ' hb-ult' : '');
		const keyLabel = isUlt ? '⚡0' : (i === 9 ? '0' : '' + (i + 1));
		if (sp) {
			const cost = calcSpellCost(sp);
			const controlDiscount = Math.max(0.3, 1 - stats.magicControl * 0.015);
			const _vbHud = getVowBoostsForSlot(i);
			const vowManaHud = Math.max(0.1, 1 - (_vbHud.manaCost||0) * 0.05);
			const displayCost = Math.round(cost * controlDiscount * vowManaHud);
			const req  = calcSpellCtrl(sp);
			const usable = stats.magicControl >= req;
			const color = sp.phases[0]?.color || '#888';
			let cdHtml = '';
			if (spellCooldowns[i] > 0) {
				const pct = (spellCooldowns[i] / spellMaxCooldowns[i]) * 100;
				cdHtml = `<div class="hb-cd-overlay" style="height:${pct}%"></div>`;
			}
			const manaLabel = isUlt ? `${displayCost*10}⚡` : `${displayCost}💧`;
			el.innerHTML = `
				<span class="hb-key">${keyLabel}</span>
				<div class="hb-dot" style="background:${usable ? color : '#555'}"></div>
				<div class="hb-name" style="${usable?'':'color:#666;text-decoration:line-through'}">${sp.name}</div>
				<div class="hb-mana">${manaLabel}</div>
				${cdHtml}
			`;
		} else {
			el.innerHTML = `<span class="hb-key">${keyLabel}</span><div class="hb-name" style="color:#555">—</div>`;
		}
		bar.appendChild(el);
	}
}
renderHotbar();

/* =============================================================
   LIVE ENTITIES
   ============================================================= */
const projectiles = [];
const particles   = [];
const dmgNumbers  = [];
const MAX_PARTICLES = 300;
const MAX_TRAIL = 8;
const PIERCE_SET = new Set(['nova','ring','beam','cone','wall','solidify','spike','summon','vortex']);

/* --- diminishing returns: track hits per spell cast --- */
let nextCastId = 0;
const spellHitCounts = {};

/* --- per-dummy damage accumulator (rolling window) --- */
const dummyDmgAccum = dummies.map(() => ({ total:0, timer:0, x:0, y:0, color:'#fff' }));

/* --- Player minions (from summon shape) --- */
const playerMinions = [];

/* =============================================================
   CAST SPELL
   ============================================================= */
function castSpell() {
	const spell = playerData.spells[activeSlot];
	if (!spell || !spell.phases.length) return;
	if(vowLockedSlots.has(activeSlot)) return;
	const _vbCast = getVowBoostsForSlot(activeSlot);
	const vowManaCostMult = Math.max(0.1, 1 - (_vbCast.manaCost||0) * 0.05);
	const vowCdMult = Math.max(0.1, 1 - (_vbCast.cooldown||0) * 0.08);
	let cost = calcSpellCost(spell);
	const controlDiscount = Math.max(0.3, 1 - stats.magicControl * 0.015);
	cost = Math.round(cost * controlDiscount * vowManaCostMult);
	const req  = calcSpellCtrl(spell);
	if (stats.magicControl < req) return;
	if (spellCooldowns[activeSlot] > 0) return;

	const isUlt = (activeSlot === 9 && spell.isUltimate);
	const rawCost = calcSpellCost(spell);
	const avgPower = spell.phases.reduce((s,p)=>s+(p.power||1),0)/spell.phases.length;

	if (isUlt) {
		const ultCost = cost * 10;
		if (totalMana < ultCost) return;
		totalMana -= ultCost;
		updateTotalManaHUD();
		const cd = Math.round((24 + Math.round(avgPower * 16) + Math.round(rawCost * 0.15)) * vowCdMult);
		spellCooldowns[activeSlot] = cd;
		spellMaxCooldowns[activeSlot] = cd;
	} else {
		if (mana < cost) return;
		mana -= cost;
		totalMana += cost;
		updateTotalManaHUD();
		const cd = Math.round((8 + Math.round(avgPower * 12) + Math.round(rawCost * 0.12)) * vowCdMult);
		spellCooldowns[activeSlot] = cd;
		spellMaxCooldowns[activeSlot] = cd;
	}

	player.castTimer = 12;
	player.castColor = spell.phases[0]?.color || '#4488ff';

	const castId = nextCastId++;
	spellHitCounts[castId] = 0;
	spawnPhase(spell, 0, player.x + player.w/2, player.y + player.h/2 - 6, player.facing, undefined, isUlt, castId, activeSlot);
}

/* Compute cascading projectile count up to and including phaseIdx
   (product of counts from phase 0 .. phaseIdx) */
function calcCascadingCount(spell, phaseIdx) {
	let product = 1;
	for (let i = 0; i <= phaseIdx && i < spell.phases.length; i++) {
		product *= (spell.phases[i].count || 1);
	}
	return product;
}

function spawnPhase(spell, phaseIdx, originX, originY, facing, dmgMult, isUltimate, castId, sourceSlot) {
	if (phaseIdx >= spell.phases.length) return;
	// enforce total projectile cap of 1000
	let totalProj = 1;
	for (const p of spell.phases) totalProj *= (p.behavior === 'aroundSelf' ? (p.aroundSelfCount || 4) : (p.count || 1));
	if (totalProj > 1000) return;
	const ph = spell.phases[phaseIdx];
	// Resolve 'same' shape: inherit shape from previous phase
	const resolvedShape = (ph.shape === 'same' && phaseIdx > 0) ? spell.phases[phaseIdx - 1].shape : (ph.shape || 'missile');
	const count = ph.behavior === 'aroundSelf' ? (ph.aroundSelfCount || 4) : (ph.count || 1);
	// Cursor-aimed behaviors: compute angle from player to mouse cursor
	const cursorAimBehaviors = new Set(['straight','boomerang','lob','spiral','zigzag','teleport']);
	let baseAngle;
	if(cursorAimBehaviors.has(ph.behavior||'straight')){
		const worldMX = mouseScreenX + camera.x;
		const worldMY = mouseScreenY + camera.y;
		const pcx = originX, pcy = originY;
		baseAngle = Math.atan2(worldMY - pcy, worldMX - pcx);
	} else {
		baseAngle = facing === 1 ? 0 : Math.PI;
	}
	const powerMult = dmgMult || 1;
	const ultFlag = !!isUltimate;
	// auto +1 power for self-targeted behaviors (no mana cost increase)
	const selfBehaviors = ['underfoot','selfCast','aroundSelf','stationary'];
	const selfPowerBonus = ph.behavior === 'stationary' ? 2.0 : selfBehaviors.includes(ph.behavior) ? 1.0 : 0;
	// Vow boosts (per-spell-slot)
	const vb = getVowBoostsForSlot(sourceSlot != null ? sourceSlot : -1);
	const vowPowerMult = 1 + vb.power * 0.12;
	const vowSizeMult = 1 + vb.size * 0.1;
	const vowSpeedMult = 1 + vb.speed * 0.1;
	const vowCountBonus = vb.count || 0;
	const vowDurMult = 1 + vb.duration * 0.1;
	const vowSizeBonus = vb._sizeBonus ? 1.5 : 1;
	const releaseSizeMult = (ph.effects && ph.effects.includes('damageRelease') && damageStored > 0) ? (1 + damageStored / 1000) : 1;

	const effectiveCount = Math.min(count + vowCountBonus, 20);
	for (let i = 0; i < effectiveCount; i++) {
		let spreadAngle = 0;
		if (effectiveCount > 1) {
			const spreadRad = (ph.spread || 0) * Math.PI / 180;
			spreadAngle = ((i / (effectiveCount - 1)) - 0.5) * spreadRad;
		}
		const angle = baseAngle + spreadAngle;
		const spd = (ph.speed || 1) * 7 * vowSpeedMult;

		const proj = {
			spell, phaseIdx, phase: ph,
			x: originX + facing * 16,
			y: originY,
			vx: Math.cos(angle) * spd,
			vy: Math.sin(angle) * spd,
			facing,
			age: 0,
			maxAge: (ph.duration || 1) * FPS * vowDurMult,
			width: (ph.width || 1) * 10 * vowSizeMult * vowSizeBonus * releaseSizeMult,
			height: (ph.height || 1) * 10 * vowSizeMult * vowSizeBonus * releaseSizeMult,
			power: ((ph.power || 1) / effectiveCount + 0.05 + selfPowerBonus) * (1 + stats.magicPower * 0.08) * powerMult * vowPowerMult,
			color: ph.color || '#4488ff',
			trail: ph.trail || 'none',
			shape: vowLockedShapes.has(resolvedShape) ? 'missile' : resolvedShape,
			behavior: ph.behavior || 'straight',
			effects: (ph.effects || []).filter(fx => !vowLockedEffects.has(fx)),
			trailParts: [],
			orbitAngle: i * (Math.PI * 2 / count),
			orbitRadius: (ph.orbitRadius || 80),
			orbitSpeed: (ph.orbitSpeed || 3),
			orbitDur: (ph.orbitDuration || 1.5) * FPS,
			orbitOriginX: originX,
			orbitOriginY: originY,
			startX: originX + facing * 16,
			startY: originY,
			beamLen: 0,
			beamAngle: angle,
			chainHits: 0,
			chainMax: 3,
			hasHit: false,
			phaseTriggered: false,
			hitDummies: new Set(),
			aimAngle: baseAngle,
			timedReleaseDelay: (ph.timedReleaseDelay || 0.5) * FPS,
			timedReleaseTriggered: false,
			phaseForkDelay: (ph.phaseForkDelay || 1) * FPS,
			phaseForkRepeats: ph.phaseForkRepeats || 1,
			phaseForkCount: 0,
			phaseForkNextAge: (ph.phaseForkDelay || 1) * FPS,
			isSolidPlatform: false,
			isUltimate: ultFlag,
			castId: castId != null ? castId : -1,
			sourceSlot: sourceSlot != null ? sourceSlot : -1,
			randomDelay: (()=>{
				let _d = 0;
				if(ph.effects && ph.effects.includes('randomDelay')) _d = Math.max(_d, Math.round(Math.random() * (ph.randomDelayMax || 0.5) * FPS));
				if(ph.effects && ph.effects.includes('evenDelay')) _d = Math.max(_d, Math.round(i * (ph.evenDelayDuration || 0.5) * FPS / Math.max(1, effectiveCount - 1)));
				return _d;
			})(),
			afterHitEffect: ph.afterHitEffect || 'none',
			polygonSides: ph.polygonSides || 6,
			_held: !!ph.holdDown,
			_holdSavedVx: 0,
			_holdSavedVy: 0,
		};

		// solidify shapes act as instant platforms
		if (resolvedShape === 'solidify') {
			proj.isSolidPlatform = true;
			proj.vx = 0; proj.vy = 0;
		}

		if (ph.behavior === 'rain') {
			const spread2 = 200 * (ph.width || 1);
			proj.x = originX + (i - (count-1)/2) * (spread2 / Math.max(count-1,1));
			proj.y = originY - (ph.rainHeight || 150);
			proj.vx = 0;
			proj.vy = spd * 0.8;
			proj.startX = proj.x;
			proj.startY = proj.y;
			proj.facing = 1;
			proj.beamAngle = Math.PI / 2; // beams point downward
		}
		if (ph.behavior === 'barrage') {
			const spread2 = 200 * (ph.height || 1);
			proj.x = originX + facing * 120;
			proj.y = originY + (i - (count-1)/2) * (spread2 / Math.max(count-1,1));
			proj.vx = facing * spd * 0.8;
			proj.vy = 0;
			proj.startX = proj.x;
			proj.startY = proj.y;
			proj.beamAngle = facing === 1 ? 0 : Math.PI;
		}
		if (ph.behavior === 'stationary') { proj.vx = 0; proj.vy = 0; }
		if (ph.behavior === 'groundSurge') { proj.vy = 0; proj.vx = facing * spd; }
		if (ph.behavior === 'underfoot') {
			proj.x = player.x + player.w / 2;
			proj.y = player.y + player.h + 4;
			proj.vx = 0; proj.vy = 0;
		}
		if (ph.behavior === 'selfCast') {
			proj.x = player.x + player.w / 2;
			proj.y = player.y + player.h / 2;
			proj.vx = 0; proj.vy = 0;
		}
		if (ph.behavior === 'aroundSelf') {
			const radius = ph.aroundSelfRadius || 50;
			const selfAngle = (i / count) * Math.PI * 2;
			proj.x = player.x + player.w/2 + Math.cos(selfAngle) * radius;
			proj.y = player.y + player.h/2 + Math.sin(selfAngle) * radius;
			proj.vx = 0; proj.vy = 0;
		}
		if (ph.behavior === 'ground') {
		// Ground: spawns at nearest dummy within radius (if auto-lock on), +40% damage bonus
		const groundRadius = ph.groundRadius || 200;
		let tgt = null;
		if (ph.groundAutoLock !== false) {
			let td = groundRadius;
			for (const d of dummies) {
				const dd = Math.hypot(d.x + d.w/2 - player.x - player.w/2, d.y + d.h/2 - player.y - player.h/2);
				if (dd < td) { td = dd; tgt = d; }
			}
			if (tgt) { proj.x = tgt.x + tgt.w/2; proj.y = tgt.y + tgt.h + 4; }
			else { proj.x = player.x + player.w/2; proj.y = player.y + player.h + 4; }
			proj.vx = 0;
			proj.vy = -((ph.speed || 1) * 2);
			proj.maxAge *= 3;
			proj.power *= 1.4;
			proj._groundTarget = tgt;
		}
		}

		if (proj._held) {
			proj._holdSavedVx = proj.vx; proj._holdSavedVy = proj.vy;
			proj.vx = 0; proj.vy = 0;
		}
		// Vortex shape: slow-moving projectile that does DoT and pulls enemies in
		if (proj.shape === 'vortex') {
			const spdMult = 0.35;
			proj.vx *= spdMult; proj.vy *= spdMult;
			proj.maxAge *= 2 * (ph.vortexDuration || 1);
		}
		if (proj.shape === 'summon') {
			playerMinions.push({
				x: proj.x, y: proj.y, w: 20, h: 20,
				vx: 0, vy: 0,
				color: proj.color,
				spell: spell, phaseIdx: phaseIdx,
				sourceSlot: proj.sourceSlot,
				castId: proj.castId,
				facing: proj.facing,
				isUltimate: proj.isUltimate,
				power: proj.power,
				hp: 40 + (ph.summonHealth || 0) * 10, maxHp: 40 + (ph.summonHealth || 0) * 10,
				age: 0, maxAge: proj.maxAge * 2,
				fireTimer: 0, fireCooldown: Math.round(FPS * 2.5),
				target: null, animTimer: 0,
				detectRange: 600 + (ph.summonRange || 0) * 100,
				moveSpeed: 2.5 + (ph.summonSpeed || 0) * 0.5,
				summonClose: !!ph.summonClose,
			});
			continue;
		}

		projectiles.push(proj);
	}
}

/* -- Morph existing projectile into next phase (phase continuation) --
   If next phase has count > 1, the original proj becomes one of them
   and (count-1) additional projectiles are spawned at the same spot. */
function morphProjectile(proj, phaseIdx, dmgMult) {
	const spell = proj.spell;
	if (phaseIdx >= spell.phases.length) return;
	const ph = spell.phases[phaseIdx];
	// Resolve 'same' shape: inherit from previous phase
	const resolvedShape = (ph.shape === 'same' && phaseIdx > 0) ? spell.phases[phaseIdx - 1].shape : (ph.shape || 'missile');
	const count = ph.behavior === 'aroundSelf' ? (ph.aroundSelfCount || 4) : (ph.count || 1);
	const powerMult = dmgMult || 1;
	const selfBehaviors = ['underfoot','selfCast','aroundSelf','stationary'];
	const selfPowerBonus = ph.behavior === 'stationary' ? 2.0 : selfBehaviors.includes(ph.behavior) ? 1.0 : 0;
	const _vb = getVowBoostsForSlot(proj.sourceSlot != null ? proj.sourceSlot : -1);
	const spd = (ph.speed || 1) * 7 * (1 + _vb.speed * 0.1);
	const _vowSzB = _vb._sizeBonus ? 1.5 : 1;
	const origX = proj.x, origY = proj.y, origFacing = proj.facing;
	const ultFlag = !!proj.isUltimate;

	// helper: apply phase properties to a projectile object
	function applyPhaseToProj(p, spreadIdx) {
		const baseAng = origFacing === 1 ? 0 : Math.PI;
		let spreadAngle = 0;
		if (count > 1) {
			const spreadRad = (ph.spread || 0) * Math.PI / 180;
			spreadAngle = ((spreadIdx / (count - 1)) - 0.5) * spreadRad;
		}
		const angle = baseAng + spreadAngle;

		p.phaseIdx = phaseIdx;
		p.phase = ph;
		p.age = 0;
		p.maxAge = (ph.duration || 1) * FPS * (1 + _vb.duration * 0.1);
		p.width = (ph.width || 1) * 10 * (1 + _vb.size * 0.1) * _vowSzB;
		p.height = (ph.height || 1) * 10 * (1 + _vb.size * 0.1) * _vowSzB;
		p.power = ((ph.power || 1) / count + 0.05 + selfPowerBonus) * (1 + stats.magicPower * 0.08) * powerMult * (1 + _vb.power * 0.12);
		p.color = ph.color || '#4488ff';
		p.trail = ph.trail || 'none';
		p.shape = resolvedShape;
		p.behavior = ph.behavior || 'straight';
		p.effects = ph.effects || [];
		p.trailParts = [];
		p.hasHit = false;
		p.phaseTriggered = false;
		p.hitDummies = new Set();
		p.startX = origX;
		p.startY = origY;
		p.beamLen = 0;
		p.beamAngle = angle;
		p.chainHits = 0;
		p.chainMax = 3;
		p.timedReleaseDelay = (ph.timedReleaseDelay || 0.5) * FPS;
		p.timedReleaseTriggered = false;
		p.phaseForkDelay = (ph.phaseForkDelay || 1) * FPS;
		p.phaseForkRepeats = ph.phaseForkRepeats || 1;
		p.phaseForkCount = 0;
		p.phaseForkNextAge = (ph.phaseForkDelay || 1) * FPS;
		p.isSolidPlatform = false;
		p.isUltimate = ultFlag;
		p.afterHitEffect = ph.afterHitEffect || 'none';
		p.polygonSides = ph.polygonSides || 6;

		p.vx = Math.cos(angle) * spd;
		p.vy = Math.sin(angle) * spd;

		if (resolvedShape === 'solidify') { p.isSolidPlatform = true; p.vx = 0; p.vy = 0; }
		if (ph.behavior === 'rain') {
			p.vx = 0; p.vy = spd * 0.8;
			p.startX = origX; p.startY = origY; p.facing = origFacing;
			p.beamAngle = Math.PI / 2;
		}
		if (ph.behavior === 'barrage') {
			const spread2 = 200 * (ph.height || 1);
			p.x = origX + origFacing * 120;
			p.y = origY + (spreadIdx - (count-1)/2) * (spread2 / Math.max(count-1,1));
			p.vx = origFacing * spd * 0.8;
			p.vy = 0;
			p.startX = p.x; p.startY = p.y;
			p.beamAngle = origFacing === 1 ? 0 : Math.PI;
		}
		if (ph.behavior === 'stationary') { p.vx = 0; p.vy = 0; }
		if (ph.behavior === 'groundSurge') { p.vy = 0; p.vx = origFacing * spd; }
		if (ph.behavior === 'underfoot') {
			// later phases: spawn at projectile's last position (origX/origY), not player
			p.x = origX;
			p.y = origY + 4;
			p.vx = 0; p.vy = 0;
		}
		if (ph.behavior === 'selfCast') {
			p.x = origX;
			p.y = origY;
			p.vx = 0; p.vy = 0;
		}
		if (ph.behavior === 'aroundSelf') {
			const radius = ph.aroundSelfRadius || 50;
			const selfAngle = (spreadIdx / count) * Math.PI * 2;
			p.x = origX + Math.cos(selfAngle) * radius;
			p.y = origY + Math.sin(selfAngle) * radius;
			p.vx = 0; p.vy = 0;
		}
		if (ph.behavior === 'orbit') {
			p.orbitOriginX = origX; p.orbitOriginY = origY;
			p.orbitAngle = spreadIdx * (Math.PI * 2 / count);
			p.orbitRadius = ph.orbitRadius || 80;
			p.orbitSpeed = ph.orbitSpeed || 3;
			p.orbitDur = (ph.orbitDuration || 1.5) * FPS;
		}
		if (ph.behavior === 'ground') {
			const groundRadius = ph.groundRadius || 200;
			let tgt = null;
			if (ph.groundAutoLock !== false) {
				let td = groundRadius;
				for (const d of dummies) {
					const dd = Math.hypot(d.x + d.w/2 - origX, d.y + d.h/2 - origY);
					if (dd < td) { td = dd; tgt = d; }
				}
			}
			if (tgt) { p.x = tgt.x + tgt.w/2; p.y = tgt.y + tgt.h + 4; }
			else { p.x = origX; p.y = origY + 4; }
			p.vx = 0; p.vy = -((ph.speed || 1) * 2);
			p.maxAge *= 3; p.power *= 1.4; p._groundTarget = tgt;
		}
	}

	// morph the existing projectile as index 0
	applyPhaseToProj(proj, 0);

	// spawn additional (count-1) projectiles at the same position
	for (let i = 1; i < count; i++) {
		const clone = {
			spell, phaseIdx, phase: ph,
			x: origX, y: origY, facing: origFacing,
			orbitAngle: 0, orbitRadius: 80, orbitSpeed: 3, orbitDur: 90,
			orbitOriginX: origX, orbitOriginY: origY,
			trailParts: [],
			castId: proj.castId != null ? proj.castId : -1,
		};
		applyPhaseToProj(clone, i);
		projectiles.push(clone);
	}
}

/* =============================================================
   COLLISION HELPERS
   ============================================================= */
function rectRect(a, b) {
	return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}
function circRect(cx, cy, cr, rx, ry, rw, rh) {
	const nx = Math.max(rx, Math.min(cx, rx+rw));
	const ny = Math.max(ry, Math.min(cy, ry+rh));
	return (cx-nx)**2 + (cy-ny)**2 <= cr*cr;
}
function dist(x1,y1,x2,y2){ return Math.sqrt((x2-x1)**2+(y2-y1)**2); }

/* =============================================================
   UPDATE PROJECTILES
   ============================================================= */
function updateProjectiles() {
	for (let i = projectiles.length - 1; i >= 0; i--) {
		const p = projectiles[i];

		// random delay: projectile waits before becoming active
		if (p.randomDelay > 0) { p.randomDelay--; continue; }

		if (p._held) {
			p.x = player.x + player.w/2 + player.facing*20;
			p.y = player.y + player.h/2 - 6;
			p.startX = p.x; p.startY = p.y;
			p.trailParts.push({x:p.x,y:p.y,age:0});
			if(p.trailParts.length>MAX_TRAIL)p.trailParts.shift();
			for(const tp of p.trailParts)tp.age++;
		} else {
		p.age++;

		// trail history
		p.trailParts.push({ x:p.x, y:p.y, age:0 });
		if (p.trailParts.length > MAX_TRAIL) p.trailParts.shift();
		for (const tp of p.trailParts) tp.age++;

		/* ---- BEHAVIOR MOVEMENT ---- */
		switch (p.behavior) {
			case 'straight': break; // velocity already set

			case 'lob':
				p.vy += 0.25;
				break;

			case 'homing': {
				let closest = null, closestD = Infinity;
				for (const d of dummies) {
					if (d.hp <= 0) continue;
					const dd = dist(p.x,p.y,d.x+d.w/2,d.y+d.h/2);
					if (dd < closestD) { closestD = dd; closest = d; }
				}
				if (closest) {
					if (p.shape === 'beam') {
						// rotate beam angle toward enemy
						const desired = Math.atan2(closest.y+closest.h/2-p.startY, closest.x+closest.w/2-p.startX);
						let diff = desired - p.beamAngle;
						while(diff > Math.PI) diff -= Math.PI*2;
						while(diff < -Math.PI) diff += Math.PI*2;
						const turn = Math.min(0.08, Math.abs(diff)) * Math.sign(diff);
						p.beamAngle += turn;
					} else {
						const desired = Math.atan2(closest.y+closest.h/2-p.y, closest.x+closest.w/2-p.x);
						const current = Math.atan2(p.vy, p.vx);
						let diff = desired - current;
						while(diff > Math.PI) diff -= Math.PI*2;
						while(diff < -Math.PI) diff += Math.PI*2;
						const turn = Math.min(0.08, Math.abs(diff)) * Math.sign(diff);
						const newAng = current + turn;
						const spd = Math.sqrt(p.vx*p.vx+p.vy*p.vy);
						p.vx = Math.cos(newAng)*spd;
						p.vy = Math.sin(newAng)*spd;
					}
				}
				break;
			}

			case 'boomerang': {
				const progress = p.age / p.maxAge;
				if (progress > 0.45) {
					if (!p.returning) { p.returning = true; p.hitDummies.clear(); }
					const tx = player.x + player.w/2, ty = player.y + player.h/2;
					const dx = tx-p.x, dy = ty-p.y;
					const d2 = Math.sqrt(dx*dx+dy*dy)||1;
					const spd = Math.sqrt(p.vx*p.vx+p.vy*p.vy);
					p.vx = (dx/d2)*spd*1.02;
					p.vy = (dy/d2)*spd*1.02;
				}
				break;
			}

			case 'groundSurge':
				p.vy += 0.6;
				for (const plat of platforms) {
					if (p.x >= plat.x && p.x <= plat.x+plat.w &&
						p.y >= plat.y - 8 && p.y <= plat.y + 12) {
						p.y = plat.y - 4;
						p.vy = -1.5;
					}
				}
				break;

			case 'orbit': {
				if (p.age < p.orbitDur) {
					p.orbitAngle += p.orbitSpeed * 0.05;
					p.orbitOriginX += (player.x+player.w/2 - p.orbitOriginX) * 0.15;
					p.orbitOriginY += (player.y+player.h/2-6 - p.orbitOriginY) * 0.15;
					p.x = p.orbitOriginX + Math.cos(p.orbitAngle) * p.orbitRadius;
					p.y = p.orbitOriginY + Math.sin(p.orbitAngle) * p.orbitRadius * 0.6;
					p.vx = 0; p.vy = 0;
				} else if (p.age === Math.ceil(p.orbitDur)) {
					let target = null, closestD = Infinity;
					for (const d of dummies) {
						if (d.hp <= 0) continue;
						const dd = dist(p.x,p.y,d.x+d.w/2,d.y+d.h/2);
						if (dd < closestD) { closestD = dd; target = d; }
					}
					const spd = (p.phase.speed||1)*9;
					if (target) {
						const ang = Math.atan2(target.y+target.h/2-p.y, target.x+target.w/2-p.x);
						p.vx = Math.cos(ang)*spd; p.vy = Math.sin(ang)*spd;
					} else {
						p.vx = p.facing*spd; p.vy = 0;
					}
				}
				break;
			}

			case 'spiral': {
				const spd = Math.sqrt(p.vx*p.vx+p.vy*p.vy) || (p.phase.speed||1)*7;
				const baseAng = p.aimAngle != null ? p.aimAngle : (p.facing===1 ? 0 : Math.PI);
				const spiralAngle = baseAng + p.age * 0.06;
				const outward = 0.3 + p.age * 0.008;
				p.vx = Math.cos(spiralAngle) * spd * outward;
				p.vy = Math.sin(spiralAngle) * spd * outward;
				break;
			}

			case 'rain':
				// cone shape stays anchored at spawn point
				if (p.shape === 'cone') { p.vx = 0; p.vy = 0; p.x = p.startX; p.y = p.startY; }
				break;
			case 'barrage':
				// cone shape stays anchored at spawn point
				if (p.shape === 'cone') { p.vx = 0; p.vy = 0; p.x = p.startX; p.y = p.startY; }
				break;
			case 'stationary': break;
			case 'underfoot': break;
			case 'selfCast': break;
			case 'aroundSelf': break;
			case 'ground': {
				// Stay locked onto target dummy if alive
				if (p._groundTarget) {
					const tgt = p._groundTarget;
					p.x = tgt.x + tgt.w/2;
				}
				// decelerate upward, stop at platforms
				for (const plat of platforms) {
					if (p.x >= plat.x && p.x <= plat.x + plat.w &&
						p.y >= plat.y - 8 && p.y <= plat.y + 12) {
						p.vy = 0; p.y = plat.y + 4;
					}
				}
				if (p.vy < 0) p.vy *= 0.97;
				if (Math.abs(p.vy) < 0.3) p.vy = 0;
				break;
			}
			case 'zigzag': {
				const spd = Math.sqrt(p.vx*p.vx+p.vy*p.vy) || ((p.phase.speed||1)*7);
				const ang = p.aimAngle != null ? p.aimAngle : (p.facing===1 ? 0 : Math.PI);
				const perpAng = ang + Math.PI/2;
				const amplitude = 40 + p.width * 0.5;
				const freq = 0.09;
				const offset = Math.sin(p.age * freq) * amplitude * freq;
				p.vx = Math.cos(ang)*spd + Math.cos(perpAng)*offset;
				p.vy = Math.sin(ang)*spd + Math.sin(perpAng)*offset;
				break;
			}
			case 'teleport': {
				/* Teleport forward every 20 frames along aim direction */
				if(p.age>0&&p.age%20===0){
					const ang=p.aimAngle!=null?p.aimAngle:(p.facing===1?0:Math.PI);
					const jumpDist=60+p.width*0.5;
					p.x+=Math.cos(ang)*jumpDist;
					p.y+=Math.sin(ang)*jumpDist;
					p.vx=0;p.vy=0;
					for(let tp=0;tp<4;tp++) particles.push({x:p.x+(Math.random()-0.5)*10,y:p.y+(Math.random()-0.5)*10,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:15,color:p.color||'#88ccff'});
				} else { p.vx=0;p.vy=0; }
				/* Auto-advance to next phase when near a dummy */
				if(!p.phaseTriggered&&p.phaseIdx+1<p.spell.phases.length){
					for(const d of dummies){
						if(d.hp<=0)continue;
						const dx2=d.x+d.w/2-p.x,dy2=d.y+d.h/2-p.y;
						if(Math.hypot(dx2,dy2)<d.w*0.8+p.width){
							p.phaseTriggered=true;
							if(p.effects.includes('resetProjectiles'))spawnPhase(p.spell,p.phaseIdx+1,p.x,p.y,p.facing,undefined,false,p.castId,p.sourceSlot);
							else morphProjectile(p,p.phaseIdx+1);
							break;
						}
					}
				}
				break;
			}
		}

		// apply velocity (unless orbiting)
		if (!(p.behavior==='orbit' && p.age < p.orbitDur)) {
			p.x += p.vx;
			p.y += p.vy;
		}
		} // end else (not held)
		/* Vortex: slow down gradually (slow-moving projectile) */
		if (p.shape === 'vortex') { const slowFactor = 0.985; p.vx *= slowFactor; p.vy *= slowFactor; }

		// beam extends forward from origin along beamAngle
		if (p.shape === 'beam') {
			p.beamLen = Math.min(p.beamLen + 12, 400 * (p.phase.width||1));
			p.x = p.startX; p.y = p.startY;
		}
		// allow all pierce shapes to re-hit targets every 60 frames (1 second)
		if (PIERCE_SET.has(p.shape) && p.shape !== 'nova' && p.age > 0 && p.age % 60 === 0) p.hitDummies.clear();

		/* ---- HIT DETECTION vs dummies ---- */
const hitR = Math.max(p.width, p.height) * 0.85;

		// allyOrb: hits player instead of dummies
		if ((p.shape === 'allyOrb' || p.behavior === 'selfCast') && !p.hasHit) {
			if (circRect(p.x, p.y, hitR, player.x, player.y, player.w, player.h)) {
				applyEffects(p, null); // null dummy = apply to player
				spawnImpact(p.x, p.y, p.color);
				if(p.afterHitEffect && p.afterHitEffect!=='none') spawnAfterHitEffect(p.x,p.y,p.afterHitEffect,p.color);
				p.hasHit = true;
				if (!p.phaseTriggered && p.phase.nextTrigger === 'onHit' && p.phaseIdx+1 < p.spell.phases.length) {
					p.phaseTriggered = true;
					if (p.effects.includes('resetProjectiles')) {
						spawnPhase(p.spell, p.phaseIdx+1, p.x, p.y, p.facing, undefined, p.isUltimate, p.castId, p.sourceSlot);
					} else {
						morphProjectile(p, p.phaseIdx+1);
					}
				}
			}
		}

		// allyOrb, selfCast and noHit skip dummy hit detection
		if (p.shape !== 'allyOrb' && p.behavior !== 'selfCast' && !p.phase.noHit)
		for (const d of dummies) {
			if (d.hp <= 0) continue;
			if (p.hitDummies.has(d)) continue; // already hit this one (pierce shapes)

			let hit = false;
			if (p.shape === 'beam') {
				// angle-based beam hit detection: check points along beam line
				const bx0 = p.startX, by0 = p.startY;
				const endX = bx0 + Math.cos(p.beamAngle) * p.beamLen;
				const endY = by0 + Math.sin(p.beamAngle) * p.beamLen;
				const halfH = p.height / 2;
				const steps = Math.max(3, Math.floor(p.beamLen / 40));
				for (let s = 0; s <= steps; s++) {
					const t = s / steps;
					const sx = bx0 + (endX - bx0) * t;
					const sy = by0 + (endY - by0) * t;
					if (sx + halfH > d.x && sx - halfH < d.x + d.w &&
						sy + halfH > d.y && sy - halfH < d.y + d.h) {
						hit = true; break;
					}
				}
			} else if (p.shape === 'nova' || p.shape === 'ring') {
				hit = circRect(p.x, p.y, (p.age/p.maxAge)*p.width*8, d.x,d.y,d.w,d.h);
			} else if (p.shape === 'cone') {
				const coneLen = (p.age/p.maxAge)*200*(p.phase.width||1);
				const coneHalf = coneLen*0.4*(p.phase.width||1);
				if (p.behavior === 'rain') {
					// rain cone points downward
					const dx = d.x+d.w/2-p.x, dy = d.y+d.h/2-p.y;
					hit = dy > 0 && dy < coneLen && Math.abs(dx) < coneHalf*(dy/coneLen);
				} else if (p.behavior === 'barrage') {
					// barrage cone points in facing direction from spawn
					const dx = d.x+d.w/2-p.startX, dy = d.y+d.h/2-p.startY;
					const along = p.facing===1?dx:-dx;
					hit = along > 0 && along < coneLen && Math.abs(dy) < coneHalf*(along/coneLen);
				} else {
					const dx = d.x+d.w/2-p.startX, dy = d.y+d.h/2-p.startY;
					const along = p.facing===1?dx:-dx;
					hit = along > 0 && along < coneLen && Math.abs(dy) < coneHalf*(along/coneLen);
				}
			} else if (p.shape === 'wall') {
				hit = rectRect({x:p.x-p.width,y:p.y-p.height*3,w:p.width*2,h:p.height*6}, d);
			} else if (p.shape === 'solidify') {
				const sw = p.width * 3, sh = p.height * 1.5;
				hit = rectRect({x:p.x-sw/2,y:p.y-sh/2,w:sw,h:sh}, d);
			} else if (p.shape === 'spike') {
				hit = circRect(p.x, p.y, hitR * 0.9, d.x, d.y, d.w, d.h);
			} else if (p.shape === 'polygon') {
				hit = circRect(p.x, p.y, hitR, d.x, d.y, d.w, d.h);
			} else if (p.shape === 'meteor') {
				hit = circRect(p.x, p.y, Math.max(p.width, p.height) * 1.5, d.x, d.y, d.w, d.h);
			} else if (p.shape === 'vortex') {
				const vR2 = p.width * 3 + p.width * 2 * (p.age / p.maxAge);
				hit = circRect(p.x, p.y, vR2, d.x, d.y, d.w, d.h);
			} else if (p.shape === 'summon') {
				hit = false; // summon projectiles spawn minions, don't hit directly
			} else {
				hit = circRect(p.x, p.y, hitR, d.x, d.y, d.w, d.h);
			}

		if (hit) {
				const homingMult = p.behavior === 'homing' ? 0.5 : 1;
				const lobMult = p.behavior === 'lob' ? 1.25 : 1; // lob: 25% damage bonus
				const orbitMult = p.behavior === 'orbit' ? 0.7 : 1;
				const rainMult = p.behavior === 'rain' ? 1.5 : 1;
				const barrageMult = p.behavior === 'barrage' ? 1.35 : 1;
				const hitNum = (p.castId >= 0 && spellHitCounts[p.castId] != null) ? spellHitCounts[p.castId]++ : 0;
				const dimMult = 1 / (1 + hitNum * 0.08);
				const beamMult = p.shape === 'beam' ? 0.65 : 1;
				const releaseMult = p.effects.includes('damageRelease') ? (1 + damageStored/500) : 1;
				const hasElemental = p.effects.includes('burn')||p.effects.includes('freeze')||p.effects.includes('poison')||p.effects.includes('stun');
				const elemMult = hasElemental ? (1+vowElementalDmgBonus*0.07) : 1;
				// PhaseThrough: 45% damage reduction for passing through walls
				const phaseMult = p.effects.includes('phaseThrough') ? 0.55 : 1;
				// Meteor: more damage the farther the enemy is from the player
				let meteorDistMult = 1;
				if (p.shape === 'meteor') { const md = Math.hypot(p.x - (player.x + player.w/2), p.y - (player.y + player.h/2)); meteorDistMult = 1 + Math.min(md / 300, 2.0); }
				// Meteor: 25% base damage nerf
				const meteorNerf = p.shape === 'meteor' ? 0.75 : 1;
				// Spread damage bonus
				let spreadMult = 1;
				if (p.phase && p.phase.spread > 0 && p.phase.count > 1) { spreadMult = 1 + (p.phase.spread * 0.0025 * p.phase.count); }
				const rawDmg = p.power * 8 * homingMult * lobMult * orbitMult * rainMult * barrageMult * dimMult * beamMult * releaseMult * elemMult * phaseMult * meteorDistMult * spreadMult * meteorNerf;
				// burn/poison steal a portion of hit damage and deal it as DOT with 25% bonus
				let dotSteal = 0;
				if (p.effects.includes('burn'))  dotSteal = 0.5;
				if (p.effects.includes('poison')) dotSteal = 0.4;
				const baseDmg = rawDmg * (1 - dotSteal);
				// Damage store/release
				if(p.effects.includes('damageStore')){const dsPct=p.phase.damageStorePercent!=null?p.phase.damageStorePercent:0.5;damageStored+=baseDmg*dsPct;updateDamageStoreHUD();}
				if(p.effects.includes('damageRelease')&&damageStored>0){damageStored=0;updateDamageStoreHUD();}
				d.hp -= baseDmg;
				d.flash = 8;
				// accumulate damage per dummy
				const di = dummies.indexOf(d);
				if (di >= 0) {
					const acc = dummyDmgAccum[di];
					acc.total += baseDmg;
					acc.timer = 180; // 3 seconds at 60fps
					acc.x = d.x + d.w/2;
					acc.y = d.y - 24;
					acc.color = p.color;
				}
				applyEffects(p, d, rawDmg);

				// chain: jump to next target + stun
				if (p.shape === 'chain' && p.chainHits < p.chainMax) {
					p.chainHits++;
					p.hitDummies.add(d);
					// chain stun
					const stunTime = (p.phase.chainStunTime || 0);
					if (stunTime > 0) d.stunTimer = Math.max(d.stunTimer, Math.round(stunTime * FPS));
					let next = null, nextD = Infinity;
					for (const d2 of dummies) {
						if (d2 === d || d2.hp <= 0 || p.hitDummies.has(d2)) continue;
						const dd = dist(p.x,p.y,d2.x+d2.w/2,d2.y+d2.h/2);
						if (dd < nextD && dd < 500) { nextD = dd; next = d2; }
					}
					if (next) {
						const ang = Math.atan2(next.y+next.h/2-p.y, next.x+next.w/2-p.x);
						const spd = Math.sqrt(p.vx*p.vx+p.vy*p.vy)||8;
						p.vx = Math.cos(ang)*spd; p.vy = Math.sin(ang)*spd;
						spawnImpact(p.x, p.y, p.color);
						if(p.afterHitEffect && p.afterHitEffect!=='none') spawnAfterHitEffect(p.x,p.y,p.afterHitEffect,p.color);
						continue;
					}
				}

				// pierce shapes: mark dummy hit, don't destroy projectile
				if (PIERCE_SET.has(p.shape)) {
					p.hitDummies.add(d);
					/* Vortex: pull dummies toward center + damage over time */
					if (p.shape === 'vortex') {
						const dx4 = p.x - (d.x + d.w/2), dy4 = p.y - (d.y + d.h/2);
						const d4 = Math.sqrt(dx4*dx4 + dy4*dy4) || 1;
						const pullStr = 3.5;
						d.x += dx4/d4 * pullStr; d.y += dy4/d4 * pullStr;
						// DoT: deal damage every 15 frames
						if (!p._vortexDotTimer) p._vortexDotTimer = 0;
						if (p.age % 15 === 0) {
							const dotDmg = p.power * 0.3;
							d.hp -= dotDmg; d.flash = 4;
							const di2 = dummies.indexOf(d);
							if (di2 >= 0) { dummyDmgAccum[di2].total += dotDmg; dummyDmgAccum[di2].timer = 180; }
							dmgNumbers.push({x: d.x + d.w/2, y: d.y - 10, text: Math.round(dotDmg) + '\ud83c\udf00', age: 0, color: p.color});
						}
					}
					continue;
				}

				/* Meteor: explosion on impact dealing 50% AoE damage */
				if (p.shape === 'meteor' && !p._meteorExploded) {
					p._meteorExploded = true;
					const mSize = Math.max(p.width, p.height);
					const explodeR = mSize * 6 + mSize * mSize * 0.04;
					spawnAfterHitEffect(p.x, p.y, 'explosion', p.color, mSize * 2.5);
					for (const d2 of dummies) {
						if (d2 === d) continue;
						const dd2 = Math.hypot(p.x - (d2.x + d2.w/2), p.y - (d2.y + d2.h/2));
						if (dd2 < explodeR) {
							const falloff = 1 - dd2 / explodeR;
							const splashDmg = rawDmg * 0.5 * falloff;
							d2.hp -= splashDmg; d2.flash = 8;
							dmgNumbers.push({x: d2.x + d2.w/2, y: d2.y - 10, text: Math.round(splashDmg) + '💥', age: 0, color: '#ff6600'});
						}
					}
				}

				p.hasHit = true;
				spawnImpact(p.x, p.y, p.color);
				if(p.afterHitEffect && p.afterHitEffect!=='none') spawnAfterHitEffect(p.x,p.y,p.afterHitEffect,p.color);

				// trigger next phase ON HIT (carry projectile forward by default)
				if (!p.phaseTriggered && p.phase.nextTrigger === 'onHit' && p.phaseIdx+1 < p.spell.phases.length) {
					p.phaseTriggered = true;
					if (p.effects.includes('resetProjectiles')) {
						spawnPhase(p.spell, p.phaseIdx+1, p.x, p.y, p.facing, undefined, p.isUltimate, p.castId, p.sourceSlot);
					} else {
						morphProjectile(p, p.phaseIdx+1);
					}
				}
				break;
			}
		}

		/* ---- DISPEL — destroy spell walls on contact ---- */
		if(p.effects.includes('dispel')&&!p.hasHit){
			const dR=Math.max(p.width,p.height)*0.8;
			for(let wi=spellWalls.length-1;wi>=0;wi--){
				const sw=spellWalls[wi];
				if(p.x>=sw.x-dR&&p.x<=sw.x+sw.w+dR&&p.y>=sw.y-dR&&p.y<=sw.y+sw.h+dR){
					spawnImpact(sw.x+sw.w/2,sw.y+sw.h/2,'#aa88ff');
					dmgNumbers.push({x:sw.x+sw.w/2,y:sw.y-10,text:'🚫 Wall Dispelled!',age:0,color:'#aa88ff'});
					spellWalls.splice(wi,1);
				}
			}
		}

		/* ---- PLATFORM COLLISION ---- */
		const skipPlatformCollision = p.shape==='nova' || p.shape==='vortex' || p.effects.includes('phaseThrough') || p.behavior==='stationary' || p.behavior==='selfCast' || p.behavior==='underfoot' || p.behavior==='aroundSelf' || p.behavior==='ground' ||
			(p.behavior==='orbit' && p.age < p.orbitDur);

		if (!skipPlatformCollision && !p.hasHit) {
			let wallHit = false;
			for (const plat of platforms) {
				if (p.behavior==='groundSurge' && plat.y===WORLD_H-GROUND_THICK) continue;
				if (circRect(p.x, p.y, hitR*0.4, plat.x, plat.y, plat.w, plat.h)) {
					wallHit = true; break;
				}
			}
			if (!wallHit) {
				for (const sw of spellWalls) {
					if (circRect(p.x, p.y, hitR*0.4, sw.x, sw.y, sw.w, sw.h)) {
						wallHit = true; break;
					}
				}
			}
			if (!wallHit) {
				for (const sp of projectiles) {
					if (sp === p || !sp.isSolidPlatform) continue;
					const sw = sp.width * 3, sh = sp.height * 1.5;
					if (circRect(p.x, p.y, hitR*0.4, sp.x-sw/2, sp.y-sh/2, sw, sh)) {
						wallHit = true; break;
					}
				}
			}
			if (wallHit) {
				spawnImpact(p.x, p.y, p.color);
				if(p.afterHitEffect && p.afterHitEffect!=='none') spawnAfterHitEffect(p.x,p.y,p.afterHitEffect,p.color);
				p.hasHit = true;
			if (!p.phaseTriggered && p.phase.nextTrigger==='onHit' && p.phaseIdx+1<p.spell.phases.length) {
					p.phaseTriggered = true;
					if (p.effects.includes('resetProjectiles')) {
						spawnPhase(p.spell, p.phaseIdx+1, p.x, p.y, p.facing, undefined, p.isUltimate, p.castId, p.sourceSlot);
					} else {
						morphProjectile(p, p.phaseIdx+1);
					}
				}
			}
		}

		/* ---- AFTER DELAY trigger ---- */
		if (!p.phaseTriggered && p.phase.nextTrigger==='afterDelay' && p.age > p.maxAge*0.6) {
			p.phaseTriggered = true;
			if (p.phaseIdx+1<p.spell.phases.length) {
				if (p.effects.includes('resetProjectiles')) {
					spawnPhase(p.spell, p.phaseIdx+1, p.x, p.y, p.facing, undefined, p.isUltimate, p.castId, p.sourceSlot);
				} else {
					morphProjectile(p, p.phaseIdx+1);
				}
			}
		}

		/* ---- TIMED RELEASE auto-trigger effects ---- */
		if (!p.timedReleaseTriggered && p.effects.includes('timedRelease') && p.age >= p.timedReleaseDelay) {
			p.timedReleaseTriggered = true;
			applyEffects(p, null);
			spawnImpact(p.x, p.y, p.color);
			dmgNumbers.push({ x:p.x, y:p.y-10, text:'\u23f1\ufe0f Triggered!', age:0, color:p.color });
		}

		/* ---- PHASE FORK: trigger next phase without ending current ---- */
		if (p.effects.includes('phaseFork') && p.phaseIdx+1 < p.spell.phases.length) {
			if (p.phaseForkCount < p.phaseForkRepeats && p.age >= p.phaseForkNextAge) {
				p.phaseForkCount++;
				p.phaseForkNextAge = p.age + p.phaseForkDelay;
				const dmgMult = 1 / (1 + p.phaseForkCount * 0.3);
				spawnPhase(p.spell, p.phaseIdx+1, p.x, p.y, p.facing, dmgMult, p.isUltimate, p.castId, p.sourceSlot);
				spawnImpact(p.x, p.y, p.color);
				dmgNumbers.push({ x:p.x, y:p.y-14, text:'\ud83d\udd00 Fork!', age:0, color:p.color });
			}
		}

		/* ---- EXPIRE ---- */
		const shouldRemove = !p._held && (p.age >= p.maxAge || (p.hasHit && !PIERCE_SET.has(p.shape)));
		if (shouldRemove) {
			/* Meteor: explode on expire/ground contact too */
			if (p.shape === 'meteor' && !p._meteorExploded) {
				p._meteorExploded = true;
				const mSize = Math.max(p.width, p.height);
				const explodeR = mSize * 6 + mSize * mSize * 0.04;
				spawnAfterHitEffect(p.x, p.y, 'explosion', p.color, mSize * 2.5);
				for (const d2 of dummies) {
					const dd2 = Math.hypot(p.x - (d2.x + d2.w/2), p.y - (d2.y + d2.h/2));
					if (dd2 < explodeR) {
						const falloff = 1 - dd2 / explodeR;
						const splashDmg = p.power * 8 * 0.5 * falloff;
						d2.hp -= splashDmg; d2.flash = 8;
						dmgNumbers.push({x: d2.x + d2.w/2, y: d2.y - 10, text: Math.round(splashDmg) + '💥', age: 0, color: '#ff6600'});
					}
				}
			}
			if (!p.phaseTriggered && p.phase.nextTrigger==='onExpire' && p.phaseIdx+1<p.spell.phases.length) {
				p.phaseTriggered = true;
				if (p.effects.includes('resetProjectiles')) {
					spawnPhase(p.spell, p.phaseIdx+1, p.x, p.y, p.facing, undefined, p.isUltimate, p.castId, p.sourceSlot);
					projectiles.splice(i,1);
				} else {
					morphProjectile(p, p.phaseIdx+1);
					// don't remove — projectile continues as next phase
				}
				continue;
			}
			projectiles.splice(i,1);
			continue;
		}

		// out of world
		if (p.x<-100||p.x>WORLD_W+100||p.y<-600||p.y>WORLD_H+100) {
			projectiles.splice(i,1);
		}
	}
}

/* =============================================================
   APPLY EFFECTS
   ============================================================= */
function applyEffects(proj, dummy, rawDmg) {
	const ultMult = proj.isUltimate ? 3 : 1;
	const ePow = proj.phase.effectPower || 1;
	const eDur = proj.phase.effectDuration || 1;
	for (const fx of proj.effects) {
		switch (fx) {
			case 'burn': {
				if(dummy && rawDmg) {
					const stolenDmg = rawDmg * 0.5;
					const ticks = Math.round(5 * eDur * ultMult);
					const dotPerTick = (stolenDmg * 1.25) / ticks;
					dummy.dots.push({ type:'burn', dmg:dotPerTick, ticks:ticks, interval:60, timer:0, color:'#ff6a00' });
				}
				break;
			}
			case 'poison': {
				if(dummy && rawDmg) {
					const stolenDmg = rawDmg * 0.4;
					const ticks = Math.round(6 * eDur * ultMult);
					const dotPerTick = (stolenDmg * 1.25) / ticks;
					dummy.dots.push({ type:'poison', dmg:dotPerTick, ticks:ticks, interval:75, timer:0, color:'#44dd44' });
				}
				break;
			}
			case 'freeze':
				if(dummy){ dummy.slowTimer = (dummy.slowTimer||0)+Math.round(90*eDur*ultMult); dummy.flash = 15; }
				break;
			case 'knockback':
				if(dummy){ dummy.x += proj.facing * 40 * ePow * ultMult; dummy.x = Math.max(20, Math.min(WORLD_W-20-dummy.w, dummy.x)); }
				break;
			case 'pull': {
				if(dummy){
					const dx = player.x+player.w/2-(dummy.x+dummy.w/2);
					const dy = player.y+player.h/2-(dummy.y+dummy.h/2);
					const d2 = Math.sqrt(dx*dx+dy*dy)||1;
					dummy.x += (dx/d2)*50*ePow*ultMult;
					dummy.y += (dy/d2)*30*ePow*ultMult;
				}
				break;
			}
			case 'stun':
				if(dummy) dummy.stunTimer = (dummy.stunTimer||0)+Math.round(60*eDur*ultMult);
				break;
			case 'healSelf': {
				const healAmt = Math.round(proj.power*5*ePow*ultMult);
				dmgNumbers.push({ x:player.x+player.w/2, y:player.y-10, text:'+'+healAmt, age:0, color:'#44ff88' });
				break;
			}
			case 'shield':
				dmgNumbers.push({ x:player.x+player.w/2, y:player.y-20, text:'🛡️ Shield', age:0, color:'#88bbff' });
				break;
			case 'lifesteal':
				mana = Math.min(maxMana, mana + proj.power*3*ePow*ultMult);
				dmgNumbers.push({ x:player.x+player.w/2, y:player.y-10, text:'+'+Math.round(proj.power*3*ePow*ultMult)+'💧', age:0, color:'#bb44ff' });
				break;
			case 'speedBoost':
				playerBuffs.speedTimer = Math.round(300*eDur*ultMult); playerBuffs.speedMult = proj.isUltimate ? 2.5 : 1.8;
				dmgNumbers.push({ x:player.x+player.w/2, y:player.y-10, text:'🏃 Speed!', age:0, color:'#ffcc00' });
				break;
			case 'jumpBoost':
				playerBuffs.jumpTimer = Math.round(300*eDur*ultMult); playerBuffs.jumpMult = proj.isUltimate ? 2.0 : 1.5;
				dmgNumbers.push({ x:player.x+player.w/2, y:player.y-20, text:'⬆️ Jump!', age:0, color:'#66ff66' });
				break;
			case 'manaRegen':
				playerBuffs.manaRegenTimer = Math.round(300*eDur*ultMult); playerBuffs.manaRegenMult = proj.isUltimate ? 6 : 3;
				dmgNumbers.push({ x:player.x+player.w/2, y:player.y-10, text:'💧 Regen!', age:0, color:'#66ccff' });
				break;
			case 'forceJump':
				// forces the target to jump — enables multi-jumps in air
				if (!dummy) {
					// hit player (allyOrb or selfCast)
					player.vy = player.jumpPow * (playerBuffs.jumpTimer > 0 ? playerBuffs.jumpMult : 1);
					player.onGround = false;
					dmgNumbers.push({ x:player.x+player.w/2, y:player.y-10, text:'🚀 Jump!', age:0, color:'#ff8800' });
				} else {
					// hit enemy - launch them upward
					dummy.y -= 60;
					dmgNumbers.push({ x:dummy.x+dummy.w/2, y:dummy.y-10, text:'🚀 Launched!', age:0, color:'#ff8800' });
				}
				break;
			case 'horizontalLaunch':
				if (!dummy) {
					player.launchVx = proj.facing * proj.power * 3.5;
					dmgNumbers.push({ x:player.x+player.w/2, y:player.y-10, text:'🚀 Launched!', age:0, color:'#ff8800' });
				} else {
					dummy.x += proj.facing * proj.power * 10;
					dummy.x = Math.max(20, Math.min(WORLD_W-20-dummy.w, dummy.x));
					dmgNumbers.push({ x:dummy.x+dummy.w/2, y:dummy.y-10, text:'LAUNCHED!', age:0, color:'#ff8800' });
				}
				break;
		}
	}
}

/* =============================================================
   PARTICLES & IMPACT
   ============================================================= */
function spawnImpact(x, y, color) {
	if (particles.length > MAX_PARTICLES) return; // skip if too many particles
	const rgb = hexToRgb(color);
	const count = particles.length > MAX_PARTICLES * 0.7 ? 4 : 8;
	for (let i = 0; i < count; i++) {
		const ang = Math.random()*Math.PI*2;
		const spd = 1.5+Math.random()*3.5;
		particles.push({
			x, y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
			life:18+Math.random()*12|0, maxLife:30,
			r:2+Math.random()*2.5, color:rgb,
		});
	}
}

/* After-hit visual effects */
function spawnAfterHitEffect(x, y, type, baseColor, spellSize) {
	if (particles.length > MAX_PARTICLES * 0.8) return;
	const sz = spellSize || 10;
	const scaleMult = Math.max(0.6, Math.min(sz / 10, 3.5));
	const lifeMult = 1 + scaleMult * 0.5;
	switch(type) {
		case 'explosion': {
			const cnt = Math.round(14 * scaleMult);
			for (let i = 0; i < cnt; i++) {
				const ang = Math.random()*Math.PI*2;
				const spd = (2+Math.random()*5) * scaleMult;
				const colors = [{r:255,g:80+Math.random()*60|0,b:0},{r:255,g:160+Math.random()*60|0,b:0},{r:255,g:220,b:100}];
				particles.push({x, y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-1,
					life:Math.round((20+Math.random()*15|0)*lifeMult), maxLife:Math.round(35*lifeMult), r:(3+Math.random()*3)*scaleMult, color:colors[i%3]});
			}
			break;
		}
		case 'flame_burst': {
			const cnt = Math.round(10 * scaleMult);
			for (let i = 0; i < cnt; i++) {
				const ang = -Math.PI/2 + (Math.random()-0.5)*1.2;
				const spd = (2+Math.random()*3) * scaleMult;
				particles.push({x:x+(Math.random()-0.5)*12*scaleMult, y, vx:Math.cos(ang)*spd*0.5, vy:Math.sin(ang)*spd-1,
					life:Math.round((15+Math.random()*20|0)*lifeMult), maxLife:Math.round(35*lifeMult), r:(2.5+Math.random()*2)*scaleMult,
					color:{r:255,g:50+Math.random()*120|0,b:0}});
			}
			break;
		}
		case 'ice_shatter': {
			const cnt = Math.round(12 * scaleMult);
			for (let i = 0; i < cnt; i++) {
				const ang = Math.random()*Math.PI*2;
				const spd = (3+Math.random()*4) * scaleMult;
				particles.push({x, y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-1.5,
					life:Math.round((14+Math.random()*14|0)*lifeMult), maxLife:Math.round(28*lifeMult), r:(2+Math.random()*2.5)*scaleMult,
					color:{r:100+Math.random()*60|0,g:180+Math.random()*60|0,b:255}});
			}
			break;
		}
		case 'electric_spark': {
			const cnt = Math.round(10 * scaleMult);
			for (let i = 0; i < cnt; i++) {
				const ang = Math.random()*Math.PI*2;
				const spd = (4+Math.random()*5) * scaleMult;
				particles.push({x:x+(Math.random()-0.5)*10*scaleMult, y:y+(Math.random()-0.5)*10*scaleMult,
					vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
					life:Math.round((8+Math.random()*10|0)*lifeMult), maxLife:Math.round(18*lifeMult), r:(1.5+Math.random()*1.5)*scaleMult,
					color:{r:200+Math.random()*55|0,g:200+Math.random()*55|0,b:50+Math.random()*50|0}});
			}
			break;
		}
		case 'poison_cloud': {
			const cnt = Math.round(8 * scaleMult);
			for (let i = 0; i < cnt; i++) {
				const ang = Math.random()*Math.PI*2;
				const spd = (0.5+Math.random()*1.5) * scaleMult;
				particles.push({x:x+(Math.random()-0.5)*20*scaleMult, y:y+(Math.random()-0.5)*20*scaleMult,
					vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-0.5,
					life:Math.round((30+Math.random()*25|0)*lifeMult), maxLife:Math.round(55*lifeMult), r:(4+Math.random()*3)*scaleMult,
					color:{r:50+Math.random()*40|0,g:180+Math.random()*60|0,b:30+Math.random()*40|0}});
			}
			break;
		}
		case 'star_burst': {
			const cnt = Math.round(12 * scaleMult);
			for (let i = 0; i < cnt; i++) {
				const ang = i * (Math.PI*2/cnt);
				const spd = (3+Math.random()*2) * scaleMult;
				particles.push({x, y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
					life:Math.round((16+Math.random()*12|0)*lifeMult), maxLife:Math.round(28*lifeMult), r:(2+Math.random()*2)*scaleMult,
					color:{r:255,g:220+Math.random()*35|0,b:100+Math.random()*100|0}});
			}
			break;
		}
	}
}

function hexToRgb(hex) {
	return {
		r: parseInt(hex.slice(1,3),16)||100,
		g: parseInt(hex.slice(3,5),16)||150,
		b: parseInt(hex.slice(5,7),16)||255
	};
}

/* =============================================================
   UPDATE
   ============================================================= */
let castPressed = false;
let hotbarDirty = false;

function update() {
	/* player movement */
	let moveX = 0;
	if (keys['a']||keys['arrowleft'])  moveX -= 1;
	if (keys['d']||keys['arrowright']) moveX += 1;
	if (moveX !== 0) player.facing = moveX;
	else { const worldMX = mouseScreenX + camera.x; player.facing = worldMX > player.x + player.w/2 ? 1 : -1; }
	const currentSpeed = player.speed * (playerBuffs.speedTimer > 0 ? playerBuffs.speedMult : 1);
	player.vx = moveX * currentSpeed;
	if (player.launchVx) {
		player.vx += player.launchVx;
		player.launchVx *= 0.88;
		if (Math.abs(player.launchVx) < 0.5) player.launchVx = 0;
	}

	if ((keys['w']||keys['arrowup']||keys[' ']) && player.onGround) {
		const currentJump = player.jumpPow * (playerBuffs.jumpTimer > 0 ? playerBuffs.jumpMult : 1);
		player.vy = currentJump;
		player.onGround = false;
	}

	player.vy += GRAVITY;
	if (player.vy > 18) player.vy = 18;

	player.x += player.vx;
	for (const p of platforms) {
		if (rectRect(player, p)) {
			if (player.vx > 0) player.x = p.x - player.w;
			else if (player.vx < 0) player.x = p.x + p.w;
			player.vx = 0;
			player.launchVx = 0;
		}
	}
	for (const sw of spellWalls) {
		if (rectRect(player, sw)) {
			if (player.vx > 0) player.x = sw.x - player.w;
			else if (player.vx < 0) player.x = sw.x + sw.w;
			player.vx = 0;
			player.launchVx = 0;
		}
	}
	// solidify projectiles as platforms (horizontal)
	for (const p of projectiles) {
		if (!p.isSolidPlatform) continue;
		const sw = p.width * 3, sh = p.height * 1.5;
		const platBox = { x:p.x-sw/2, y:p.y-sh/2, w:sw, h:sh };
		if (rectRect(player, platBox)) {
			if (player.vx > 0) player.x = platBox.x - player.w;
			else if (player.vx < 0) player.x = platBox.x + platBox.w;
			player.vx = 0;
		}
	}
	player.y += player.vy;
	player.onGround = false;
	for (const p of platforms) {
		if (rectRect(player, p)) {
			if (player.vy > 0) { player.y = p.y - player.h; player.onGround = true; }
			else if (player.vy < 0) { player.y = p.y + p.h; }
			player.vy = 0;
		}
	}
	for (const sw of spellWalls) {
		if (rectRect(player, sw)) {
			if (player.vy > 0) { player.y = sw.y - player.h; player.onGround = true; }
			else if (player.vy < 0) { player.y = sw.y + sw.h; }
			player.vy = 0;
		}
	}
	// solidify projectiles as platforms (vertical)
	for (const p of projectiles) {
		if (!p.isSolidPlatform) continue;
		const sw = p.width * 3, sh = p.height * 1.5;
		const platBox = { x:p.x-sw/2, y:p.y-sh/2, w:sw, h:sh };
		if (rectRect(player, platBox)) {
			if (player.vy > 0) { player.y = platBox.y - player.h; player.onGround = true; }
			else if (player.vy < 0) { player.y = platBox.y + platBox.h; }
			player.vy = 0;
		}
	}
	if (player.y < 0) { player.y = 0; player.vy = 0; }

	/* casting */
	const wantCast = mouseDown;
	if (wantCast && !castPressed) { castPressed = true; castSpell(); }
	if (!wantCast) castPressed = false;
	if (player.castTimer > 0) player.castTimer--;

	/* player animation state */
	if(player.castTimer>0) playerAnimState='attack';
	else if(Math.abs(player.vx)>0.5||(!player.onGround&&Math.abs(player.vy)>1)) playerAnimState='walk';
	else playerAnimState='idle';
	playerAnimTimer++;
	if(playerAnimTimer>=PLAYER_SPRITE_FPS){playerAnimTimer=0;playerAnimFrame=(playerAnimFrame+1)%PLAYER_SPRITE_COLS;}

	/* cooldowns */
	let anyCDChanged = false;
	for (let i = 0; i < 10; i++) {
		if (spellCooldowns[i] > 0) { spellCooldowns[i]--; anyCDChanged = true; }
	}
	if (anyCDChanged || hotbarDirty) { renderHotbar(); hotbarDirty = false; }

	/* mana regen */
	const currentRegen = baseManaRegen * (playerBuffs.manaRegenTimer > 0 ? playerBuffs.manaRegenMult : 1);
	mana = Math.min(maxMana, mana + currentRegen);
	updateManaHUD();

	/* projectiles */
	updateProjectiles();

	/* dummies */
	for (let di = 0; di < dummies.length; di++) {
		const d = dummies[di];
		if (d.flash > 0) d.flash--;
		if (d.stunTimer > 0) d.stunTimer--;
		if (d.slowTimer > 0) d.slowTimer--;

		if (d.hp <= 0) {
			d.hp = d.maxHp;
			d.x = dummySpawns[di].x;
			d.y = dummySpawns[di].y;
			d.flash = 0; d.dots = []; d.stunTimer = 0; d.slowTimer = 0;
			dmgNumbers.push({ x:d.x+d.w/2, y:d.y-10, text:'Respawned', age:0, color:'#888' });
			dummyDmgAccum[di].total = 0; dummyDmgAccum[di].timer = 0;
		}

		for (let doti = d.dots.length-1; doti >= 0; doti--) {
			const dot = d.dots[doti];
			dot.timer++;
			if (dot.timer >= dot.interval) {
				dot.timer = 0;
				d.hp -= dot.dmg;
				d.flash = 4;
				// DoT damage into accumulator too
				const acc = dummyDmgAccum[di];
				acc.total += dot.dmg;
				acc.timer = 180;
				acc.x = d.x + d.w/2;
				acc.y = d.y - 24;
				acc.color = dot.color;
				dot.ticks--;
				if (dot.ticks <= 0) d.dots.splice(doti, 1);
			}
		}
	}

	/* spell walls */
	for (let i = spellWalls.length - 1; i >= 0; i--) {
		spellWalls[i].timer--;
		if (spellWalls[i].timer <= 0) spellWalls.splice(i, 1);
	}

	/* player buffs */
	if (playerBuffs.speedTimer > 0) playerBuffs.speedTimer--;
	if (playerBuffs.jumpTimer > 0) playerBuffs.jumpTimer--;
	if (playerBuffs.manaRegenTimer > 0) playerBuffs.manaRegenTimer--;

	/* particles */
	for (let i = particles.length-1; i >= 0; i--) {
		const p = particles[i];
		p.x += p.vx; p.y += p.vy;
		p.vy += 0.06; p.vx *= 0.97;
		p.life--;
		if (p.life <= 0) particles.splice(i,1);
	}

	/* dmg numbers */
	for (let i = dmgNumbers.length-1; i >= 0; i--) {
		dmgNumbers[i].age++;
		dmgNumbers[i].y -= 0.8;
		if (dmgNumbers[i].age > 60) dmgNumbers.splice(i,1);
	}

	/* damage accumulators — tick down, clear when timer runs out */
	for (const acc of dummyDmgAccum) {
		if (acc.timer > 0) acc.timer--;
		if (acc.timer <= 0 && acc.total > 0) acc.total = 0;
	}

	/* Update player minions */
	for (let mi = playerMinions.length - 1; mi >= 0; mi--) {
		const m = playerMinions[mi];
		m.age++; m.animTimer++;
		if (m.age >= m.maxAge || m.hp <= 0) {
			spawnImpact(m.x + m.w/2, m.y + m.h/2, m.color);
			playerMinions.splice(mi, 1); continue;
		}
		// Find nearest dummy target
		let nearest = null, nearDist = m.detectRange || 600;
		for (const d of dummies) {
			const dd = Math.hypot(d.x + d.w/2 - m.x - m.w/2, d.y + d.h/2 - m.y - m.h/2);
			if (dd < nearDist) { nearest = d; nearDist = dd; }
		}
		m.target = nearest;
		// Fly toward target
		if (nearest) {
			const dx = nearest.x + nearest.w/2 - m.x - m.w/2;
			const dy = nearest.y + nearest.h/2 - m.y - m.h/2;
			const dist = Math.hypot(dx, dy) || 1;
			const speed = m.moveSpeed || 2.5;
			const stopDist = m.summonClose ? 60 : 200;
			if (dist > stopDist) { m.vx += (dx/dist) * speed * 0.1; m.vy += (dy/dist) * speed * 0.1; }
			m.facing = dx > 0 ? 1 : -1;
		}
		m.vx *= 0.92; m.vy *= 0.92;
		m.x += m.vx; m.y += m.vy;
		// Fire next spell phase periodically
		m.fireTimer++;
		if (m.fireTimer >= m.fireCooldown && m.phaseIdx + 1 < m.spell.phases.length) {
			m.fireTimer = 0;
			const castId = nextCastId++; spellHitCounts[castId] = 0;
			spawnPhase(m.spell, m.phaseIdx + 1, m.x + m.w/2, m.y + m.h/2, m.facing, 0.6, m.isUltimate, castId, m.sourceSlot);
			spawnImpact(m.x + m.w/2, m.y + m.h/2, m.color);
		}
	}

	updateCamera();
}

/* =============================================================
   RENDER
   ============================================================= */
function render() {
	ctx.clearRect(0, 0, canvas.width, canvas.height);

	/* sky */
	const grad = ctx.createLinearGradient(0,0,0,canvas.height);
	grad.addColorStop(0,'#1a1a2e'); grad.addColorStop(1,'#16213e');
	ctx.fillStyle = grad;
	ctx.fillRect(0,0,canvas.width,canvas.height);

	/* grid parallax - batched into single path */
	ctx.save(); ctx.globalAlpha = 0.06; ctx.strokeStyle = '#888'; ctx.lineWidth = 1;
	const gs = 80, oX = -(camera.x*0.3)%gs, oY = -(camera.y*0.3)%gs;
	ctx.beginPath();
	for (let gx=oX;gx<canvas.width;gx+=gs){ctx.moveTo(gx,0);ctx.lineTo(gx,canvas.height);}
	for (let gy=oY;gy<canvas.height;gy+=gs){ctx.moveTo(0,gy);ctx.lineTo(canvas.width,gy);}
	ctx.stroke();
	ctx.restore();

	/* platforms */
	for (const p of platforms) {
		const sx=p.x-camera.x, sy=p.y-camera.y;
		if(sx+p.w<0||sx>canvas.width||sy+p.h<0||sy>canvas.height) continue;
		if(p.h>30){ctx.fillStyle='#2a2a3d';ctx.fillRect(sx,sy,p.w,p.h);ctx.fillStyle='#3d3d56';ctx.fillRect(sx,sy,p.w,4);}
		else{ctx.fillStyle='#3b3b55';ctx.fillRect(sx,sy,p.w,p.h);ctx.fillStyle='#55557a';ctx.fillRect(sx,sy,p.w,4);}
	}

	/* spell walls */
	for (const sw of spellWalls) {
		const sx = sw.x - camera.x, sy = sw.y - camera.y;
		if (sx+sw.w<0||sx>canvas.width||sy+sw.h<0||sy>canvas.height) continue;
		const alpha = Math.min(1, sw.timer / 60);
		ctx.save();
		ctx.globalAlpha = 0.5 * alpha;
		ctx.fillStyle = sw.color;
		ctx.fillRect(sx, sy, sw.w, sw.h);
		ctx.globalAlpha = 0.8 * alpha;
		ctx.strokeStyle = sw.color;
		ctx.lineWidth = 2;
		ctx.strokeRect(sx, sy, sw.w, sw.h);
		ctx.globalAlpha = 0.15 * alpha;
		ctx.fillStyle = '#fff';
		ctx.fillRect(sx + 2, sy + 2, sw.w - 4, 4);
		ctx.restore();
	}

	/* dummies */
	for (const d of dummies) {
		const dx=d.x-camera.x, dy=d.y-camera.y;
		if(dx+d.w<-50||dx>canvas.width+50||dy+d.h<-50||dy>canvas.height+50) continue;
		ctx.fillStyle = d.flash>0?'#ff6666':(d.stunTimer>0?'#8888cc':(d.slowTimer>0?'#66ccff':'#8b4444'));
		ctx.fillRect(dx,dy,d.w,d.h);
		ctx.fillStyle='#666'; ctx.fillRect(dx-6,dy+12,d.w+12,4);
		ctx.fillStyle = d.flash>0?'#ff8888':'#a05050';
		ctx.fillRect(dx+4,dy-10,d.w-8,12);
		const hpPct=Math.max(0,d.hp/d.maxHp);
		ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(dx-4,dy-18,d.w+8,5);
		ctx.fillStyle = hpPct>0.5?'#2ecc71':(hpPct>0.25?'#f39c12':'#e74c3c');
		ctx.fillRect(dx-4,dy-18,(d.w+8)*hpPct,5);
		ctx.font='9px Arial';ctx.fillStyle='#888';ctx.textAlign='center';
		ctx.fillText('Dummy',dx+d.w/2,dy+d.h+12);
	}

	/* player minions */
	for (const m of playerMinions) {
		const mx = m.x - camera.x, my = m.y - camera.y;
		if (mx+m.w<-50||mx>canvas.width+50) continue;
		const bob = Math.sin(m.animTimer * 0.08) * 3;
		// Glow
		ctx.save();
		const glow = ctx.createRadialGradient(mx+m.w/2, my+m.h/2+bob, 0, mx+m.w/2, my+m.h/2+bob, m.w*1.5);
		glow.addColorStop(0, m.color); glow.addColorStop(1, 'transparent');
		ctx.globalAlpha = 0.25; ctx.fillStyle = glow;
		ctx.beginPath(); ctx.arc(mx+m.w/2, my+m.h/2+bob, m.w*1.5, 0, Math.PI*2); ctx.fill();
		ctx.restore();
		// Body
		ctx.fillStyle = m.color;
		ctx.beginPath(); ctx.arc(mx+m.w/2, my+m.h/2+bob, m.w*0.45, 0, Math.PI*2); ctx.fill();
		// Eyes
		ctx.fillStyle = '#fff';
		ctx.beginPath(); ctx.arc(mx+m.w/2+m.facing*3-3, my+m.h/2+bob-2, 2, 0, Math.PI*2); ctx.fill();
		ctx.beginPath(); ctx.arc(mx+m.w/2+m.facing*3+3, my+m.h/2+bob-2, 2, 0, Math.PI*2); ctx.fill();
		// Wings
		ctx.globalAlpha = 0.5;
		const wingFlap = Math.sin(m.animTimer * 0.2) * 4;
		ctx.fillStyle = m.color;
		ctx.beginPath(); ctx.moveTo(mx+m.w/2-5, my+m.h/2+bob); ctx.lineTo(mx-4, my+m.h/2-8+bob+wingFlap); ctx.lineTo(mx+4, my+m.h/2+bob); ctx.fill();
		ctx.beginPath(); ctx.moveTo(mx+m.w/2+5, my+m.h/2+bob); ctx.lineTo(mx+m.w+4, my+m.h/2-8+bob-wingFlap); ctx.lineTo(mx+m.w-4, my+m.h/2+bob); ctx.fill();
		ctx.globalAlpha = 1;
		// HP bar
		if (m.hp < m.maxHp) {
			const hpPct = m.hp / m.maxHp;
			ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(mx-2, my-6+bob, m.w+4, 3);
			ctx.fillStyle = hpPct > 0.5 ? '#44ff88' : '#ff8844';
			ctx.fillRect(mx-2, my-6+bob, (m.w+4)*hpPct, 3);
		}
	}

	/* projectiles */
	for (const p of projectiles) {
		const px=p.x-camera.x, py=p.y-camera.y;
		const progress = p.age/p.maxAge;

		// cull offscreen projectiles (generous margin for beams/cones)
		const margin = 500;
		if (px < -margin || px > canvas.width+margin || py < -margin || py > canvas.height+margin) continue;

		drawTrail(p);

		// glow (skip if many projectiles)
		if (projectiles.length < 100) {
			ctx.save();
			ctx.globalAlpha = 0.25+0.2*(1-progress);
			const glow = ctx.createRadialGradient(px,py,0,px,py,p.width*3);
			glow.addColorStop(0,p.color); glow.addColorStop(1,'transparent');
			ctx.fillStyle=glow;
			ctx.beginPath();ctx.arc(px,py,p.width*3,0,Math.PI*2);ctx.fill();
			ctx.restore();
		}

		ctx.fillStyle=p.color; ctx.strokeStyle=p.color; ctx.globalAlpha=0.9;

		switch(p.shape){
			case 'allyOrb':{
				const r=p.width*1.3;
				ctx.fillStyle='#44ff88';ctx.strokeStyle='#44ff88';
				ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.fill();
				ctx.fillStyle='#aaffcc';ctx.globalAlpha=0.6;
				ctx.beginPath();ctx.arc(px,py,r*0.5,0,Math.PI*2);ctx.fill();
				break;
			}
			case 'missile':case 'orb':{
				const r=p.shape==='orb'?p.width*1.3:p.width*0.7;
				ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.fill();
				ctx.fillStyle='#fff';ctx.globalAlpha=0.6;
				ctx.beginPath();ctx.arc(px,py,r*0.4,0,Math.PI*2);ctx.fill();
				break;
			}
			case 'blade':{
				ctx.save();ctx.translate(px,py);ctx.rotate(p.age*0.3);
				ctx.fillRect(-p.width*1.8,-p.height*0.3,p.width*3.6,p.height*0.6);
				ctx.restore();break;
			}
			case 'beam':{
				const bx=p.startX-camera.x,by=p.startY-camera.y;
				ctx.save();
				ctx.translate(bx,by);
				ctx.rotate(p.beamAngle);
				ctx.globalAlpha=0.7;
				ctx.fillRect(0,-p.height/2,p.beamLen,p.height);
				ctx.fillStyle='#fff';ctx.globalAlpha=0.5;
				ctx.fillRect(0,-p.height*0.15,p.beamLen,p.height*0.3);
				ctx.restore();
				break;
			}
			case 'ring':{
				const eR=progress*p.width*8;
				ctx.beginPath();ctx.arc(px,py,eR,0,Math.PI*2);
				ctx.lineWidth=3;ctx.globalAlpha=0.7*(1-progress);ctx.stroke();
				break;
			}
			case 'cone':{
